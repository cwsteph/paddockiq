<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PaddockIQ — Keeneland Turf Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; min-height:100%; background:#faf6ec; }
  body { font-family: Inter, system-ui, sans-serif; color:#1a2420; }
  * { box-sizing: border-box; }
  #root { min-height:100vh; }
  @keyframes kpulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  @keyframes kdot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-3px); opacity: 1; }
  }
  button { font-family: inherit; }
  select { font-family: inherit; }
  input { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #f5efe0; }
  ::-webkit-scrollbar-thumb { background: #d4c79a; border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #a67c2e; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="keeneland-tokens.jsx"></script>
<script type="text/babel" src="keeneland-chrome.jsx"></script>
<script type="text/babel" src="keeneland-dashboard.jsx"></script>
<script type="text/babel" src="keeneland-race.jsx"></script>

<script type="text/babel">
const { KDashboard, KRaceScreen } = window;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "brass",
  "density": "comfy",
  "silksOn": true
}/*EDITMODE-END*/;

function App() {
  const [screen, setScreen] = React.useState(() => {
    try {
      const s = localStorage.getItem('piq-screen');
      if (s === 'dashboard' || s === 'race') return s;
      return 'race';
    } catch { return 'race'; }
  });
  const [params, setParams] = React.useState({});
  const [ui, setUi] = React.useState(TWEAKS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => { try { localStorage.setItem('piq-screen', screen); } catch {} }, [screen]);

  // Host tweaks bridge
  React.useEffect(() => {
    const handler = (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode')   { setEditMode(true); setTweaksOpen(true); }
      if (d.type === '__deactivate_edit_mode') { setEditMode(false); setTweaksOpen(false); }
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const nav = (s, p) => { setScreen(s); setParams(p || {}); window.scrollTo(0,0); };
  const setTweak = (key, val) => {
    setUi(u => {
      const next = { ...u, [key]: val };
      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{ [key]: val }}, '*');
      return next;
    });
  };

  return (
    <div style={{minHeight:'100vh', background:'#faf6ec'}}>
      {screen === 'dashboard' && <KDashboard nav={nav} ui={ui}/>}
      {screen === 'race'      && <KRaceScreen  nav={nav} ui={ui} params={params}/>}

      {/* Footer ornament */}
      <div style={{padding:'22px 28px', textAlign:'center', borderTop:'1px solid #e4dcc4', background:'#f5efe0', color:'#6b6558', fontFamily:'Playfair Display, serif', fontStyle:'italic', fontSize:12}}>
        <svg width="80" height="10" viewBox="0 0 80 10" style={{display:'inline-block', verticalAlign:'middle', marginRight:10}}>
          <path d="M0 5 L30 5 M50 5 L80 5" stroke="#d4c79a" strokeWidth="0.75"/>
          <circle cx="40" cy="5" r="2" fill="#a67c2e"/>
        </svg>
        PaddockIQ · Turf Club Edition · All wagers subject to IRS reporting. Must be 21+.
      </div>

      {/* Tweaks panel */}
      {tweaksOpen && (
        <div style={{position:'fixed', bottom:20, right:20, width:280, background:'#0d3d2e', color:'#f5ecd3', borderRadius:8, border:'2px solid #a67c2e', boxShadow:'0 8px 24px rgba(0,0,0,0.3)', zIndex:100, fontFamily:'Inter, sans-serif'}}>
          <div style={{padding:'12px 16px', borderBottom:'1px solid rgba(212,175,55,0.3)', display:'flex', alignItems:'center'}}>
            <div style={{fontFamily:'Oswald, sans-serif', fontSize:11, letterSpacing:2, color:'#c99a4a', textTransform:'uppercase', fontWeight:600}}>Tweaks</div>
            <div style={{marginLeft:'auto', cursor:'pointer', color:'#c99a4a'}} onClick={()=>setTweaksOpen(false)}>×</div>
          </div>
          <div style={{padding:14, display:'flex', flexDirection:'column', gap:14}}>
            <div>
              <div style={{fontFamily:'Oswald, sans-serif', fontSize:10, letterSpacing:1.5, color:'rgba(245,236,211,0.6)', textTransform:'uppercase', marginBottom:6}}>Accent</div>
              <div style={{display:'flex', gap:4}}>
                {[
                  { id:'brass',   label:'Brass',   color:'#a67c2e' },
                  { id:'oxblood', label:'Oxblood', color:'#8b2330' },
                  { id:'navy',    label:'Navy',    color:'#1a3a5e' },
                ].map(a => (
                  <button key={a.id} onClick={()=>setTweak('accent', a.id)} style={{flex:1, padding:'8px 6px', background: ui.accent===a.id ? a.color : 'transparent', border:`1px solid ${a.color}`, color: ui.accent===a.id ? '#f5ecd3' : 'rgba(245,236,211,0.7)', borderRadius:4, fontFamily:'Oswald, sans-serif', fontSize:10, letterSpacing:1.5, cursor:'pointer', textTransform:'uppercase', fontWeight:600}}>
                    {a.label}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontFamily:'Oswald, sans-serif', fontSize:10, letterSpacing:1.5, color:'rgba(245,236,211,0.6)', textTransform:'uppercase', marginBottom:6}}>Density</div>
              <div style={{display:'flex', gap:4}}>
                {[['comfy','Comfy'],['compact','Compact']].map(([id,label])=>(
                  <button key={id} onClick={()=>setTweak('density', id)} style={{flex:1, padding:'8px 6px', background: ui.density===id ? '#a67c2e' : 'transparent', border:'1px solid #a67c2e', color: ui.density===id ? '#0d3d2e' : '#c99a4a', borderRadius:4, fontFamily:'Oswald, sans-serif', fontSize:10, letterSpacing:1.5, cursor:'pointer', textTransform:'uppercase', fontWeight:600}}>{label}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{display:'flex', alignItems:'center'}}>
                <div style={{fontFamily:'Oswald, sans-serif', fontSize:10, letterSpacing:1.5, color:'rgba(245,236,211,0.6)', textTransform:'uppercase'}}>Jockey Silks</div>
                <div style={{marginLeft:'auto', width:36, height:20, background: ui.silksOn ? '#a67c2e' : 'rgba(255,255,255,0.1)', borderRadius:10, position:'relative', cursor:'pointer'}} onClick={()=>setTweak('silksOn', !ui.silksOn)}>
                  <div style={{position:'absolute', top:2, left: ui.silksOn ? 18 : 2, width:16, height:16, background:'#f5ecd3', borderRadius:'50%', transition:'left 0.15s'}}/>
                </div>
              </div>
            </div>
            <div style={{fontSize:10.5, color:'rgba(245,236,211,0.5)', fontStyle:'italic', fontFamily:'Playfair Display, serif', paddingTop:10, borderTop:'1px solid rgba(212,175,55,0.2)'}}>
              Navigation: {['dashboard','race'].join(' · ')} — click race chips, horse rows, and tabs to traverse.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
