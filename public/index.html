<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Paddock IQ — Oaklawn Park — Mar 20, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Keeneland Turf Club palette — cream canvas, deep green masthead, brass accents */
  --bg:#faf6ec;            /* cream canvas */
  --bg2:#f5efe0;           /* canvas2 — alt rows, secondary surface */
  --bg3:#ffffff;           /* white panel */
  --border:#e4dcc4;        /* cream border */
  --rule2:#ede5cc;          /* soft inner rule */
  --gold:#a67c2e;          /* brass (primary accent) */
  --gold2:#c99a4a;         /* brass highlight */
  --green:#0d4f3c;         /* Keeneland deep green */
  --green2:#1a6b54;        /* green highlight */
  --green-soft:#e8f2e8;    /* green tint bg */
  --brass-soft:#fbf3d8;    /* brass tint bg */
  --red-soft:#f0d8dc;      /* red tint bg */
  --purple-soft:#ede3f5;   /* purple tint bg */
  --blue-soft:#dde6f0;     /* blue tint bg */
  --blue:#1a3a5e;          /* navy */
  --red:#8b2330;           /* oxblood */
  --purple:#6a3f90;        /* refined purple */
  --text:#1a2420;          /* ink */
  --muted:#6b6558;         /* muted tan */
  --dim:#a89f8c;           /* dim */
  --track-accent:#a67c2e;  /* brass stripe */
  /* Masthead */
  --header-bg:#0d3d2e;     /* deep green */
  --header-ink:#f5ecd3;    /* cream on green */
  --header-accent:#c99a4a; /* brass highlight on green */
}
body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);font-size:14px;min-height:100vh}
button{font-family:'Inter',system-ui,sans-serif;cursor:pointer}
input{font-family:'Inter',system-ui,sans-serif}
select{font-family:'Inter',system-ui,sans-serif}
.mono{font-family:'JetBrains Mono',monospace}
.bebas{font-family:'Oswald',sans-serif;letter-spacing:2px;font-weight:600;text-transform:uppercase}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:#d4c79a;border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}

/* Layout */
#hdr{background:var(--header-bg);color:var(--header-ink);border-bottom:3px solid var(--gold);padding:0 20px;display:flex;align-items:center;justify-content:space-between;min-height:58px;flex-wrap:wrap;gap:8px}
#hdr select{background:rgba(0,0,0,0.25);border-color:var(--gold) !important;color:var(--header-accent) !important;font-family:'Oswald',sans-serif !important;letter-spacing:1px}
#hdr input{background:rgba(0,0,0,0.2);border-color:rgba(201,154,74,0.4);color:var(--header-ink)}
#main{max-width:1060px;margin:0 auto;padding:16px}

/* Track accent band — brass/green/brass ornamented stripe */
#track-accent{height:3px;background:linear-gradient(90deg,var(--gold) 0%,var(--gold2) 15%,var(--green) 50%,var(--gold2) 85%,var(--gold) 100%);width:100%}

/* Track action bar (DRF link + upload) */
#track-action-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg2);font-size:12px;color:var(--muted)}
#track-action-bar a{color:var(--gold);text-decoration:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;background:var(--bg3);transition:all .15s}
#track-action-bar a:hover{border-color:var(--gold);background:var(--brass-soft)}
#track-action-bar .upload-btn{background:var(--green-soft);border:1px solid var(--green);color:var(--green);border-radius:20px;padding:5px 12px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .15s}
#track-action-bar .upload-btn:hover{background:var(--green);color:var(--header-ink)}

/* Race tabs */
#race-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px}
.rtab{padding:7px 15px;border-radius:4px;font-size:13px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);transition:all .15s;line-height:1.2;font-family:'Oswald',sans-serif;letter-spacing:0.8px;font-weight:500;text-transform:uppercase}
.rtab:hover{border-color:var(--green);color:var(--green);background:var(--green-soft)}
.rtab.on{border-color:var(--green);background:var(--green);color:var(--header-ink);font-weight:700;box-shadow:0 2px 4px rgba(13,61,46,0.15)}
.rtab.past{border-color:var(--rule2);color:var(--dim);text-decoration:line-through;opacity:.55;background:transparent}
.rtab.past:hover{border-color:var(--gold);color:var(--gold);opacity:1;background:var(--brass-soft)}
.rtab.nxt{border-color:var(--green);background:var(--green-soft);color:var(--green);font-weight:700;box-shadow:0 2px 4px rgba(13,79,60,0.1)}
.rtab.upcoming{border-color:var(--border);color:var(--muted);background:var(--bg3)}

/* Nav tabs */
#nav-tabs{display:flex;border-bottom:2px solid var(--green);margin-bottom:14px;overflow-x:auto;gap:0;background:var(--bg2);padding:0 6px;border-top-left-radius:6px;border-top-right-radius:6px}
.ntab{padding:11px 16px;font-size:12.5px;font-weight:600;color:var(--muted);border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;transition:all .15s;font-family:'Oswald',sans-serif;letter-spacing:1.6px;text-transform:uppercase}
.ntab:hover{color:var(--green)}
.ntab.on{color:var(--header-ink);background:var(--green);border-top-left-radius:6px;border-top-right-radius:6px;border-bottom-color:var(--green);position:relative;top:2px}

/* Bankroll popover */
#br-pop{display:none;position:absolute;top:100%;right:0;margin-top:6px;background:var(--bg3);border:1px solid var(--gold);border-radius:8px;padding:12px;min-width:220px;z-index:999;box-shadow:0 8px 24px rgba(13,61,46,0.2)}
#br-pop.on{display:block}
#br-wrap{position:relative;display:inline-flex;align-items:center}
#br-edit{background:transparent;border:none;color:rgba(245,236,211,0.6);cursor:pointer;padding:0 4px;font-size:11px;transition:color .15s}
#br-edit:hover{color:var(--header-accent)}

/* Cards — regular cards get a green left accent; card-gold stays brass */
.card{background:var(--bg3);border:1px solid var(--border);border-left:4px solid var(--green);border-radius:6px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(13,61,46,0.05)}
.card-gold{background:linear-gradient(135deg,var(--brass-soft),var(--bg3));border:1.5px solid var(--gold);border-left:4px solid var(--gold);border-radius:6px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 6px rgba(166,124,46,0.1)}
.ctitle{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:var(--green);margin-bottom:10px;letter-spacing:0.2px}
.card-gold .ctitle{color:var(--gold)}
.slabel{font-family:'Oswald',sans-serif;font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-weight:700}

/* Stat boxes — subtle green left tick */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.stat-box{background:var(--bg);border:1px solid var(--rule2);border-left:3px solid var(--green);border-radius:4px;padding:9px 12px}
.stat-l{font-family:'Oswald',sans-serif;font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;font-weight:700}
.stat-v{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;letter-spacing:0.2px;color:var(--text)}

/* Badges / pills */
.pill{display:inline-block;padding:3px 10px;border-radius:20px;border:1px solid var(--border);font-size:11px;background:transparent;color:var(--muted);white-space:nowrap;transition:all .15s;font-family:'Oswald',sans-serif;letter-spacing:0.5px;font-weight:500}
.pill:hover{border-color:var(--gold);color:var(--gold)}
.pill.on{border-color:var(--gold);background:var(--brass-soft);color:var(--gold);font-weight:600}
.pill.on-g{border-color:var(--green);background:var(--green-soft);color:var(--green);font-weight:600}
.pill.on-b{border-color:var(--blue);background:var(--blue-soft);color:var(--blue);font-weight:600}
.pill.on-r{border-color:var(--red);background:var(--red-soft);color:var(--red);font-weight:600}
.pill.on-p{border-color:var(--purple);background:var(--purple-soft);color:var(--purple);font-weight:600}
.badge-h{padding:2px 9px;border-radius:20px;font-size:10px;background:var(--green-soft);color:var(--green);border:1px solid var(--green);font-family:'Oswald',sans-serif;letter-spacing:1px;font-weight:700}
.badge-m{padding:2px 9px;border-radius:20px;font-size:10px;background:var(--brass-soft);color:var(--gold);border:1px solid var(--gold);font-family:'Oswald',sans-serif;letter-spacing:1px;font-weight:700}
.badge-l{padding:2px 9px;border-radius:20px;font-size:10px;background:var(--red-soft);color:var(--red);border:1px solid var(--red);font-family:'Oswald',sans-serif;letter-spacing:1px;font-weight:700}

/* Btn */
.btn{padding:6px 14px;border-radius:4px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;transition:all .15s;font-family:'Oswald',sans-serif;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.btn:hover{border-color:var(--gold);color:var(--gold);background:var(--brass-soft)}
.btn.on{border-color:var(--gold);background:var(--gold);color:var(--bg)}
.btn-green{background:var(--green);border:1.5px solid var(--green);color:var(--header-ink);padding:5px 14px;border-radius:4px;font-size:12px;font-family:'Oswald',sans-serif;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}

/* Input */
.inp{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:6px 10px;font-size:13px;font-family:'Inter',sans-serif}
.inp:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(166,124,46,0.15)}

/* Horse rank cards — green left accent for all, brass for top pick via JS if it sets a class */
.hcard{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:6px;margin-bottom:6px;overflow:hidden;box-shadow:0 1px 2px rgba(13,61,46,0.05)}
.hcard.top-pick{border-left-color:var(--gold);background:linear-gradient(90deg,var(--brass-soft) 0%,var(--bg3) 12%)}
.hcard-row{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;transition:background .1s}
.hcard-row:hover{background:var(--bg2)}
.hcard-detail{padding:0 14px 14px;border-top:1px solid var(--rule2);background:var(--bg)}
.hcard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:5px;margin:8px 0}
.hcard-stat{background:var(--bg3);border:1px solid var(--rule2);border-radius:4px;padding:6px 9px}
.hcard-stat-l{font-family:'Oswald',sans-serif;font-size:9px;color:var(--green);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.hcard-stat-v{font-size:12.5px;font-weight:700;color:var(--text);margin-top:1px;font-family:'JetBrains Mono',monospace}

/* Progress bar — green for generic progress, brass highlight via .pbar-fill-brass */
.pbar{height:6px;background:var(--rule2);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--green2))}
.pbar-fill-brass{background:linear-gradient(90deg,var(--gold),var(--gold2))}

/* Table — green header text on cream header row */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-family:'Oswald',sans-serif;font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:1.2px;padding:8px 10px;text-align:left;border-bottom:2px solid var(--green);font-weight:700;background:var(--green-soft)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--rule2);vertical-align:middle}
.tbl tr.scr td{opacity:.4;text-decoration:line-through}
.tbl tr:hover td{background:var(--bg2)}

/* Track bar */
#tc-bar{background:var(--bg3);border:1px solid var(--border);border-left:4px solid var(--green);border-radius:6px;padding:10px 14px;margin:0 0 12px}
#tc-content{display:none;margin-top:10px;display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
#tc-content.open{display:grid}
#big-race-spotlight{margin:0 0 12px;padding:14px 18px;background:linear-gradient(135deg,#faf0d4 0%,var(--brass-soft) 50%,#faf0d4 100%);border:1.5px solid var(--gold);border-radius:8px}
#big-race-spotlight .brs-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
#big-race-spotlight .brs-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:800;color:var(--gold);letter-spacing:0.3px}
#big-race-spotlight .brs-badge{background:var(--gold);color:var(--bg);font-family:'Oswald',sans-serif;font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:1.2px}
#big-race-spotlight .brs-races{display:flex;flex-direction:column;gap:10px}
#big-race-spotlight .brs-race{background:rgba(255,255,255,0.6);border:1px solid rgba(166,124,46,0.25);border-radius:6px;padding:12px}
#big-race-spotlight .brs-race-name{font-family:'Playfair Display',serif;font-weight:800;color:var(--gold);font-size:1rem;margin-bottom:6px}
#big-race-spotlight .brs-race-meta{font-size:0.75rem;color:var(--muted);margin-bottom:8px;font-family:'JetBrains Mono',monospace}
#big-race-spotlight .brs-picks{display:flex;flex-direction:column;gap:4px}
#big-race-spotlight .brs-pick{display:flex;align-items:center;gap:8px;font-size:0.85rem}
#big-race-spotlight .brs-rank{font-family:'Playfair Display',serif;font-weight:800;color:var(--gold);min-width:22px}
#big-race-spotlight .brs-horse{font-family:'Playfair Display',serif;font-weight:700;flex:1;color:var(--text)}
#big-race-spotlight .brs-score{color:var(--green);font-weight:700;font-size:0.82rem;font-family:'JetBrains Mono',monospace}
#big-race-spotlight .brs-commentary{font-size:0.82rem;color:var(--text);margin-top:8px;line-height:1.5;font-family:'Playfair Display',serif;font-style:italic;border-top:1px solid rgba(166,124,46,0.25);padding-top:8px}

/* Alloc row */
.alloc-row{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:5px}

/* Note / warn boxes */
.note-box{background:var(--green-soft);border:1px solid var(--green);border-left:3px solid var(--green);border-radius:4px;padding:9px 12px;font-size:11.5px;color:var(--green);line-height:1.6;margin-top:8px;font-family:'Playfair Display',serif}
.warn-box{background:var(--red-soft);border:1px solid var(--red);border-left:3px solid var(--red);border-radius:4px;padding:9px 12px;font-size:11.5px;color:var(--red);line-height:1.6;margin-top:8px;font-family:'Playfair Display',serif}

/* Kaci — purple accent preserved (identity color for Kaci system), but lightened to fit the Keeneland palette */
.kaci-panel{background:var(--purple-soft);border:1px solid var(--purple);border-radius:6px;padding:10px 12px;margin-top:8px}
.kaci-cat{background:var(--bg3);border-radius:4px;padding:8px 10px;border:1px solid var(--rule2)}
.kaci-cat-l{font-family:'Oswald',sans-serif;font-size:10px;color:var(--purple);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:3px;font-weight:700}
.kaci-cat-d{font-size:10.5px;color:var(--muted);margin-bottom:6px;font-family:'Playfair Display',serif;font-style:italic}
.kaci-opts{display:flex;gap:3px}
.kopt{flex:1;padding:5px 2px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--muted);transition:all .1s;min-height:32px;font-family:'JetBrains Mono',monospace}
.kopt:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-soft)}
.kopt.on{border-color:var(--purple);background:var(--purple);color:#fff;font-weight:700}
/* Kaci inline strip on main card row — deep green band like the redesign spec */
.kaci-strip{display:flex;gap:5px;padding:10px 14px;background:linear-gradient(90deg,var(--header-bg),var(--green));border-top:1px solid var(--gold);align-items:center;flex-wrap:wrap}
.kaci-strip-label{font-family:'Oswald',sans-serif;font-size:10px;color:var(--header-accent);text-transform:uppercase;letter-spacing:1.5px;min-width:56px;font-weight:700}
.kstrip-btn{padding:4px 11px;border-radius:20px;font-size:10.5px;cursor:pointer;border:1px solid rgba(245,236,211,0.3);background:transparent;color:rgba(245,236,211,0.75);transition:all .1s;min-height:30px;font-family:'Inter',sans-serif}
.kstrip-btn:hover{border-color:var(--header-accent);color:var(--header-ink);background:rgba(201,154,74,0.15)}
.kstrip-btn.on{border-color:var(--header-accent);background:rgba(201,154,74,0.25);color:var(--header-ink);font-weight:600}
/* Tablet touch targets */
@media(max-width:768px){
  .ntab{padding:11px 12px;font-size:12px}
  .rtab{padding:7px 12px;font-size:12px;min-height:34px}
  .hcard-row{padding:13px 14px}
  .kopt{min-height:38px;font-size:12px}
  .kstrip-btn{min-height:36px;font-size:12px;padding:6px 12px}
  .btn{min-height:36px;padding:8px 16px}
  .inp{min-height:36px;font-size:14px}
}

/* Pace */
.pace-bar{display:flex;height:24px;border-radius:4px;overflow:hidden;margin:6px 0;border:1px solid var(--rule2)}
.pace-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;opacity:.95}
.proj-bar{height:5px;background:var(--rule2);border-radius:3px;overflow:hidden;flex:1;min-width:50px}
.proj-fill{height:100%;border-radius:3px}

/* Multi-race */
.leg-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px 14px}
.leg-horse{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:4px;cursor:pointer;margin-bottom:3px;border:1px solid var(--border);background:var(--bg3);transition:all .1s}
.leg-horse:hover{border-color:var(--gold);background:var(--brass-soft)}
.leg-horse.sel{background:var(--green-soft);border-color:var(--green)}
.leg-chk{width:14px;height:14px;border-radius:3px;border:1px solid var(--dim);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.leg-chk.on{background:var(--green);border-color:var(--green);color:#fff}

/* Responsive */
@media(max-width:600px){
  .hcard-grid{grid-template-columns:repeat(3,1fr)}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}
#csv-drop-zone.drag-over{border-color:#2a6a9c !important;background:var(--blue-soft) !important}

/* Turf Club footer ornament (subtle, appended via existing markup if present) */
.turf-footer{padding:20px;text-align:center;border-top:1px solid var(--border);background:var(--bg2);color:var(--muted);font-family:'Playfair Display',serif;font-style:italic;font-size:12px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="/lib/betting-core.js"></script>
</head>
<body>

<div id="hdr">
  <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <div class="bebas" style="font-size:24px;color:var(--gold);letter-spacing:1px">PaddockIQ</div>
    <select id="hdr-track-sel" onchange="switchTrack(this.value)" style="background:var(--bg2);border:1px solid var(--gold);color:var(--gold);border-radius:7px;padding:6px 12px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;min-width:200px"></select>
    <select id="hdr-card-sel" onchange="if(this.value)loadCardById(parseInt(this.value))" style="background:var(--bg2);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:5px 10px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;min-width:180px"><option value="">Loading cards…</option></select>
    <div id="hdr-sub" style="font-size:11px;color:var(--muted);letter-spacing:1.5px;font-family:'DM Sans',sans-serif">OAKLAWN PARK · 10 RACES</div>
  </div>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
    <div id="br-wrap">
      <span class="pill on-g" id="br-badge">$100.00 Bankroll</span>
      <button id="br-edit" onclick="toggleBankrollPop(event)" title="Edit bankroll / reset day">&#9998;</button>
      <div id="br-pop">
        <div style="font-size:10px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Bankroll</div>
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px">
          <input class="inp" type="number" id="br-inp" value="100" min="1" style="width:100px;font-size:14px;color:var(--gold);font-weight:600"/>
          <button class="btn on" onclick="updateBR()">Update</button>
        </div>

<script>
// ═══════════════════════════════════════════════════════════

var R=[
 {n:1,t:"",d:"6F Dirt",ty:"4+ OC35k/SAL25k",horses:[]},
 {n:2,t:"",d:"6F Dirt",ty:"3YO Mdn Clm $40K",horses:[]},

 {n:8,t:"",d:"1M Dirt",ty:"4+ Alw $62K",horses:[]},
 {n:9,t:"",d:"6F Dirt",ty:"3+ Alw N2L $125K",horses:[]},
 {n:10,t:"",d:"6F Dirt",ty:"4+ Clm $10K N1Y",horses:[]},
];


// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
var PP_COLORS={1:{bg:"#CC0000",t:"#fff"},2:{bg:"#ffffff",t:"#111"},3:{bg:"#1a4fd6",t:"#fff"},4:{bg:"#f5c518",t:"#000"},5:{bg:"#2d8a2d",t:"#fff"},6:{bg:"#1a1a1a",t:"#fff"},7:{bg:"#e85c0d",t:"#fff"},8:{bg:"#e84d8a",t:"#fff"},9:{bg:"#1abfbf",t:"#000"},10:{bg:"#7b3fa0",t:"#fff"},11:{bg:"#888888",t:"#fff"},12:{bg:"#a8e63d",t:"#000"}};
var CUR=0, TAB='rankings';
var DEFAULT_BANKROLL=100;
var APP_VERSION='2.2'; // bump to clear stale state (multi-track + kelly scaling)
var bankroll=DEFAULT_BANKROLL, wagered=0, returned=0;
var tracksToday=1; // number of tracks betting on today — splits bankroll allocation
var scratches={
  0:{"Itzel":true},

  4:{"Uncle Tater":true,"Jonesboogie":true},

}, liveOdds={}, expanded={}, kaci={}, eqChange={}, jockeyOvr={}, checklist={}, tvgCommentary={};
var bets=[], mrLegs=[], mrSels={}, mrUnit=0.5;
var tc={surface:'fast',bias:'none',wind:'calm',temp:'55',weather:'clear'};
var tcOpen=false;

function rem(){return bankroll-wagered+returned;}
function updateCardHeader(){
  var el = document.getElementById('hdr-sub');
  if(typeof cardInfo === 'undefined') return;
  // Use today's date if cardInfo.date not set
  var dateStr = (cardInfo && cardInfo.date) ? cardInfo.date : new Date().toLocaleDateString('en-CA',{timeZone:'America/Chicago'});
  var parts = dateStr.split('-');
  var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  var mo  = months[parseInt(parts[1])-1] || '';
  var dy  = parseInt(parts[2]);
  var yr  = parts[0];
  var total  = R.length;
  var loaded = R.filter(function(r){return r.horses.length>0;}).length;
  var raceStr = (loaded > 0 && loaded < total) ? loaded+'/'+total+' RACES' : total+' RACES';
  var track = (cardInfo && cardInfo.track) ? cardInfo.track : 'OAKLAWN PARK';
  if(el) el.textContent = mo+' '+dy+', '+yr+' · '+raceStr;
  document.title = 'PaddockIQ — '+track+' — '+mo+' '+dy+', '+yr;
  applyTrackAccent(cardInfo && cardInfo.code);
  updateDRFLink();
}

function raceTypeBadge(ty){
  // Returns short badge text from race type string
  // Handles both PP-parser format (MDN, CLM) and CSV format (Md Sp Wt, Clm, -G1 etc)
  if(!ty) return '';
  var t = ty.toUpperCase();
  // Graded stakes first — CSV format: "Ashland-G1", "Beaumont-G2", "Trnylvna-G3"
  if(/-G1\b|\bG1\b|GRADE 1/.test(t))                    return 'G1';
  if(/-G2\b|\bG2\b|GRADE 2/.test(t))                    return 'G2';
  if(/-G3\b|\bG3\b|GRADE 3/.test(t))                    return 'G3';
  // Maiden claiming — must check before generic maiden/claiming
  if(t.indexOf('MDN CLM')>-1||t.indexOf('MAIDEN CLM')>-1) return 'MDN CLM';
  if(/\bMD\s+CLM|\bMD CLM/.test(t))                     return 'MDN CLM';
  // Maiden special weight — CSV: "Md Sp Wt", "Md Sp Wt 90k"
  if(/\bMD SP WT|\bMSW\b/.test(t))                      return 'MSW';
  // Generic maiden
  if(t.indexOf('MDN')>-1||t.indexOf('MAIDEN')>-1||/\bMD\b/.test(t)) return 'MDN';
  // Stakes — CSV: "LafayetteL400k", "Stk 200k"
  if(t.indexOf('STK')>-1||t.indexOf('STAKES')>-1)         return 'STK';
  // Named stakes (CSV format: word + optional L + number + k)
  if(/[A-Z]{4,}L?\d+K/.test(t))                          return 'STK';
  // Allowance
  if(/\bALW\b|\bALLOWANCE\b|\bALLW\b/.test(t))      return 'ALW';
  // Optional claiming
  if(t.indexOf('OPT CLM')>-1||/\bOC\b/.test(t))         return 'OC';
  // Maiden claiming catch-all
  if(/\bMCL\b/.test(t))                                  return 'MCL';
  // Claiming — CSV: "Clm 25000", PP: "CLM"
  if(/\bCLM\b|\bCLAIMING\b|\bCLM\b/.test(t))        return 'CLM';
  if(/\bCLM\b/.test(t))                                  return 'CLM';
  if(t.indexOf('RHP')>-1||t.indexOf('R/HP')>-1)           return 'RHP';
  return '';
}

function raceTypeBadgeColor(badge){
  var map = {
    'STK':'#c490f8','G1':'#f0c850','G2':'#f0c850','G3':'#f0c850',
    'ALW':'#6aabbb','OC':'#6aabbb',
    'MDN CLM':'#d4904a','MDN':'#d4904a','MSW':'#d4904a','MCL':'#d4904a',
    'CLM':'#888','RHP':'#888'
  };
  return map[badge]||'#888';
}



// ═══════════════════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════════════════
function mlDec(ml){var p=(ml||'4-1').split('-');return p[1]>0?p[0]/p[1]:4;}

function scoreRace(ri){
  var race=R[ri], scr=scratches[ri]||{};
  var _autoScr=((typeof scratchedHorses!=='undefined'&&scratchedHorses[race.n])||[]).map(function(n){return n.toLowerCase().replace(/[^a-z0-9 ]/g,'');});
  function _isScrH(h){
    if(scr[h.name]) return true;
    var hn=h.name.toLowerCase().replace(/[^a-z0-9 ]/g,'');
    return _autoScr.some(function(s){if(s===hn)return true;if(s.length>=5&&hn.length>=5&&(hn.includes(s)||s.includes(hn)))return true;return false;});
  }
  var results=[];
  // CSV cards: let full scoring run for component analysis, then override final score with _csvScore
  var _hasCSVScores = race.horses.filter(function(h){ return !_isScrH(h) && h._csvScore != null; }).length > 0;
  race.horses.forEach(function(h){
    if(_isScrH(h))return;
    // Speed: Beyer weight 18% — best figure
    var spd=Math.min(100,Math.max(0,(h.b-60)/70*100))*0.19;

    // Beyer TREND: 9% — are figures improving, declining, or flat?
    var beyerTrend = 0;
    var wkBeyersRaw = (h.wk||[]).slice(0,4).map(function(w){ return parseFloat(w.beyer||w.figure||0); }).filter(function(b){ return b>0; });
    // Also use notes to infer trend if no workouts
    var trendScore = 0;
    if(wkBeyersRaw.length >= 2){
      // Simple linear trend — last vs average of earlier
      var recent = wkBeyersRaw[0];
      var earlier = wkBeyersRaw.slice(1).reduce(function(s,v){return s+v;},0)/wkBeyersRaw.slice(1).length;
      var diff = recent - earlier;
      if(diff >= 10)       trendScore = 100;  // massive improvement
      else if(diff >= 6)   trendScore = 80;
      else if(diff >= 3)   trendScore = 60;
      else if(diff >= 0)   trendScore = 40;   // flat/slight improvement
      else if(diff >= -3)  trendScore = 25;   // slight decline
      else if(diff >= -6)  trendScore = 10;
      else                 trendScore = 0;    // sharp decline
    } else {
      trendScore = 40; // unknown — neutral
    }
    beyerTrend = trendScore * 0.06;

    // E1/E2 Pace figures: 6% — early pace dominance
    var paceScore = 50; // default neutral
    var nn_lower = (h.notes||'').toLowerCase();
    // Extract E1/E2 from notes if Claude included them
    var e1m = nn_lower.match(/e1[:\s]+(\d+)/);
    var e2m = nn_lower.match(/e2[:\s]+(\d+)/);
    if(e1m && e2m){
      var e1 = parseInt(e1m[1]), e2 = parseInt(e2m[1]);
      // Higher E2 = sustained pace — most predictive
      paceScore = Math.min(100, Math.max(0, (e2 - 80) / 40 * 100));
    } else if(h.sty==='Leader'||h.sty==='Speed'){
      paceScore = 65; // front runner bonus — likely good early figures
    } else if(h.sty==='Closer'){
      paceScore = 45;
    }
    var e1e2Score = paceScore * 0.06;
    var nn=(h.notes||'').toLowerCase();
    // FORM: 5-tier keyword system
    var frm_raw=50;
    var months=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    var wonRecent=months.some(function(m){return nn.indexOf('won '+m)>-1;})||nn.indexOf('won last')>-1||nn.indexOf('won here')>-1;
    var multiWin=/\d+\s*wins?\s*(op|here|2026|2025|career|this|lifetime)/.test(nn)||['won op','op wins','career wins','won maiden','won allowance','won kee','won cd'].some(function(x){return nn.indexOf(x)>-1;});
    var closeUp=['2nd last','3rd last','placed last','showed life','improving','close 3rd','close 2nd','2nd in stakes','placed in stakes','vied for lead','runner-up'].some(function(x){return nn.indexOf(x)>-1;});
    var weakForm=['weak form','flat lately','poor form','0-3 all','beaten far','no wins ever'].some(function(x){return nn.indexOf(x)>-1;});
    var unproven=['only 1 career','unproven','0-12','0-4 all','0-3 all'].some(function(x){return nn.indexOf(x)>-1;});
    if(wonRecent)frm_raw=90;
    else if(multiWin)frm_raw=78;
    else if(closeUp)frm_raw=68;
    else if(weakForm)frm_raw=30;
    else if(unproven)frm_raw=35;
    // Career wins: floor weak-form horses with proven class
    var cwm=nn.match(/(\d+)\s*career wins/);
    var careerWins=cwm?parseInt(cwm[1]):0;
    var careerWins=cwm?parseInt(cwm[1]):(h.wins||0);
    if(careerWins>=10&&frm_raw<=40)frm_raw=Math.max(frm_raw,52);
    var frm=frm_raw*0.20;  // 22%->20%
    // Class: use h.cl if set, otherwise default 65; add career wins bonus
    var careerBonus=Math.min(15,careerWins*0.8);
    var cls=((h.cl!=null?h.cl:65)+careerBonus)*0.18;  // 25%->18% (backtest: class rank1 only 17.7% win rate — weakest of top 3)
    var sm={Tracker:72,Closer:70,Speed:65,Leader:62,Midpack:58,Plodder:50};
    var pce=(sm[h.sty]||62)*0.13;  // backtest: Tracker 15.5%, Closer 15.3% > Leader 13.4%
    // Jockey/Trainer: curved formula rewards elite riders more
    var jEff=(jockeyOvr[race.n]&&jockeyOvr[race.n][h.name]!=null)?jockeyOvr[race.n][h.name]:h.j;
    // Jockey/Trainer: track-specific meet win% — thresholds vary by track depth
    var _tp = getTrackProfile();
    var jElite = _tp.jThresh[0], jGood = _tp.jThresh[1];
    var tElite = _tp.trThresh[0], tGood = _tp.trThresh[1];
    var jBase = Math.min(100, jEff*3.5 + Math.pow(jEff,1.3)*0.4);
    var jMeetBonus = jEff >= jElite ? 8 : jEff >= jGood ? 4 : 0;
    var jck = (jBase + jMeetBonus) * 0.08;  // 5%->8% (backtest: 25%+ J/T combo = 16.9% win rate vs 9.5% for 0-4%)

    var trBase = Math.min(100, h.tr*3.5 + Math.pow(h.tr,1.3)*0.4);
    var trMeetBonus = h.tr >= tElite ? 6 : h.tr >= tGood ? 3 : 0;
    var trn = (trBase + trMeetBonus) * 0.06;  // 4%->6% (backtest: J/T combo is strongly predictive)
    // Layoff adjustment
    var lo=(h.layoff!=null&&h.layoff>0) ? h.layoff : (h.wk&&h.wk.length&&typeof h.wk[0]==='object'&&h.wk[0].daysAgo>0 ? h.wk[0].daysAgo+7 : 30);
    var layoffAdj= lo<=14?-3 : lo<=28?1 : lo<=45?3 : lo<=90?1 : -5;  // backtest: 29-45d=13.5% win rate (best), 0-14d=10.7% (worst)
    // Class change: negative cc = dropped in class = bonus
    var cc=h.cc||0;
    var ccAdj= cc<=-15?8 : cc<=-5?5 : cc<=-1?2 : cc>=10?-5 : cc>=5?-3 : cc>=1?-1 : 0;
    // ── WORKOUT SCORING (replaces flat bulletBonus) ───────────────────────────
    // Uses h.wk array from PP parser, falls back to notes keywords
    var wkScore = 0;
    var wkLabel = ''; // for display in detail card
    var wkArr   = h.wk || [];
    var isDebut = !h.b || h.b === 0;

    if(wkArr.length > 0){
      // ── Score from structured workout data ──
      var w0 = wkArr[0]; // most recent work
      // Compute daysAgo/field on the fly for old saved cards that predate the fix
      if(w0.daysAgo == null && w0.date) w0.daysAgo = Math.round((new Date() - new Date(w0.date)) / 86400000);
      if(w0.field == null) w0.field = w0.rankIn != null ? w0.rankIn : 0;
      // 1. Recency bonus
      var recBonus = w0.daysAgo <= 7  ? 4 :
                     w0.daysAgo <= 14 ? 2 :
                     w0.daysAgo <= 21 ? 1 : 0;
      // 2. Quality bonus — bullet or elite rank/field ratio
      var rf = (w0.field > 0) ? w0.rank / w0.field : 0.5;
      var qualBonus = w0.bullet         ? 8 :
                      rf > 0 && rf < 0.1 ? 6 :  // top 10% but not bullet
                      rf > 0 && rf < 0.2 ? 4 :  // top 20%
                      rf > 0 && rf < 0.4 ? 2 : 0;
      // 3. Volume — more works = horse is pointed
      var volBonus = wkArr.length >= 4 ? 3 :
                     wkArr.length >= 3 ? 2 :
                     wkArr.length >= 2 ? 1 : 0;
      // 4. Layoff multiplier — bullet/elite work off 45+ days = trainer is pointing this horse HERE
      var layoffMult = (lo >= 45 && (w0.bullet || rf < 0.15)) ? 1.5 : 1.0;
      // 5. Debut multiplier — workouts are the PRIMARY signal when b=0
      var debutMult  = isDebut ? 1.8 : 1.0;
      // 6. Distance match bonus — worked at race distance or further
      var raceDistF  = (race.d||'').match(/(\d+)\s*f/i);
      var raceFurlong = raceDistF ? parseInt(raceDistF[1]) : 6;
      var workFurlong = parseInt((w0.dist||'').replace(/\D/g,'')) || 0;
      var distBonus   = (workFurlong >= raceFurlong) ? 2 : (workFurlong >= raceFurlong - 1) ? 1 : 0;

      wkScore = Math.min(18, Math.round((recBonus + qualBonus + volBonus + distBonus) * layoffMult * debutMult));

      // Build label for display
      var qStr = w0.bullet ? '🔵 BULLET' : (rf < 0.2 ? '🟢 ELITE' : '');
      wkLabel  = (w0.dist||'?f') + ' ' + (w0.time||'') + (w0.bullet?' B':'') +
                 (w0.rank&&w0.field?' '+w0.rank+'/'+w0.field:'') +
                 ' ('+(w0.daysAgo||'?')+'d ago)' + (qStr?' '+qStr:'');
    } else {
      // ── Fallback to notes keywords when no wk array ──
      var hasBullet  = nn.indexOf('bullet') > -1;
      var recentWork = nn.indexOf('sharp work') > -1 || nn.indexOf('works well') > -1;
      var multiWork  = (nn.match(/\bwork\b/g)||[]).length >= 2;
      if(hasBullet){
        wkScore = lo >= 45 ? 9 : 6;
        wkLabel = 'Bullet (notes)';
      } else if(recentWork) {
        wkScore = 2;
        wkLabel = 'Sharp work (notes)';
      }
      if(multiWork && !hasBullet) wkScore = Math.max(wkScore, 3);
      if(isDebut && wkScore > 0) wkScore = Math.round(wkScore * 1.5); // debut multiplier even on fallback
    }
    var bulletBonus = Math.round(wkScore * 1.25); // WK weight bumped ~8%->10%
    // Equipment signals from PDF extraction
    var heq=h.eq||{lf:false,lo:false,bf:false,bl:false};
    var lasixFirst=heq.lf?12:0;    // Lasix first time — horse was bleeding, expect big improvement
    var blinkFirst=heq.bf?10:0;    // Blinkers first time — focus/equipment change
    var blinkCont=heq.bl?3:0;      // Blinkers continuing — minor signal
    var eqB=(eqChange[race.n]&&eqChange[race.n][h.name])||0;
    // FIX 1: First-with-trainer bonus — notes keyword 'new trainer' or h.newTrainer flag
    // Rewards hot barn switches that static trainer% misses (e.g. Saffie Joseph 50% 1stW/Trn)
    var newTrnBonus=0;
    if(h.newTrainer){newTrnBonus=(h.newTrainer>=30)?12:(h.newTrainer>=20)?9:(h.newTrainer>=15)?6:3;}
    else if(nn.indexOf('new trainer')>-1||nn.indexOf('1stw/trn')>-1||nn.indexOf('first with trainer')>-1){newTrnBonus=7;}
    // FIX 2: Extreme class-drop floor — when horse drops 2+ full class levels (cc<=-20)
    // layoff penalty was swamping the class-drop signal; cap layoff at -5 and add drop bonus
    var extremeDropBonus=0;
    if(cc<=-20){extremeDropBonus=6; if(layoffAdj<-5)layoffAdj=-5;}

    // ── DISTANCE FIT ─────────────────────────────────────────────────────────
    // Uses distFit field extracted by PP Parser from horse's past performance lines
    var distFitAdj=0;
    var df=h.distFit||'tested';
    if(df==='proven')       distFitAdj=5;   // 2+ wins at today's exact distance
    else if(df==='tested')  distFitAdj=2;   // has run it, competitive
    else if(df==='shortening') distFitAdj=3; // sprint->route to sprint often helps
    else if(df==='stretching') distFitAdj=-3; // route novice, often struggles
    else if(df==='debut_dist') distFitAdj=-2; // first time at distance, unknown
    // Notes-based fallback when distFit not available
    if(df==='tested'||!h.distFit){
      if(nn.indexOf('best at route')>-1||nn.indexOf('router')>-1) distFitAdj=Math.max(distFitAdj,3);
      if(nn.indexOf('sprint to route')>-1||nn.indexOf('first route')>-1) distFitAdj=Math.min(distFitAdj,-2);
      if(nn.indexOf('best sprinting')>-1||nn.indexOf('route to sprint')>-1) distFitAdj=Math.max(distFitAdj,2);
    }

    // ── STAKES EXPERIENCE ────────────────────────────────────────────────────
    // Horses that have run in stakes have proven class above what claiming $ shows
    var stakesBonus=0;
    if(nn.indexOf('stakes')>-1||nn.indexOf('grade')>-1){
      stakesBonus=3; // has run in stakes company — proven class
      if(nn.indexOf('won stakes')>-1||nn.indexOf('stakes winner')>-1) stakesBonus=5;
      if(nn.indexOf('graded')>-1) stakesBonus=4;
    }

    var base=spd+beyerTrend+e1e2Score+frm+cls+pce+jck+trn+layoffAdj+ccAdj+bulletBonus+lasixFirst+blinkFirst+blinkCont+eqB+newTrnBonus+extremeDropBonus+distFitAdj+stakesBonus;
    // Track bonus
    var tb=0;
    if(tc.surface==='sloppy'||tc.surface==='muddy'){
      tb+=(h.sty==='Closer'?2:(h.sty==='Leader'||h.sty==='Speed')?-2:0);
      tb+=(nn.indexOf('sloppy')>-1||nn.indexOf('muddy')>-1)?3:-2;
    } else if(tc.surface==='soft'){
      tb+=(h.sty==='Closer'||h.sty==='Tracker')?2:(h.sty==='Leader')?-2:0;
    }
    if(tc.bias==='speed')tb+=(h.sty==='Leader'||h.sty==='Speed')?5:(h.sty==='Closer')?-3:0;
    if(tc.bias==='closer')tb+=(h.sty==='Closer')?5:(h.sty==='Leader')?-3:0;
    if(tc.bias==='inside')tb+=(h.sty==='Leader'||h.sty==='Speed')?3:0;
    if(tc.wind==='strong')tb+=(h.sty==='Leader'||h.sty==='Speed')?-2:0;
    // Kaci
    var k=kaci[race.n]&&kaci[race.n][h.name]||{enabled:false,carry:0,conformation:0,temperament:0};
    var km=1.0;
    if(k.enabled){var kt=k.carry+k.conformation+k.temperament;if(kt>0)km=1+(kt/9)*0.15;}
    var final=Math.min(120,Math.round((base+tb)*km));
    var trendDir=wkBeyersRaw&&wkBeyersRaw.length>=2?(wkBeyersRaw[0]-wkBeyersRaw[1]):0;
    results.push({name:h.name,horse:h,score:final,base:Math.round(base),tb:Math.round(tb*10)/10,km:km,kaciOn:km>1,newTrnBonus:newTrnBonus,extremeDropBonus:extremeDropBonus,wkScore:wkScore,wkLabel:wkLabel,distFitAdj:distFitAdj,stakesBonus:stakesBonus,
      spdRaw:Math.round(spd*10)/10, frmRaw:Math.round(frm*10)/10, clsRaw:Math.round(cls*10)/10, pceRaw:Math.round(pce*10)/10,
      trendScore:trendScore, bulletBonus:bulletBonus, lasixFirst:lasixFirst, blinkFirst:blinkFirst,
      _components:{spd:Math.round(spd*10)/10,frm:Math.round(frm*10)/10,cls:Math.round(cls*10)/10,pce:Math.round(pce*10)/10,jck:Math.round(jck*10)/10,trn:Math.round(trn*10)/10,wk:Math.round((bulletBonus||0)*10)/10,trend:Math.round(beyerTrend*10)/10,ml:Math.round((e1e2Score||0)*10)/10}});
  });
  // If CSV card, override final score with _csvScore but keep computed components for analysis
  if(_hasCSVScores){
    results.forEach(function(r){
      if(r.horse._csvScore!=null) r.score=r.horse._csvScore;
    });
  }
  results.sort(function(a,b){return b.score-a.score;});
  var debutCount=race.horses.filter(function(h){return !(scratches[ri]||{})[h.name]&&(h.b===0||h.b==null||isNaN(h.b));}).length;
  results._debutWarning=debutCount>=3;
  return results;
}

function softmax(sc){
  // Temperature must be high enough that score gaps (often 20-40 pts) produce realistic probabilities.
  // A dominant horse should cap around 30-40%, not 90%.
  // T = max(20, 15 + fieldSize * 2.5) → 5-horse: 27.5, 8-horse: 35, 14-horse: 50
  var T = Math.max(20, 15 + sc.length * 2.5);
  var mx=Math.max.apply(null,sc.map(function(s){return s.score;}));
  var ex=sc.map(function(s){return Math.exp((s.score-mx)/T);});
  var sum=ex.reduce(function(a,b){return a+b;},0);
  return ex.map(function(e){return e/sum;});
}

function kellyBet(prob,ml,bank){
  var dec = BettingCore.mlToDecimal(ml);
  // Scale Kelly fraction by bankroll size — small bankrolls need to be more aggressive
  // Multi-track: allocate proportional share of bankroll to this track
  var effectiveBank = tracksToday > 1 ? bank / tracksToday : bank;
  var kf = effectiveBank >= 500 ? 0.25 :  // grinding mode
           effectiveBank >= 100 ? 0.50 :  // day at the track
           0.75;                           // fun money
  var maxPct = effectiveBank >= 500 ? 0.15 : 0.20;
  return BettingCore.recommendedStake(bank, prob, dec, {
    kellyFraction: kf,
    maxBetPct: maxPct,
    minBet: 2
  });
}

function conf(sc){
  if(sc.length<2)return'low';
  var g=sc[0].score-sc[1].score;
  return g>=6?'high':g>=4?'medium':'low';  // 3->4 gap for medium (backtest: medium at 3 was -12% ROI)
}

function getOdds(ri,name){
  return(liveOdds[ri]&&liveOdds[ri][name])||R[ri].horses.find(function(h){return h.name===name;}).ml||'5-1';
}

var TRACK_LAT = 34.4850, TRACK_LON = -93.0571;
var TRACK_CITY = 'Hot+Springs,AR';
var weatherStatus = '';

// Update weather coords when track changes and re-fetch
function updateWeatherForTrack(code) {
  var tObj = TRACK_LIST.find(function(t){ return t.code === code; });
  if (tObj && tObj.lat && tObj.lon) {
    TRACK_LAT = tObj.lat;
    TRACK_LON = tObj.lon;
  }
  // Also patch cardInfo.code so fetchLiveWeather picks up the right timezone
  if (typeof cardInfo !== 'undefined' && cardInfo) {
    cardInfo.code = code;
  }
  try { fetchLiveWeather(); } catch(e) { console.warn('weather update:', e); }
}

function fetchLiveWeather() {
  weatherStatus = 'Fetching...';
  renderTC();

  // Resolve timezone for the current track — use TRACK_LIST lookup
  var _tCode = (typeof cardInfo !== 'undefined' && cardInfo && cardInfo.code) ? cardInfo.code : 'OP';
  var _tObj  = TRACK_LIST.find(function(t){ return t.code === _tCode; });
  var _tz    = (_tObj && _tObj.tz) ? _tObj.tz : 'America/Chicago';

  // Use Open-Meteo directly — coordinate-based, no API key, reliable CORS
  var url = 'https://api.open-meteo.com/v1/forecast' +
    '?latitude='  + TRACK_LAT +
    '&longitude=' + TRACK_LON +
    '&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation,weather_code' +
    '&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch' +
    '&timezone=' + encodeURIComponent(_tz);

  fetch(url, {mode: 'cors'})
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(d) {
      var cur    = d.current;
      var tempF  = Math.round(cur.temperature_2m);
      var wind   = Math.round(cur.wind_speed_10m);
      var precip = cur.precipitation;
      var code   = cur.weather_code;

      // WMO weather code → surface condition
      var surface = 'fast';
      if      (precip > 0.3)                      surface = 'sloppy';
      else if (precip > 0.05)                     surface = 'good';
      else if (code >= 71 && code <= 77)          surface = 'muddy';   // snow
      else if (code >= 61 && code <= 67)          surface = precip > 0 ? 'sloppy' : 'good'; // rain
      else if (code >= 51 && code <= 57)          surface = 'good';    // drizzle
      else if (code === 45 || code === 48)        surface = 'good';    // fog

      var windSet  = wind > 18 ? 'strong' : wind > 8 ? 'light' : 'calm';

      // WMO code → human description
      var wmoDesc = {0:'clear',1:'mainly clear',2:'partly cloudy',3:'overcast',
        45:'fog',48:'icy fog',51:'light drizzle',53:'drizzle',55:'heavy drizzle',
        61:'light rain',63:'rain',65:'heavy rain',71:'light snow',73:'snow',75:'heavy snow',
        77:'snow grains',80:'rain showers',81:'showers',82:'heavy showers',
        85:'snow showers',86:'heavy snow showers',95:'thunderstorm',96:'thunderstorm w/ hail',
        99:'thunderstorm w/ heavy hail'};
      var desc = wmoDesc[code] || ('code ' + code);

      tc.surface = surface;
      tc.wind    = windSet;
      tc.temp    = String(tempF);

      weatherStatus = 'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) +
        ' \u2014 ' + tempF + '\u00b0F, ' + wind + 'mph, ' + desc +
        ' \u2192 ' + surface;
      render();
    })
    .catch(function(e) {
      weatherStatus = '\u26a0 Weather unavailable \u2014 set surface manually below';
      renderTC();
    });
}

function renderRankings(){
  var race=R[CUR], sc=scoreRace(CUR), pr=softmax(sc), cf=conf(sc);
  var scr=scratches[CUR]||{};
  var el=document.getElementById('tab-rankings');
  if(!sc.length){el.innerHTML='<div style="color:var(--dim);padding:20px">All horses scratched.</div>';return;}
  var top=sc[0], top2=sc[1]||{name:'—',score:0}, top3=sc[2]||{name:'—',score:0};
  var gap=top.score-(top2.score||0);
  var btype=cf==='high'?'WIN':cf==='medium'?'WIN / PLACE':'NO BET';
  var cfBadge=cf==='high'?'badge-h':cf==='medium'?'badge-m':'badge-l';
  var odds=getOdds(CUR,top.name);
  // ── DAILY BUDGET CAP ─────────────────────────────────────────
  // Count HIGH or MEDIUM confidence races across the card
  var qualRaces = R.reduce(function(n, r, i) {
    var s = scoreRace(i);
    if (!s.length) return n;
    var g = s[0].score - (s[1] ? s[1].score : 0);
    return n + (g >= 3 ? 1 : 0);
  }, 0);
  var qualCount = Math.max(1, qualRaces);
  // Full bankroll available — cap any single race at 20% max, divide evenly among qualifying races
  var perRaceCap = Math.min(rem() * 0.20, rem() / qualCount);
  // LOW confidence = NO BET regardless of Kelly
  // MEDIUM/HIGH confidence always gets at least a minimum bet, even if Kelly sees no edge at live odds
  var _kellyAmt = Math.round(Math.min(kellyBet(pr[0]||.01, odds, rem()), perRaceCap));
  var _minConfBet = cf === 'high' ? 4 : cf === 'medium' ? 2 : 0;
  var ka = (cf === 'low') ? 0 : Math.max(_minConfBet, _kellyAmt);
  // Maiden warning — short favorite in field with 3+ debut horses
  var mlDecTop = mlDec(odds);
  var maidenWarn = (sc._debutWarning && mlDecTop <= 2) ?
    '<div class="warn-box" style="margin-bottom:10px">⚠️ Short favorite in maiden field with 3+ first-time starters. High variance — consider skipping.</div>' : '';
  var debutWarn=sc._debutWarning?'<div class="warn-box" style="margin-bottom:10px">⚠️ Debut warning — 3+ first-out horses in this field. Algorithm confidence is reduced; use caution sizing bets.</div>':'';

  var html='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;font-size:12px">'+
    '<span class="bebas" style="font-size:14px;color:var(--gold);background:#f5efe0;border:1px solid var(--gold);padding:2px 10px;border-radius:4px">Race '+race.n+'</span>'+

    '</div>';

  // Track profile info banner
  var _tprof = getTrackProfile();
  var _biasColor = _tprof.bias==='speed' ? '#d4904a' : _tprof.bias==='closer' ? '#6aabbb' : 'var(--muted)';

// Flag pills on horse card
function whyBadge(s){
  // Returns a single badge explaining the PRIMARY reason this horse scores well
  // s = scoreRace result object with component breakdown
  if(!s) return '';

  var reasons = [];

  // Build reason list ranked by contribution
  if(s.lasixFirst > 0)   reasons.push({label:'1ST LASIX', score:s.lasixFirst, color:'#4ec97e', bg:'#e8f2e8'});
  if(s.blinkFirst > 0)   reasons.push({label:'BLINKERS ON', score:s.blinkFirst, color:'#b48cf8', bg:'#ede3f5'});
  if(s.extremeDropBonus > 0) reasons.push({label:'BIG DROP', score:s.extremeDropBonus, color:'#4ec97e', bg:'#0a2010'});
  if(s.newTrnBonus > 0)  reasons.push({label:'NEW TRAINER', score:s.newTrnBonus, color:'#c8a84b', bg:'#1a1500'});
  if(s.stakesBonus > 0)  reasons.push({label:'STAKES BRED', score:s.stakesBonus, color:'#f0c850', bg:'#fbf3d8'});

  // Component scores — find dominant factor
  var components = [
    {label:'SPEED', score: s.spdRaw||0, color:'#e07733', bg:'#fbf3d8'},
    {label:'FORM',  score: s.frmRaw||0, color:'#4ec97e', bg:'#e8f2e8'},
    {label:'CLASS', score: s.clsRaw||0, color:'#b48cf8', bg:'#ede3f5'},
    {label:'PACE',  score: s.pceRaw||0, color:'#6aabbb', bg:'#dde6f0'},
  ];
  var topComp = components.reduce(function(a,b){return a.score>b.score?a:b;}, {score:0});

  // Jockey dominance
  var jEff = Math.max(s.horse ? (s.horse.j||10) : 10, 10);
  if(jEff >= 25) reasons.push({label:'HOT JOCK '+jEff+'%', score:jEff, color:'#c8a84b', bg:'#fbf3d8'});
  else if(jEff >= 20) reasons.push({label:'JOC '+jEff+'%', score:jEff*0.5, color:'#aaaa66', bg:'#151500'});

  // Distance proven
  if(s.distFitAdj >= 5) reasons.push({label:'PROVEN DIST', score:5, color:'#6aabbb', bg:'#dde6f0'});

  // Bullet workout
  if(s.trendScore >= 70) reasons.push({label:'IMPROVING', score:s.trendScore*0.5, color:'#4ec97e', bg:'#e8f2e8'});
  if(s.trendScore <= 15) reasons.push({label:'DECLINING', score:20, color:'#e05555', bg:'#200505'});
  if(s.bulletBonus > 0)  reasons.push({label:'BULLET WRK', score:s.bulletBonus, color:'#b48cf8', bg:'#ede3f5'});

  // Pick the top reason by score
  var allReasons = reasons.concat([topComp]);
  allReasons.sort(function(a,b){return b.score-a.score;});
  var top = allReasons[0];
  if(!top || top.score <= 0) return '';

  return '<span style="font-size:9px;font-weight:700;background:'+top.bg+
    ';color:'+top.color+';border:1px solid '+top.color+'44;'+
    'border-radius:3px;padding:2px 6px;letter-spacing:.3px">'+top.label+'</span>';
}


/** Fetch TVG commentary for all races (analystsComments, powerRating) */
function fetchTVGCommentary() {
  var trackCode = (typeof cardInfo !== 'undefined' && cardInfo.code) ? cardInfo.code : null;
  if (!trackCode) return;
  R.forEach(function(race, ri) {
    if (tvgCommentary[ri]) return; // already fetched
    fetch('/api/odds?track=' + trackCode + '&date=' + ((cardInfo && cardInfo.date) || '') + '&race=' + race.n)
      .catch(function(){});
    // Use TVG live race() query for commentary
    fetch('https://api.tvg.com/cosmo/v1/graphql', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: 'query($t:String!,$n:String!){race(profile:"hpws",track:$t,number:$n){bettingInterests{runners{horseName timeform{ratingStars analystsComments productionComment formFigures}handicapping{snapshot{powerRating}}}}}}',
        variables: { t: trackCode, n: String(race.n) } })
    }).then(function(r){ return r.json(); }).then(function(data) {
      var raceData = data.data && data.data.race;
      if (!raceData || !raceData.bettingInterests) return;
      if (!tvgCommentary[ri]) tvgCommentary[ri] = {};
      raceData.bettingInterests.forEach(function(bi) {
        (bi.runners || []).forEach(function(r) {
          if (!r.horseName) return;
          var tf = r.timeform || {};
          var hc = r.handicapping || {};
          tvgCommentary[ri][r.horseName] = {
            analyst: tf.analystsComments || null,
            production: tf.productionComment || null,
            stars: tf.ratingStars || null,
            form: tf.formFigures || null,
            power: hc.snapshot ? hc.snapshot.powerRating : null
          };
        });
      });
    }).catch(function(){});
  });
}

/**
 * Generate a betting thesis for a horse based on model scores, odds, and context.
 * Returns HTML string with narrative + key stats.
 */
function generateThesis(s, prob, rank, race, raceIdx, allScored) {
  if (!s || !s.horse) return '';
  var h = s.horse;
  var odds = getOdds(raceIdx, s.name);
  var mlDec = BettingCore.mlToDecimal(odds || h.ml);
  var impliedProb = mlDec > 0 ? 1 / (mlDec + 1) : 0;
  var edge = prob - impliedProb;
  var edgePct = (edge * 100).toFixed(1);
  var c = s._components || {};

  // Determine dominant strength RELATIVE to the field average
  var keys = ['spd','frm','cls','pce','jck','trn'];
  var labels = {spd:'speed figures',frm:'current form',cls:'class advantage',pce:'pace scenario',jck:'jockey',trn:'trainer stats'};
  var fieldAvg = {};
  var fieldN = (allScored && allScored.length) || 1;
  keys.forEach(function(k){
    var sum = 0;
    if(allScored && allScored.length){
      allScored.forEach(function(x){ sum += (x._components && x._components[k]) || 0; });
    }
    fieldAvg[k] = sum / fieldN;
  });
  var strengths = keys.map(function(k){
    return { k: k, label: labels[k], v: (c[k]||0) - fieldAvg[k] };
  }).sort(function(a, b) { return b.v - a.v; });
  var top1 = strengths[0], top2 = strengths[1];

  // Build narrative
  var parts = [];

  // Opening — who is this horse
  if (rank === 0) {
    parts.push('<b style="color:var(--gold)">Top pick.</b>');
  } else if (rank <= 2) {
    parts.push('<b style="color:var(--muted)">Contender (#' + (rank + 1) + ').</b>');
  }

  // Key strength — only mention if this horse is meaningfully ABOVE the field average
  if (top1.v > 0.5) {
    parts.push('Stands out on <b style="color:var(--blue)">' + top1.label + '</b>');
    if (top2.v > 0.3) parts[parts.length - 1] += ' and <b style="color:var(--blue)">' + top2.label + '</b>';
    parts[parts.length - 1] += '.';
  } else if (top1.v > 0) {
    parts.push('Slight edge in <b style="color:var(--blue)">' + top1.label + '</b>.');
  } else {
    parts.push('No standout factors vs the field.');
  }

  // Beyer context
  var bf = h.beyerFigs || [];
  if (bf.length >= 2) {
    var trend = bf[0] - bf[1];
    if (trend >= 5) parts.push('Beyers trending up (' + bf.slice(0, 3).join('-') + ').');
    else if (trend <= -5) parts.push('Beyers declining (' + bf.slice(0, 3).join('-') + ') — regression risk.');
    else if (bf[0] >= 75) parts.push('Top Beyer of ' + bf[0] + ' is best in field.');
  }

  // Class move
  if (h.cc != null && h.cc !== 0) {
    if (h.cc <= -10) parts.push('Dropping significantly in class ($' + Math.abs(h.cc) + 'K) — could dominate.');
    else if (h.cc <= -5) parts.push('Class drop from ' + (h.lastClass || 'higher') + '.');
    else if (h.cc >= 5) parts.push('Stepping up in class — needs to prove it.');
  }

  // Running style + pace
  if (h.sty === 'Leader' || h.sty === 'Speed' || h.sty === 'Front') {
    parts.push('Likely on or near the lead early.');
  } else if (h.sty === 'Closer') {
    parts.push('Closer who needs pace to set up.');
  }

  // Layoff
  var lo = h.layoff || 0;
  if (lo >= 90) parts.push('Long layoff (' + lo + 'd) — fitness question.');
  else if (lo >= 45) parts.push('Returning from ' + lo + '-day break.');
  else if (lo > 0 && lo <= 14) parts.push('Fresh off a ' + lo + '-day turnaround.');

  // Distance fit
  if (h.distFit === 'proven' || h.distFit === 'winner') parts.push('Proven winner at this distance.');
  else if (h.distFit === 'first-time') parts.push('First try at this distance.');

  // Value assessment
  if (edge > 0.05) {
    parts.push('<span style="color:var(--green)">At ' + odds + ', offers +' + edgePct + '% edge</span> — model gives ' + (prob * 100).toFixed(0) + '% win probability vs ' + (impliedProb * 100).toFixed(0) + '% implied.');
  } else if (edge > 0) {
    parts.push('Fair price at ' + odds + ' (' + (prob * 100).toFixed(0) + '% model vs ' + (impliedProb * 100).toFixed(0) + '% implied).');
  } else if (edge < -0.05) {
    parts.push('<span style="color:var(--red)">Overbet at ' + odds + '</span> — model says ' + (prob * 100).toFixed(0) + '% but line implies ' + (impliedProb * 100).toFixed(0) + '%.');
  }

  // Record context
  if (h.wins > 0 && h.starts > 0) {
    var wp = (h.wins / h.starts * 100).toFixed(0);
    parts.push('' + h.wins + '-for-' + h.starts + ' (' + wp + '%) career.');
  }

  if (!parts.length) return '';

  return '<div style="font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:8px;padding:8px 10px;background:rgba(212,175,55,0.03);border-left:2px solid var(--gold);border-radius:0 6px 6px 0">' +
    parts.join(' ') + '</div>';
}

function flagPills(h,rn){

         (h.wk&&h.wk.length&&typeof h.wk[0]==='object'&&h.wk[0].daysAgo>0 ? h.wk[0].daysAgo+7 : null);
  if(lo!=null){
    var lbg,lcl,ltx;
    if(lo<=14){lbg='#e8f2e8';lcl='#4ec97e';ltx=lo+'d fresh';}
    else if(lo<=28){lbg='#dde6f0';lcl='#6aabbb';ltx=lo+'d';}
    else if(lo<=45){lbg='#1a1a0d';lcl='#aaaa66';ltx=lo+'d';}

  }

  else if(cc<=-10)pills.push('<span style="font-size:9px;font-weight:700;background:#e8f2e8;color:#4ec97e;border:1px solid #2a6040;border-radius:3px;padding:2px 7px">↓ DROP $'+Math.abs(cc)+'K</span>');

  else if(cc>=20)pills.push('<span style="font-size:9px;font-weight:700;background:#200505;color:#e05555;border:1px solid #e05555;border-radius:3px;padding:2px 7px">⬆ UP $'+cc+'K</span>');
  else if(cc>=10)pills.push('<span style="font-size:9px;font-weight:700;background:#1a0808;color:#e05555;border:1px solid #602020;border-radius:3px;padding:2px 7px">↑ UP $'+cc+'K</span>');
  else if(cc>0)pills.push('<span style="font-size:9px;background:#150808;color:#cc6666;border:1px solid #401515;border-radius:3px;padding:2px 7px">↑ up $'+cc+'K</span>');
  if(nn.indexOf('bullet')>-1||(h.wk&&h.wk.length>0&&h.wk[0].bullet))pills.push('<span style="font-size:9px;background:#ede3f5;color:#b48cf8;border-radius:3px;padding:1px 5px">🔵 BULLET</span>');
  else if(h.wk&&h.wk.length>0&&(h.wk[0].rank/Math.max(1,h.wk[0].field))<0.15)pills.push('<span style="font-size:9px;background:#0d1a10;color:var(--green);border-radius:3px;padding:1px 5px">★ ELITE WRK</span>');
  else if(nn.indexOf('sharp work')>-1||nn.indexOf('works well')>-1)pills.push('<span style="font-size:9px;background:#101020;color:#888;border-radius:3px;padding:1px 5px">SHARP WRK</span>');
  var heqf=h.eq||{lf:false,lo:false,bf:false,bl:false};
  if(heqf.lf)pills.push('<span style="font-size:9px;background:#0a1a30;color:#60b8ff;border-radius:3px;padding:1px 5px;font-weight:700">LASIX 1ST</span>');
  else if(heqf.lo)pills.push('<span style="font-size:9px;background:#080f1a;color:#4488cc;border-radius:3px;padding:1px 5px">LASIX</span>');
  if(heqf.bf)pills.push('<span style="font-size:9px;background:#1a0a30;color:#c090ff;border-radius:3px;padding:1px 5px;font-weight:700">BLINK 1ST</span>');
  if(nn.indexOf('stakes')>-1||nn.indexOf('grade')>-1)pills.push('<span style="font-size:9px;background:#ede3f5;color:#c490f8;border-radius:3px;padding:1px 5px">STAKES</span>');
  // Distance fit badge
  var df=h.distFit||'';
  if(df==='proven')pills.push('<span style="font-size:9px;background:#e8f2e8;color:#4ec97e;border-radius:3px;padding:1px 5px">✓ DIST</span>');
  else if(df==='stretching')pills.push('<span style="font-size:9px;background:#fbf3d8;color:#d4904a;border-radius:3px;padding:1px 5px">↑ DIST</span>');
  else if(df==='shortening')pills.push('<span style="font-size:9px;background:#001a10;color:#6aabbb;border-radius:3px;padding:1px 5px">↓ DIST</span>');
  else if(df==='debut_dist')pills.push('<span style="font-size:9px;background:#fbf3d8;color:#aaaa44;border-radius:3px;padding:1px 5px">NEW DIST</span>');
  var eq=(eqChange[rn]&&eqChange[rn][h.name])||0;
  if(eq>0)pills.push('<span style="font-size:9px;background:#101a30;color:#90b8f8;border-radius:3px;padding:1px 5px">BLINK+</span>');

  // ── CLAIMING TRAINER ANGLE ───────────────────────────────────
  // Flag when trainer has strong claim win% AND good ROI — Winter's Ghost lesson
  var claimAngle = false;
  for(var ti=1;ti<=4;ti++){
    var tcat=(h['trnrCat'+ti]||'').toLowerCase();
    var twp=parseFloat(h['trnrWp'+ti]||0);
    var troi=parseFloat(h['trnrRoi'+ti]||0);
    if((tcat.indexOf('clm')>-1||tcat.indexOf('claim')>-1)&&twp>=0.18&&troi>=1.8){
      claimAngle=true; break;
    }
  }
  if(claimAngle) pills.push('<span style="font-size:9px;font-weight:700;background:#fbf3d8;color:#f0c850;border:1px solid #f0c85088;border-radius:3px;padding:2px 7px">🎯 CLAIM ANGLE</span>');

  // ── CLASS DROP ORIGIN ────────────────────────────────────────
  // ALW/OC/Stakes → claim = red flag (connections giving up)
  // Within-claim drop = green flag (trainer spotting a spot)
  var lastClassStr = (h.lastClass||'').toUpperCase();
  var claimNow = parseFloat(h.claimPrice||0);
  var claimLast = parseFloat(h.lastClaimPrice||0);
  var isAlwDrop = claimNow>0 && (lastClassStr.indexOf('ALW')>-1||lastClassStr.indexOf('OC ')>-1||lastClassStr.indexOf('ALLOW')>-1||lastClassStr.indexOf('STK')>-1||lastClassStr.indexOf('STAKE')>-1||lastClassStr.indexOf('MSW')>-1||lastClassStr.indexOf('MDN SP')>-1);
  var isClaimDrop = claimNow>0 && claimLast>0 && claimLast>claimNow;
  if(isAlwDrop) pills.push('<span style="font-size:9px;font-weight:700;background:#200808;color:#e05555;border:1px solid #e0555588;border-radius:3px;padding:2px 7px">⚠️ ALW DROP</span>');
  else if(isClaimDrop) pills.push('<span style="font-size:9px;font-weight:700;background:#e8f2e8;color:#4ec97e;border:1px solid #4ec97e88;border-radius:3px;padding:2px 7px">✅ CLM DROP</span>');

  return pills.length?'<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:2px">'+pills.join('')+'</div>':'';
}

// ═══════════════════════════════════════════════════════════
// EXOTICS — Daily exotic bet recommendations across all races
// ═══════════════════════════════════════════════════════════
function renderExotics(){
  var el=document.getElementById('tab-exotics');
  if(!el) return;

  // If tracks are selected in "Betting Today" and current track isn't one of them, show message
  var currentTrack=(cardInfo&&cardInfo.code)||'';
  if(bettingTracks.length>0 && currentTrack && bettingTracks.indexOf(currentTrack)<0){
    el.innerHTML='<div class="card" style="text-align:center;padding:30px">'+
      '<div style="font-size:16px;color:var(--dim);margin-bottom:8px">Not betting this track today</div>'+
      '<div style="font-size:12px;color:var(--muted)">You selected <b style="color:var(--gold)">'+bettingTracks.join(', ')+'</b> in the Betting dropdown. Switch to one of those cards to see exotic picks.</div>'+
      '<div style="margin-top:12px"><button onclick="toggleBettingTrack(\''+currentTrack+'\')" style="background:#fbf3d8;border:1px solid var(--gold);color:var(--gold);border-radius:8px;padding:8px 16px;cursor:pointer;font-size:12px;font-weight:600">Add '+currentTrack+' to today\'s tracks</button></div>'+
    '</div>';
    return;
  }

  var allRaces=[], skipped=[];

  R.forEach(function(race, ri){
    if(!race.horses||!race.horses.length) return;
    var sc=scoreRace(ri), pr=softmax(sc), cf=conf(sc);
    if(sc.length<3) return;

    var gap=sc[0].score-(sc[1]?sc[1].score:0);
    var gap23=sc.length>=3?(sc[1].score-sc[2].score):0;
    var topProb=pr[0]||0;

    // ── Confidence filter ──
    // Skip races where model has no conviction:
    //  - All LOW confidence (gap < 4) AND top prob < 12%
    //  - Fewer than 4 scored horses
    var exoticConf='good';
    if(cf==='high'&&gap>=10) exoticConf='strong';
    else if(cf==='high'||cf==='medium') exoticConf='good';
    else if(gap>=3||topProb>=0.12) exoticConf='marginal';
    else { skipped.push(race.n); return; }

    // Exacta: top 2 (widen to 3 if 2nd/3rd are close)
    var exaN=gap23<=5&&sc.length>=3?3:2;
    var exaHorses=sc.slice(0,exaN);
    var exaCombos=exaN*(exaN-1);
    var exaCost=exaCombos*(exoticConf==='strong'?1:0.5);

    // Trifecta box: always 4 horses per user preference
    var triN=Math.min(4,sc.length);
    var triHorses=sc.slice(0,triN);
    var triCombos=triN*(triN-1)*(triN-2);
    var triCost=triCombos*(exoticConf==='strong'?1:0.5);

    // Auto-thesis
    var thesis='';
    if(exoticConf==='strong') thesis='Strong separation — #1 pick is the key. Exacta should land if model is right.';
    else if(gap>=6) thesis='Clear top pick with playable contenders underneath.';
    else if(gap23<=3) thesis='2nd and 3rd are close — 3-horse exacta box protects you.';
    else thesis='Competitive race. Trifecta box captures upside.';

    allRaces.push({
      race:race, ri:ri, sc:sc, pr:pr, cf:cf, gap:gap, exoticConf:exoticConf,
      exaHorses:exaHorses, exaCost:Math.round(exaCost), exaCombos:exaCombos,
      triHorses:triHorses, triCost:Math.round(triCost), triCombos:triCombos,
      thesis:thesis
    });
  });

  // ── Rank races by exotic value ──
  // Score: confidence * gap * field separation * value potential
  allRaces.forEach(function(rc){
    var confMult = rc.exoticConf==='strong'?3:rc.exoticConf==='good'?2:1;
    var gapScore = Math.min(rc.gap, 15);
    // Value: if top pick has decent odds, exacta pays more
    var topOdds = rc.pr[0]>0 ? (1/rc.pr[0]) : 3;
    var valueMult = topOdds >= 5 ? 1.5 : topOdds >= 3 ? 1.2 : 1.0;
    // Separation: clear top 2-3 = better exacta structure
    var sepScore = rc.sc.length>=3 ? (rc.sc[0].score-rc.sc[2].score) : rc.gap;
    rc.exoticScore = Math.round(confMult * gapScore * valueMult + sepScore);
  });
  allRaces.sort(function(a,b){return b.exoticScore-a.exoticScore;});

  // Top recommendations vs rest
  var topExotics = allRaces.slice(0, Math.min(3, allRaces.length));
  var otherExotics = allRaces.slice(3);

  var totalExa=topExotics.reduce(function(s,r){return s+r.exaCost;},0);
  var totalTri=topExotics.reduce(function(s,r){return s+r.triCost;},0);

  // ── Header with recommendations ──
  var html='<div class="card-gold"><div class="ctitle">Exotic Bet Picks</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-bottom:10px">Algorithm recommends <b style="color:var(--gold)">'+topExotics.length+' best exotic races</b> out of '+allRaces.length+' playable'+(skipped.length?' · Skipped R'+skipped.join(', R')+' (low confidence)':'')+'</div>'+
    '<div class="stat-grid">'+
      '<div class="stat-box"><div class="stat-l">Recommended</div><div class="stat-v" style="color:var(--gold)">'+topExotics.length+' Races</div></div>'+
      '<div class="stat-box"><div class="stat-l">Exacta Cost</div><div class="stat-v" style="color:var(--blue)">$'+totalExa+'</div></div>'+
      '<div class="stat-box"><div class="stat-l">Trifecta Cost</div><div class="stat-v" style="color:#b48cf8">$'+totalTri+'</div></div>'+
      '<div class="stat-box"><div class="stat-l">Total Exotics</div><div class="stat-v" style="color:var(--green)">$'+(totalExa+totalTri)+'</div></div>'+
    '</div></div>';

  // ── Top Picks (featured) — sorted by race number ──
  topExotics.sort(function(a,b){return a.race.n-b.race.n;});
  if(topExotics.length){
    html+='<div style="font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px;padding:0 4px">Top Exotic Plays</div>';
  }
  topExotics.forEach(function(rc, rank){
    var medal = rank===0?'🥇':rank===1?'🥈':'🥉';
    rc._featured = true;
    rc._medal = medal;
  });

  // Build race cards into html string
  function _renderExoticRace(rc){
    var race=rc.race;
    var confColor=rc.exoticConf==='strong'?'var(--green)':rc.exoticConf==='good'?'var(--gold)':'var(--dim)';
    var confLabel=rc.exoticConf==='strong'?'STRONG':rc.exoticConf==='good'?'GOOD':'MARGINAL';
    var borderStyle=rc._featured?'border-left:3px solid var(--gold);':'';

    html+='<div class="card" style="margin-bottom:8px;padding:12px 14px;'+borderStyle+'">'+
      // Header row
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">'+
        (rc._medal?'<span style="font-size:16px">'+rc._medal+'</span>':'')+
        '<span class="bebas" style="font-size:15px;color:var(--gold);background:#f5efe0;border:1px solid var(--gold);padding:1px 8px;border-radius:4px">R'+race.n+'</span>'+
        '<span style="font-size:11px;color:var(--muted)">'+race.d+' · '+race.ty+'</span>'+
        '<span style="font-size:9px;font-weight:700;color:'+confColor+';background:rgba(0,0,0,0.3);border:1px solid '+confColor+';padding:2px 8px;border-radius:3px">'+confLabel+'</span>'+
        '<span style="font-size:11px;color:var(--dim);margin-left:auto">Gap: '+rc.gap+' · Score: '+rc.exoticScore+'</span>'+
      '</div>'+
      // Horses — compact inline
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">';

    rc.sc.slice(0,5).forEach(function(s,i){
      var isTri=i<rc.triHorses.length;
      var isExa=i<rc.exaHorses.length;
      var nc=i===0?'var(--gold)':i===1?'var(--blue)':i===2?'#c09060':isTri?'#b48cf8':'var(--dim)';
      var odds=getOdds(rc.ri,s.name);
      var bg=isExa?'#ede3f5':isTri?'#ede3f5':'var(--bg2)';
      var bd=isExa?'#4a5a8a':isTri?'#4a3a6a':'var(--border)';
      var ppNum=s.horse?s.horse.pp:'?';
      var ppC=PP_COLORS[ppNum]||{bg:'#555',t:'#fff'};
      html+='<div style="background:'+bg+';border:1px solid '+bd+';border-radius:6px;padding:5px 10px;min-width:0">'+
        '<div style="display:flex;align-items:center;gap:6px"><span style="display:inline-flex;align-items:center;justify-content:center;background:'+ppC.bg+';color:'+ppC.t+';font-size:14px;font-weight:800;min-width:28px;height:28px;border-radius:4px;border:2px solid rgba(255,255,255,0.2);flex-shrink:0">'+ppNum+'</span>'+
        '<div><div style="font-size:12px;font-weight:600;color:'+nc+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(s.horse?s.horse.disp||s.name:s.name)+'</div>'+
        '<div style="font-size:11px;color:var(--muted)">'+s.score+' pts · <span style="color:var(--blue)">'+odds+'</span> · '+(rc.pr[i]?(rc.pr[i]*100).toFixed(0)+'%':'—')+'</div></div></div>'+
      '</div>';
    });
    html+='</div>'+
      // Bet recommendations — compact row
      '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">'+
        '<div style="background:#ede3f5;border:1px solid #4a5a8a;border-radius:6px;padding:5px 12px;flex:1;min-width:180px">'+
          '<span style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">EXA BOX '+rc.exaHorses.length+'H</span> '+
          '<span style="font-size:13px;color:var(--blue);font-weight:700">'+rc.exaHorses.map(function(s2){var pp2=s2.horse?s2.horse.pp:'?';var pc2=PP_COLORS[pp2]||{bg:'#555',t:'#fff'};return '<span style="display:inline-flex;align-items:center;justify-content:center;background:'+pc2.bg+';color:'+pc2.t+';font-size:12px;font-weight:800;min-width:22px;height:20px;border-radius:3px;margin:0 1px;vertical-align:middle">'+pp2+'</span> '+(s2.horse?s2.horse.disp||s2.name:s2.name).split(' ')[0];}).join(' / ')+'</span>'+
          ' <span style="font-size:11px;color:var(--text)">$'+rc.exaCost+'</span>'+
        '</div>'+
        '<div style="background:#ede3f5;border:1px solid #6a5a8a;border-radius:6px;padding:5px 12px;flex:1;min-width:180px">'+
          '<span style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">TRI BOX 4H</span> '+
          '<span style="font-size:13px;color:#b48cf8;font-weight:700">'+rc.triHorses.map(function(s2){var pp2=s2.horse?s2.horse.pp:'?';var pc2=PP_COLORS[pp2]||{bg:'#555',t:'#fff'};return '<span style="display:inline-flex;align-items:center;justify-content:center;background:'+pc2.bg+';color:'+pc2.t+';font-size:12px;font-weight:800;min-width:22px;height:20px;border-radius:3px;margin:0 1px;vertical-align:middle">'+pp2+'</span> '+(s2.horse?s2.horse.disp||s2.name:s2.name).split(' ')[0];}).join(' / ')+'</span>'+
          ' <span style="font-size:11px;color:var(--text)">$'+rc.triCost+'</span>'+
        '</div>'+
      '</div>'+
      '<div style="font-size:11px;color:var(--muted);margin-top:6px">'+rc.thesis+'</div>'+
    '</div>';
  }

  // Render featured
  topExotics.forEach(_renderExoticRace);

  // Render others in collapsible — sorted by race number
  if(otherExotics.length){
    otherExotics.sort(function(a,b){return a.race.n-b.race.n;});
    otherExotics.forEach(function(rc){ rc._featured=false; rc._medal=null; });
    html+='<details style="margin-top:8px"><summary style="font-size:11px;color:var(--dim);cursor:pointer;padding:8px 4px">'+otherExotics.length+' more playable races (other options)</summary><div style="margin-top:8px">';
    otherExotics.forEach(_renderExoticRace);
    html+='</div></details>';
  }

  if(!allRaces.length){
    html+='<div class="card" style="color:var(--dim);text-align:center;padding:20px">No playable exotic races. All races have low model confidence.</div>';
  }

  el.innerHTML=html;
}

function renderNews(){
  var el=document.getElementById('tab-news');
  if(!el) return;
  var code=(cardInfo&&cardInfo.code)||'OP';
  var trackName=(cardInfo&&cardInfo.track)||'Oaklawn Park';
  var profile=TRACK_PROFILES[code]||{};
  var tips=TRACK_TIPS[code]||{};
  var tObj=TRACK_LIST.find(function(t){return t.code===code;})||{};

  var html='';

  // ── Track Info Header ──
  html+='<div class="card-gold"><div class="ctitle">'+trackName+'</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-bottom:8px">'+(tips.city||'')+' · '+(tips.venue||trackName)+'</div>'+
    (tips.info?'<div style="font-size:12px;color:var(--text);line-height:1.6;margin-bottom:10px">'+tips.info+'</div>':'')+
    (profile.notes?'<div style="font-size:11px;color:var(--blue);padding:6px 10px;background:rgba(100,150,255,0.05);border-left:2px solid var(--blue);border-radius:0 4px 4px 0"><b>Handicapping note:</b> '+profile.notes+'</div>':'')+
    '</div>';

  // ── Race Day Info ──
  html+='<div class="card"><div class="ctitle">Race Day Info</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  var infoItems=[
    {icon:'🎟', label:'Admission', val:tips.admission||'Check track website'},
    {icon:'💺', label:'Box Seats', val:tips.boxSeats||'Contact box office'},
    {icon:'👔', label:'Dress Code', val:tips.dressCode||'Casual'},
    {icon:'🏆', label:'Jockey Club', val:tips.jockeyClub||'Contact track for premium options'}
  ];
  infoItems.forEach(function(item){
    html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 10px">'+
      '<div style="font-size:12px;font-weight:600;color:var(--gold);margin-bottom:4px">'+item.icon+' '+item.label+'</div>'+
      '<div style="font-size:11px;color:var(--text);line-height:1.5">'+item.val+'</div>'+
    '</div>';
  });
  html+='</div>';

  if(tips.sigDrink){

// ── Live Odds API Fetch ──
var _oddsLastFetch = null;
function fetchLiveOdds(silent) {
  var trackCode = (typeof cardInfo !== 'undefined' && cardInfo.code) ? cardInfo.code : 'OP';
  var rd = (typeof cardInfo !== 'undefined' && cardInfo.date) || '';
  var isoDate = '';
  if (rd) { var d = new Date(rd); if (!isNaN(d)) isoDate = d.toISOString().slice(0, 10); }
  if (!isoDate) { if (!silent) alert('No race date set — load a card first.'); return; }

  var statusEl = document.getElementById('live-odds-status');
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--blue)">Fetching live odds from TVG...</span>';

  fetch('/api/odds?track=' + trackCode + '&date=' + isoDate)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">' + data.error + '</span>';
        return;
      }
      var updated = 0;
      var newScratches = 0;
      R.forEach(function(race, ri) {
        var raceOdds = data.races[race.n];
        if (!raceOdds) return;
        race.horses.forEach(function(h) {
          // Match by name — try exact, then fuzzy
          var runner = raceOdds.runners[h.name];
          if (!runner) {
            var hLow = h.name.toLowerCase().replace(/[^a-z0-9]/g, '');
            var keys = Object.keys(raceOdds.runners);
            for (var k = 0; k < keys.length; k++) {
              var rLow = keys[k].toLowerCase().replace(/[^a-z0-9]/g, '');
              if (rLow === hLow || rLow.indexOf(hLow.substring(0, 6)) >= 0 || hLow.indexOf(rLow.substring(0, 6)) >= 0) {
                runner = raceOdds.runners[keys[k]];
                break;
              }
            }
          }
          if (!runner) return;
          // Auto-scratch from TVG
          if (runner.scratched) {
            if (!scratches[ri]) scratches[ri] = {};
            if (!scratches[ri][h.name]) { scratches[ri][h.name] = true; newScratches++; }
          }
          // Populate morning line from TVG if horse still has default 5-1
          if (runner.ml && (!h.ml || h.ml === '5-1' || h.ml === '4-1')) {
            h.ml = runner.ml;
            updated++;
          }
          // If still stuck on 5-1 and we have live odds, use live as best ML estimate
          if ((!h.ml || h.ml === '5-1') && runner.live) {
            h.ml = runner.live;
            updated++;
          }
          // Update live odds if available
          if (runner.live) {
            if (!liveOdds[ri]) liveOdds[ri] = {};
            liveOdds[ri][h.name] = runner.live;
            updated++;
          }
        });
      });
      // Update track condition from TVG if available
      var conditionUpdated = false;
      if (data.trackCondition) {
        var tvgCond = data.trackCondition.toLowerCase();
        var mapped = tvgCond === 'fast' ? 'fast' : tvgCond === 'sloppy' ? 'sloppy' : tvgCond === 'muddy' ? 'muddy' :
                     tvgCond === 'good' ? 'good' : tvgCond === 'soft' ? 'soft' : tvgCond === 'firm' ? 'fast' :
                     tvgCond === 'yielding' ? 'soft' : tvgCond === 'heavy' ? 'muddy' : null;
        if (mapped && mapped !== tc.surface) {
          tc.surface = mapped;
          conditionUpdated = true;
        }
      }

      _oddsLastFetch = new Date();
      if (statusEl) {
        var msg = 'Updated ' + updated + ' odds';
        if (newScratches > 0) msg += ' · ' + newScratches + ' new scratch' + (newScratches > 1 ? 'es' : '');
        if (conditionUpdated) msg += ' · Track: ' + tc.surface.toUpperCase();
        msg += ' (' + _oddsLastFetch.toLocaleTimeString() + ')';
        statusEl.innerHTML = '<span style="color:var(--green)">' + msg + '</span>';
      }
      // Re-render current tab to reflect scratches + odds + condition changes
      if (conditionUpdated) renderTC();
      if (TAB === 'odds') renderOdds();
      else if (TAB === 'rankings' && (newScratches > 0 || conditionUpdated)) render();
      if (newScratches > 0) renderRaceTabs();
      saveState();
    })
    .catch(function(e) {
      if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">Fetch error: ' + e.message + '</span>';
    });
}

function scratchByPP(rn, pp) {
  var race = R[rn];
  var h = race.horses.find(function(x){ return x.pp === pp; });
  if(!h){ alert('No horse with PP #' + pp + ' in Race ' + R[rn].n); return; }
  if(!scratches[rn]) scratches[rn] = {};
  scratches[rn][h.name] = !scratches[rn][h.name];
  render();
}

function buildBettingChecklist(){
  var container=document.getElementById('betting-today-checks');
  if(!container)return;
  // Show popular tracks + current track at top
  var popular=['KEE','OP','CD','SA','GP','BEL','AQU','SAR','DMR','TAM','FG','LRL','MTH','TP','PIM','WO','PEN','PRX','CT'];
  var currentCode=(cardInfo&&cardInfo.code)||'';
  // Put current track first if not in list
  if(currentCode&&popular.indexOf(currentCode)<0) popular.unshift(currentCode);

  var html='';
  popular.forEach(function(code){
    var tObj=TRACK_LIST.find(function(t){return t.code===code;});
    if(!tObj)return;
    var checked=bettingTracks.indexOf(code)>=0;
    var isCurrent=code===currentCode;
    html+='<label style="display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:6px;cursor:pointer;'+(checked?'background:rgba(212,175,55,0.1);':'')+'" onmouseover="this.style.background=\'rgba(255,255,255,0.05)\'" onmouseout="this.style.background=\''+(checked?'rgba(212,175,55,0.1)':'')+'\'">'+
