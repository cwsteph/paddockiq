// Day history — persisted across sessions for multi-day graph
var dayHistory = [];  // [{date, track, net, wagered, wins, bets}]
var raceResultsLog = []; // [{date, track, race, algoPickName, algoScore, algoGap, algoConf, betType, betAmt, actualWinner, winPay, placePay, algoPickFinish, won, pnl}]

function saveRaceResultsLog(){
  try{ localStorage.setItem('paddockiq_results_log', JSON.stringify(raceResultsLog)); }catch(e){}
}
function loadRaceResultsLog(){
  try{
    var raw = localStorage.getItem('paddockiq_results_log');
    if(raw) raceResultsLog = JSON.parse(raw);
  }catch(e){ raceResultsLog=[]; }
}

function closeDayAndSave(){
  var pnl = returned - wagered;
  if(wagered === 0){ alert('No bets wagered today — nothing to close.'); return; }
  var today = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  dayHistory.push({
    date: today,
    track: 'OP',
    net: parseFloat(pnl.toFixed(2)),
    wagered: parseFloat(wagered.toFixed(2)),
    wins: bets.filter(function(b){return b.settled&&b.payout>b.amount;}).length,
    bets: bets.filter(function(b){return b.amount>0;}).length,
    bankroll: parseFloat(rem().toFixed(2))
  });
  // Persist day history separately (not cleared by daily reset)
  try{ localStorage.setItem('paddockiq_history', JSON.stringify(dayHistory)); }catch(e){}
  alert('Day closed and saved to history!');
  renderPnL();
}

function exportResultsLog(){
  loadRaceResultsLog();
  if(!raceResultsLog.length){alert('No results logged yet. Parse race results in the PP Parser tab first.');return;}
  var cols=['date','track','race','algoPickName','algoScore','algoGap','algoConf','betType','betAmt',
            'actualWinner','winPay','placePay','pickFinish','won','pnl','surface','bias','fieldSize'];
  var csv=cols.join(',')+'\n';
  raceResultsLog.forEach(function(r){
    csv+=cols.map(function(c){
      var v=r[c]===undefined?'':r[c];
      return typeof v==='string'&&v.indexOf(',')>-1?'"'+v+'"':v;
    }).join(',')+'\n';
  });
  var blob=new Blob([csv],{type:'text/csv'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='paddockiq_results_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function clearResultsLog(){
  if(confirm('Clear all stored race results? This cannot be undone.')){
    raceResultsLog=[];
    localStorage.removeItem('paddockiq_results_log');
    alert('Results log cleared.');
  }
}

function loadDayHistory(){
  try{
    var raw = localStorage.getItem('paddockiq_history');
    if(raw) dayHistory = JSON.parse(raw);
  }catch(e){ dayHistory=[]; }
}

function renderPnL(){
  loadDayHistory();
  var pnl=returned-wagered, roi=wagered>0?(pnl/wagered*100).toFixed(1):null;

  // ── 1. Today's summary stats ──
  var html='<div class="card"><div class="ctitle">Today\'s P&L</div>'+
    '<div class="stat-grid">';
  [['Wagered','$'+wagered.toFixed(2),'var(--blue)'],
   ['Returned','$'+returned.toFixed(2),'var(--green)'],
   ['Net P&L',(pnl>=0?'+':'')+pnl.toFixed(2),pnl>=0?'var(--green)':'var(--red)'],
   ['ROI',roi!=null?roi+'%':'—',parseFloat(roi)>=0?'var(--green)':'var(--red)']
  ].forEach(function(x){
    html+='<div class="stat-box"><div class="stat-l">'+x[0]+'</div><div class="stat-v" style="color:'+x[2]+'">'+x[1]+'</div></div>';
  });
  html+='</div>'+
    '<button onclick="closeDayAndSave()" style="margin-top:10px;font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--green);background:#0d2010;color:var(--green);cursor:pointer">📅 Close Day & Save to History</button>'+
    '<button onclick="exportResultsLog()" style="margin-top:10px;margin-left:8px;font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid #6aabbb;background:#0d1a20;color:#6aabbb;cursor:pointer">📥 Export Results Log (CSV)</button>'+
  '</div>';

  // ── 2. TODAY — race-by-race chart ──
  // Build per-race P&L from bets array
  var racePnl = {};   // race# -> {bet, payout, net, horse, settled}
  bets.forEach(function(b){
    if(!racePnl[b.race]) racePnl[b.race]={bet:0,payout:0,horse:b.horse,settled:false,type:b.type};
    racePnl[b.race].bet    += b.amount;
    racePnl[b.race].payout += b.payout||0;
    racePnl[b.race].settled = racePnl[b.race].settled||b.settled;
  });

  // Fill in races with no bet as $0
  R.forEach(function(r){
    if(!racePnl[r.n]) racePnl[r.n]={bet:0,payout:0,horse:'—',settled:false,type:'—',noBet:true};
  });

  var raceNums   = R.map(function(r){return r.n;}).sort(function(a,b){return a-b;});
  var raceLabels = raceNums.map(function(n){return 'R'+n;});
  var raceBars   = raceNums.map(function(n){
    var d=racePnl[n];
    if(d.noBet||!d.settled) return 0;
    return parseFloat((d.payout - d.bet).toFixed(2));
  });
  var raceColors = raceBars.map(function(v){
    if(v>0)  return 'rgba(78,201,126,0.85)';
    if(v<0)  return 'rgba(224,85,85,0.85)';
    return 'rgba(80,80,120,0.5)';
  });

  // Running bankroll line
  var runBank = bankroll;
  // work backwards to find starting bankroll
  var totalNet = bets.filter(function(b){return b.settled;}).reduce(function(s,b){return s+(b.payout-b.amount);},0);
  var startBank = bankroll - totalNet;
  var runningLine=[startBank];
  raceNums.forEach(function(n){
    var d=racePnl[n];
    var last=runningLine[runningLine.length-1];
    if(d.settled) runningLine.push(parseFloat((last + d.payout - d.bet).toFixed(2)));
    else runningLine.push(last);
  });

  html += '<div class="card"><div class="ctitle">Race-by-Race Results</div>';
  html += '<canvas id="race-chart" style="width:100%;height:200px;max-height:200px"></canvas>';

  // Race-by-race detail table
  html += '<div style="overflow-x:auto;margin-top:12px"><table style="width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed">';
  html += '<colgroup><col style="width:6%"><col style="width:24%"><col style="width:12%"><col style="width:10%"><col style="width:10%"><col style="width:12%"><col style="width:14%"><col style="width:12%"></colgroup>';
  html += '<thead><tr style="border-bottom:1px solid var(--border)">';
  ['R','Horse','Type','Bet','Return','Net','Bank','Status'].forEach(function(h){
    html+='<th style="padding:5px 6px;text-align:left;color:var(--dim);font-weight:500;font-size:11px">'+h+'</th>';
  });
  html += '</tr></thead><tbody>';

  var runBk = startBank;
  raceNums.forEach(function(n){
    var d = racePnl[n];
    var net = d.settled ? parseFloat((d.payout - d.bet).toFixed(2)) : null;
    if(d.settled) runBk = parseFloat((runBk + net).toFixed(2));
    var nc = net===null?'var(--dim)':(net>0?'var(--green)':'var(--red)');
    var status = d.noBet?'<span style="color:var(--dim);font-size:11px">No bet</span>':
                 !d.settled?'<span style="color:var(--gold);font-size:11px">Pending</span>':
                 net>0?'<span style="color:var(--green);font-size:11px">WIN</span>':
                 '<span style="color:var(--red);font-size:11px">LOSS</span>';
    html += '<tr style="border-bottom:1px solid #0d0d18">';
    html += '<td style="padding:5px 6px;color:var(--muted);font-size:11px">'+n+'</td>';
    html += '<td style="padding:5px 6px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+d.horse+'</td>';
    html += '<td style="padding:5px 6px;color:var(--blue);font-size:11px">'+d.type+'</td>';
    html += '<td style="padding:5px 6px;color:var(--dim)">'+( d.bet?'$'+d.bet.toFixed(2):'—')+'</td>';
    html += '<td style="padding:5px 6px;color:var(--dim)">'+( d.payout?'$'+d.payout.toFixed(2):'—')+'</td>';
    html += '<td style="padding:5px 6px;font-weight:600;color:'+nc+'">'+(net!==null?(net>=0?'+':'')+net.toFixed(2):'—')+'</td>';
    html += '<td style="padding:5px 6px;color:var(--gold)">$'+( d.settled?runBk.toFixed(2):'—')+'</td>';
    html += '<td style="padding:5px 6px">'+status+'</td>';
    html += '</tr>';
  });

  // Totals row
  var totalBet = bets.reduce(function(s,b){return s+b.amount;},0);
  var totalRet = bets.reduce(function(s,b){return s+(b.payout||0);},0);
  var totalNet2 = totalRet - totalBet;
  html += '<tr style="border-top:1px solid var(--border);font-weight:600">';
  html += '<td colspan="3" style="padding:6px 6px;color:var(--muted);font-size:11px">TOTAL</td>';
  html += '<td style="padding:6px 6px;color:var(--dim)">$'+totalBet.toFixed(2)+'</td>';
  html += '<td style="padding:6px 6px;color:var(--dim)">$'+totalRet.toFixed(2)+'</td>';
  html += '<td style="padding:6px 6px;color:'+(totalNet2>=0?'var(--green)':'var(--red)')+'">'+
          (totalNet2>=0?'+':'')+totalNet2.toFixed(2)+'</td>';
  html += '<td style="padding:6px 6px;color:var(--gold)">$'+rem().toFixed(2)+'</td>';
  html += '<td></td></tr>';
  html += '</tbody></table></div></div>';

  // ── 3. Multi-day history (past closed days) ──
  var allDays = dayHistory.slice();
  if(wagered > 0){
    var today = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
    allDays.push({date:today+'*',track:'OP',net:parseFloat(pnl.toFixed(2)),wagered:parseFloat(wagered.toFixed(2)),
      wins:bets.filter(function(b){return b.settled&&b.payout>b.amount;}).length,
      bets:bets.filter(function(b){return b.amount>0;}).length,
      bankroll:parseFloat(rem().toFixed(2)),today:true});
  }

  if(allDays.length > 0){
    html += '<div class="card"><div class="ctitle">Race Day History</div>';
    html += '<canvas id="pnl-chart" style="width:100%;height:180px;max-height:180px"></canvas>';
    html += '<div style="overflow-x:auto;margin-top:10px"><table style="width:100%;border-collapse:collapse;font-size:12px">';
    html += '<thead><tr style="border-bottom:1px solid var(--border)">';
    ['Date','Track','Net','Wagered','ROI','W/B','Bankroll'].forEach(function(h){
      html+='<th style="padding:5px 8px;text-align:left;color:var(--dim);font-weight:500">'+h+'</th>';
    });
    html += '</tr></thead><tbody>';
    allDays.forEach(function(d){
      var r = d.wagered>0?((d.net/d.wagered)*100).toFixed(1)+'%':'—';
      var nc = d.net>=0?'var(--green)':'var(--red)';
      html += '<tr style="border-bottom:1px solid #0d0d18'+(d.today?';opacity:0.75':'')+'\">';
      html += '<td style="padding:5px 8px;color:var(--text)">'+(d.today?'<i>':'')+d.date+(d.today?'</i>':'')+'</td>';
      html += '<td style="padding:5px 8px;color:var(--dim)">'+d.track+'</td>';
      html += '<td style="padding:5px 8px;font-weight:600;color:'+nc+'">'+(d.net>=0?'+':'')+d.net.toFixed(2)+'</td>';
      html += '<td style="padding:5px 8px;color:var(--dim)">$'+d.wagered.toFixed(2)+'</td>';
      html += '<td style="padding:5px 8px;color:'+nc+'">'+r+'</td>';
      html += '<td style="padding:5px 8px;color:var(--dim)">'+(d.wins||0)+'/'+(d.bets||0)+'</td>';
      html += '<td style="padding:5px 8px;color:var(--gold)">$'+(d.bankroll||0).toFixed(2)+'</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
  }

  // ── Settle race ──
  var raceOpts = R.map(function(r,i){return '<option value="'+i+'"'+(i===CUR?' selected':'')+'>Race '+r.n+'</option>';}).join('');
  // Build horse options for current race
  var curRaceIdx = CUR;
  var horseOpts = R[curRaceIdx].horses
    .filter(function(h){return !(scratches[curRaceIdx]||{})[h.name];})
    .sort(function(a,b){return (a.pp||0)-(b.pp||0);})
    .map(function(h){return '<option value="'+h.name+'">'+(h.disp||h.name)+' (PP'+h.pp+')</option>';}).join('');

  html += '<div class="card"><div class="ctitle">Settle a Race</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px">'+
      '<div><div class="slabel">Race</div>'+
        '<select id="s-race" onchange="updateSettleHorses(this.value)" style="background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-size:13px">'+raceOpts+'</select></div>'+
      '<div><div class="slabel">Winner</div>'+
        '<select id="s-winner" style="background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-size:13px;min-width:180px">'+
          horseOpts+
        '</select></div>'+
      '<div><div class="slabel">Win ($2)</div><input class="inp" type="number" id="s-pay" placeholder="e.g. 7.40" step="0.01" style="width:80px"/></div>'+
      '<div><div class="slabel">Place ($2)</div><input class="inp" type="number" id="s-place" placeholder="e.g. 4.20" step="0.01" style="width:80px"/></div>'+
      '<button class="btn-green" onclick="settleRace()">Settle</button>'+
    '</div></div>';

  // ── Bet log ──
  html += '<div class="card"><div class="ctitle">Bet Log</div>';
  if(!bets.length){
    html += '<div style="font-size:12px;color:var(--dim)">No bets logged yet. Tap the WIN / WIN·PLACE / PLACE·SHOW button on the Rankings tab to log a bet.</div>';
  } else {
    html += '<table style="width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed">'+
      '<colgroup><col style="width:6%"><col style="width:26%"><col style="width:12%"><col style="width:10%"><col style="width:12%"><col style="width:14%"><col style="width:20%"></colgroup>'+
      '<thead><tr style="border-bottom:1px solid var(--border)">'+
      ['R','Horse','Type','Bet','Return','Net','Status'].map(function(h){
        return '<th style="padding:4px 6px;text-align:left;color:var(--dim);font-weight:500;font-size:11px">'+h+'</th>';
      }).join('')+
      '</tr></thead><tbody>';
    bets.forEach(function(b){
      var net = b.settled ? b.payout - b.amount : null;
      var nc  = net===null?'var(--dim)':(net>0?'var(--green)':'var(--red)');
      var status = !b.settled?'<span style="color:var(--gold)">Pending</span>':
                   net>0?'<span style="color:var(--green)">WIN +$'+b.payout.toFixed(2)+'</span>':
                   '<span style="color:var(--red)">LOSS</span>';
      html += '<tr style="border-bottom:1px solid #0d0d18">'+
        '<td style="padding:4px 6px;color:var(--muted)">'+b.race+'</td>'+
        '<td style="padding:4px 6px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+b.horse+'</td>'+
        '<td style="padding:4px 6px;color:var(--blue);font-size:11px">'+b.type+'</td>'+
        '<td style="padding:4px 6px;color:var(--dim)">$'+b.amount.toFixed(2)+'</td>'+
        '<td style="padding:4px 6px;color:var(--dim)">'+(b.payout?'$'+b.payout.toFixed(2):'—')+'</td>'+
        '<td style="padding:4px 6px;font-weight:600;color:'+nc+'">'+(net!==null?(net>=0?'+':'')+net.toFixed(2):'—')+'</td>'+

    });
    html += '</tbody></table>';
  }
  html += '</div>';

  document.getElementById('tab-pnl').innerHTML = html;

  // ── Render race-by-race chart ──
  setTimeout(function(){
    var canvas = document.getElementById('race-chart');
    if(canvas && window.Chart){
      if(window._raceChart) window._raceChart.destroy();
      window._raceChart = new Chart(canvas, {
        type:'bar',
        data:{
          labels: raceLabels,
          datasets:[
            {label:'Race P&L ($)',data:raceBars,backgroundColor:raceColors,borderColor:raceColors,borderRadius:4,order:2},
            {label:'Bankroll ($)',data:runningLine.slice(1),type:'line',borderColor:'#b48cf8',
             backgroundColor:'transparent',pointBackgroundColor:runningLine.slice(1).map(function(v,i){
               return v>(runningLine[i]||v)?'var(--green)':'var(--red)';
             }),
             pointRadius:4,borderWidth:2,tension:0.3,order:1,yAxisID:'y2'}
          ]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          interaction:{mode:'index',intersect:false},
          plugins:{
            legend:{labels:{color:'#aaa',font:{size:10}}},
            tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': $'+ctx.parsed.y.toFixed(2);}}}
          },
          scales:{
            x:{ticks:{color:'#888',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},
            y:{ticks:{color:'#888',font:{size:11},callback:function(v){return '$'+v;}},grid:{color:'rgba(255,255,255,0.04)'},
               title:{display:true,text:'Race P&L',color:'#666',font:{size:10}}},

    // ── Render multi-day chart ──
    var canvas2 = document.getElementById('pnl-chart');
    if(canvas2 && window.Chart && allDays.length > 0){
      if(window._pnlChart) window._pnlChart.destroy();
      var labels2 = allDays.map(function(d){return d.date;});
      var nets2   = allDays.map(function(d){return d.net;});
      var banks2  = allDays.map(function(d){return d.bankroll||0;});
      var colors2 = nets2.map(function(n){return n>=0?'rgba(78,201,126,0.85)':'rgba(200,60,60,0.85)';});
      window._pnlChart = new Chart(canvas2, {
        type:'bar',
        data:{labels:labels2,datasets:[
          {label:'Net P&L ($)',data:nets2,backgroundColor:colors2,borderColor:colors2,borderRadius:4,order:2},
          {label:'Bankroll ($)',data:banks2,type:'line',borderColor:'#b48cf8',backgroundColor:'transparent',
           pointBackgroundColor:'#b48cf8',pointRadius:4,borderWidth:2,tension:0.3,order:1,yAxisID:'y2'}
        ]},
        options:{responsive:true,maintainAspectRatio:false,

  sel.innerHTML = R[ri].horses
    .filter(function(h){return !scr[h.name];})
    .sort(function(a,b){return (a.pp||0)-(b.pp||0);})

function settleRace(){
  var raceIdx = parseInt(document.getElementById('s-race').value);
  var raceN   = R[raceIdx].n;
  var winner  = document.getElementById('s-winner').value.trim();
  var winPay  = parseFloat(document.getElementById('s-pay').value)||0;
  var placePay= parseFloat(document.getElementById('s-place').value)||0;
  if(!winner){alert('Select a winner');return;}
  var newRet=0;
  bets.forEach(function(b){
    if(b.race===raceN&&!b.settled){
      b.settled=true;
      var won    = b.horse===winner && winPay>0;
      var placed = b.horse===winner && placePay>0;
      if(b.type==='WIN'){
        b.payout = won?(b.amount/2)*winPay:0;
      } else if(b.type==='WIN/PLACE'||b.type==='WIN / PLACE'){
        var wp=b.amount/2, pp=b.amount/2;
        b.payout = (won?(wp/2)*winPay:0) + (placed?(pp/2)*placePay:0);
      } else {
        // PLACE/SHOW
        b.payout = placed?((b.amount/2)/2)*placePay:0;
      }
      newRet+=b.payout;
    }
  });
  returned+=newRet;
  saveState();
  render();
  alert('Race '+raceN+' settled! Returned: $'+newRet.toFixed(2));
}

function parseRaceTime(t){
  var m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if(!m)return 9999;
  var h=parseInt(m[1]),mn=parseInt(m[2]),ap=m[3].toUpperCase();
  if(ap==='PM'&&h!==12)h+=12;
  if(ap==='AM'&&h===12)h=0;
  return h*60+mn;
}

function rebuildRacesFromEquibase(eqData){
  if(!eqData || !eqData.races || !eqData.races.length) return false;

  // Equibase is authoritative for race count and structure
  // Only preserve horse data for races that are in TODAY's Equibase card
  var today = cardInfo.date || new Date().toLocaleDateString('en-CA',{timeZone:'America/Chicago'});
  var savedDate = '';
  try{ savedDate = (JSON.parse(localStorage.getItem('paddockiq_state')||'{}')||{}).cardInfo && JSON.parse(localStorage.getItem('paddockiq_state')||'{}').cardInfo.date || ''; }catch(e){}
  var isSameDay = !savedDate || savedDate === today;

  // Build lookup of existing horse data
  var existingHorses = {};
  var existingRaces  = {};
  R.forEach(function(r){ existingHorses[r.n] = r.horses; existingRaces[r.n] = r; });

  // Equibase races = today's definitive race list
  var eqRaceNums = eqData.races.map(function(er){return er.n;});
  var mergedRaces = eqData.races.map(function(er){
    var existing = existingRaces[er.n] || {};
    return {
      n:  er.n,
      t:  er.t || existing.t || '',
      d:  er.d || existing.d || '',
      ty: er.ty || existing.ty || '',
      purse: er.purse || '',
      grade: er.grade || existing.grade || 0,
      gradeName: er.gradeName || existing.gradeName || '',
      // Only keep horses if it's the same day — otherwise fresh start
      horses: isSameDay ? (existingHorses[er.n] || []) : []
    };
  });
  // Add back races Equibase skipped (showing RESULTS) BUT only if they match today's date
  // Don't carry over races from yesterday's card
  var today = cardInfo.date || new Date().toLocaleDateString('en-CA',{timeZone:'America/Chicago'});
  var savedDate = (function(){ try{ var st=JSON.parse(localStorage.getItem('paddockiq_state')||'{}'); return (st.cardInfo||{}).date||''; }catch(e){return '';} })();
  var isSameDay = (savedDate === today);
  // Add back completed races (RESULTS on Equibase) from same day only
  // Cap at R20 max to prevent garbage race numbers from date-parsing bugs
  if(isSameDay){
    R.forEach(function(r){
      if(r.n > 0 && r.n <= 20 && eqRaceNums.indexOf(r.n) < 0){
        mergedRaces.push({
          n:r.n, t:r.t||'', d:r.d, ty:r.ty,
          purse:r.purse||'', grade:r.grade||0, gradeName:r.gradeName||'',
          horses:r.horses
        });
      }
    });
  }
  mergedRaces.sort(function(a,b){return a.n-b.n;});

  // First: remove any obviously corrupted times (79:42 PM, times with 'CT' etc)
  mergedRaces.forEach(function(r){
    if(r.t && (parseInt(r.t) > 12 || r.t.indexOf('CT')>-1 || r.t.match(/^\d{2,}:/))){
      console.warn('R'+r.n+' bad time cleared:', r.t);
      r.t = '';
    }
  });

  // Fix times: ensure races are in ascending time order
  // If a race's time is out of order with its neighbors, interpolate
  for(var fi=1; fi<mergedRaces.length-1; fi++){
    var prev = parseRaceTime(mergedRaces[fi-1].t||'');
    var curr = parseRaceTime(mergedRaces[fi].t||'');
    var next = parseRaceTime(mergedRaces[fi+1].t||'');
    if(curr > 0 && prev > 0 && next > 0 && (curr >= next || curr <= prev)){
      // Time is out of order — interpolate between prev and next
      var interp = Math.round((prev + next) / 2);
      var hh = Math.floor(interp/60);
      var mm = interp%60;
      var ap = hh>=12?'PM':'AM';
      if(hh>12)hh-=12; if(hh===0)hh=12;
      mergedRaces[fi].t = hh+':'+(mm<10?'0':'')+mm+' '+ap;
      console.log('R'+mergedRaces[fi].n+' time interpolated to '+mergedRaces[fi].t);
    }
  }

  R = mergedRaces;

  // Update cardInfo
  cardInfo.numRaces = numRaces;
  // Update header
  updateCardHeader();
  // Update race tabs
  renderRaceTabs();

  console.log('R[] rebuilt from Equibase: '+R.length+' races');
  updateCardHeader();
  return true;
}

function equibaseURL(){
  // Build Equibase static entry URL from cardInfo
  // Format: /static/entry/TRACKMMDDYYUSA-EQB.html
  var code = cardInfo && cardInfo.code ? cardInfo.code : 'OP';
  var date = cardInfo && cardInfo.date ? cardInfo.date :
    new Date().toLocaleDateString('en-CA',{timeZone:'America/Chicago'}); // fallback to today
  var parts = date.split('-'); // yyyy-mm-dd
  if(parts.length < 3) return null;
  var yr2 = parts[0].slice(2); // 26
  return 'https://www.equibase.com/static/entry/'+
    code+parts[1]+parts[2]+yr2+'USA-EQB.html';
}

function getTrackTZ(){
  // Get timezone for current track from cardInfo
  if(typeof cardInfo !== 'undefined' && cardInfo.code){
    var tObj = TRACK_LIST.find(function(t){return t.code===cardInfo.code;});
    if(tObj && tObj.tz) return tObj.tz;
  }
  return 'America/Chicago'; // default
}

function getCTMins(){
  // Returns current time in minutes for the active track's timezone
  var tz = getTrackTZ();
  try {
    var now=new Date();
    var parts=new Intl.DateTimeFormat('en-US',{
      timeZone:tz,
      hour:'numeric',minute:'numeric',hour12:false
    }).formatToParts(now);
    var h=parseInt(parts.find(function(p){return p.type==='hour';}).value);
    var m=parseInt(parts.find(function(p){return p.type==='minute';}).value);
    if(isNaN(h)||isNaN(m)) throw new Error('parse fail');
    return h*60+m;
  } catch(e) {
    var now=new Date();
    var utcMs=now.getTime()+now.getTimezoneOffset()*60000;
    var ct=new Date(utcMs-5*3600000);
    return ct.getHours()*60+ct.getMinutes();
  }
}

async function fetchEquibaseData(){
  var url = equibaseURL();

    });
    var data = await resp.json();

function parseEquibaseRosters(text){
  // Extract the official horse list per race from Equibase entry page
  // Returns {raceN: [{name, pp, ml, scratched}]}
  var rosters = {};
  var raceRe = /Race\s+(\d+)\s+POST\s+Time\s*[-–]\s*(\d{1,2}:\d{2}\s*(?:AM|PM))/gi;
  var raceMatches = [];
  var m;
  while((m=raceRe.exec(text))!==null){
    raceMatches.push({n:parseInt(m[1]), time:m[2].trim(), pos:m.index});
  }

  for(var i=0; i<raceMatches.length; i++){
    var rn    = raceMatches[i].n;
    var start = raceMatches[i].pos;
    var end   = i+1 < raceMatches.length ? raceMatches[i+1].pos : text.length;
    var section = text.slice(start, end);

    rosters[rn] = [];
    var lines = section.split(' ');
    var currentPP = null;

    // Parse horse entries: look for PP# then horse name then odds
    // Equibase format: "1 HorseName (Jockey) Trainer M/L"
    var lineText = section;
    // Find patterns: number followed by capitalized horse name
    var horseRe = /(\d{1,2})\s+([A-Z][a-zA-Z\s']{2,30}?)\s+(?:[A-Z]\.\s+)?[A-Z][a-z]/g;
    var hm;
    while((hm=horseRe.exec(lineText))!==null){
      var pp = parseInt(hm[1]);
      var name = hm[2].trim();
      if(pp >= 1 && pp <= 20 && name.length > 2){
        // Check if scratched
        var nearText = lineText.slice(Math.max(0,hm.index-10), hm.index+name.length+50);
        var scratched = /SCR/.test(nearText);
        // Get ML odds
        var oddsM = lineText.slice(hm.index, hm.index+100).match(/(\d+)\/(\d+)/);
        var ml = oddsM ? oddsM[1]+'-'+oddsM[2] : '5-1';
        rosters[rn].push({name:name, pp:pp, ml:ml, scratched:scratched});
      }
    }
  }
  return rosters;
}

function parseEquibasePage(text){
  var result = {
    postTimes: {},  // {raceN: "12:30 PM"}
    odds:      {},  // {raceN: {horseName: "5-2"}}
    scratched: {},  // {raceN: ["Horse Name", ...]}
    races:     []   // [{n, time, dist, ty}] — full card structure
  };

  // Split into race sections — Equibase uses "RACE N POST TIME - H:MM AM/PM TZ"
  var raceRe = /Race\s+(\d+)\s+POST\s+Time\s*[-–]\s*(\d{1,2}:\d{2}\s*(?:AM|PM))\s*([A-Z]{2,3})?/gi;
  var raceMatches = [];
  var m;
  while((m = raceRe.exec(text)) !== null){
    raceMatches.push({n:parseInt(m[1]), time:m[2].trim(), tz:m[3]||'', pos:m.index});
  }

  raceMatches.forEach(function(r){ result.postTimes[r.n] = r.time; });

  for(var i=0; i<raceMatches.length; i++){
    var rn    = raceMatches[i].n;
    var start = raceMatches[i].pos;
    var end   = i+1 < raceMatches.length ? raceMatches[i+1].pos : text.length;
    var section = text.slice(start, end);

    result.odds[rn]     = {};
    result.scratched[rn] = [];

    // Extract race type and distance
    var distM = section.match(/(\d+(?:\s+\d+\/\d+)?)\s*(Furlongs?|Miles?|Yards?)/i);
    var dist  = distM ? distM[1]+' '+distM[2] : '';
    // Race type
    var ty = '';
    if(/maiden\s+special\s+weight|MSW/i.test(section))         ty='Mdn Sp Wt';
    else if(/maiden\s+claiming|MCL/i.test(section))            ty='Mdn Clm';
    else if(/maiden/i.test(section))                           ty='Mdn';
    else if(/optional\s+claiming|OC/i.test(section))           ty='OC';
    else if(/allowance.*optional|AOC/i.test(section))          ty='AOC';
    else if(/allowance/i.test(section))                        ty='Alw';
    else if(/claiming/i.test(section))                         ty='Clm';
    else if(/stakes|handicap/i.test(section))                  ty='Stakes';
    // Purse
    var purseM = section.match(/Purse\s+\$([\d,]+)/i);
    var purse  = purseM ? '$'+purseM[1] : '';
    // Grade
    // Grade: must have explicit "Grade N" keyword AND a proper race name
    var gradeM = section.match(/\bGrade\s+([123])\b/i);
    var grade  = gradeM ? parseInt(gradeM[1]) : 0;
    // Stakes name: only extract if grade is confirmed
    var stakeName = '';
    if(grade > 0){
      var stakeM = section.match(/Grade\s+[123]\s+([A-Z][a-zA-Z\s']{3,50}?(?:Handicap|Stakes|Derby|Cup|Classic|Oaks|Futurity))/i);
      stakeName = stakeM ? stakeM[1].trim() : '';
    }

    result.races.push({n:rn, t:raceMatches[i].time, d:dist, ty:ty, purse:purse, grade:grade, gradeName:stakeName});

    // Parse horses from section lines
    var lines = section.split('\n');
    var currentHorse = null;
    var isScratched  = false;
    lines.forEach(function(line){
      var l = line.trim();
      if(!l) return;
      // SCR marker
      if(/\bSCR\b|Scratched/i.test(l)){
        isScratched = true;
        if(currentHorse && result.scratched[rn].indexOf(currentHorse)<0)
          result.scratched[rn].push(currentHorse);
      }
      // ML odds: X/Y at end of line
      var oddsM = l.match(/(\d+)\/(\d+)\s*$/);
      if(oddsM && currentHorse && !isScratched){
        result.odds[rn][currentHorse] = oddsM[1]+'-'+oddsM[2];
      }
      // Horse name: title case, 2-50 chars, not starting with digit
      if(l.length>=2 && l.length<=50 && /^[A-Z][a-z]/.test(l) && !/^\d/.test(l)){
        currentHorse = l.replace(/\s+\d+\s*$/, '').trim();
        isScratched  = false;
      }
    });
  }
  return result;
}

async function reparseSingleRace(raceN){
  var key = ppApiKey || '';
  if(!key){ alert('Add your API key in Settings first.'); return; }
  var src = ppParseState && ppParseState.pdfText;
  if(!src){ alert('No PDF loaded — upload the PP PDF first.'); return; }
  var ri = R.findIndex(function(r){return r.n===raceN;}); if(ri<0) return;
  var btn = document.getElementById('reparse-btn-'+raceN);
  if(btn){ btn.textContent='Parsing...'; btn.disabled=true; }
  var total=R.length, chunkSize=Math.ceil(src.length/total), overlap=Math.floor(chunkSize*0.30);
  var cStart=Math.max(0,ri*chunkSize-overlap), cEnd=Math.min(src.length,(ri+1)*chunkSize+overlap);
  var chunk=src.slice(cStart,cEnd);
  var roster=(typeof equibaseRosters!=='undefined'&&equibaseRosters[raceN])||[];
  var rStr=roster.length?'\nEquibase roster for Race '+raceN+': '+roster.map(function(h){return h.name;}).join(', '):'';
  var prompt='Extract ONLY Race '+raceN+' horses from this DRF PP text.'+rStr+
    '\nCRITICAL: Horse names are proper nouns (e.g. "Boltoro", "Australian Navy"). NEVER use a number as a horse name — numbers are post positions.'+
    '\nReturn ONLY valid JSON:\n{"postTime":null,"horses":[{"name":"","disp":"","pp":1,"ml":"5-1","b":80,"sty":"Tracker","j":15,"tr":20,"layoff":14,"cc":0,"wins":3,"notes":"","eq":{"lf":false,"bf":false,"bl":false},"wk":[],"distFit":"tested"}]}'+
    '\nname=no apostrophes, disp=with punctuation, pp=post position int, b=Beyer speed figure int (0=debut), sty=Leader/Speed/Tracker/Midpack/Closer/Plodder, j/tr=win% int, layoff=days since last race, cc=class change $K int'+
    '\n\nPP TEXT:\n'+chunk;
  try{
    var resp=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:5120,messages:[{role:'user',content:[{type:'text',text:prompt}]}]})});
    var data=await resp.json();
    if(data.error) throw new Error(data.error.message);
    var raw=data.content[0].text.trim().replace(/```json|```/g,'').trim();
    var depth=0,jS=-1,jE=-1;
    for(var ci=0;ci<raw.length;ci++){if(raw[ci]==='{'){if(depth===0)jS=ci;depth++;}else if(raw[ci]==='}'){depth--;if(depth===0){jE=ci+1;break;}}}
    if(jS>-1&&jE>-1) raw=raw.slice(jS,jE);
    var parsed=JSON.parse(raw), horses=parsed.horses||[];
    if(!horses.length) throw new Error('No horses returned');
    R[ri].horses=horses.map(function(h){return {name:h.name||'',disp:h.disp||h.name||'',pp:parseInt(h.pp)||0,ml:h.ml||'5-1',b:parseInt(h.b)||0,sty:h.sty||'Midpack',j:parseInt(h.j)||10,tr:parseInt(h.tr)||10,wins:parseInt(h.wins)||0,notes:h.notes||'',layoff:parseInt(h.layoff)||21,cc:parseInt(h.cc)||0,eq:h.eq||{lf:false,bf:false,bl:false},wk:h.wk||[],distFit:h.distFit||'tested'};});
    if(parsed.postTime&&/\d+:\d+/.test(parsed.postTime)) R[ri].t=parsed.postTime;
    var st=JSON.parse(localStorage.getItem('paddockiq_state')||'{}');
    if(st.races){var sr=st.races.find(function(r){return r.n===raceN;});if(sr)sr.horses=R[ri].horses;}
    localStorage.setItem('paddockiq_state',JSON.stringify(st));
    if(CUR===ri) render(); renderRaceTabs(); renderPPParser();
    alert('Race '+raceN+' re-parsed: '+horses.length+' horses loaded');
  }catch(e){alert('Re-parse failed: '+e.message+'\n\nTry photo parse instead.');}
  if(btn){ btn.textContent='Retry PDF'; btn.disabled=false; }
}

async function fetchRaceResults(){
  // Fetch Equibase results page for today's card
  // URL: /static/chart/summary/TRACKMMDDYYUSA-EQB.html
  if(!cardInfo.date || !cardInfo.code) return null;
  var parts = cardInfo.date.split('-');
  var yr2 = parts[0].slice(2);
  var url = 'https://www.equibase.com/static/chart/summary/'+
    cardInfo.code+parts[1]+parts[2]+yr2+'USA-EQB.html';
  try{
    var resp = await fetch(PROXY_URL,{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'fetchDRF',url:url})});
    var data = await resp.json();
    if(!data.ok || !data.text) return null;
    return parseEquibaseResults(data.text);
  }catch(e){ console.warn('Results fetch failed:',e.message); return null; }
}

function parseEquibaseResults(text){
  // Returns {raceN: [{finish, name, odds, payouts}]}
  var results = {};
  // Find race sections — "Race N" headers
  var raceRe = /Race\s+(\d+)/gi;
  var sections = [];
  var m;
  while((m=raceRe.exec(text))!==null){
    sections.push({n:parseInt(m[1]), pos:m.index});
  }
  for(var i=0;i<sections.length;i++){
    var rn = sections[i].n;
    var start = sections[i].pos;
    var end = i+1<sections.length ? sections[i+1].pos : text.length;
    var section = text.slice(start, Math.min(end, start+3000));
    results[rn] = [];
    // Parse finish order: "1 HorseName" or "1st HorseName"
    var finRe = /\b([1-9]|10|11|12)\s+([A-Z][a-zA-Z\s']{2,30}?)(?:\s+\d|\s+[A-Z]\.)/g;
    var fm;
    while((fm=finRe.exec(section))!==null){
      var pos = parseInt(fm[1]);
      var name = fm[2].trim();
      if(pos<=12 && name.length>2){
        results[rn].push({finish:pos, name:name});
      }
    }
    // Sort by finish position
    results[rn].sort(function(a,b){return a.finish-b.finish;});
    // Deduplicate
    var seen = {};
    results[rn] = results[rn].filter(function(h){
      if(seen[h.finish]) return false;
      seen[h.finish]=true; return true;
    });
  }
  return results;
}

function buildAlgorithmCSV(raceResults){
  // Build CSV with all scoring data + actual results for algorithm calibration
  var rows = [];
  // Header
  rows.push([
    'date','track','race_n','race_type','distance','grade',
    'horse_name','pp','morning_line',
    // Scores
    'total_score','pick_rank',
    // Component scores
    'speed_score','form_score','class_score','pace_score','jockey_score','trainer_score',
    // Raw inputs
    'beyer','layoff_days','class_change_k','wins','jockey_pct','trainer_pct',
    // Angles
    'first_lasix','blinkers_on','bullet_workout','dist_fit','running_style',
    // Equipment
    'lasix','blinkers','equipment_change',
    // Bet recommendation
    'bet_type','bet_amount','confidence',
    // Actual results (filled after race)
    'actual_finish','won','placed','showed',
    'pick_correct','result_notes'
  ].join(','));

  var date = cardInfo.date || '';
  var track = cardInfo.track || '';

  R.forEach(function(r){
    if(!r.horses.length) return;
    // Score the race
    var scored = scoreRace(R.indexOf(r));
    if(!scored || !scored.length) return;

    // Get actual results for this race
    var actuals = (raceResults && raceResults[r.n]) || [];

    // Get recommended bet for this race
    var topPick = scored[0];
    var secondPick = scored.length>1 ? scored[1] : null;
    var gap = secondPick ? topPick.score - secondPick.score : 999;
    var betType = gap>=8?'WIN':gap>=4?'WIN/PLACE':'PLACE/SHOW';
    var betAmt = topPick.kelly ? Math.round(topPick.kelly) : 0;
    var confidence = gap>=8?'HIGH':gap>=4?'MEDIUM':'LOW';

    scored.forEach(function(s, idx){
      var h = r.horses.find(function(x){return x.name===s.name;});
      if(!h) return;

      // Find actual finish
      var actual = actuals.find(function(a){
        var an = a.name.toLowerCase().replace(/[^a-z]/g,'');
        var hn = h.name.toLowerCase().replace(/[^a-z]/g,'');
        var hd = (h.disp||'').toLowerCase().replace(/[^a-z]/g,'');
        // Exact match first, then partial only if both names are 5+ chars
        if(an===hn||an===hd) return true;
        if(an.length>=5 && hn.length>=5 && (hn.indexOf(an)>-1||an.indexOf(hn)>-1)) return true;
        if(an.length>=5 && hd.length>=5 && (hd.indexOf(an)>-1||an.indexOf(hd)>-1)) return true;
        return false;
      });
      var finish = actual ? actual.finish : '';
      var won   = finish===1?1:0;
      var placed = finish<=2?1:0;
      var showed = finish<=3?1:0;
      var pickCorrect = idx===0&&finish===1?1:0;

      // Extract component scores from scoreRace (we need to re-expose them)
      // Use the raw horse data we have
      var beyer = h.b||0;
      var spd = Math.min(100,Math.max(0,(beyer-60)/70*100))*0.22;
      var jck = (h.j||10)/100*0.06*100;
      var trn = (h.tr||10)/100*0.05*100;

      var esc = function(v){ return '"'+(v||'').toString().replace(/"/g,'""')+'"'; };

      rows.push([
        date, track, r.n,
        esc(r.ty), esc(r.d), r.grade||0,
        esc(h.disp||h.name), h.pp||0, esc(h.ml||''),
        // Scores
        s.score.toFixed(1), idx+1,
        // Components (approximate from horse data)
        spd.toFixed(1), '', '', '', jck.toFixed(1), trn.toFixed(1),
        // Raw inputs
        beyer, h.layoff||0, h.cc||0, h.wins||0, h.j||10, h.tr||10,
        // Angles
        h.eq&&h.eq.lf?1:0, h.eq&&h.eq.bl?1:0, 0, esc(h.distFit||''), esc(h.sty||''),
        // Equipment
        h.eq&&h.eq.lf?1:0, h.eq&&h.eq.bl?1:0, h.eq&&h.eq.bf?1:0,
        // Bet
        idx===0?esc(betType):'', idx===0?betAmt:'', idx===0?esc(confidence):'',
        // Results
        finish, won, placed, showed, pickCorrect, ''
      ].join(','));
    });
  });

  return rows.join('\n');
}

// ── PERSISTENT STORAGE (IndexedDB) ──────────────────────────────────────────
// Uses IndexedDB for true persistence across tab closes and device sleep
// Falls back to localStorage if IndexedDB unavailable

var _idb = null;

function openIDB(){
  return new Promise(function(resolve, reject){
    if(_idb){ resolve(_idb); return; }
    var req = indexedDB.open('paddockiq_db', 1);
    req.onupgradeneeded = function(e){
      var db = e.target.result;
      if(!db.objectStoreNames.contains('state')){
        db.createObjectStore('state', {keyPath:'key'});
      }
    };
    req.onsuccess = function(e){ _idb = e.target.result; resolve(_idb); };
    req.onerror   = function(){ reject(req.error); };
  });
}

async function idbSet(key, value){
  try{
    var db = await openIDB();
    return new Promise(function(resolve, reject){
      var tx = db.transaction('state','readwrite');
      tx.objectStore('state').put({key:key, value:value});
      tx.oncomplete = resolve;
      tx.onerror    = reject;
    });
  }catch(e){
    // Fallback to localStorage
    try{ localStorage.setItem('piq_'+key, JSON.stringify(value)); }catch(le){}
  }
}

async function idbGet(key){
  try{
    var db = await openIDB();
    return new Promise(function(resolve, reject){
      var tx  = db.transaction('state','readonly');
      var req = tx.objectStore('state').get(key);
      req.onsuccess = function(){ resolve(req.result ? req.result.value : null); };
      req.onerror   = reject;
    });
  }catch(e){
    // Fallback to localStorage
    try{
      var v = localStorage.getItem('piq_'+key);
      return v ? JSON.parse(v) : null;
    }catch(le){ return null; }
  }
}

async function persistState(){
  // Save full app state to IndexedDB — survives tab/browser close
  var state = {
    races: R.map(function(r){
      return {n:r.n,t:r.t,d:r.d,ty:r.ty,grade:r.grade||0,gradeName:r.gradeName||'',
        purse:r.purse||'',
        horses:r.horses.map(function(h){
          return {name:h.name,disp:h.disp,pp:h.pp,ml:h.ml,b:h.b,sty:h.sty,
            j:h.j,tr:h.tr,layoff:h.layoff,cc:h.cc,wins:h.wins,notes:h.notes,
            eq:h.eq||{lf:false,bf:false,bl:false},wk:h.wk||[],distFit:h.distFit||'tested',
            // Validate cc — should be in $K (e.g. -10 = drop $10K), cap at ±150
            cc: (function(v){ v=parseInt(v)||0; if(Math.abs(v)>150) v=Math.round(v/1000); return Math.max(-150,Math.min(150,v)); })(h.cc)};
        })};
    }),
    cardInfo:  cardInfo,
    bankroll:  bankroll,
    bets:      bets,
    tc:        tc,
    scratches: scratches,
    savedAt:   new Date().toISOString()
  };
  await idbSet('app_state', state);
  // Also keep localStorage as backup
  try{ localStorage.setItem('paddockiq_state', JSON.stringify(state)); }catch(e){}
}

async function loadPersistedState(){
  // Try IndexedDB first, fall back to localStorage
  var state = await idbGet('app_state');
  if(!state){
    try{
      var ls = localStorage.getItem('paddockiq_state');
      state = ls ? JSON.parse(ls) : null;
    }catch(e){}
  }
  return state;
}

// ── SCRATCH CHECK SYSTEM ─────────────────────────────────────────────────────
var equibaseRosters = {}; // {raceN: [{name,pp,ml,scratched}]} — from Equibase before parse
var scratchCheckTimer   = null;
var lastScratchCheck    = {}; // {raceN: {mins: epochMs}} — tracks each trigger
var scratchedHorses     = {}; // {raceN: ['Horse Name', ...]}
// Trigger thresholds in minutes before post
var SCRATCH_TRIGGERS    = [20, 5, 3, 1]; // check at these MTP marks

function startScratchTimer(){
  if(scratchCheckTimer) clearInterval(scratchCheckTimer);
  scratchCheckTimer = setInterval(function(){
    checkUpcomingRaceScratches();
  }, 60000); // check every 60 seconds
  checkUpcomingRaceScratches(); // also run immediately
}

function checkUpcomingRaceScratches(){
  if(typeof cardInfo === 'undefined' || !cardInfo || !cardInfo.date || !cardInfo.code) return;
  var now = getCTMins();
  var needsCheck = false;

  R.forEach(function(r){
    if(!r.t || !r.horses.length) return;
    var rMins = parseRaceTime(r.t);
    var mtp = rMins - now;
    if(mtp <= 0 || mtp > 20) return; // only within 20 min of post

    var rChecks = lastScratchCheck[r.n] || {};
    // Check each trigger threshold
    SCRATCH_TRIGGERS.forEach(function(trigger){
      if(mtp <= trigger){
        var lastAt = rChecks[trigger] || 0;
        // Only fire once per trigger — if not checked within 2 min of this trigger
        if((Date.now() - lastAt) > 2 * 60000){
          needsCheck = true;
          rChecks[trigger] = Date.now();
          console.log('R'+r.n+': triggering check at MTP '+Math.round(mtp)+' (trigger='+trigger+')');
        }
      }
    });
    lastScratchCheck[r.n] = rChecks;
  });

  if(needsCheck) runEquibaseCheck();
}

async function runEquibaseCheck(){
  var data = await fetchEquibaseData();
  if(!data) return;
  var now = getCTMins();
  var changed = false;

  R.forEach(function(r, ri){
    if(!r.horses.length) return;
    lastScratchCheck[r.n] = Date.now();

    // ── Update post times from Equibase ──────────────────────────────────────
    if(data.postTimes[r.n] && !r.t){
      r.t = data.postTimes[r.n];
      changed = true;
    }

    // ── Apply scratches ───────────────────────────────────────────────────────
    var newScratches = data.scratched[r.n] || [];
    if(newScratches.length){
      var prev = scratchedHorses[r.n] || [];
      scratchedHorses[r.n] = newScratches;
      var added = newScratches.filter(function(n){return prev.indexOf(n)<0;});
      if(added.length){
        added.forEach(function(nm){
          if(scratches.indexOf(nm.toLowerCase())<0) scratches.push(nm.toLowerCase());
        });
        showScratchBanner(r.n, added);
        if(ri===CUR) render();
        changed = true;
      }
    }

    // ── Update odds at 5/3/1 min triggers ───────────────────────────────────
    var rMins = parseRaceTime(r.t);
    var mtp = rMins - now;
    if(mtp > 0 && mtp <= 5 && data.odds[r.n]){
      var oddsChanged = false;
      Object.keys(data.odds[r.n]).forEach(function(hName){
        var horse = r.horses.find(function(h){
          return h.name.toLowerCase().replace(/[^a-z]/g,'') ===
                 hName.toLowerCase().replace(/[^a-z]/g,'');
        });
        if(horse && data.odds[r.n][hName] !== horse.ml){
          horse.ml = data.odds[r.n][hName];
          changed = true;
          oddsChanged = true;
        }
      });
      if(oddsChanged){
        console.log('R'+r.n+' odds updated at MTP '+Math.round(mtp));
        if(ri===CUR){ render(); }
      }
    }
  });

  if(changed){ renderRaceTabs(); saveState(); }
}

async function fetchScratches(ri, race){
  var raceN = race.n;
  lastScratchCheck[raceN] = Date.now();
  // Build DRF URL: /classic/pp-details/MM-DD-YYYY/TRACK/RACE/D/USA
  if(!cardInfo || !cardInfo.date) return;
  var d = cardInfo.date; // yyyy-mm-dd
  var parts = d.split('-');
  var drfDate = parts[1]+'-'+parts[2]+'-'+parts[0]; // MM-DD-YYYY
  var url = 'https://www.drf.com/classic/pp-details/'+drfDate+'/'+cardInfo.code+'/'+raceN+'/D/USA';

  try{
    var resp = await fetch(PROXY_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'fetchDRF', url:url})
    });
    var data = await resp.json();
    if(data.error){ console.warn('Scratch fetch R'+raceN+':', data.error); return; }

    // Parse scratches from returned text
    var text = data.text || data.scratchText || '';
    var newScratches = parseScratchesFromText(text, race);

    if(newScratches.length){
      var prev = scratchedHorses[raceN] || [];
      var added = newScratches.filter(function(n){ return prev.indexOf(n) < 0; });
      scratchedHorses[raceN] = newScratches;
      if(added.length){
        console.log('R'+raceN+' scratch(es):', added.join(', '));
        // Update scratches array
        added.forEach(function(name){
          var nm = name.toLowerCase();
          if(scratches.indexOf(nm) < 0) scratches.push(nm);
        });
        // Re-render current race if it's the affected one
        if(ri === CUR){ render(); }
        else { renderRaceTabs(); }
        showScratchBanner(raceN, added);
      }
    } else {
      // No scratches — clear any old ones for this race
      if((scratchedHorses[raceN]||[]).length){
        scratchedHorses[raceN] = [];
      }
    }
    console.log('R'+raceN+' scratch check OK — '+newScratches.length+' scratched');
  }catch(e){
    console.warn('Scratch check R'+raceN+' error:', e.message);
  }
}

function parseScratchesFromText(text, race){
  // Look for "Scratched Horses - None" or "Scratched Horses - Name1, Name2"
  var scratchLine = text.match(/Scratched Horses\s*[-—:]\s*([^\n\r]+)/i);
  if(!scratchLine) return [];
  var val = scratchLine[1].trim();
  if(/none/i.test(val)) return [];

  // Split on comma or semicolon, clean each name
  var names = val.split(/[,;]/).map(function(n){ return n.trim(); }).filter(Boolean);

  // Fuzzy match against actual horses in the race to handle minor name differences
  var matched = [];
  names.forEach(function(scr){
    var scrLow = scr.toLowerCase().replace(/[^a-z0-9 ]/g,'');
    // Direct match first
    var horse = race.horses.find(function(h){
      var hn2=h.name.toLowerCase().replace(/[^a-z0-9 ]/g,''); var hd2=(h.disp||'').toLowerCase().replace(/[^a-z0-9 ]/g,''); return hn2===scrLow||hd2===scrLow;
    });
    // Partial match fallback
    if(!horse) horse = race.horses.find(function(h){
      var hn3=h.name.toLowerCase().replace(/[^a-z0-9 ]/g,''); return hn3.length>=5&&scrLow.length>=5&&(hn3.includes(scrLow)||scrLow.includes(hn3));
    });
    if(horse) matched.push(horse.name);
    else matched.push(scr); // keep original if no match found
  });
  return matched;
}

async function parseResultsFromClipboard(){
  var key=document.getElementById('pp-api-key').value.trim();
  if(!key){document.getElementById('results-status').textContent='Enter API key in the PP Parser tab first.';return;}

  var userContent=[];
  var prompt='Extract horse racing results from this document. Return a JSON array:\n'+
    '[{race:number, winner:string, second:string, third:string, winPay:number, placePay:number, showPay:number}]\n'+
    'Payouts are $2 mutuels as numbers (e.g. 7.40). Use 0 if unavailable.\n'+
    'Return ONLY valid JSON array, no markdown, no preamble.';

  if(resMode==='pdf'&&(resPdfText||resPdfBase64)){
    if(resPdfText){
      userContent=[{type:'text',text:prompt+'\n\nRESULTS TEXT (extracted from PDF):\n'+resPdfText}];
    } else {
      userContent=[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:resPdfBase64}},
        {type:'text',text:prompt}
      ];
    }
  } else {
    // Text mode
    var text=document.getElementById('results-raw').value.trim();
    if(!text||text.length<20){
      try{
        text=await navigator.clipboard.readText();
        var ta=document.getElementById('results-raw');
        if(ta){ta.value=text;ta.style.display='';}
      }catch(e){
        document.getElementById('results-status').textContent='Paste results text in the box, or switch to PDF Upload mode.';
        return;
      }
    }
    userContent=[{type:'text',text:prompt+'\n\nRESULTS:\n'+text}];
  }

  document.getElementById('results-status').textContent='Parsing results...';
  try{
    var resp=await fetch(PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-beta':'pdfs-2024-09-25'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:5120,messages:[{role:'user',content:userContent}]})
    });
    var data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    var raw=data.content[0].text.trim().replace(/```json|```/g,'').trim();
    var match=raw.match(/\[[\s\S]*\]/); if(match)raw=match[0];
    var results=JSON.parse(raw);

    loadRaceResultsLog();
    var today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    var trackSel=document.getElementById('res-track');
    var track=trackSel?trackSel.value:'OP';
    var settled=0;

    results.forEach(function(r){
      // 1. Auto-settle bets
      bets.forEach(function(b){
        if(b.race===r.race&&!b.settled){
          b.settled=true;
          var won=b.horse.toLowerCase()===r.winner.toLowerCase();
          var placed=b.horse.toLowerCase()===r.winner.toLowerCase();
          if(b.type==='WIN'){
            b.payout=won&&r.winPay?(b.amount/2)*r.winPay:0;
          } else if(b.type==='WIN/PLACE'||b.type==='WIN / PLACE'){
            b.payout=(won&&r.winPay?(b.amount/4)*r.winPay:0)+(placed&&r.placePay?(b.amount/4)*r.placePay:0);
          } else {
            b.payout=placed&&r.placePay?(b.amount/4)*r.placePay:0;
          }
          if(b.payout>0){returned+=b.payout;settled++;}
        }
      });

      // 2. Store full algo context for calibration
      var ri=R.findIndex(function(race){return race.n===r.race;});
      if(ri<0)return;
      var sc=scoreRace(ri);
      if(!sc.length)return;
      var cf=conf(sc);
      var gap=sc.length>1?sc[0].score-sc[1].score:0;
      var top=sc[0];
      var topBet=bets.find(function(b){return b.race===r.race&&b.horse===top.name;});
      var pickFinish=top.name.toLowerCase()===r.winner.toLowerCase()?1:
                     top.name.toLowerCase()===(r.second||'').toLowerCase()?2:
                     top.name.toLowerCase()===(r.third||'').toLowerCase()?3:0;
      var entry={
        date:today, track:track, race:r.race,
        algoPickName:top.horse?(top.horse.disp||top.name):top.name,
        algoScore:top.score, algoGap:gap, algoConf:cf,
        betType:topBet?topBet.type:(cf==='high'?'WIN':cf==='medium'?'WIN/PLACE':'PLACE/SHOW'),
        betAmt:topBet?topBet.amount:0,
        actualWinner:r.winner, winPay:r.winPay||0,
        placePay:r.placePay||0, showPay:r.showPay||0,
        second:r.second||'', third:r.third||'',
        pickFinish:pickFinish, won:pickFinish===1,
        pnl:topBet?parseFloat((topBet.payout-topBet.amount).toFixed(2)):0,
        surface:tc.surface, bias:tc.bias, fieldSize:sc.length
      };
      var ex=raceResultsLog.findIndex(function(e){return e.date===today&&e.track===track&&e.race===r.race;});
      if(ex>-1)raceResultsLog[ex]=entry; else raceResultsLog.push(entry);
    });

    saveRaceResultsLog();
    saveState();
    render();

    document.getElementById('results-status').innerHTML=
      '<span style="color:var(--green)">✓ '+results.length+' races parsed · '+settled+' bets settled · saved to history log</span><br>'+
      '<span style="font-size:11px;color:var(--muted)">'+
      results.map(function(r){
        var ri=R.findIndex(function(race){return race.n===r.race;});
        var top=ri>=0?scoreRace(ri)[0]:null;
        var hit=top&&top.name.toLowerCase()===r.winner.toLowerCase();
        return '<span style="color:'+(hit?'var(--green)':'var(--red)')+'">R'+r.race+': '+r.winner+' $'+r.winPay+'</span>';
      }).join(' · ')+
      '</span>';
  }catch(e){
    var emsg2=e.message||'';
    if(emsg2.toLowerCase().indexOf('fetch')>-1||emsg2.toLowerCase().indexOf('network')>-1){
      document.getElementById('results-status').innerHTML='<span style="color:var(--red)">\u26a0 Connection blocked — host the app at https:// (e.g. Netlify) to enable API calls from a tablet or phone.</span>';
    } else {
      document.getElementById('results-status').textContent='Parse error: '+emsg2;
    }
  }
}

        j:h.j,tr:h.tr,layoff:h.layoff,cc:h.cc,wins:h.wins,notes:h.notes,
        eq:h.eq||{lf:false,bf:false,bl:false},wk:h.wk||[]};
    })};});
    var state={
      bankroll:bankroll,
      wagered:wagered,
      returned:returned,
      scratches:scratches,
      bets:bets,
      tc:tc,
      apiKey:ppApiKey,
      proxyUrl:PROXY_URL,
      races:racesData,
      savedAt:new Date().toISOString()
    };
    localStorage.setItem(LS_KEY,JSON.stringify(state));
  }catch(e){console.warn('Save failed:',e);}
}

function applyLoadedState(state){
  if(!state) return;
  if(state.races && state.races.length){
    R = state.races.map(function(sr){
      var ri = R.findIndex(function(r){return r.n===sr.n;});
      return {
        n:sr.n, t:sr.t||'', d:sr.d||'', ty:sr.ty||'',
        grade:sr.grade||0, gradeName:sr.gradeName||'',
        purse:sr.purse||'',
        horses:(sr.horses||[]).map(function(h){
          return {name:h.name||'',disp:h.disp||h.name||'',pp:parseInt(h.pp)||0,
            ml:h.ml||'5-1',b:parseInt(h.b)||0,sty:h.sty||'Midpack',
            j:parseInt(h.j)||10,tr:parseInt(h.tr)||10,wins:parseInt(h.wins)||0,
            notes:h.notes||'',layoff:parseInt(h.layoff)||21,cc:parseInt(h.cc)||0,
            eq:h.eq||{lf:false,bf:false,bl:false},wk:h.wk||[],distFit:h.distFit||'tested',
            // Validate cc — should be in $K (e.g. -10 = drop $10K), cap at ±150
            cc: (function(v){ v=parseInt(v)||0; if(Math.abs(v)>150) v=Math.round(v/1000); return Math.max(-150,Math.min(150,v)); })(h.cc)};
        })
      };
    });
  }
  if(state.cardInfo){
    cardInfo.track    = state.cardInfo.track   || cardInfo.track;
    cardInfo.code     = state.cardInfo.code    || cardInfo.code;
    cardInfo.date     = state.cardInfo.date    || cardInfo.date;
    cardInfo.numRaces = state.cardInfo.numRaces|| cardInfo.numRaces;
    cardInfo.tz       = state.cardInfo.tz      || cardInfo.tz;
  }
  if(state.bankroll)  bankroll  = state.bankroll;
  if(state.bets)      bets      = state.bets;
  if(state.tc)        Object.assign(tc, state.tc);
  if(state.scratches) scratches = state.scratches;
  if(state.ppApiKey)  ppApiKey  = state.ppApiKey;
}

function loadState(){
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(!raw)return;
    var state=JSON.parse(raw);
    // Only restore if same day
    var savedDay=state.savedAt?state.savedAt.slice(0,10):'';
    var today=new Date().toISOString().slice(0,10);
    if(savedDay!==today){
      localStorage.removeItem(LS_KEY);
      return;
    }
    if(state.bankroll)bankroll=state.bankroll;
    if(state.wagered!==undefined)wagered=state.wagered;
    if(state.returned!==undefined)returned=state.returned;
    if(state.scratches)scratches=state.scratches;
    if(state.bets)bets=state.bets;
    if(state.tc)tc=state.tc;
    if(state.apiKey)ppApiKey=state.apiKey;
    if(state.proxyUrl)PROXY_URL=state.proxyUrl;
    if(state.cardInfo){
      Object.assign(cardInfo,state.cardInfo);
      // Ensure tz is set from TRACK_LIST if not saved
      if(!cardInfo.tz && cardInfo.code){
        var tObj=TRACK_LIST.find(function(t){return t.code===cardInfo.code;});
        if(tObj) cardInfo.tz=tObj.tz;
      }
    }
    // Restore parsed horse data
    if(state.races&&state.races.length){
      state.races.forEach(function(saved){
        var ri=R.findIndex(function(r){return r.n===saved.n;});
        if(ri>=0){
          if(saved.horses&&saved.horses.length) R[ri].horses=saved.horses;
          if(saved.t) R[ri].t=saved.t;
          if(saved.d) R[ri].d=saved.d;
          if(saved.ty) R[ri].ty=saved.ty;
          if(saved.grade) R[ri].grade=saved.grade;
          if(saved.gradeName) R[ri].gradeName=saved.gradeName;
        }
      });
    }
    console.log('PaddockIQ state restored from',savedDay);
  }catch(e){
    // If anything goes wrong, clear corrupted state and start fresh
    console.warn('Load failed, clearing state:',e);
    localStorage.removeItem(LS_KEY);
  }
}

var resPdfText=null;
function resHandleFile(file){
  if(!file) return;
  if(file.type!=='application/pdf'&&!file.name.endsWith('.pdf')){
    var st=document.getElementById('results-status'); if(st) st.textContent='Please select a PDF file.'; return;
  }
  resPdfText=null; resPdfBase64=null; resPdfFileName=file.name;
  var st=document.getElementById('results-status'); if(st) st.textContent='Reading PDF...';
  var reader=new FileReader();
  reader.onload=function(e){
    var arr=new Uint8Array(e.target.result);
    if(typeof pdfjsLib==='undefined'){
      resPdfBase64=btoa(String.fromCharCode.apply(null,arr));
      var lbl=document.getElementById('res-drop-label'); if(lbl) lbl.textContent='\u2713 '+file.name;
      if(st) st.textContent=''; return;
    }
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    pdfjsLib.getDocument({data:arr}).promise.then(function(pdf){
      var pages=[]; for(var i=1;i<=pdf.numPages;i++) pages.push(i);
      return Promise.all(pages.map(function(n){
        return pdf.getPage(n).then(function(pg){
          return pg.getTextContent().then(function(tc){
            return tc.items.map(function(it){return it.str;}).join(' ');
          });
        });
      })).then(function(texts){
        resPdfText=texts.join('\n\n');
        var lbl=document.getElementById('res-drop-label');
        if(lbl) lbl.textContent='\u2713 '+file.name+' ('+pdf.numPages+' pages extracted)';
        document.getElementById('res-drop-zone').style.borderColor='#6aabbb';
        if(st) st.textContent='Text ready \u2014 click Parse Results via Claude';
      });
    }).catch(function(err){
      if(st) st.textContent='PDF error: '+err.message+'. Switch to Paste Text mode.';
    });
  };
  reader.readAsArrayBuffer(file);
}

function ppHandleFile(file){
  if(!file)return;
  if(file.type!=='application/pdf'&&!file.name.endsWith('.pdf')){
    ppParseState.error='Please select a PDF file.';renderPPParser();return;
  }
  ppParseState.fileName=file.name;
  ppParseState.error=null;
  ppParseState.pdfText=null;
  ppParseState.pdfBase64=null;
  // Show extracting state
  ppParseState.loading=true;
  renderPPParser();
  // Extract text using PDF.js
  var reader=new FileReader();
  reader.onload=function(e){
    var arr=new Uint8Array(e.target.result);
    if(typeof pdfjsLib==='undefined'){
      // PDF.js not loaded — fall back to base64
      var b64=btoa(String.fromCharCode.apply(null,arr));
      ppParseState.pdfBase64=b64;
      ppParseState.loading=false;
      renderPPParser();
      return;
    }
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    pdfjsLib.getDocument({data:arr}).promise.then(function(pdf){
      var pages=[];
      var total=pdf.numPages;
      for(var i=1;i<=total;i++) pages.push(i);
      return Promise.all(pages.map(function(n){
        return pdf.getPage(n).then(function(page){
          return page.getTextContent().then(function(tc){
            return tc.items.map(function(item){return item.str;}).join(' ');
          });
        });
      }));
    }).then(function(pageTexts){
      ppParseState.pdfText=pageTexts.join('\n\n');
      ppParseState.loading=false;
      renderPPParser();
    }).catch(function(err){
      ppParseState.error='PDF read error: '+err.message+'. Try Paste Text mode instead.';
      ppParseState.loading=false;
      renderPPParser();
    });
  };
  reader.readAsArrayBuffer(file);
}

function ppHandleDrop(e){
  e.preventDefault();
  document.getElementById('pp-drop-zone').style.borderColor='var(--border)';
  var file=e.dataTransfer.files[0];
  if(file)ppHandleFile(file);
}
