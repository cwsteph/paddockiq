function toggleBettingTrack(code){
  var idx=bettingTracks.indexOf(code);
  if(idx>=0) bettingTracks.splice(idx,1);
  else bettingTracks.push(code);
  tracksToday=Math.max(1,bettingTracks.length);
  updateBettingSummary();
  buildBettingChecklist(); // refresh check states
  saveState();render();
}

function updateBettingSummary(){
  var label=document.getElementById('betting-today-label');
  var summary=document.getElementById('betting-today-summary');
  var badge=document.getElementById('br-badge');
  var n=Math.max(1,bettingTracks.length);
  tracksToday=n;

  if(label){
    if(bettingTracks.length===0) label.textContent='1 Track';
    else if(bettingTracks.length<=3) label.textContent=bettingTracks.join(' + ');
    else label.textContent=bettingTracks.length+' Tracks';
  }
  if(summary){
    var perTrack=Math.round(bankroll/n);
    var kelly=perTrack>=500?'Quarter Kelly (conservative)':perTrack>=100?'Half Kelly (standard)':'Aggressive Kelly (fun money)';
    summary.innerHTML='<b>$'+perTrack+'</b> per track · '+kelly;
  }
  if(badge){
    var perTrack=Math.round(bankroll/n);
    badge.textContent=n>1?'$'+bankroll+' ($'+perTrack+'/track)':'$'+bankroll.toFixed(2)+' Bankroll';
  }
}

function updateTracksToggle(){ updateBettingSummary(); }

function openResultsModal(raceIdx) {
  var race = R[raceIdx];

  if (!sc || !sc.length) { alert('No scored horses for this race.'); return; }

  // Remove existing modal
  var existing = document.getElementById('results-modal');
  if (existing) existing.remove();

  var horses = sc.map(function(s, i) {
    return { name: s.name, rank: i + 1, score: s.score, components: s._components || {} };

function fetchTVGResults(raceIdx) {
  var race   = R[raceIdx];
  window._tvgRaceIdx = raceIdx;  // store for auto-settle
  var status = document.getElementById('results-fetch-status');
  if (status) { status.style.color = 'var(--blue)'; status.textContent = '⏳ Fetching from TVG…'; }

  // Get race date from card metadata
  var rd = (typeof cardInfo !== 'undefined' && cardInfo.date) || race.date || '';
  // Normalise to YYYY-MM-DD
  var isoDate = '';
  if (rd) {
    var d = new Date(rd);
    if (!isNaN(d)) isoDate = d.toISOString().slice(0, 10);
  }

  if (!isoDate) {
    if (status) { status.style.color = '#e05555'; status.textContent = '⚠️ No race date — fill in manually.'; }
    return;
  }

  var trackCode = (typeof cardInfo !== 'undefined' && cardInfo.code) ? cardInfo.code : 'OP';
  var url = '/api/results/fetch?date=' + isoDate + '&race=' + race.n + '&track=' + trackCode;

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        if (status) { status.style.color = '#e05555'; status.textContent = '⚠️ ' + data.error; }
        return;
      }

      var sc = scoreRace(raceIdx);
      var filled = 0;

      // Match TVG runner names to our horse list by fuzzy name match
      sc.forEach(function(s, i) {
        var ourName  = s.name.toLowerCase().replace(/[^a-z0-9]/g, '');
        var match    = data.runners.find(function(r) {
          if (r.scratched || !r.finishPos) return false;
          var tvgName = r.name.toLowerCase().replace(/[^a-z0-9]/g, '');
          // exact or one contains the other (handles apostrophes, spacing diffs)
          return tvgName === ourName ||
                 tvgName.includes(ourName.substring(0, Math.min(ourName.length, 8))) ||
                 ourName.includes(tvgName.substring(0, Math.min(tvgName.length, 8)));
        });
        if (match) {
          var inp = document.getElementById('fin_' + i);
          if (inp) { inp.value = match.finishPos; filled++; }
        }
      });

      if (status) {
        if (filled > 0) {
          status.style.color = 'var(--green)';
          status.textContent = '✅ Filled ' + filled + '/' + sc.length + ' horses from TVG — review then save.';
        } else {
          status.style.color = '#e05555';
          status.textContent = '⚠️ TVG returned results but names didn\'t match — fill in manually.';
        }
      }

      // Store payoffs on modal for use at save time
      window._tvgPayoffs = {};
      data.runners.forEach(function(r) {
        window._tvgPayoffs[r.name] = {
          winPayoff:   r.winPayoff   || 0,
          placePayoff: r.placePayoff || 0,
          showPayoff:  r.showPayoff  || 0,
        };
      });

      // Show payoff info
      var winner = data.runners.find(function(r) { return r.finishPos === 1; });
      if (winner && winner.winPayoff && status) {
        status.textContent += '  WIN: $' + winner.winPayoff.toFixed(2);
        if (winner.placePayoff) status.textContent += '  PL: $' + winner.placePayoff.toFixed(2);
      }

      // Auto-settle the bet for this race using TVG payoffs
      if (window.bets && Array.isArray(window.bets)) {
        var raceN = window.R[window._tvgRaceIdx || 0] && window.R[window._tvgRaceIdx || 0].n;
        var rIdx  = window._tvgRaceIdx || 0;
        bets.forEach(function(b) {
          if (b.race !== raceN || b.settled) return;
          var hp = window._tvgPayoffs[b.horse] || {};
          b.settled = true;
          // Capture closing odds from live odds for CLV
          var liveStr = (liveOdds[rIdx] && liveOdds[rIdx][b.horse]) || null;
          if(liveStr) b.closingOdds = BettingCore.mlToDecimal(liveStr);
          b.result = winner && b.horse === winner.name ? 'WIN' : 'LOSS';
          if (b.type === 'WIN') {
            b.payout = winner && b.horse === winner.name ? (b.amount / 2) * (hp.winPayoff || 0) : 0;
          } else if (b.type === 'WIN/PLACE' || b.type === 'WIN / PLACE') {
            var won    = winner && b.horse === winner.name;
            var placed = data.runners.find(function(r){ return r.name===b.horse && r.finishPos<=2; });
            b.payout = (won ? (b.amount/4) * (hp.winPayoff||0) : 0) +
                       (placed ? (b.amount/4) * (hp.placePayoff||0) : 0);
          } else {
            var showed = data.runners.find(function(r){ return r.name===b.horse && r.finishPos<=3; });
            b.payout = showed ? (b.amount/2) * (hp.showPayoff||0) : 0;
          }
          b.pnl = b.payout - b.amount;
        });
        if (typeof saveState === 'function') saveState();
      }
    })
    .catch(function(e) {
      if (status) { status.style.color = '#e05555'; status.textContent = '⚠️ Fetch error: ' + e.message; }
    });
}

function submitResults(raceIdx, horses) {
  var race  = R[raceIdx];
  var sc    = scoreRace(raceIdx);
  var cardId   = window._loadedCardId || null;
  var raceDate = (typeof cardInfo !== 'undefined' && cardInfo.date) || race.date || new Date().toISOString().slice(0,10);

  var results = [];
  sc.forEach(function(s, i) {
    var inp = document.getElementById('fin_' + i);
    var pos = inp && inp.value ? parseInt(inp.value) : null;
    if (pos === null) return; // skip blanks (scratches)
    // Find any logged bet for this horse/race
    var matchBet = (window.bets || []).find(function(b) {
      return b.race === race.n && b.horse === s.name;
    });
    // Find TVG payoffs for this horse
    var tvgPay = (window._tvgPayoffs || {})[s.name] || {};
    results.push({
      horse_name:     s.name,
      finish_pos:     pos,
      paddockiq_rank: i + 1,
      score:          s.score,
      components:     s._components || {},
      // Bet tracking — null if no bet was made on this horse
      bet_amount:   matchBet ? matchBet.amount  : null,
      bet_type:     matchBet ? matchBet.type     : null,
      bet_payout:   matchBet ? matchBet.payout   : null,
      // TVG payoffs for all horses (for optimizer ROI calc)
      win_payoff:   tvgPay.winPayoff   || null,
      place_payoff: tvgPay.placePayoff || null,
      show_payoff:  tvgPay.showPayoff  || null,
    });
  });

  if (!results.length) { alert('No finish positions entered.'); return; }

  var status = document.getElementById('results-fetch-status');
  if (status) { status.style.color='var(--blue)'; status.textContent='💾 Saving…'; }

  fetch('/api/results', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ card_id: cardId, race_num: race.n, race_date: raceDate, results: results })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if (data.error) {
      alert('Save failed: ' + data.error);
      if (status) { status.style.color='#e05555'; status.textContent='❌ Save failed: ' + data.error; }
      return;
    }
    document.getElementById('results-modal').remove();
    // Show brief toast
    var toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#e8f2e8;border:1px solid var(--green);color:var(--green);border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;z-index:9999';
    toast.textContent = '✅ Race ' + race.n + ' results saved (' + data.saved + ' horses)';
    document.body.appendChild(toast);
    setTimeout(function(){ toast.remove(); }, 3500);
  })
  .catch(function(e){ alert('Network error: ' + e.message); });
}

function logBet(name,amt){
  amt = Math.round(amt);  // always whole dollars
  wagered+=amt;
  var mlOdds = getOdds(CUR, name);
  var sc = scoreRace(CUR);
  var pr = softmax(sc);
  var idx = sc.findIndex(function(s){ return s.name === name; });
  var prob = idx >= 0 ? pr[idx] : 0;
  bets.push({
    race:R[CUR].n, horse:name, amount:amt,
    type: conf(sc)==='high'?'WIN':'WIN/PLACE',
    settled:false, payout:0,
    mlOdds: mlOdds,                              // ML odds at bet time (for CLV)
    decOdds: BettingCore.mlToDecimal(mlOdds),    // decimal odds at bet time
    closingOdds: null,                           // filled at settle time from live odds
    modelProb: prob,                             // model win probability
    edge: prob - BettingCore.decimalToImplied(BettingCore.mlToDecimal(mlOdds))  // edge vs ML
  });
  render();saveState();
  alert('Bet logged: $'+Math.round(amt)+' on '+name);
}

// AUTO-PIPELINE: Snapshot Picks → Capture Odds → Fetch Results
// ═══════════════════════════════════════════════════════════

/**
 * Snapshot all pre-race picks to RaceResult (finish_pos=NULL).
 * Called after card is parsed and saved to Neon.
 * This creates the "what the algo picked" record BEFORE the race runs.
 */
function snapshotPicks(cardId) {
  if (!cardId) { console.warn('snapshotPicks: no cardId'); return; }
  var raceDate = (typeof cardInfo !== 'undefined' && cardInfo.date) || new Date().toISOString().slice(0,10);

  R.forEach(function(race, ri) {
    var sc = scoreRace(ri);
    if (!sc.length) return;
    var pr = softmax(sc);

    var results = sc.map(function(s, i) {
      return {
        horse_name: s.name,
        finish_pos: null,  // pre-race — no result yet
        paddockiq_rank: i + 1,
        score: s.score,
        components: s._components || {},
        morning_line: s.horse ? s.horse.ml : null,
        model_prob: pr[i] || null,
        source: 'snapshot'
      };
    });

    fetch('/api/results', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ card_id: cardId, race_num: race.n, race_date: raceDate, results: results })
    }).then(function(r){ return r.json(); }).then(function(data){
      if(data.ok) console.log('Snapshot R'+race.n+': '+data.saved+' horses saved');
    }).catch(function(e){ console.warn('Snapshot R'+race.n+' error:', e.message); });
  });

  console.log('Pre-race snapshot initiated for card #'+cardId);
}

/**
 * Race status tracker — manages the auto-pipeline per race.
 * States: 'pending' → 'odds_captured' → 'results_fetched' → 'settled'
 */
var _raceStatus = {};  // raceNum -> { state, mtpCaptured, lastCheck }

function initRaceStatus() {
  _raceStatus = {};
  R.forEach(function(race) {
    _raceStatus[race.n] = { state: 'pending', mtpCaptured: false, lastCheck: 0 };
  });
}

/**
 * Auto-results loop — runs every 60 seconds.
 * 1. At 3-5 MTP: capture closing odds from TVG live endpoint
 * 2. After race is official: fetch results, update DB, auto-settle bets
 */
function autoResultsLoop() {
  var trackCode = (typeof cardInfo !== 'undefined' && cardInfo.code) ? cardInfo.code : null;
  var raceDate = (typeof cardInfo !== 'undefined' && cardInfo.date) || '';
  var isoDate = '';
  if (raceDate) { var d = new Date(raceDate); if (!isNaN(d)) isoDate = d.toISOString().slice(0,10); }
  if (!trackCode || !isoDate) return;

  // Check each race
  R.forEach(function(race, ri) {
    var st = _raceStatus[race.n];
    if (!st || st.state === 'settled') return;

    var now = Date.now();
    // Throttle checks to every 45 seconds per race
    if (now - st.lastCheck < 45000) return;
    st.lastCheck = now;

    if (st.state === 'pending' || !st.mtpCaptured) {
      // Try to capture live odds — the API returns MTP when available
      captureClosingOdds(ri, trackCode, isoDate);
    }

    if (st.state === 'pending' || st.state === 'odds_captured') {
      // Try to fetch results — if race is official, TVG pastRaces returns runners
      autoFetchResults(ri, trackCode, isoDate);
    }
  });
}

/**
 * Capture closing odds at 3-5 MTP.
 * Uses the live race() query which includes MTP (minutes to post).
 */
function captureClosingOdds(raceIdx, trackCode, isoDate) {
  var race = R[raceIdx];
  var st = _raceStatus[race.n];

  fetch('/api/odds?track=' + trackCode + '&date=' + isoDate + '&race=' + race.n)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (!data.ok || !data.races) return;
      var raceOdds = data.races[race.n];
      if (!raceOdds) return;

      // Update liveOdds from TVG data
      var updated = 0;
      race.horses.forEach(function(h) {
        var runner = _matchRunner(h.name, raceOdds.runners);
        if (!runner) return;
        if (runner.scratched) {
          if (!scratches[raceIdx]) scratches[raceIdx] = {};
          scratches[raceIdx][h.name] = true;
        }
        if (runner.live) {
          if (!liveOdds[raceIdx]) liveOdds[raceIdx] = {};
          liveOdds[raceIdx][h.name] = runner.live;
          updated++;
        }
      });

      // Check MTP — capture at 3-5 minutes
      var mtp = raceOdds.mtp;
      if (mtp != null && mtp <= 5 && mtp >= 0 && !st.mtpCaptured) {
        st.mtpCaptured = true;
        st.state = 'odds_captured';
        console.log('R'+race.n+' closing odds captured at MTP '+mtp+' ('+updated+' horses)');

        // Save closing odds to DB
        _saveClosingOddsToDb(raceIdx, trackCode, isoDate);
      }
    })
    .catch(function(){});
}

/** Fuzzy match horse name to TVG runner list */
function _matchRunner(horseName, runners) {
  if (!runners) return null;
  if (runners[horseName]) return runners[horseName];
  var hLow = horseName.toLowerCase().replace(/[^a-z0-9]/g, '');
  var keys = Object.keys(runners);
  for (var k = 0; k < keys.length; k++) {
    var rLow = keys[k].toLowerCase().replace(/[^a-z0-9]/g, '');
    if (rLow === hLow || rLow.indexOf(hLow.substring(0, 6)) >= 0 || hLow.indexOf(rLow.substring(0, 6)) >= 0) {
      return runners[keys[k]];
    }
  }
  return null;
}

/** Save closing odds snapshot to RaceResult DB */
function _saveClosingOddsToDb(raceIdx, trackCode, isoDate) {
  var race = R[raceIdx];
  var cardId = window._loadedCardId;
  if (!cardId) return;

  var sc = scoreRace(raceIdx);
  var results = sc.map(function(s, i) {
    var closingStr = (liveOdds[raceIdx] && liveOdds[raceIdx][s.name]) || null;
    return {
      horse_name: s.name,
      finish_pos: null,
      paddockiq_rank: i + 1,
      score: s.score,
      components: s._components || {},
      closing_odds: closingStr,
      morning_line: s.horse ? s.horse.ml : null,
      source: 'odds_capture'
    };
  });

  fetch('/api/results', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ card_id: cardId, race_num: race.n, race_date: isoDate, results: results })
  }).catch(function(e){ console.warn('Closing odds save R'+race.n+':', e.message); });
}

/**
 * Auto-fetch results from TVG after race is official.
 * Fills finish positions, payoffs, and marks winner.
 */
function autoFetchResults(raceIdx, trackCode, isoDate) {
  var race = R[raceIdx];
  var st = _raceStatus[race.n];
  var cardId = window._loadedCardId;
  if (!cardId) return;

  fetch('/api/results/fetch?date=' + isoDate + '&race=' + race.n + '&track=' + trackCode)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data.error || !data.runners || !data.runners.length) return;

      // Only process if there's an actual winner — skip if race not yet official
      var winner = data.runners.find(function(r){ return r.finishPos === 1; });
      if (!winner) return;

      // We have results! Build the DB update
      var sc = scoreRace(raceIdx);
      var pr = softmax(sc);

      var results = sc.map(function(s, i) {
        var tvgRunner = _matchTVGRunner(s.name, data.runners);
        var finishPos = tvgRunner ? tvgRunner.finishPos : null;
        var closingStr = (liveOdds[raceIdx] && liveOdds[raceIdx][s.name]) || null;

        // Check if there's a logged bet for this horse
        var matchBet = (window.bets || []).find(function(b) {
          return b.race === race.n && b.horse === s.name;
        });

        return {
          horse_name: s.name,
          finish_pos: finishPos,
          paddockiq_rank: i + 1,
          score: s.score,
          components: s._components || {},
          morning_line: s.horse ? s.horse.ml : null,
          closing_odds: closingStr,
          model_prob: pr[i] || null,
          bet_amount: matchBet ? matchBet.amount : null,
          bet_type: matchBet ? matchBet.type : null,
          bet_payout: matchBet ? matchBet.payout : null,
          win_payoff: tvgRunner ? tvgRunner.winPayoff : null,
          place_payoff: tvgRunner ? tvgRunner.placePayoff : null,
          show_payoff: tvgRunner ? tvgRunner.showPayoff : null,
          source: 'auto'
        };
      });

      // Save to DB
      fetch('/api/results', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ card_id: cardId, race_num: race.n, race_date: isoDate, results: results })
      }).then(function(r){ return r.json(); }).then(function(res){
        if (res.ok) console.log('Auto-results R'+race.n+': '+res.saved+' horses saved');
      });

      // Auto-settle bets for this race
      _autoSettleRace(raceIdx, data, winner);

      st.state = 'settled';

      // Show toast
      var topPick = sc[0];
      var topFinish = _matchTVGRunner(topPick.name, data.runners);
      var winnerName = winner ? winner.name : '?';
      var pickFinish = topFinish ? topFinish.finishPos : '?';
      _showAutoToast('R'+race.n+' Official', 'Winner: '+winnerName+' | Our #1 ('+topPick.name+'): '+_ordinal(pickFinish));

      if (TAB === 'rankings') render();
    })
    .catch(function(){});
}

/** Match our horse name to TVG runner by fuzzy name */
function _matchTVGRunner(horseName, runners) {
  var hLow = horseName.toLowerCase().replace(/[^a-z0-9]/g, '');
  return runners.find(function(r) {
    if (r.scratched) return false;
    var rLow = r.name.toLowerCase().replace(/[^a-z0-9]/g, '');
    return rLow === hLow ||
           rLow.indexOf(hLow.substring(0, Math.min(hLow.length, 8))) >= 0 ||
           hLow.indexOf(rLow.substring(0, Math.min(rLow.length, 8))) >= 0;
  }) || null;
}

/** Auto-settle bets for a race using TVG results */
function _autoSettleRace(raceIdx, data, winner) {
  var race = R[raceIdx];
  var newRet = 0;

  // Store payoffs
  window._tvgPayoffs = window._tvgPayoffs || {};
  data.runners.forEach(function(r) {
    window._tvgPayoffs[r.name] = {
      winPayoff: r.winPayoff || 0,
      placePayoff: r.placePayoff || 0,
      showPayoff: r.showPayoff || 0
    };
  });

  bets.forEach(function(b) {
    if (b.race !== race.n || b.settled) return;
    b.settled = true;

    // Capture closing odds for CLV
    var liveStr = (liveOdds[raceIdx] && liveOdds[raceIdx][b.horse]) || null;
    if (liveStr) b.closingOdds = BettingCore.mlToDecimal(liveStr);

    // Match horse to TVG runner for payoff
    var tvgRunner = _matchTVGRunner(b.horse, data.runners);
    var hp = tvgRunner ? (window._tvgPayoffs[tvgRunner.name] || {}) : {};
    var isWinner = tvgRunner && tvgRunner.finishPos === 1;

    b.result = isWinner ? 'WIN' : 'LOSS';

    if (b.type === 'WIN') {
      b.payout = isWinner ? (b.amount / 2) * (hp.winPayoff || 0) : 0;
    } else if (b.type === 'WIN/PLACE' || b.type === 'WIN / PLACE') {
      var placed = tvgRunner && tvgRunner.finishPos <= 2;
      b.payout = (isWinner ? (b.amount / 4) * (hp.winPayoff || 0) : 0) +
                 (placed ? (b.amount / 4) * (hp.placePayoff || 0) : 0);
    } else {
      var showed = tvgRunner && tvgRunner.finishPos <= 3;
      b.payout = showed ? (b.amount / 2) * (hp.showPayoff || 0) : 0;
    }
    b.pnl = b.payout - b.amount;
    newRet += b.payout;
  });

  if (newRet > 0 || bets.some(function(b){ return b.race === race.n && b.settled; })) {
    returned += newRet;
    saveState();
  }
}

function _ordinal(n) {
  if (n == null || n === '?') return '?';
  var s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

var _toastQueue = [], _toastShowing = false;
function _showAutoToast(title, msg) {
  _toastQueue.push({ title: title, msg: msg });
  if (!_toastShowing) _processToastQueue();
}
function _processToastQueue() {
  if (!_toastQueue.length) { _toastShowing = false; return; }
  _toastShowing = true;
  var item = _toastQueue.shift();
  // Remove any existing toast
  var old = document.getElementById('auto-toast');
  if (old) old.remove();
  var toast = document.createElement('div');
  toast.id = 'auto-toast';
  toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#f5efe0;border:1px solid var(--green);border-radius:10px;padding:12px 18px;z-index:9999;max-width:340px;box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;transition:opacity .3s';
  toast.innerHTML = '<div style="font-family:Bebas Neue,sans-serif;font-size:14px;color:var(--gold);margin-bottom:4px">'+item.title+'</div>' +
    '<div style="font-size:12px;color:var(--text)">'+item.msg+'</div>' +
    (_toastQueue.length > 0 ? '<div style="font-size:10px;color:var(--dim);margin-top:4px">+' + _toastQueue.length + ' more</div>' : '');
  document.body.appendChild(toast);
  requestAnimationFrame(function(){ toast.style.opacity='1'; });
  setTimeout(function(){
    toast.style.opacity='0';
    setTimeout(function(){ toast.remove(); _processToastQueue(); }, 400);
  }, 4000);
}


function updateSettleHorses(raceIdxStr){
  var ri = parseInt(raceIdxStr);
  var sel = document.getElementById('s-winner');
  if(!sel) return;
  var scr = scratches[ri]||{};
  sel.innerHTML = R[ri].horses
    .filter(function(h){return !scr[h.name];})
    .sort(function(a,b){return (a.pp||0)-(b.pp||0);})
    .map(function(h){return '<option value="'+h.name+'">'+(h.disp||h.name)+' (PP'+h.pp+')</option>';}).join('');
}

function settleRace(){
  var raceIdx = parseInt(document.getElementById('s-race').value);
  var raceN   = R[raceIdx].n;
  var winner  = document.getElementById('s-winner').value.trim();
  var winPay  = parseFloat(document.getElementById('s-pay').value)||0;
  var placePay= parseFloat(document.getElementById('s-place').value)||0;
  if(!winner){alert('Select a winner');return;}
  var newRet=0;
  bets.forEach(function(b){
    if(b.race===raceN&&!b.settled){
      b.settled=true;
      // Capture closing odds from live odds (if entered) for CLV tracking
      var liveOddsStr = (liveOdds[raceIdx] && liveOdds[raceIdx][b.horse]) || null;
      if(liveOddsStr) b.closingOdds = BettingCore.mlToDecimal(liveOddsStr);
      b.result = b.horse===winner ? 'WIN' : 'LOSS';
      var won    = b.horse===winner && winPay>0;
      var placed = b.horse===winner && placePay>0;
      if(b.type==='WIN'){
        b.payout = won?(b.amount/2)*winPay:0;
      } else if(b.type==='WIN/PLACE'||b.type==='WIN / PLACE'){
        var wp=b.amount/2, pp=b.amount/2;
        b.payout = (won?(wp/2)*winPay:0) + (placed?(pp/2)*placePay:0);
      } else {
        // PLACE/SHOW
        b.payout = placed?((b.amount/2)/2)*placePay:0;
      }
      b.pnl = b.payout - b.amount;
      newRet+=b.payout;
    }
  });
  returned+=newRet;
  saveState();
  render();
  alert('Race '+raceN+' settled! Returned: $'+newRet.toFixed(2));
}

/**
 * Fetch all race results + final odds from TVG in one shot.
 * Uses /api/results/fetch-all which queries each race in parallel.
 * Auto-settles all open bets and saves results to DB.
 */
async function fetchAllTVGResults() {
  var statusEl = document.getElementById('fetch-all-status');
  if (statusEl) { statusEl.style.color = 'var(--blue)'; statusEl.textContent = '⏳ Fetching all races from TVG…'; }

  var rd = (typeof cardInfo !== 'undefined' && cardInfo.date) || '';
  var isoDate = '';
  if (rd) { var d = new Date(rd); if (!isNaN(d)) isoDate = d.toISOString().slice(0, 10); }
  if (!isoDate) { if (statusEl) { statusEl.style.color = '#e05555'; statusEl.textContent = '⚠️ No card date'; } return; }

  var trackCode = (typeof cardInfo !== 'undefined' && cardInfo.code) ? cardInfo.code : 'OP';
  var numRaces = R.filter(function(r){ return r.horses && r.horses.length > 0; }).length;

  try {
    var resp = await fetch('/api/results/fetch-all?track=' + trackCode + '&date=' + isoDate + '&races=' + numRaces);
    var data = await resp.json();
    if (!data.ok || !data.races) {
      if (statusEl) { statusEl.style.color = '#e05555'; statusEl.textContent = '⚠️ ' + (data.error || 'No results found'); }
      return;
    }

    var settled = 0, saved = 0, wins = 0;

    // Process each race
    for (var raceNum in data.races) {
      var raceData = data.races[raceNum];
      var rn = parseInt(raceNum);
      var raceIdx = R.findIndex(function(r){ return r.n === rn; });
      if (raceIdx < 0) continue;

      var winner = raceData.runners.find(function(r){ return r.finishPos === 1; });
      if (!winner) continue;

      // Update live odds from final odds
      raceData.runners.forEach(function(runner) {
        if (runner.finalOdds) {
          if (!liveOdds[raceIdx]) liveOdds[raceIdx] = {};
          liveOdds[raceIdx][runner.name] = runner.finalOdds;
        }
      });

      // Auto-settle bets
      var winPay = winner.winPayoff || 0;
      var placePay = winner.placePayoff || 0;
      bets.forEach(function(b) {
        if (b.race !== rn || b.settled) return;
        b.settled = true;
        settled++;

        // Try to match horse name to TVG runner for closing odds
        var matched = _matchTVGRunner(b.horse, raceData.runners);
        if (matched && matched.finalOdds) {
          b.closingOdds = BettingCore.mlToDecimal(matched.finalOdds);
        }

        // Check if our horse won
        var isWinner = _fuzzyNameMatch(b.horse, winner.name);
        // Check if our horse placed (top 2)
        var placer = raceData.runners.find(function(r){ return r.finishPos === 2; });
        var isPlace = isWinner || (placer && _fuzzyNameMatch(b.horse, placer.name));

        var plPay = isWinner ? placePay : (placer ? (placer.placePayoff || 0) : 0);

        if (b.type === 'WIN') {
          b.payout = isWinner ? (b.amount / 2) * winPay : 0;
        } else if (b.type === 'WIN/PLACE' || b.type === 'WIN / PLACE') {
          var wp = b.amount / 2, pp = b.amount / 2;
          b.payout = (isWinner ? (wp / 2) * winPay : 0) + (isPlace ? (pp / 2) * plPay : 0);
        } else {
          b.payout = isPlace ? ((b.amount / 2) / 2) * plPay : 0;
        }
        b.pnl = b.payout - b.amount;
        b.result = b.payout > b.amount ? 'WIN' : 'LOSS';
        if (b.payout > b.amount) wins++;
        returned += b.payout;
      });

      // Save to DB if we have a card ID
      var cardId = window._loadedCardId;
      if (cardId) {
        var sc = scoreRace(raceIdx);
        var pr = softmax(sc);
        var results = sc.map(function(s, i) {
          var tvgRunner = _matchTVGRunner(s.name, raceData.runners);
          var closingStr = (liveOdds[raceIdx] && liveOdds[raceIdx][s.name]) || (tvgRunner ? tvgRunner.finalOdds : null);
          var matchBet = bets.find(function(b){ return b.race === rn && b.horse === s.name; });
          return {
            horse_name: s.name,
            finish_pos: tvgRunner ? tvgRunner.finishPos : null,
            paddockiq_rank: i + 1,
            score: s.score,
            components: s._components || {},
            morning_line: s.horse ? s.horse.ml : null,
            closing_odds: closingStr,
            model_prob: pr[i] || null,
            bet_amount: matchBet ? matchBet.amount : null,
            bet_type: matchBet ? matchBet.type : null,
            bet_payout: matchBet ? matchBet.payout : null,
            win_payoff: tvgRunner ? tvgRunner.winPayoff : null,
            place_payoff: tvgRunner ? tvgRunner.placePayoff : null,
            show_payoff: tvgRunner ? tvgRunner.showPayoff : null,
            source: 'fetch-all'
          };
        });
        fetch('/api/results', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ card_id: cardId, race_num: rn, race_date: isoDate, results: results })
        }).then(function(r){ return r.json(); }).then(function(res){
          if (res.ok) saved += res.saved;
        }).catch(function(){});
      }
    }

    saveState();
    render();
    var msg = '✅ ' + Object.keys(data.races).length + ' races fetched · ' + settled + ' bets settled';
    if (wins > 0) msg += ' · ' + wins + ' winners';
    if (statusEl) { statusEl.style.color = 'var(--green)'; statusEl.textContent = msg; }

  } catch (e) {
    if (statusEl) { statusEl.style.color = '#e05555'; statusEl.textContent = '⚠️ ' + e.message; }
  }
}

/** Fuzzy match horse names (strips punctuation, case-insensitive) */
function _fuzzyNameMatch(a, b) {
  if (!a || !b) return false;
  var na = a.toLowerCase().replace(/[^a-z0-9]/g, '');
  var nb = b.toLowerCase().replace(/[^a-z0-9]/g, '');
  return na === nb || na.indexOf(nb.substring(0, 6)) >= 0 || nb.indexOf(na.substring(0, 6)) >= 0;
}

/** Backfill: load each saved card, score it, fetch TVG results, save to DB */
async function backfillAllCards() {
  var statusEl = document.getElementById('backfill-status');
  var btn = document.getElementById('backfill-btn');
  if (btn) btn.disabled = true;
  if (statusEl) { statusEl.style.color = 'var(--blue)'; statusEl.textContent = '⏳ Loading saved cards…'; }

  // Save current state so we can restore after
  var origR = window.R, origScratches = window.scratches, origCardInfo = window.cardInfo;
  var origKaci = window.kaci, origLiveOdds = window.liveOdds;

  try {
    // 1. Get list of all saved cards
    var cardsResp = await fetch('/api/cards');
    var cards = await cardsResp.json();
    if (!Array.isArray(cards) || !cards.length) {
      if (statusEl) { statusEl.style.color = '#e05555'; statusEl.textContent = '⚠️ No saved cards found'; }
      if (btn) btn.disabled = false;
      return;
    }

    var totalSaved = 0, totalRaces = 0;
    for (var ci = 0; ci < cards.length; ci++) {
      var card = cards[ci];
      if (statusEl) statusEl.textContent = '⏳ Processing ' + card.label + ' (' + (ci + 1) + '/' + cards.length + ')…';

      // 2. Load full card data
      var cardResp = await fetch('/api/cards?id=' + card.id);
      var cardFull = await cardResp.json();
      if (!cardFull || !cardFull.data) continue;

      var parsed;
      try { parsed = JSON.parse(cardFull.data); } catch (e) { continue; }

      // Card data could be {cardInfo, races, scratches} or {races, track, date, ...}
      var cardRaces = parsed.races || [];
      var cardScratches = parsed.scratches || {};
      var ci2 = parsed.cardInfo || { code: card.track, date: card.raceDate, track: card.label };

      if (!cardRaces.length) continue;

      // 3. Temporarily swap globals for scoring
      window.R = cardRaces;
      window.scratches = cardScratches;
      window.cardInfo = ci2;
      window.kaci = parsed.kaci || {};
      window.liveOdds = {};

      // 4. Fetch TVG results
      var tvgResp = await fetch('/api/results/fetch-all?track=' + card.track + '&date=' + card.raceDate + '&races=' + card.numRaces);
      var tvgData = await tvgResp.json();
      if (!tvgData.ok || !tvgData.races) continue;

      // 5. Score each race and save to DB
      for (var ri = 0; ri < cardRaces.length; ri++) {
        var race = cardRaces[ri];
        if (!race || !race.horses || !race.horses.length) continue;
        var rn = race.n;
        var tvgRace = tvgData.races[rn];
        if (!tvgRace || !tvgRace.runners || !tvgRace.runners.length) continue;

        var sc = scoreRace(ri);
        var pr = softmax(sc);

        var results = sc.map(function(s, i) {
          var tvgRunner = _matchTVGRunner(s.name, tvgRace.runners);
          return {
            horse_name: s.name,
            finish_pos: tvgRunner ? tvgRunner.finishPos : null,
            paddockiq_rank: i + 1,
            score: s.score,
            components: s._components || {},
            morning_line: s.horse ? s.horse.ml : null,
            closing_odds: tvgRunner ? tvgRunner.finalOdds : null,
            model_prob: pr[i] || null,
            win_payoff: tvgRunner ? tvgRunner.winPayoff : null,
            place_payoff: tvgRunner ? tvgRunner.placePayoff : null,
            show_payoff: tvgRunner ? tvgRunner.showPayoff : null,
            source: 'backfill'
          };
        });

        await fetch('/api/results', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ card_id: card.id, race_num: rn, race_date: card.raceDate, track: card.track, results: results })
        });
        totalSaved += results.length;
        totalRaces++;
      }
    }

    // 6. Restore original state
    window.R = origR; window.scratches = origScratches; window.cardInfo = origCardInfo;
    window.kaci = origKaci; window.liveOdds = origLiveOdds;

    if (statusEl) { statusEl.style.color = 'var(--green)'; statusEl.textContent = '✅ Backfilled ' + totalRaces + ' races (' + totalSaved + ' horses) across ' + cards.length + ' cards'; }

    // Auto-load analysis
    await loadAnalysisData();
  } catch (e) {
    // Restore state on error too
    window.R = origR; window.scratches = origScratches; window.cardInfo = origCardInfo;
    window.kaci = origKaci; window.liveOdds = origLiveOdds;
    if (statusEl) { statusEl.style.color = '#e05555'; statusEl.textContent = '⚠️ ' + e.message; }
  }
  if (btn) btn.disabled = false;
}

// ── Kelly replay (single-track, no tracksToday scaling) — mirrors live logic ──
function _analysisKellyReplay(prob, oddsStr, bank) {
  var dec = BettingCore.mlToDecimal(oddsStr || '5-1');
  var kf = bank >= 500 ? 0.25 : bank >= 100 ? 0.50 : 0.75;
  var maxPct = bank >= 500 ? 0.15 : 0.20;
  return BettingCore.recommendedStake(bank, prob, dec, {
    kellyFraction: kf,
    maxBetPct: maxPct,
    minBet: 2
  });
}

// For each race, replay what Kelly told us to bet at the time, compounding from startBank.
// "Hit" = our top pick finished 1st AND Kelly said to bet (non-LOW conf). Payout uses closing $2 win_payoff.
function _computeBetReplay(races, startBank) {
  var bank = startBank, peakBank = startBank;
  var entries = [];
  races.forEach(function(rd) {
    var entry = { rd: rd, bet: false, stake: 0, won: false, payout: 0, net: 0, conf: 'low', oddsStr: null, bankBefore: bank, bankAfter: bank };
    if (rd.topPick && rd.secondPickScore != null && bank > 0) {
      var gap = (rd.topPick.score || 0) - (rd.secondPickScore || 0);
      var cf = gap >= 6 ? 'high' : gap >= 4 ? 'medium' : 'low';
      entry.conf = cf;
      if (cf !== 'low') {
        var oddsStr = rd.topPick.closingOdds || rd.topPick.morningLine || '5-1';
        var prob = rd.topPick.modelProb || 0.01;
        var rawKelly = 0;
        try { rawKelly = _analysisKellyReplay(prob, oddsStr, bank); } catch (e) {}
        var minBet = cf === 'high' ? 4 : 2;
        var stake = Math.max(minBet, Math.round(rawKelly));
        if (stake > bank) stake = Math.floor(bank);
        if (stake > 0) {
          entry.bet = true;
          entry.stake = stake;
          entry.oddsStr = oddsStr;
          var won = rd.topPick.finishPos === 1;
          entry.won = won;
          // win_payoff is $2-base TVG payoff; scale by actual stake
          var payoff = (won && rd.topPick.winPayoff) ? (stake / 2) * rd.topPick.winPayoff : 0;
          entry.payout = payoff;
          entry.net = payoff - stake;
          bank = bank - stake + payoff;
          entry.bankAfter = bank;
          if (bank > peakBank) peakBank = bank;
        }
      }
    }
    entries.push(entry);
  });
  return { entries: entries, endBank: bank, peakBank: peakBank, startBank: startBank };
}

function buildAnalysisView() {
  var container = document.getElementById('analysis-content');
  if (!container || !_analysisCache) return;

  var allRaces = _analysisCache.races;
  var races = _analysisFilter === 'all' ? allRaces : allRaces.filter(function(r) { return r.track === _analysisFilter; });
  // Apply date filters
  if(_analysisDateFrom) races = races.filter(function(r){ return (r.raceDate||'').slice(0,10) >= _analysisDateFrom; });
  if(_analysisDateTo) races = races.filter(function(r){ return (r.raceDate||'').slice(0,10) <= _analysisDateTo; });

  if (!races.length) {
    container.innerHTML = '<div class="card" style="color:var(--dim);text-align:center;padding:20px">No races for this filter.</div>';
    return;
  }

  // ── Kelly replay: $100 starting bank, compounds race-by-race in chronological order ──
  var replay = _computeBetReplay(races, 100);
  var betEntries = replay.entries.filter(function(e){ return e.bet; });
  var betCount = betEntries.length;
  var betHits = betEntries.filter(function(e){ return e.won; }).length;
  var wagered = betEntries.reduce(function(s,e){ return s+e.stake; }, 0);
  var returned = betEntries.reduce(function(s,e){ return s+e.payout; }, 0);
  var netPnl = returned - wagered;
  var roi = wagered > 0 ? (netPnl / wagered * 100) : 0;
  var hitRate = betCount > 0 ? (betHits / betCount * 100) : 0;
  var maxDrawdown = 0, runningPeak = replay.startBank;
  replay.entries.forEach(function(e){
    if (e.bankAfter > runningPeak) runningPeak = e.bankAfter;
    var dd = runningPeak - e.bankAfter;
    if (dd > maxDrawdown) maxDrawdown = dd;
  });

  var compLabels = ['SPD', 'FRM', 'CLS', 'PCE', 'JCK', 'TRN', 'WK', 'TREND', 'PACE'];
  var compKeys = ['spd', 'frm', 'cls', 'pce', 'jck', 'trn', 'wk', 'trend', 'ml'];

  // ── Compute running stats ──
  var hitCount = 0, top3Count = 0;
  var cumPct = [], cumTop3 = [];
  var winnerCompSums = compKeys.map(function() { return 0; });
  var pickCompSums = compKeys.map(function() { return 0; });
  var missCompDiffs = compKeys.map(function() { return 0; });
  var missCount = 0;
  var dateGroups = {};  // date -> { hits, total, track }

  races.forEach(function(rd, idx) {
    var n = idx + 1;
    if (rd.isHit) hitCount++;
    if (rd.winnerInTop3) top3Count++;
    cumPct.push(Math.round(hitCount / n * 100));

// Venmo CSV importer — Caesars buy-ins matched to PP card days
// ═══════════════════════════════════════════════════════════
async function importVenmoCSV(ev) {
  var file = ev.target.files && ev.target.files[0];
  var resultEl = document.getElementById('venmo-result');
  if (!file) return;
  if (resultEl) resultEl.innerHTML = '<div style="color:var(--dim);font-size:12px">⏳ Parsing Venmo CSV…</div>';

  try {
    var text = await file.text();
    var txns = _parseVenmoCSV(text);
    if (!txns.length) {
      if (resultEl) resultEl.innerHTML = '<div style="color:var(--red);font-size:12px">⚠️ Could not find any transactions. Make sure this is the raw Venmo statement CSV (not a filtered export).</div>';
      return;
    }
    var caesarsTxns = txns.filter(_isCaesarsPayment);

    // Pull all uploaded card days — support multiple cards per date
    var cardsResp = await fetch('/api/cards');
    var cards = await cardsResp.json();
    var racingDates = {};
    (Array.isArray(cards) ? cards : []).forEach(function(c){
      if (!racingDates[c.raceDate]) racingDates[c.raceDate] = [];
      racingDates[c.raceDate].push(c);
    });

    _venmoData = { caesarsTxns: caesarsTxns, racingDates: racingDates, cards: cards, totalTxns: txns.length };
    _renderVenmoResult();
  } catch (e) {
    if (resultEl) resultEl.innerHTML = '<div style="color:var(--red);font-size:12px">⚠️ ' + (e.message || 'Parse error') + '</div>';
  }
}

function _parseVenmoCSV(text) {
  var lines = text.split(/\r?\n/);
  var headerIdx = -1;
  for (var i = 0; i < lines.length; i++) {
    var low = lines[i].toLowerCase();
    if (low.indexOf('datetime') >= 0 && low.indexOf('amount') >= 0) { headerIdx = i; break; }
  }
  if (headerIdx < 0) return [];

  var headers = _splitCsvRow(lines[headerIdx]).map(function(h){ return h.trim(); });
  var out = [];
  for (var j = headerIdx + 1; j < lines.length; j++) {
    if (!lines[j].trim()) continue;
    var cols = _splitCsvRow(lines[j]);
    if (cols.length < 3) continue;
    var obj = {};
    headers.forEach(function(h, idx){ obj[h] = (cols[idx] || '').trim(); });
    if (!obj.Datetime) continue;
    out.push(obj);
  }
  return out;
}

function _splitCsvRow(line) {
  var cols = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else { inQ = !inQ; } }
    else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
    else cur += c;
  }
  cols.push(cur);
  return cols;
}

var _CAESARS_PATTERN = /caesars|caesar's|william\s*hill|williamhill|harrah/i;
function _isCaesarsPayment(t) {
  var to = t.To || '';
  var from = t.From || '';
  var note = t.Note || '';
  var amt = _venmoAmt(t);
  // outgoing payment (negative amount) to a Caesars counterparty or annotated as one
  return amt < 0 && (_CAESARS_PATTERN.test(to) || _CAESARS_PATTERN.test(note) || _CAESARS_PATTERN.test(from));
}

function _venmoAmt(t) {
  var raw = t['Amount (total)'] || t['Amount Total'] || t.Amount || '';
  if (!raw) return 0;
  var s = String(raw);
  var sign = s.indexOf('-') >= 0 ? -1 : 1;
  var n = parseFloat(s.replace(/[^\d.]/g, ''));
  return isNaN(n) ? 0 : sign * n;
}

function _venmoYMD(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) return '';
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return d.getFullYear() + '-' + m + '-' + day;
}

function _renderVenmoResult() {
  var resultEl = document.getElementById('venmo-result');
  if (!resultEl || !_venmoData) return;
  var d = _venmoData;

  if (!d.caesarsTxns.length) {
    resultEl.innerHTML = '<div style="color:var(--gold);font-size:12px">Parsed ' + d.totalTxns + ' transactions — no Caesars payments found. Match pattern: <code style="color:var(--muted)">caesars · william hill · harrah</code>. Checked: To, From, Note fields.</div>';
    return;
  }

  var totalCount = d.caesarsTxns.length;
  var totalAmt = d.caesarsTxns.reduce(function(s,t){ return s + Math.abs(_venmoAmt(t)); }, 0);
  var matched = d.caesarsTxns.filter(function(t){
    var cs = d.racingDates[_venmoYMD(t.Datetime)];
    return cs && cs.length;
  });
  var matchedAmt = matched.reduce(function(s,t){ return s + Math.abs(_venmoAmt(t)); }, 0);
  var unmatchedCount = totalCount - matched.length;
  var unmatchedAmt = totalAmt - matchedAmt;

  var html = '<div class="stat-grid">' +
    '<div class="stat-box"><div class="stat-l">Total Buy-Ins</div><div class="stat-v" style="color:var(--gold)">' + totalCount + '</div></div>' +
    '<div class="stat-box"><div class="stat-l">Total $ Paid</div><div class="stat-v" style="color:var(--red)">$' + totalAmt.toFixed(2) + '</div></div>' +
    '<div class="stat-box"><div class="stat-l">On PP-Card Days</div><div class="stat-v" style="color:var(--green)">' + matched.length + ' <span style="font-size:12px;color:var(--dim)">/ ' + totalCount + '</span></div></div>' +
    '<div class="stat-box"><div class="stat-l">$ on PP-Card Days</div><div class="stat-v" style="color:var(--green)">$' + matchedAmt.toFixed(2) + '</div></div>' +
    '<div class="stat-box"><div class="stat-l">Off-Day Buy-Ins</div><div class="stat-v" style="color:var(--dim)">' + unmatchedCount + ' · $' + unmatchedAmt.toFixed(2) + '</div></div>' +
    '<div class="stat-box"><div class="stat-l">Avg Buy-In</div><div class="stat-v" style="color:var(--blue)">$' + (totalAmt / totalCount).toFixed(2) + '</div></div>' +
  '</div>';

  // Table — chronological
  d.caesarsTxns.sort(function(a,b){ return new Date(a.Datetime) - new Date(b.Datetime); });
  html += '<div style="overflow-x:auto;margin-top:14px"><table style="width:100%;border-collapse:collapse;font-size:12px">' +
    '<thead><tr style="border-bottom:1px solid var(--border)">' +
    ['#','Date','Amount','To / Note','Card Day?'].map(function(h){
      return '<th style="padding:6px 8px;text-align:left;color:var(--dim);font-weight:500;font-size:10px;white-space:nowrap">' + h + '</th>';
    }).join('') + '</tr></thead><tbody>';
  d.caesarsTxns.forEach(function(t, i) {
    var ymd = _venmoYMD(t.Datetime);
    var cs = d.racingDates[ymd] || [];
    var amt = Math.abs(_venmoAmt(t));
    var tracks = cs.map(function(c){ return c.track; }).filter(function(v,i,a){ return a.indexOf(v) === i; }).join(' + ');
    var matchCell = cs.length
      ? '<span style="color:var(--green);font-weight:600">✓ ' + tracks + '</span>'
      : '<span style="color:var(--dim)">—</span>';
    var label = (t.To || t.Note || '—');
    html += '<tr style="border-bottom:1px solid #f5efe0' + (i % 2 ? ';background:rgba(255,255,255,0.015)' : '') + '">' +
      '<td style="padding:4px 8px;color:var(--dim);font-size:11px">' + (i+1) + '</td>' +
      '<td style="padding:4px 8px;color:var(--muted);font-size:11px;white-space:nowrap">' + ymd + '</td>' +
      '<td style="padding:4px 8px;color:var(--red);font-weight:600">$' + amt.toFixed(2) + '</td>' +
      '<td style="padding:4px 8px;color:var(--muted);font-size:11px;max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + label + '</td>' +
      '<td style="padding:4px 8px">' + matchCell + '</td>' +
    '</tr>';
  });
  html += '</tbody></table></div>';

  // Reconciliation: buy-ins vs. reloads
  var reloadMultiple = matchedAmt / 100;
  html += '<div style="margin-top:12px;padding:10px 14px;background:rgba(255,255,255,0.02);border-left:3px solid var(--gold);border-radius:0 6px 6px 0;font-size:11px;color:var(--muted);line-height:1.5">' +
    '<b style="color:var(--gold)">Reload math:</b> ' +
    'You fed Caesars <b style="color:var(--text)">$' + matchedAmt.toFixed(2) + '</b> on ' + matched.length + ' card day' + (matched.length === 1 ? '' : 's') + ' — avg <b style="color:var(--text)">$' + (matched.length ? (matchedAmt / matched.length).toFixed(2) : '0.00') + '</b>/day. ' +
    'That\'s <b style="color:var(--text)">' + reloadMultiple.toFixed(1) + '×</b> a $100 buy-in, i.e. ~<b style="color:' + (reloadMultiple >= 2 ? 'var(--red)' : 'var(--gold)') + '">' + Math.max(0, Math.round(reloadMultiple - 1)) + ' reload' + (Math.round(reloadMultiple - 1) === 1 ? '' : 's') + '</b> beyond the first $100.' +
  '</div>';

  resultEl.innerHTML = html;
}

function _renderBankrollChart(replay) {
  var canvas = document.getElementById('bankroll-chart');
  if (!canvas || !window.Chart) return;
  if (window._analysisBankChart) window._analysisBankChart.destroy();

  // X = bet # (not race #), Y = bank after that bet
  var labels = [], banks = [], nets = [];
  var bi = 0;
  replay.entries.forEach(function(e) {
    if (!e.bet) return;
    bi++;
    labels.push(bi);
    banks.push(+e.bankAfter.toFixed(2));
    nets.push(+e.net.toFixed(2));
  });

  var startLine = new Array(labels.length).fill(replay.startBank);

  window._analysisBankChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Bank',
          data: banks,
          borderColor: '#d4af37',
          backgroundColor: 'rgba(212,175,55,0.08)',
          borderWidth: 2,
          tension: 0.25,
          pointRadius: labels.length > 40 ? 0 : 2.5,
          fill: true,
          order: 1
        },
        {
          label: 'Starting $' + replay.startBank,
          data: startLine,
          borderColor: 'rgba(200,200,200,0.35)',
          borderDash: [4, 4],
          borderWidth: 1,
          pointRadius: 0,
          fill: false,
          order: 2
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#999', font: { size: 10 } } },
        tooltip: {
          callbacks: {
            title: function(items) { return 'Bet #' + items[0].label; },
            label: function(ctx) {
              if (ctx.datasetIndex === 0) return 'Bank: $' + ctx.parsed.y.toFixed(2) + '  (net ' + (nets[ctx.dataIndex] >= 0 ? '+' : '') + '$' + nets[ctx.dataIndex].toFixed(2) + ')';
              return null;
            }
          }
        }
      },

function _renderWeightTrendChart(races, compLabels, compKeys) {
  var canvas = document.getElementById('weight-trend-chart');
  if (!canvas || !window.Chart || races.length < 5) return;
  if (window._weightTrendChart) window._weightTrendChart.destroy();

  // Compute rolling 10-race window: for each component, track (winner_comp - pick_comp) average
  // Positive = winners have more of this component than our picks = under-weighted
  // Negative = we over-weight this component
  var windowSize = Math.min(10, Math.max(5, Math.floor(races.length / 3)));
  var datasets = [];
  var labels = [];
  var colors = ['#d4af37','#4ec97e','#b48cf8','#6aabbb','#e07733','#7b8df8','#e05555','#aaaa66','#c09060'];

  // Build data points for each component — use dates as labels
  compKeys.forEach(function(k, ki) {
    var data = [];
    for (var i = windowSize - 1; i < races.length; i++) {
      var sum = 0, count = 0;
      for (var j = i - windowSize + 1; j <= i; j++) {
        var rd = races[j];
        if (!rd.isHit && rd.winner && rd.winner.comps && rd.topPick && rd.topPick.comps) {
          sum += (rd.winner.comps[k] || 0) - (rd.topPick.comps[k] || 0);
          count++;
        }
      }
      data.push(count > 0 ? +(sum / count).toFixed(2) : 0);
      if (ki === 0) {
        var rd2 = races[i];
        var dateLabel = (rd2.raceDate || '').slice(5) + ' ' + rd2.track + ' R' + rd2.raceNum;
        labels.push(dateLabel);
      }
    }
    datasets.push({
      label: compLabels[ki],
      data: data,
      borderColor: colors[ki % colors.length],
      backgroundColor: 'transparent',
      borderWidth: ki < 4 ? 2.5 : 1.5,
      borderDash: ki >= 6 ? [4, 3] : [],
      pointRadius: races.length > 40 ? 0 : 2,
      tension: 0.3,
      hidden: false // all visible — click legend to toggle
    });
  });

  window._weightTrendChart = new Chart(canvas, {
    type: 'line',
    data: { labels: labels, datasets: datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#bbb', font: { size: 11 }, usePointStyle: true, pointStyle: 'line' } },
        tooltip: {
          callbacks: {
            title: function(items) { return 'After race ' + items[0].label; },
            label: function(ctx) {
              var v = ctx.raw;
              var dir = v > 0.3 ? ' (under-weighted)' : v < -0.3 ? ' (over-weighted)' : ' (balanced)';
              return ctx.dataset.label + ': ' + (v > 0 ? '+' : '') + v.toFixed(2) + dir;
            }
          }
        },
        annotation: undefined
      },
      scales: {
        x: {
          title: { display: true, text: 'Race #', color: '#666' },
          ticks: {
            color: '#555',
            callback: function(val, i) {
              var n = labels[i];
              return [20,40,60,80,100].indexOf(n) >= 0 ? '▼' + n : (races.length > 40 ? (i % 5 === 0 ? n : '') : n);
            }
          },
          grid: { color: function(ctx) { return [20,40,60,80,100].indexOf(labels[ctx.index]) >= 0 ? 'rgba(212,175,55,0.25)' : '#ede5cc'; } }
        },
        y: {
          title: { display: true, text: 'Winner − Pick (avg)', color: '#666' },
          ticks: { color: '#666', callback: function(v) { return (v > 0 ? '+' : '') + v.toFixed(1); } },
          grid: { color: '#ede5cc' }
        }
      }
    }
  });
}

function parseRaceTime(t){
  if(!t) return 9999;
  // Try AM/PM format first: "1:30 PM"
  var m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if(m){
    var h=parseInt(m[1]),mn=parseInt(m[2]),ap=m[3].toUpperCase();
    if(ap==='PM'&&h!==12)h+=12;
    if(ap==='AM'&&h===12)h=0;
    return h*60+mn;
  }
  // Try timezone-labeled format: "1:30 CT" or "1:30 ET" or just "13:30"
  var m2=t.match(/(\d+):(\d+)/);
  if(!m2) return 9999;
  var h2=parseInt(m2[1]),mn2=parseInt(m2[2]);
  // Adjust for timezone label if present (convert to track local time)
  // Times like "1:00 CT" are 1:00 PM CT (post times are always afternoon)
  // If hour < 10, it's PM (no morning races at 1:00 AM)
  if(h2<10) h2+=12;
  return h2*60+mn2;
}

function getTrackTZ(){
  // Get timezone for current track from cardInfo
  if(typeof cardInfo !== 'undefined' && cardInfo.code){
    var tObj = TRACK_LIST.find(function(t){return t.code===cardInfo.code;});
    if(tObj && tObj.tz) return tObj.tz;
  }
  return 'America/Chicago'; // default
}

function getCTMins(){
  // Returns current time in minutes for the active track's timezone
  var tz = getTrackTZ();
  try {
    var now=new Date();
    var parts=new Intl.DateTimeFormat('en-US',{
      timeZone:tz,
      hour:'numeric',minute:'numeric',hour12:false
    }).formatToParts(now);
    var h=parseInt(parts.find(function(p){return p.type==='hour';}).value);
    var m=parseInt(parts.find(function(p){return p.type==='minute';}).value);
    if(isNaN(h)||isNaN(m)) throw new Error('parse fail');
    return h*60+m;
  } catch(e) {
    var now=new Date();
    var utcMs=now.getTime()+now.getTimezoneOffset()*60000;
    var ct=new Date(utcMs-5*3600000);
    return ct.getHours()*60+ct.getMinutes();
  }
}



// ── PERSISTENT STORAGE (IndexedDB) ──────────────────────────────────────────
// Uses IndexedDB for true persistence across tab closes and device sleep
// Falls back to localStorage if IndexedDB unavailable

var _idb = null;

function openIDB(){
  return new Promise(function(resolve, reject){
    if(_idb){ resolve(_idb); return; }
    var req = indexedDB.open('paddockiq_db', 1);
    req.onupgradeneeded = function(e){
      var db = e.target.result;
      if(!db.objectStoreNames.contains('state')){
        db.createObjectStore('state', {keyPath:'key'});
      }
    };
    req.onsuccess = function(e){ _idb = e.target.result; resolve(_idb); };
    req.onerror   = function(){ reject(req.error); };
  });
}

async function idbSet(key, value){
  try{
    var db = await openIDB();
    return new Promise(function(resolve, reject){
      var tx = db.transaction('state','readwrite');
      tx.objectStore('state').put({key:key, value:value});
      tx.oncomplete = resolve;
      tx.onerror    = reject;
    });
  }catch(e){
    // Fallback to localStorage
    try{ localStorage.setItem('piq_'+key, JSON.stringify(value)); }catch(le){}
  }
}

async function idbGet(key){
  try{
    var db = await openIDB();
    return new Promise(function(resolve, reject){
      var tx  = db.transaction('state','readonly');
      var req = tx.objectStore('state').get(key);
      req.onsuccess = function(){ resolve(req.result ? req.result.value : null); };
      req.onerror   = reject;
    });
  }catch(e){
    // Fallback to localStorage
    try{
      var v = localStorage.getItem('piq_'+key);
      return v ? JSON.parse(v) : null;
    }catch(le){ return null; }
  }
}

async function persistState(){
  // Save full app state to IndexedDB — survives tab/browser close
  var state = {
    races: R.map(function(r){
      return {n:r.n,t:r.t,d:r.d,ty:r.ty,grade:r.grade||0,gradeName:r.gradeName||'',
        purse:r.purse||'',
        horses:r.horses.map(function(h){
          return {name:h.name,disp:h.disp,pp:h.pp,ml:h.ml,b:h.b,sty:h.sty,
            j:h.j,tr:h.tr,layoff:h.layoff,cc:h.cc,wins:h.wins,notes:h.notes,
            eq:h.eq||{lf:false,bf:false,bl:false},wk:h.wk||[],distFit:h.distFit||'tested',
            // Validate cc — should be in $K (e.g. -10 = drop $10K), cap at ±150
            cc: (function(v){ v=parseInt(v)||0; if(Math.abs(v)>150) v=Math.round(v/1000); return Math.max(-150,Math.min(150,v)); })(h.cc)};
        })};
    }),
    cardInfo:  cardInfo,
    bankroll:  bankroll,
    bets:      bets,
    tc:        tc,
    scratches: scratches,
    savedAt:   new Date().toISOString()
  };
  await idbSet('app_state', state);
  // Also keep localStorage as backup
  try{ localStorage.setItem('paddockiq_state', JSON.stringify(state)); }catch(e){}
}

async function loadPersistedState(){
  // Try IndexedDB first, fall back to localStorage
  var state = await idbGet('app_state');
  if(!state){
    try{
      var ls = localStorage.getItem('paddockiq_state');
      state = ls ? JSON.parse(ls) : null;
    }catch(e){}
  }
  return state;
}



function renderRaceTabs(){
  try{renderBigRaceSpotlight();}catch(e){}
  var el=document.getElementById('race-tabs');
  var ctMins=getCTMins();
  var nextIdx=-1;
  for(var ri=0;ri<R.length;ri++){
    if(parseRaceTime(R[ri].t)>ctMins){nextIdx=ri;break;}
  }
  var html='';
  R.forEach(function(r,i){
    var rMins=parseRaceTime(r.t);
    var isPast=rMins<=ctMins-25;
    var isRunning=!isPast&&rMins<=ctMins&&rMins>ctMins-25;
    var isNext=i===nextIdx&&!isRunning;
    var isCur=CUR===i;
    var cls='rtab';
    if(isCur) cls+=' on';
    if(isPast) cls+=' past';
    else if(isRunning) cls+=' nxt'; // reuse green styling for live
    else if(isNext) cls+=' nxt';
    else cls+=' upcoming';

    var badge = r.grade ? 'G'+r.grade : raceTypeBadge(r.ty);
    var badgeColor = r.grade ? '#f0c850' : raceTypeBadgeColor(badge);
    var badgeHtml = badge ? ' <span style="font-size:9px;color:'+badgeColor+';opacity:0.85">'+badge+'</span>' : '';
    var timeStr = r.t || '';

    // Status icon
    var icon = isPast ? '<span style="color:#aa5555;font-size:11px">✓</span> ' :
               isRunning ? '<span style="color:var(--green);font-size:10px">●</span> ' :
               isNext ? '<span style="color:var(--green);font-size:9px">▶</span> ' : '';

    var label = icon + '<span style="font-weight:600">R'+r.n+'</span>';
    if(timeStr) label += ' <span style="font-size:11px;opacity:0.7">'+timeStr+'</span>';
    label += badgeHtml;

    html+='<button class="'+cls+'" onclick="goRace('+i+')">'+label+'</button>';
  });
  el.innerHTML=html;
}

// ── Per-Track Jockey/Trainer Stats Store ────────────────────────────────────
// Persists jockey & trainer meet win% per track in localStorage.
// Format: { 'OP': { jockeys: { 'Jon Court': {pct:18,starts:120,wins:22,updated:'2026-03-28'} }, trainers: {...} }, 'KEE': {...} }
// Updated every time a card is loaded — latest win% always wins.

var JOCK_STATS_KEY = 'paddockiq_jock_stats';

function loadJockStats() {
  try { return JSON.parse(localStorage.getItem(JOCK_STATS_KEY) || '{}'); }
  catch(e) { return {}; }
}

function saveJockStats(stats) {
  try { localStorage.setItem(JOCK_STATS_KEY, JSON.stringify(stats)); }
  catch(e) { console.warn('Failed to save jock stats', e); }
}

// Ingest jockey/trainer data from a newly loaded card into the persistent store
function ingestCardJockStats(races, trackCode) {
  if (!races || !trackCode) return;
  var stats = loadJockStats();
  if (!stats[trackCode]) stats[trackCode] = { jockeys: {}, trainers: {} };
  var ts = stats[trackCode];
  var today = new Date().toISOString().slice(0, 10);

  races.forEach(function(race) {
    (race.horses || []).forEach(function(h) {
      // Jockey
      var jName = h.jockeyName || h.jName;
      var jPct  = h.jockMeetWinPct != null ? h.jockMeetWinPct : (h.j != null ? h.j / 100 : null);
      if (jName && jPct != null) {
        var existing = ts.jockeys[jName];
        // Always update — latest card has freshest meet stats
        ts.jockeys[jName] = {
          pct:     Math.round(jPct * 100 * 10) / 10,  // e.g. 18.5
          updated: today
        };
      }
      // Trainer
      var tName = h.trainerName || h.tName;
      var tPct  = h.trnrMeetWinPct != null ? h.trnrMeetWinPct : (h.tr != null ? h.tr / 100 : null);
      if (tName && tPct != null) {
        ts.trainers[tName] = {
          pct:     Math.round(tPct * 100 * 10) / 10,
          updated: today
        };
      }
    });
  });

  saveJockStats(stats);
}

function applyLoadedState(state){
  if(!state) return;
  if(state.races && state.races.length){
    R = state.races.map(function(sr){
      var ri = R.findIndex(function(r){return r.n===sr.n;});
      return {
        n:sr.n, t:sr.t||'', d:sr.d||'', ty:sr.ty||'',
        grade:sr.grade||0, gradeName:sr.gradeName||'',
        purse:sr.purse||'',
        horses:(sr.horses||[]).map(function(h){
          // Sanitize legacy eq data: lf was wrongly set for "on lasix" — move to lo
          var rawEq = h.eq||{lf:false,bf:false,bl:false};
          var eq = {
            lf: rawEq.lf && rawEq.lo ? rawEq.lf : false,  // keep lf only if lo also set (genuine first-time)
            lo: rawEq.lo || (rawEq.lf && !rawEq.lo),       // migrate old lf→lo
            bf: rawEq.bf||false,
            bl: rawEq.bl||false
          };
          // Sanitize legacy distFit
          var distFit = h.distFit==='csv' ? 'tested' : (h.distFit||'tested');
          return {name:h.name||'',disp:h.disp||h.name||'',pp:parseInt(h.pp)||0,
            ml:h.ml||'5-1',b:parseInt(h.b)||0,sty:h.sty||'Midpack',
            j:parseInt(h.j)||10,tr:parseInt(h.tr)||10,wins:parseInt(h.wins)||0,
            starts:parseInt(h.starts)||0,places:parseInt(h.places)||0,shows:parseInt(h.shows)||0,
            cl:h.cl!=null?parseInt(h.cl):null,
            beyerFigs:h.beyerFigs||[],
            sire:h.sire||'',dam:h.dam||'',earnings:h.earnings||0,
            jockeyName:h.jockeyName||'',trainerName:h.trainerName||'',
            claimPrice:h.claimPrice||0,lastClass:h.lastClass||'',
            notes:h.notes||'',layoff:h.layoff!=null?parseInt(h.layoff):null,cc:parseInt(h.cc)||0,
            eq:eq,wk:h.wk||[],distFit:distFit,
            // Validate cc — should be in $K (e.g. -10 = drop $10K), cap at ±150
            cc: (function(v){ v=parseInt(v)||0; if(Math.abs(v)>150) v=Math.round(v/1000); return Math.max(-150,Math.min(150,v)); })(h.cc)};
        })
      };
    });
  }
  if(state.cardInfo){
    cardInfo.track    = state.cardInfo.track   || cardInfo.track;
    cardInfo.code     = state.cardInfo.code    || cardInfo.code;
    cardInfo.date     = state.cardInfo.date    || cardInfo.date;
    cardInfo.numRaces = state.cardInfo.numRaces|| cardInfo.numRaces;
    cardInfo.tz       = state.cardInfo.tz      || cardInfo.tz;
  }
  if(state.bankroll)  bankroll  = state.bankroll;
  if(state.bets)      bets      = state.bets;
  if(state.tc)        Object.assign(tc, state.tc);
  if(state.scratches) scratches = state.scratches;
  if(state.tracksToday) tracksToday = state.tracksToday;
  if(state.bettingTracks) bettingTracks = state.bettingTracks;
}

function loadState(){
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(!raw)return;
    var state=JSON.parse(raw);
    // Wipe state if app version changed (clears stale bankroll etc)
    if(state.appVersion!==APP_VERSION){
      localStorage.removeItem(LS_KEY);
      return;
    }
    // Only restore if same day
    var savedDay=state.savedAt?state.savedAt.slice(0,10):'';
    var today=new Date().toISOString().slice(0,10);
    if(savedDay!==today){
      localStorage.removeItem(LS_KEY);
      return;
    }
    // Only restore bankroll/wagered/returned if the save looks like a real session
    if(state.bankroll&&state.bankroll!==DEFAULT_BANKROLL)bankroll=state.bankroll;
    if(state.wagered!==undefined)wagered=state.wagered;
    if(state.returned!==undefined)returned=state.returned;
    if(state.scratches)scratches=state.scratches;
    if(state.bets)bets=state.bets;
    if(state.tc)tc=state.tc;
    if(state.tracksToday)tracksToday=state.tracksToday;
    if(state.bettingTracks)bettingTracks=state.bettingTracks;
    if(state.cardInfo){
      Object.assign(cardInfo,state.cardInfo);
      // Ensure tz is set from TRACK_LIST if not saved
      if(!cardInfo.tz && cardInfo.code){
        var tObj=TRACK_LIST.find(function(t){return t.code===cardInfo.code;});
        if(tObj) cardInfo.tz=tObj.tz;
      }
    }
    // Restore parsed horse data
    if(state.races&&state.races.length){
      state.races.forEach(function(saved){
        var ri=R.findIndex(function(r){return r.n===saved.n;});
        if(ri>=0){
          if(saved.horses&&saved.horses.length) R[ri].horses=saved.horses.map(function(h){
            var eq=h.eq||{lf:false,lo:false,bf:false,bl:false};
            if(eq.lf&&!eq.lo){ eq=Object.assign({},eq,{lo:true,lf:false}); }
            var distFit=h.distFit==='csv'?'tested':(h.distFit||'tested');
            return Object.assign({},h,{eq:eq,distFit:distFit});
          });
          if(saved.t) R[ri].t=saved.t;
          if(saved.d) R[ri].d=saved.d;
          if(saved.ty) R[ri].ty=saved.ty;
          if(saved.grade) R[ri].grade=saved.grade;
          if(saved.gradeName) R[ri].gradeName=saved.gradeName;
        }
      });
    }
    console.log('PaddockIQ state restored from',savedDay);
  }catch(e){
    // If anything goes wrong, clear corrupted state and start fresh
    console.warn('Load failed, clearing state:',e);
    localStorage.removeItem(LS_KEY);
  }
}

// Switch the app's active track. Clears the loaded card, repoints accents,
// news, weather, DRF link, and rescopes the card dropdown to the new track.

  if(!t) return;
  cardInfo.code = t.code;
  cardInfo.track = t.name;
  cardInfo.tz   = t.tz;
  // Clear any loaded card state — horses + scratches + live odds belong to the prior track
  R = R.map(function(r){ return {n:r.n, t:'', d:r.d, ty:r.ty, horses:[]}; });
  scratches = {}; liveOdds = {}; kaci = {}; tvgCommentary = {};
  window._loadedCardId = 0;
  // Reset TC bias from the new track's profile
  var prof = TRACK_PROFILES[code] || {};
  var biasMap = {speed:'speed',closer:'closer',neutral:'none'};
  tc.bias = biasMap[prof.bias] || 'none';
  // Update ambient state
  applyTrackAccent(code);
  updateDRFLink();
  updateCardHeader();
  if(typeof updateWeatherForTrack === 'function') updateWeatherForTrack(code);
  // Repopulate card dropdown scoped to this track
  if(typeof loadSavedCardList === 'function') loadSavedCardList().catch(function(){});
  // Re-render current view
  renderRaceTabs();
  if(TAB==='news') renderNews();
  else render();
  saveState();
}
