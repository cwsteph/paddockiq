// PACE
// ═══════════════════════════════════════════════════════════
function renderPace(){
  var race=R[CUR], scr=scratches[CUR]||{};
  var active=race.horses.filter(function(h){return!scr[h.name];});
  var early=active.filter(function(h){return h.sty==='Leader'||h.sty==='Speed';});
  var press=active.filter(function(h){return h.sty==='Tracker';});
  var mid=active.filter(function(h){return h.sty==='Midpack';});
  var closrs=active.filter(function(h){return h.sty==='Closer'||h.sty==='Plodder';});
  var sc=scoreRace(CUR);

  var scenario,sCol,sIcon,sDesc,setup;
  if(early.length===0){scenario='NO SPEED';sCol='var(--blue)';sIcon='😴';sDesc='No front-runners — slow tactical race. Closers and stalkers get a clean trip.';setup='Favors Closers/Trackers';}
  else if(early.length===1){scenario='LONE SPEED';sCol='var(--gold)';sIcon='⚡';sDesc=early[0].name+' has an uncontested lead — lone speed on a fast track wins at a very high rate. Strong lean.';setup='Strong lean: '+early[0].name;}
  else if(early.length===2){scenario='DUAL SPEED';sCol='#d4b55a';sIcon='⚔️';sDesc=early.map(function(h){return h.name;}).join(' and ')+' will fight for the lead. Contested pace sets up closers.';setup='Slight edge to Closers';}
  else{scenario='HOT PACE';sCol='var(--red)';sIcon='🔥';sDesc=early.length+' horses want the lead. Hot pace almost always collapses — closers and stalkers are perfectly set.';setup='Strong favor: Closers/Trackers';}

  var segs=[{lbl:'Early',arr:early,col:'var(--gold)'},{lbl:'Trackers',arr:press,col:'var(--blue)'},{lbl:'Mid-Pack',arr:mid,col:'#9eaac8'},{lbl:'Closers',arr:closrs,col:'var(--green)'}].filter(function(s){return s.arr.length>0;});
  var total=active.length||1;
  var sClr={Leader:'var(--gold)',Speed:'#d4b55a',Tracker:'var(--blue)',Midpack:'#9eaac8',Closer:'var(--green)',Plodder:'var(--muted)'};

  var html='<div class="card-gold" style="border-color:'+sCol+'">'+
    '<div style="display:flex;gap:14px;flex-wrap:wrap">'+
    '<div style="font-size:44px;line-height:1">'+sIcon+'</div>'+
    '<div style="flex:1">'+
    '<div class="slabel">Pace Scenario — Race '+race.n+'</div>'+
    '<div class="bebas" style="font-size:26px;color:'+sCol+'">'+scenario+'</div>'+
    '<div style="font-size:12px;color:#aaa;line-height:1.7;margin-top:6px">'+sDesc+'</div>'+
    '<div style="margin-top:8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 11px;font-size:12px">'+
    '<span class="slabel" style="display:inline">Betting Setup: </span>'+
    '<span style="color:'+sCol+';font-weight:600">'+setup+'</span></div>'+
    '</div></div>'+
    '<div style="margin-top:12px">'+
    '<div class="slabel">Field Composition</div>'+
    '<div class="pace-bar">'+
    segs.map(function(s){return'<div class="pace-seg" style="flex:'+s.arr.length+';background:'+s.col+'">'+s.arr.length+'</div>';}).join('')+
    '</div>'+
    '<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:11px">'+
    segs.map(function(s){
      return'<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+s.col+';margin-right:4px;opacity:.8"></span>'+
      '<span style="color:var(--muted)">'+s.lbl+': </span><b>'+s.arr.length+'</b>'+
      '<span style="color:var(--dim)"> ('+s.arr.map(function(h){return h.name;}).join(', ')+')</span></span>';
    }).join('')+
    '</div></div></div>';

  // Projections
  var proj=active.map(function(h){
    var e={Leader:[.95,.85,.70],Speed:[.90,.88,.75],Tracker:[.78,.92,.85],Midpack:[.70,.85,.90],Closer:[.60,.78,.95],Plodder:[.55,.72,.88]}[h.sty]||[.72,.82,.85];
    return{name:h.name,sty:h.sty,b:h.b,e1:Math.round(h.b*e[0]),e2:Math.round(h.b*e[1]),late:Math.round(h.b*e[2])};
  }).sort(function(a,b){return b.e1-a.e1;});

  html+='<div class="card"><div class="ctitle">Pace Projections</div>';
  proj.forEach(function(h){
    var mx=Math.max(h.e1,h.e2,h.late);
    html+='<div style="padding:7px 0;border-bottom:1px solid #0d0d18">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'+
      '<div style="flex:1;font-size:13px;font-weight:500">'+h.name+'</div>'+
      '<span style="font-size:11px;color:'+(sClr[h.sty]||'#888')+';background:var(--bg2);padding:1px 7px;border-radius:20px;border:1px solid '+(sClr[h.sty]||'#888')+'44">'+h.sty+'</span>'+
      '<span style="font-size:11px;color:var(--gold)">'+h.b+'</span></div>'+
      [['E1',h.e1,'var(--gold)'],['E2',h.e2,'var(--blue)'],['Late',h.late,'var(--green)']].map(function(x){
        return'<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'+
          '<span style="font-size:10px;color:var(--dim);min-width:28px">'+x[0]+'</span>'+
          '<div class="proj-bar"><div class="proj-fill" style="width:'+Math.round(x[1]/mx*100)+'%;background:'+x[2]+'"></div></div>'+
          '<span style="font-size:11px;color:var(--muted);min-width:24px">'+x[1]+'</span></div>';
      }).join('')+
      '</div>';
  });
  html+='</div>';

  // Pace-adjusted picks
  html+='<div class="card"><div class="ctitle">Pace-Adjusted Picks</div>';
  sc.forEach(function(s){
    var st=s.horse.sty;
    var benefit=(scenario==='LONE SPEED'&&(st==='Leader'||st==='Speed'))||
                (scenario==='HOT PACE'&&(st==='Closer'||st==='Tracker'))||
                (scenario==='DUAL SPEED'&&(st==='Closer'||st==='Tracker'));
    var hurt=(scenario==='HOT PACE'&&(st==='Leader'||st==='Speed'))||
             (scenario==='LONE SPEED'&&(st==='Closer'||st==='Plodder'));
    if(benefit){
      html+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #0d0d18;font-size:13px">'+
        '<span style="color:var(--green)">✅</span>'+
        '<span style="flex:1;font-weight:500">'+s.name+'</span>'+
        '<span style="font-size:11px;color:'+(sClr[st]||'#888')+';background:var(--bg2);padding:1px 7px;border-radius:20px;border:1px solid '+(sClr[st]||'#888')+'44">'+st+'</span>'+
        '<span class="bebas" style="font-size:16px;color:var(--gold)">'+s.score+'</span></div>';
    }
  });
  var hasBenefit=sc.some(function(s){var st=s.horse.sty;return(scenario==='LONE SPEED'&&(st==='Leader'||st==='Speed'))||(scenario==='HOT PACE'&&(st==='Closer'||st==='Tracker'))||(scenario==='DUAL SPEED'&&(st==='Closer'||st==='Tracker'));});
  if(!hasBenefit)html+='<div style="color:var(--dim);font-size:12px">Even setup — no clear pace beneficiary in this race.</div>';
  html+='</div>';

  document.getElementById('tab-pace').innerHTML=html;
}

// ═══════════════════════════════════════════════════════════
// MULTI-RACE / PICK 3-4-5
// ═══════════════════════════════════════════════════════════
function initMR(n){mrLegs=[];mrSels={};for(var i=0;i<n;i++)mrLegs.push(i);renderMR();}
function setMRStart(s){var n=mrLegs.length;mrLegs=[];mrSels={};for(var i=0;i<n&&(s+i)<10;i++)mrLegs.push(s+i);renderMR();}
function setMRUnit(v){mrUnit=v;renderMR();}
function toggleMRSel(ri,name){
  if(!mrSels[ri])mrSels[ri]=[];
  var idx=mrSels[ri].indexOf(name);
  if(idx>-1)mrSels[ri].splice(idx,1);
  else{if(mrSels[ri].length>=3)mrSels[ri].shift();mrSels[ri].push(name);}
  renderMR();
}

function renderMR(){
  var el=document.getElementById('tab-multirace');
  var combos=mrLegs.reduce(function(acc,ri){return acc*Math.max(1,(mrSels[ri]||[]).length);},1);
  var cost=combos*mrUnit;
  var allSet=mrLegs.length>0&&mrLegs.every(function(ri){return(mrSels[ri]||[]).length>0;});

  var html='<div class="card-gold">'+
    '<div class="ctitle">Pick 3 / 4 / 5 Builder</div>'+
    '<div style="font-size:11px;color:var(--muted);margin-bottom:12px">Pick consecutive races. Select up to 3 horses per leg. Ticket cost calculated automatically.</div>'+
    '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">'+
    '<span class="slabel" style="margin:0">Bet Type:</span>'+
    [3,4,5].map(function(n){return'<button class="btn'+(mrLegs.length===n?' on':'')+'" onclick="initMR('+n+')">Pick '+n+'</button>';}).join('')+
    '</div>';

  if(mrLegs.length>0){
    html+='<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">'+
      '<span class="slabel" style="margin:0">Start Race:</span>'+
      R.slice(0,10-mrLegs.length+1).map(function(r,i){return'<button class="pill'+(mrLegs[0]===i?' on':'')+'" onclick="setMRStart('+i+')">R'+r.n+'</button>';}).join('')+
      '</div>';
  }

  html+='<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+
    '<span class="slabel" style="margin:0">Base Unit:</span>'+
    [0.10,0.50,1.00,2.00].map(function(v){return'<button class="pill'+(mrUnit===v?' on':'')+'" onclick="setMRUnit('+v+')">$'+v.toFixed(2)+'</button>';}).join('')+
    '</div></div>';

  if(mrLegs.length===0){
    html+='<div class="card" style="text-align:center;padding:28px"><div style="font-size:36px;margin-bottom:8px">🎯</div><div style="font-size:14px;color:var(--muted)">Select Pick 3, 4, or 5 above to start building your ticket.</div></div>';
  } else {
    html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-bottom:12px">';
    mrLegs.forEach(function(ri,legNum){
      var race=R[ri], sc=scoreRace(ri).slice(0,6), sels=mrSels[ri]||[];
      html+='<div class="leg-card">'+
        '<div class="bebas" style="font-size:15px;color:var(--gold);margin-bottom:2px">Leg '+(legNum+1)+' — Race '+race.n+'</div>'+
        '<div style="font-size:10px;color:var(--dim);margin-bottom:8px">'+race.t+' · '+race.d+'</div>';
      sc.forEach(function(s){
        var sel=sels.indexOf(s.name)>-1;
        html+='<div class="leg-horse'+(sel?' sel':'')+'" onclick="toggleMRSel('+ri+',\''+s.name.replace(/'/g,'\\\'')+'\')" >'+
          '<div class="leg-chk'+(sel?' on':'')+'">'+(sel?'✓':'')+'</div>'+
          '<div style="flex:1;font-size:12px;font-weight:'+(sel?600:400)+';color:'+(sel?'var(--text)':'var(--muted)')+'">'+s.name+'</div>'+
          '<span style="font-size:10px;color:var(--blue)">'+getOdds(ri,s.name)+'</span>'+
          '<span class="bebas" style="font-size:14px;color:'+(sel?'var(--gold)':'var(--dim)')+'">'+s.score+'</span>'+
          '</div>';
      });
      html+='<div style="font-size:10px;color:var(--dim);margin-top:5px">'+sels.length+' selected (max 3)</div></div>';
    });
    html+='</div>';

    // Ticket summary
    html+='<div class="card-gold">'+
      '<div class="ctitle">Ticket Summary</div>'+
      '<div class="stat-grid">';
    [['Combinations',combos,'var(--blue)'],['Base Unit','$'+mrUnit.toFixed(2),'var(--muted)'],['Ticket Cost','$'+cost.toFixed(2),'var(--gold)'],['% of Roll',rem()>0?(cost/rem()*100).toFixed(1)+'%':'—',cost/rem()>0.15?'var(--red)':'var(--green)']].forEach(function(x){
      html+='<div class="stat-box"><div class="stat-l">'+x[0]+'</div><div class="stat-v" style="color:'+x[2]+'">'+x[1]+'</div></div>';
    });
    html+='</div>'+
      '<div class="slabel">Computer singles (top pick each leg):</div>'+
      '<div style="font-size:13px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;line-height:2;margin-bottom:10px">'+
      mrLegs.map(function(ri,i){var top=scoreRace(ri)[0];return(i>0?' > ':' ')+'R'+R[ri].n+': <b>'+(top?top.name:'?')+'</b>';}).join('')+
      '</div>'+
      '<div class="slabel">Your selections:</div>'+
      '<div style="font-size:13px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;line-height:2">'+
      (allSet?mrLegs.map(function(ri,i){return(i>0?' > ':'')+'R'+R[ri].n+': <b>'+(mrSels[ri]||[]).join(' / ')+'</b>';}).join(''):'<span style="color:var(--dim)">Select at least one horse per leg.</span>')+
      '</div>'+
      (cost>rem()*0.20?'<div class="warn-box">⚠️ Ticket cost exceeds 20% of bankroll. Reduce unit or combos.</div>':'')+
      '</div>';

    // ── Smart Ticket section ──
    html += '<div class="card"><div class="ctitle">⚡ Smart Ticket</div>';
    html += '<div style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.6">'+
      'Auto-selects the top algorithm pick + main longshot threat per leg based on score gap and odds. '+
      'Uses expected value to size the ticket relative to your bankroll.</div>';

    var smartLegs = mrLegs.map(function(ri){
      var sc = scoreRace(ri);
      if(!sc.length) return {ri:ri, picks:[]};
      var top = sc[0];
      // Find the best longshot — highest score among horses 3-1 or longer that aren't the top pick
      var longshot = sc.slice(1).find(function(s){
        var odds = mlDec(getOdds(ri, s.name));
        return odds >= 3.0 && s.score >= sc[0].score - 12;
      });
      return {ri:ri, top:top, longshot:longshot, sc:sc};
    });

    // EV for straight single (top pick wins each leg)
    var singlesProb = smartLegs.reduce(function(p,leg){
      if(!leg.top) return p;
      var probs = softmax(leg.sc);
      return p * (probs[0]||0.1);
    }, 1);
    var singleCost = mrUnit;
    var topPickOdds = smartLegs.map(function(leg){
      return leg.top ? mlDec(getOdds(leg.ri, leg.top.name)) : 3;
    });
    var singlePayout = mrUnit * topPickOdds.reduce(function(p,o){return p*(o+1);}, 1) * 0.75; // ~75% track take factor
    var singleEV = ((singlesProb * singlePayout) - singleCost).toFixed(2);

    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';
    // Straight single
    html += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px">';
    html += '<div style="font-size:11px;color:var(--dim);margin-bottom:4px">STRAIGHT SINGLE</div>';
    html += '<div style="font-size:12px;color:var(--text);line-height:1.8">';
    smartLegs.forEach(function(leg, i){
      if(!leg.top) return;
      html += 'R'+R[leg.ri].n+': <b style="color:var(--gold)">'+(leg.top.horse?leg.top.horse.disp||leg.top.name:leg.top.name)+'</b><br>';
    });
    html += '</div>';
    html += '<div style="margin-top:6px;font-size:11px">Cost: <b style="color:var(--blue)">$'+mrUnit.toFixed(2)+'</b> · ';
    html += 'EV: <b style="color:'+(parseFloat(singleEV)>=0?'var(--green)':'var(--red)')+'">'+singleEV+'</b></div>';
    html += '</div>';

    // With-a-key (top pick + 1 longshot per leg)
    var keyPicks = smartLegs.map(function(leg){
      var picks = [leg.top ? leg.top.name : null];
      if(leg.longshot) picks.push(leg.longshot.name);
      return picks.filter(Boolean);
    });
    var keyCombos = keyPicks.reduce(function(a,p){return a*p.length;},1);
    var keyCost = (keyCombos * mrUnit).toFixed(2);
    html += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px">';
    html += '<div style="font-size:11px;color:var(--dim);margin-bottom:4px">WITH-A-KEY (top + longshot threat)</div>';
    html += '<div style="font-size:12px;color:var(--text);line-height:1.8">';
    smartLegs.forEach(function(leg, i){
      if(!leg.top) return;
      var disp = leg.top.horse ? leg.top.horse.disp||leg.top.name : leg.top.name;
      html += 'R'+R[leg.ri].n+': <b style="color:var(--gold)">'+disp+'</b>';
      if(leg.longshot){
        var ldisp = leg.longshot.horse ? leg.longshot.horse.disp||leg.longshot.name : leg.longshot.name;
        html += ' / <span style="color:#b48cf8">'+ldisp+'</span>';
      }
      html += '<br>';
    });
    html += '</div>';
    html += '<div style="margin-top:6px;font-size:11px">'+keyCombos+' combos · <b style="color:var(--blue)">$'+keyCost+'</b></div>';
    html += '</div>';
    html += '</div>';

    // Leg-by-leg breakdown
    html += '<div style="font-size:11px;color:var(--dim);margin-top:4px">'+
      smartLegs.map(function(leg,i){
        if(!leg.sc||!leg.sc.length) return '';
        var probs = softmax(leg.sc);
        var p1 = (probs[0]*100).toFixed(0);
        var topDisp = leg.top?(leg.top.horse?leg.top.horse.disp||leg.top.name:leg.top.name):'?';
        var gap = leg.sc.length>1?leg.sc[0].score-leg.sc[1].score:0;
        return 'R'+R[leg.ri].n+': '+topDisp+' '+p1+'% win prob, gap +'+gap+
          (gap>=8?' 🔒':(gap>=4?' ✓':' ⚠️'));
      }).join(' &nbsp;·&nbsp; ')+
    '</div>';

    html += '</div>'; // close smart ticket card
  }
  el.innerHTML=html;
}

// ═══════════════════════════════════════════════════════════
// ODDS
// ═══════════════════════════════════════════════════════════
function renderOdds(){
  var race=R[CUR], scr=scratches[CUR]||{};
  var html='<div class="card" style="margin-bottom:8px">'+'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+'<span class="ctitle" style="margin:0">Scratches & Changes</span>'+'<button onclick="openEquibaseScratches()" style="font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid #6aabbb;background:#0d1a20;color:#6aabbb;cursor:pointer">Open Equibase Scratches</button>'+'<span style="font-size:10px;color:var(--dim);flex:1">Check official scratches, then tap horse below to toggle</span>'+'</div>'+'<div style="font-size:10px;color:var(--dim);margin-top:6px">Quick scratch by PP# : '+race.horses.map(function(h){var isS=(scratches[CUR]||{})[h.name];return '<button onclick="scratchByPP('+CUR+','+h.pp+')" style="font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid '+(isS?'var(--red)':'var(--border)')+';background:'+(isS?'#2e1010':'transparent')+';color:'+(isS?'var(--red)':'var(--dim)')+';cursor:pointer;margin:2px">'+(isS?'<s>':'')+h.pp+(isS?'</s>':'')+' '+(h.horse?h.horse.disp||h.name:h.name).split(' ')[0]+'</button>';}).join('')+'</div></div>'+'<div class="card"><div class="ctitle">Live Odds — Race '+race.n+'</div>'+
    '<div style="font-size:11px;color:var(--muted);margin-bottom:12px">Enter current tote odds. Scratch toggles remove horse from all Kelly calculations.</div>'+
    '<table class="tbl"><thead><tr>'+
    ['Horse','PP','Morning Line','Current Odds','Movement',''].map(function(h){return'<th>'+h+'</th>';}).join('')+
    '</tr></thead><tbody>';
  race.horses.forEach(function(h){
    var isScr=scr[h.name];
    var cur=getOdds(CUR,h.name);
    var mlD=mlDec(h.ml),curD=mlDec(cur);
    var mov='',movBadge='';
    if(curD>mlD*1.8){mov='<span style="color:var(--blue);font-size:11px">↑ Drifting</span>';movBadge='<span style="font-size:9px;font-weight:700;color:#6aabff;background:#101828;border:1px solid #203050;border-radius:3px;padding:1px 6px;margin-right:4px">FADE</span>';}
    else if(curD<mlD*0.55){mov='<span style="color:var(--green);font-size:11px">↓ Shortening</span>';movBadge='<span style="font-size:9px;font-weight:700;color:#ff8040;background:#1a1008;border:1px solid #503010;border-radius:3px;padding:1px 6px;margin-right:4px">STEAM</span>';}
    else if(curD<mlD*0.9){mov='<span style="color:var(--green);font-size:11px">↓ Shortening</span>';}
    else if(curD>mlD*1.1){mov='<span style="color:var(--dim);font-size:11px">↑ Drifting</span>';}
    html+='<tr class="'+(isScr?'scr':'')+'" id="orow-'+CUR+'-'+h.name.replace(/\s/g,'_')+'">'+
      '<td style="font-weight:500">'+h.name+'</td>'+
      '<td style="color:var(--dim)">'+h.pp+'</td>'+
      '<td style="color:var(--blue)">'+h.ml+'</td>'+
      '<td>'+movBadge+'<input class="inp" value="'+cur+'" style="width:68px;text-align:center;color:var(--blue)" onblur="setOdds('+CUR+',\''+h.name.replace(/'/g,'\\\'')+'\'  ,this.value)" '+(isScr?'disabled':'')+'/></td>'+
      '<td>'+mov+'</td>'+
      '<td><button class="pill'+(isScr?' on-r':'')+'" onclick="toggleScr('+CUR+',\''+h.name.replace(/'/g,'\\\'')+'\')">'+( isScr?'Scratched':'Scratch')+'</button></td>'+
      '</tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById('tab-odds').innerHTML=html;
}

function scratchByPP(rn, pp) {
  var race = R[rn];
  var h = race.horses.find(function(x){ return x.pp === pp; });
  if(!h){ alert('No horse with PP #' + pp + ' in Race ' + R[rn].n); return; }
  if(!scratches[rn]) scratches[rn] = {};
  scratches[rn][h.name] = !scratches[rn][h.name];
  render();
}

function fetchTVGResults(raceIdx) {
  var race   = R[raceIdx];
  window._tvgRaceIdx = raceIdx;  // store for auto-settle
  var status = document.getElementById('results-fetch-status');
  if (status) { status.style.color = 'var(--blue)'; status.textContent = '⏳ Fetching from TVG…'; }

  // Get race date from card metadata
  var rd = (typeof cardInfo !== 'undefined' && cardInfo.date) || race.date || '';
  // Normalise to YYYY-MM-DD
  var isoDate = '';
  if (rd) {
    var d = new Date(rd);
    if (!isNaN(d)) isoDate = d.toISOString().slice(0, 10);
  }

  if (!isoDate) {
    if (status) { status.style.color = '#e05555'; status.textContent = '⚠️ No race date — fill in manually.'; }
    return;
  }

  var trackCode = (typeof cardInfo !== 'undefined' && cardInfo.code) ? cardInfo.code : 'OP';
  var url = '/api/results/fetch?date=' + isoDate + '&race=' + race.n + '&track=' + trackCode;

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        if (status) { status.style.color = '#e05555'; status.textContent = '⚠️ ' + data.error; }
        return;
      }

      var sc = scoreRace(raceIdx);
      var filled = 0;

      // Match TVG runner names to our horse list by fuzzy name match
      sc.forEach(function(s, i) {
        var ourName  = s.name.toLowerCase().replace(/[^a-z0-9]/g, '');
        var match    = data.runners.find(function(r) {
          if (r.scratched || !r.finishPos) return false;
          var tvgName = r.name.toLowerCase().replace(/[^a-z0-9]/g, '');
          // exact or one contains the other (handles apostrophes, spacing diffs)
          return tvgName === ourName ||
                 tvgName.includes(ourName.substring(0, Math.min(ourName.length, 8))) ||
                 ourName.includes(tvgName.substring(0, Math.min(tvgName.length, 8)));
        });
        if (match) {
          var inp = document.getElementById('fin_' + i);
          if (inp) { inp.value = match.finishPos; filled++; }
        }
      });

      if (status) {
        if (filled > 0) {
          status.style.color = 'var(--green)';
          status.textContent = '✅ Filled ' + filled + '/' + sc.length + ' horses from TVG — review then save.';
        } else {
          status.style.color = '#e05555';
          status.textContent = '⚠️ TVG returned results but names didn\'t match — fill in manually.';
        }
      }

      // Store payoffs on modal for use at save time
      window._tvgPayoffs = {};
      data.runners.forEach(function(r) {
        window._tvgPayoffs[r.name] = {
          winPayoff:   r.winPayoff   || 0,
          placePayoff: r.placePayoff || 0,
          showPayoff:  r.showPayoff  || 0,
        };
      });

      // Show payoff info
      var winner = data.runners.find(function(r) { return r.finishPos === 1; });
      if (winner && winner.winPayoff && status) {
        status.textContent += '  WIN: $' + winner.winPayoff.toFixed(2);
        if (winner.placePayoff) status.textContent += '  PL: $' + winner.placePayoff.toFixed(2);
      }

      // Auto-settle the bet for this race using TVG payoffs
      if (window.bets && Array.isArray(window.bets)) {
        var raceN = window.R[window._tvgRaceIdx || 0] && window.R[window._tvgRaceIdx || 0].n;
        bets.forEach(function(b) {
          if (b.race !== raceN || b.settled) return;
          var hp = window._tvgPayoffs[b.horse] || {};
          b.settled = true;
          if (b.type === 'WIN') {
            b.payout = winner && b.horse === winner.name ? (b.amount / 2) * (hp.winPayoff || 0) : 0;
          } else if (b.type === 'WIN/PLACE' || b.type === 'WIN / PLACE') {
            var won    = winner && b.horse === winner.name;
            var placed = data.runners.find(function(r){ return r.name===b.horse && r.finishPos<=2; });
            b.payout = (won ? (b.amount/4) * (hp.winPayoff||0) : 0) +
                       (placed ? (b.amount/4) * (hp.placePayoff||0) : 0);
          } else {
            var showed = data.runners.find(function(r){ return r.name===b.horse && r.finishPos<=3; });
            b.payout = showed ? (b.amount/2) * (hp.showPayoff||0) : 0;
          }
        });
        if (typeof saveState === 'function') saveState();
      }
    })
    .catch(function(e) {
      if (status) { status.style.color = '#e05555'; status.textContent = '⚠️ Fetch error: ' + e.message; }
    });
}

function submitResults(raceIdx, horses) {
  var race  = R[raceIdx];
  var sc    = scoreRace(raceIdx);
  var cardId   = window._loadedCardId || null;
  var raceDate = (typeof cardInfo !== 'undefined' && cardInfo.date) || race.date || new Date().toISOString().slice(0,10);

  var results = [];
  sc.forEach(function(s, i) {
    var inp = document.getElementById('fin_' + i);
    var pos = inp && inp.value ? parseInt(inp.value) : null;
    if (pos === null) return; // skip blanks (scratches)
    // Find any logged bet for this horse/race
    var matchBet = (window.bets || []).find(function(b) {
      return b.race === race.n && b.horse === s.name;
    });
    // Find TVG payoffs for this horse
    var tvgPay = (window._tvgPayoffs || {})[s.name] || {};
    results.push({
      horse_name:     s.name,
      finish_pos:     pos,
      paddockiq_rank: i + 1,
      score:          s.score,
      components:     s._components || {},
      // Bet tracking — null if no bet was made on this horse
      bet_amount:   matchBet ? matchBet.amount  : null,
      bet_type:     matchBet ? matchBet.type     : null,
      bet_payout:   matchBet ? matchBet.payout   : null,
      // TVG payoffs for all horses (for optimizer ROI calc)
      win_payoff:   tvgPay.winPayoff   || null,
      place_payoff: tvgPay.placePayoff || null,
      show_payoff:  tvgPay.showPayoff  || null,
    });
  });

  if (!results.length) { alert('No finish positions entered.'); return; }

  var status = document.getElementById('results-fetch-status');
  if (status) { status.style.color='var(--blue)'; status.textContent='💾 Saving…'; }

  fetch('/api/results', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ card_id: cardId, race_num: race.n, race_date: raceDate, results: results })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if (data.error) {
      alert('Save failed: ' + data.error);
      if (status) { status.style.color='#e05555'; status.textContent='❌ Save failed: ' + data.error; }
      return;
    }
    document.getElementById('results-modal').remove();
    // Show brief toast
    var toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#0d2010;border:1px solid var(--green);color:var(--green);border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;z-index:9999';
    toast.textContent = '✅ Race ' + race.n + ' results saved (' + data.saved + ' horses)';
    document.body.appendChild(toast);
    setTimeout(function(){ toast.remove(); }, 3500);
  })
  .catch(function(e){ alert('Network error: ' + e.message); });
}

// Day history — persisted across sessions for multi-day graph
var dayHistory = [];  // [{date, track, net, wagered, wins, bets}]
var raceResultsLog = []; // [{date, track, race, algoPickName, algoScore, algoGap, algoConf, betType, betAmt, actualWinner, winPay, placePay, algoPickFinish, won, pnl}]

function saveRaceResultsLog(){
  try{ localStorage.setItem('paddockiq_results_log', JSON.stringify(raceResultsLog)); }catch(e){}
}
function loadRaceResultsLog(){
  try{
    var raw = localStorage.getItem('paddockiq_results_log');
    if(raw) raceResultsLog = JSON.parse(raw);
  }catch(e){ raceResultsLog=[]; }
}

function closeDayAndSave(){
  var pnl = returned - wagered;
  if(wagered === 0){ alert('No bets wagered today — nothing to close.'); return; }
  var today = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  dayHistory.push({
    date: today,
    track: 'OP',
    net: parseFloat(pnl.toFixed(2)),
    wagered: parseFloat(wagered.toFixed(2)),
    wins: bets.filter(function(b){return b.settled&&b.payout>b.amount;}).length,
    bets: bets.filter(function(b){return b.amount>0;}).length,
    bankroll: parseFloat(rem().toFixed(2))
  });
  // Persist day history separately (not cleared by daily reset)
  try{ localStorage.setItem('paddockiq_history', JSON.stringify(dayHistory)); }catch(e){}
  alert('Day closed and saved to history!');
  renderPnL();
}

function exportResultsLog(){
  loadRaceResultsLog();
  if(!raceResultsLog.length){alert('No results logged yet. Parse race results in the PP Parser tab first.');return;}
  var cols=['date','track','race','algoPickName','algoScore','algoGap','algoConf','betType','betAmt',
            'actualWinner','winPay','placePay','pickFinish','won','pnl','surface','bias','fieldSize'];
  var csv=cols.join(',')+'\n';
  raceResultsLog.forEach(function(r){
    csv+=cols.map(function(c){
      var v=r[c]===undefined?'':r[c];
      return typeof v==='string'&&v.indexOf(',')>-1?'"'+v+'"':v;
    }).join(',')+'\n';
  });
  var blob=new Blob([csv],{type:'text/csv'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='paddockiq_results_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

  if(confirm('Clear all stored race results? This cannot be undone.')){

}

   ['Returned','$'+returned.toFixed(2),'var(--green)'],

function settleRace(){
  var raceIdx = parseInt(document.getElementById('s-race').value);
  var raceN   = R[raceIdx].n;
  var winner  = document.getElementById('s-winner').value.trim();
  var winPay  = parseFloat(document.getElementById('s-pay').value)||0;
  var placePay= parseFloat(document.getElementById('s-place').value)||0;
  if(!winner){alert('Select a winner');return;}
  var newRet=0;
  bets.forEach(function(b){
    if(b.race===raceN&&!b.settled){
      b.settled=true;
      var won    = b.horse===winner && winPay>0;
      var placed = b.horse===winner && placePay>0;
      if(b.type==='WIN'){
        b.payout = won?(b.amount/2)*winPay:0;
      } else if(b.type==='WIN/PLACE'||b.type==='WIN / PLACE'){
        var wp=b.amount/2, pp=b.amount/2;
        b.payout = (won?(wp/2)*winPay:0) + (placed?(pp/2)*placePay:0);
      } else {
        // PLACE/SHOW
        b.payout = placed?((b.amount/2)/2)*placePay:0;
      }
      newRet+=b.payout;
    }
  });
  returned+=newRet;
  saveState();
  render();
  alert('Race '+raceN+' settled! Returned: $'+newRet.toFixed(2));
}

function parseRaceTime(t){
  var m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if(!m)return 9999;
  var h=parseInt(m[1]),mn=parseInt(m[2]),ap=m[3].toUpperCase();
  if(ap==='PM'&&h!==12)h+=12;
  if(ap==='AM'&&h===12)h=0;
  return h*60+mn;
}

function rebuildRacesFromEquibase(eqData){
  if(!eqData || !eqData.races || !eqData.races.length) return false;

  // Equibase is authoritative for race count and structure
  // Only preserve horse data for races that are in TODAY's Equibase card
  var today = cardInfo.date || new Date().toLocaleDateString('en-CA',{timeZone:'America/Chicago'});
  var savedDate = '';
  try{ savedDate = (JSON.parse(localStorage.getItem('paddockiq_state')||'{}')||{}).cardInfo && JSON.parse(localStorage.getItem('paddockiq_state')||'{}').cardInfo.date || ''; }catch(e){}
  var isSameDay = !savedDate || savedDate === today;

  // Build lookup of existing horse data
  var existingHorses = {};
  var existingRaces  = {};
  R.forEach(function(r){ existingHorses[r.n] = r.horses; existingRaces[r.n] = r; });

  // Equibase races = today's definitive race list
  var eqRaceNums = eqData.races.map(function(er){return er.n;});
  var mergedRaces = eqData.races.map(function(er){
    var existing = existingRaces[er.n] || {};
    return {
      n:  er.n,
      t:  er.t || existing.t || '',
      d:  er.d || existing.d || '',
      ty: er.ty || existing.ty || '',
      purse: er.purse || '',
      grade: er.grade || existing.grade || 0,
      gradeName: er.gradeName || existing.gradeName || '',
      // Only keep horses if it's the same day — otherwise fresh start
      horses: isSameDay ? (existingHorses[er.n] || []) : []
    };
  });
  // Add back races Equibase skipped (showing RESULTS) BUT only if they match today's date
  // Don't carry over races from yesterday's card
  var today = cardInfo.date || new Date().toLocaleDateString('en-CA',{timeZone:'America/Chicago'});
  var savedDate = (function(){ try{ var st=JSON.parse(localStorage.getItem('paddockiq_state')||'{}'); return (st.cardInfo||{}).date||''; }catch(e){return '';} })();
  var isSameDay = (savedDate === today);
  // Add back completed races (RESULTS on Equibase) from same day only
  // Cap at R20 max to prevent garbage race numbers from date-parsing bugs
  if(isSameDay){
    R.forEach(function(r){
      if(r.n > 0 && r.n <= 20 && eqRaceNums.indexOf(r.n) < 0){
        mergedRaces.push({
          n:r.n, t:r.t||'', d:r.d, ty:r.ty,
          purse:r.purse||'', grade:r.grade||0, gradeName:r.gradeName||'',
          horses:r.horses
        });
      }
    });
  }
  mergedRaces.sort(function(a,b){return a.n-b.n;});

  // First: remove any obviously corrupted times (79:42 PM, times with 'CT' etc)
  mergedRaces.forEach(function(r){
    if(r.t && (parseInt(r.t) > 12 || r.t.indexOf('CT')>-1 || r.t.match(/^\d{2,}:/))){
      console.warn('R'+r.n+' bad time cleared:', r.t);
      r.t = '';
    }
  });

  // Fix times: ensure races are in ascending time order
  // If a race's time is out of order with its neighbors, interpolate
  for(var fi=1; fi<mergedRaces.length-1; fi++){
    var prev = parseRaceTime(mergedRaces[fi-1].t||'');
    var curr = parseRaceTime(mergedRaces[fi].t||'');
    var next = parseRaceTime(mergedRaces[fi+1].t||'');
    if(curr > 0 && prev > 0 && next > 0 && (curr >= next || curr <= prev)){
      // Time is out of order — interpolate between prev and next
      var interp = Math.round((prev + next) / 2);
      var hh = Math.floor(interp/60);
      var mm = interp%60;
      var ap = hh>=12?'PM':'AM';
      if(hh>12)hh-=12; if(hh===0)hh=12;
      mergedRaces[fi].t = hh+':'+(mm<10?'0':'')+mm+' '+ap;
      console.log('R'+mergedRaces[fi].n+' time interpolated to '+mergedRaces[fi].t);
    }
  }

  R = mergedRaces;

  // Update cardInfo
  cardInfo.numRaces = numRaces;
  // Update header
  updateCardHeader();
  // Update race tabs
  renderRaceTabs();

  console.log('R[] rebuilt from Equibase: '+R.length+' races');
  updateCardHeader();
  return true;
}

function equibaseURL(){
  // Build Equibase static entry URL from cardInfo
  // Format: /static/entry/TRACKMMDDYYUSA-EQB.html
  var code = cardInfo && cardInfo.code ? cardInfo.code : 'OP';
  var date = cardInfo && cardInfo.date ? cardInfo.date :
    new Date().toLocaleDateString('en-CA',{timeZone:'America/Chicago'}); // fallback to today
  var parts = date.split('-'); // yyyy-mm-dd
  if(parts.length < 3) return null;
  var yr2 = parts[0].slice(2); // 26
  return 'https://www.equibase.com/static/entry/'+
    code+parts[1]+parts[2]+yr2+'USA-EQB.html';
}

function getTrackTZ(){
  // Get timezone for current track from cardInfo
  if(typeof cardInfo !== 'undefined' && cardInfo.code){
    var tObj = TRACK_LIST.find(function(t){return t.code===cardInfo.code;});
    if(tObj && tObj.tz) return tObj.tz;
  }
  return 'America/Chicago'; // default
}

function getCTMins(){
  // Returns current time in minutes for the active track's timezone
  var tz = getTrackTZ();
  try {
    var now=new Date();
    var parts=new Intl.DateTimeFormat('en-US',{
      timeZone:tz,
      hour:'numeric',minute:'numeric',hour12:false
    }).formatToParts(now);
    var h=parseInt(parts.find(function(p){return p.type==='hour';}).value);
    var m=parseInt(parts.find(function(p){return p.type==='minute';}).value);
    if(isNaN(h)||isNaN(m)) throw new Error('parse fail');
    return h*60+m;
  } catch(e) {
    var now=new Date();
    var utcMs=now.getTime()+now.getTimezoneOffset()*60000;
    var ct=new Date(utcMs-5*3600000);
    return ct.getHours()*60+ct.getMinutes();
  }
}

    'lasix','blinkers','equipment_change',
    // Bet recommendation
    'bet_type','bet_amount','confidence',
    // Actual results (filled after race)
    'actual_finish','won','placed','showed',
    'pick_correct','result_notes'
  ].join(','));

  var date = cardInfo.date || '';
  var track = cardInfo.track || '';

  R.forEach(function(r){
    if(!r.horses.length) return;
    // Score the race
    var scored = scoreRace(R.indexOf(r));
    if(!scored || !scored.length) return;

    // Get actual results for this race
    var actuals = (raceResults && raceResults[r.n]) || [];

    // Get recommended bet for this race
    var topPick = scored[0];
    var secondPick = scored.length>1 ? scored[1] : null;
    var gap = secondPick ? topPick.score - secondPick.score : 999;
    var betType = gap>=8?'WIN':gap>=4?'WIN/PLACE':'PLACE/SHOW';
    var betAmt = topPick.kelly ? Math.round(topPick.kelly) : 0;
    var confidence = gap>=8?'HIGH':gap>=4?'MEDIUM':'LOW';

    scored.forEach(function(s, idx){
      var h = r.horses.find(function(x){return x.name===s.name;});
      if(!h) return;

      // Find actual finish
      var actual = actuals.find(function(a){
        var an = a.name.toLowerCase().replace(/[^a-z]/g,'');
        var hn = h.name.toLowerCase().replace(/[^a-z]/g,'');
        var hd = (h.disp||'').toLowerCase().replace(/[^a-z]/g,'');
        // Exact match first, then partial only if both names are 5+ chars
        if(an===hn||an===hd) return true;
        if(an.length>=5 && hn.length>=5 && (hn.indexOf(an)>-1||an.indexOf(hn)>-1)) return true;
        if(an.length>=5 && hd.length>=5 && (hd.indexOf(an)>-1||an.indexOf(hd)>-1)) return true;
        return false;
      });
      var finish = actual ? actual.finish : '';
      var won   = finish===1?1:0;
      var placed = finish<=2?1:0;
      var showed = finish<=3?1:0;
      var pickCorrect = idx===0&&finish===1?1:0;

      // Extract component scores from scoreRace (we need to re-expose them)
      // Use the raw horse data we have
      var beyer = h.b||0;
      var spd = Math.min(100,Math.max(0,(beyer-60)/70*100))*0.22;
      var jck = (h.j||10)/100*0.06*100;
      var trn = (h.tr||10)/100*0.05*100;

      var esc = function(v){ return '"'+(v||'').toString().replace(/"/g,'""')+'"'; };

      rows.push([
        date, track, r.n,
        esc(r.ty), esc(r.d), r.grade||0,
        esc(h.disp||h.name), h.pp||0, esc(h.ml||''),
        // Scores
        s.score.toFixed(1), idx+1,
        // Components (approximate from horse data)
        spd.toFixed(1), '', '', '', jck.toFixed(1), trn.toFixed(1),
        // Raw inputs
        beyer, h.layoff||0, h.cc||0, h.wins||0, h.j||10, h.tr||10,
        // Angles
        h.eq&&h.eq.lf?1:0, h.eq&&h.eq.bl?1:0, 0, esc(h.distFit||''), esc(h.sty||''),
        // Equipment
        h.eq&&h.eq.lf?1:0, h.eq&&h.eq.bl?1:0, h.eq&&h.eq.bf?1:0,
        // Bet
        idx===0?esc(betType):'', idx===0?betAmt:'', idx===0?esc(confidence):'',
        // Results
        finish, won, placed, showed, pickCorrect, ''
      ].join(','));
    });
  });

  return rows.join('\n');
}

// ── PERSISTENT STORAGE (IndexedDB) ──────────────────────────────────────────
// Uses IndexedDB for true persistence across tab closes and device sleep
// Falls back to localStorage if IndexedDB unavailable

var _idb = null;

function openIDB(){
  return new Promise(function(resolve, reject){
    if(_idb){ resolve(_idb); return; }
    var req = indexedDB.open('paddockiq_db', 1);
    req.onupgradeneeded = function(e){
      var db = e.target.result;
      if(!db.objectStoreNames.contains('state')){
        db.createObjectStore('state', {keyPath:'key'});
      }
    };
    req.onsuccess = function(e){ _idb = e.target.result; resolve(_idb); };
    req.onerror   = function(){ reject(req.error); };
  });
}

async function idbSet(key, value){
  try{
    var db = await openIDB();
    return new Promise(function(resolve, reject){
      var tx = db.transaction('state','readwrite');
      tx.objectStore('state').put({key:key, value:value});
      tx.oncomplete = resolve;
      tx.onerror    = reject;
    });
  }catch(e){
    // Fallback to localStorage
    try{ localStorage.setItem('piq_'+key, JSON.stringify(value)); }catch(le){}
  }
}

async function idbGet(key){
  try{
    var db = await openIDB();
    return new Promise(function(resolve, reject){
      var tx  = db.transaction('state','readonly');
      var req = tx.objectStore('state').get(key);
      req.onsuccess = function(){ resolve(req.result ? req.result.value : null); };
      req.onerror   = reject;
    });
  }catch(e){
    // Fallback to localStorage
    try{
      var v = localStorage.getItem('piq_'+key);
      return v ? JSON.parse(v) : null;
    }catch(le){ return null; }
  }
}

async function persistState(){
  // Save full app state to IndexedDB — survives tab/browser close
  var state = {
    races: R.map(function(r){
      return {n:r.n,t:r.t,d:r.d,ty:r.ty,grade:r.grade||0,gradeName:r.gradeName||'',
        purse:r.purse||'',
        horses:r.horses.map(function(h){
          return {name:h.name,disp:h.disp,pp:h.pp,ml:h.ml,b:h.b,sty:h.sty,
            j:h.j,tr:h.tr,layoff:h.layoff,cc:h.cc,wins:h.wins,notes:h.notes,
            eq:h.eq||{lf:false,bf:false,bl:false},wk:h.wk||[],distFit:h.distFit||'tested',
            // Validate cc — should be in $K (e.g. -10 = drop $10K), cap at ±150
            cc: (function(v){ v=parseInt(v)||0; if(Math.abs(v)>150) v=Math.round(v/1000); return Math.max(-150,Math.min(150,v)); })(h.cc)};
        })};
    }),
    cardInfo:  cardInfo,
    bankroll:  bankroll,
    bets:      bets,
    tc:        tc,
    scratches: scratches,
    savedAt:   new Date().toISOString()
  };
  await idbSet('app_state', state);
  // Also keep localStorage as backup
  try{ localStorage.setItem('paddockiq_state', JSON.stringify(state)); }catch(e){}
}

async function loadPersistedState(){
  // Try IndexedDB first, fall back to localStorage
  var state = await idbGet('app_state');
  if(!state){
    try{
      var ls = localStorage.getItem('paddockiq_state');
      state = ls ? JSON.parse(ls) : null;
    }catch(e){}
  }
  return state;
}

// ── SCRATCH CHECK SYSTEM ─────────────────────────────────────────────────────
var equibaseRosters = {}; // {raceN: [{name,pp,ml,scratched}]} — from Equibase before parse
var scratchCheckTimer   = null;
var lastScratchCheck    = {}; // {raceN: {mins: epochMs}} — tracks each trigger
var scratchedHorses     = {}; // {raceN: ['Horse Name', ...]}
// Trigger thresholds in minutes before post
var SCRATCH_TRIGGERS    = [20, 5, 3, 1]; // check at these MTP marks

function startScratchTimer(){
  if(scratchCheckTimer) clearInterval(scratchCheckTimer);
  scratchCheckTimer = setInterval(function(){
    checkUpcomingRaceScratches();
  }, 60000); // check every 60 seconds
  checkUpcomingRaceScratches(); // also run immediately
}

function checkUpcomingRaceScratches(){
  if(typeof cardInfo === 'undefined' || !cardInfo || !cardInfo.date || !cardInfo.code) return;
  var now = getCTMins();
  var needsCheck = false;

  R.forEach(function(r){
    if(!r.t || !r.horses.length) return;
    var rMins = parseRaceTime(r.t);
    var mtp = rMins - now;
    if(mtp <= 0 || mtp > 20) return; // only within 20 min of post

    var rChecks = lastScratchCheck[r.n] || {};
    // Check each trigger threshold
    SCRATCH_TRIGGERS.forEach(function(trigger){
      if(mtp <= trigger){
        var lastAt = rChecks[trigger] || 0;
        // Only fire once per trigger — if not checked within 2 min of this trigger
        if((Date.now() - lastAt) > 2 * 60000){
          needsCheck = true;
          rChecks[trigger] = Date.now();
          console.log('R'+r.n+': triggering check at MTP '+Math.round(mtp)+' (trigger='+trigger+')');
        }
      }
    });
    lastScratchCheck[r.n] = rChecks;
  });

  if(needsCheck) runEquibaseCheck();
}

async function runEquibaseCheck(){
  var data = await fetchEquibaseData();
  if(!data) return;
  var now = getCTMins();
  var changed = false;

  R.forEach(function(r, ri){
    if(!r.horses.length) return;
    lastScratchCheck[r.n] = Date.now();

    // ── Update post times from Equibase ──────────────────────────────────────
    if(data.postTimes[r.n] && !r.t){
      r.t = data.postTimes[r.n];
      changed = true;
    }

    // ── Apply scratches ───────────────────────────────────────────────────────
    var newScratches = data.scratched[r.n] || [];
    if(newScratches.length){
      var prev = scratchedHorses[r.n] || [];
      scratchedHorses[r.n] = newScratches;
      var added = newScratches.filter(function(n){return prev.indexOf(n)<0;});
      if(added.length){
        added.forEach(function(nm){
          if(scratches.indexOf(nm.toLowerCase())<0) scratches.push(nm.toLowerCase());
        });
        showScratchBanner(r.n, added);
        if(ri===CUR) render();
        changed = true;
      }
    }

    // ── Update odds at 5/3/1 min triggers ───────────────────────────────────
    var rMins = parseRaceTime(r.t);
    var mtp = rMins - now;
    if(mtp > 0 && mtp <= 5 && data.odds[r.n]){
      var oddsChanged = false;
      Object.keys(data.odds[r.n]).forEach(function(hName){
        var horse = r.horses.find(function(h){
          return h.name.toLowerCase().replace(/[^a-z]/g,'') ===
                 hName.toLowerCase().replace(/[^a-z]/g,'');
        });
        if(horse && data.odds[r.n][hName] !== horse.ml){
          horse.ml = data.odds[r.n][hName];
          changed = true;
          oddsChanged = true;
        }
      });
      if(oddsChanged){
        console.log('R'+r.n+' odds updated at MTP '+Math.round(mtp));
        if(ri===CUR){ render(); }
      }
    }
  });

  if(changed){ renderRaceTabs(); saveState(); }
}

async function fetchScratches(ri, race){
  var raceN = race.n;
  lastScratchCheck[raceN] = Date.now();
  // Build DRF URL: /classic/pp-details/MM-DD-YYYY/TRACK/RACE/D/USA
  if(!cardInfo || !cardInfo.date) return;
  var d = cardInfo.date; // yyyy-mm-dd
  var parts = d.split('-');
  var drfDate = parts[1]+'-'+parts[2]+'-'+parts[0]; // MM-DD-YYYY
  var url = 'https://www.drf.com/classic/pp-details/'+drfDate+'/'+cardInfo.code+'/'+raceN+'/D/USA';

  try{
    var resp = await fetch(PROXY_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'fetchDRF', url:url})
    });
    var data = await resp.json();
    if(data.error){ console.warn('Scratch fetch R'+raceN+':', data.error); return; }

    // Parse scratches from returned text
    var text = data.text || data.scratchText || '';
    var newScratches = parseScratchesFromText(text, race);

    if(newScratches.length){
      var prev = scratchedHorses[raceN] || [];
      var added = newScratches.filter(function(n){ return prev.indexOf(n) < 0; });
      scratchedHorses[raceN] = newScratches;
      if(added.length){
        console.log('R'+raceN+' scratch(es):', added.join(', '));
        // Update scratches array
        added.forEach(function(name){
          var nm = name.toLowerCase();
          if(scratches.indexOf(nm) < 0) scratches.push(nm);
        });
        // Re-render current race if it's the affected one
        if(ri === CUR){ render(); }
        else { renderRaceTabs(); }
        showScratchBanner(raceN, added);
      }
    } else {
      // No scratches — clear any old ones for this race
      if((scratchedHorses[raceN]||[]).length){
        scratchedHorses[raceN] = [];
      }
    }
    console.log('R'+raceN+' scratch check OK — '+newScratches.length+' scratched');
  }catch(e){
    console.warn('Scratch check R'+raceN+' error:', e.message);
  }
}

function parseScratchesFromText(text, race){
  // Look for "Scratched Horses - None" or "Scratched Horses - Name1, Name2"
  var scratchLine = text.match(/Scratched Horses\s*[-—:]\s*([^\n\r]+)/i);
  if(!scratchLine) return [];
  var val = scratchLine[1].trim();
  if(/none/i.test(val)) return [];

  // Split on comma or semicolon, clean each name
  var names = val.split(/[,;]/).map(function(n){ return n.trim(); }).filter(Boolean);

  // Fuzzy match against actual horses in the race to handle minor name differences
  var matched = [];
  names.forEach(function(scr){
    var scrLow = scr.toLowerCase().replace(/[^a-z0-9 ]/g,'');
    // Direct match first
    var horse = race.horses.find(function(h){
      var hn2=h.name.toLowerCase().replace(/[^a-z0-9 ]/g,''); var hd2=(h.disp||'').toLowerCase().replace(/[^a-z0-9 ]/g,''); return hn2===scrLow||hd2===scrLow;
    });
    // Partial match fallback
    if(!horse) horse = race.horses.find(function(h){
      var hn3=h.name.toLowerCase().replace(/[^a-z0-9 ]/g,''); return hn3.length>=5&&scrLow.length>=5&&(hn3.includes(scrLow)||scrLow.includes(hn3));
    });
    if(horse) matched.push(horse.name);
    else matched.push(scr); // keep original if no match found
  });
  return matched;
}

function showScratchBanner(raceN, names){
  var existing = document.getElementById('scratch-banner');
  if(!existing){
    existing = document.createElement('div');
    existing.id = 'scratch-banner';
    existing.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:9999;background:#2e0a0a;border:1px solid var(--red);color:var(--red);border-radius:8px;padding:10px 20px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,0.5);max-width:500px;text-align:center';
    document.body.appendChild(existing);
  }
  existing.innerHTML = '🚫 SCRATCH — Race '+raceN+': <b>'+names.join(', ')+'</b> <span style="color:var(--dim);font-size:11px;margin-left:8px">Rankings updated</span>';
  existing.style.display = 'block';
  // Auto-hide after 12 seconds
  setTimeout(function(){ if(existing) existing.style.display='none'; }, 12000);
}

async function manualScratchCheck(){
  var btn = document.getElementById('scratch-check-btn');
  if(btn){ btn.textContent = '🔄 Checking...'; btn.disabled = true; }
  R.forEach(function(r){ lastScratchCheck[r.n] = 0; }); // force re-check
  await runEquibaseCheck();
  if(btn){ btn.textContent = '🔍 Check Scratches'; btn.disabled = false; }
  renderRaceTabs(); render();
}

function renderRaceTabs(){
  var el=document.getElementById('race-tabs');
  var ctMins=getCTMins();
  var nextIdx=-1;
  for(var ri=0;ri<R.length;ri++){
    if(parseRaceTime(R[ri].t)>ctMins){nextIdx=ri;break;}
  }
  var html='<span style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-right:2px">Race:</span>';
  R.forEach(function(r,i){
    var rMins=parseRaceTime(r.t);
    var isPast=rMins<=ctMins-25; // past = post time was 25+ min ago
    var isNext=i===nextIdx;
    var style='';
    var cls='rtab'+(CUR===i?' on':'')+(isPast?' past':isNext?' nxt':'');
    if(isPast){
      style='border-color:#552020;color:#884444;text-decoration:line-through;opacity:.6';
    } else if(isNext){
      style='border-color:var(--green);background:#0d2010;color:var(--green);font-weight:600';
    }
    // Checkmark for past races
    // If graded stakes, show grade instead of generic badge
    var badge = r.grade ? 'G'+r.grade : raceTypeBadge(r.ty);
    var badgeColor = r.grade ? '#f0c850' : raceTypeBadgeColor(badge);
    var badgeHtml = badge ? ' <span style="font-size:9px;color:'+badgeColor+';opacity:0.9">'+badge+'</span>' : '';
    var timeStr = r.t || '–:– –M';
    var label=(isPast?'&#10003; ':'')+r.n+' &middot; '+timeStr+badgeHtml;
    html+='<button class="'+cls+'" onclick="goRace('+i+')" style="'+style+'">'+label+'</button>';
  });
  el.innerHTML=html;
}

// ── Per-Track Jockey/Trainer Stats Store ────────────────────────────────────
// Persists jockey & trainer meet win% per track in localStorage.
// Format: { 'OP': { jockeys: { 'Jon Court': {pct:18,starts:120,wins:22,updated:'2026-03-28'} }, trainers: {...} }, 'KEE': {...} }
// Updated every time a card is loaded — latest win% always wins.

var JOCK_STATS_KEY = 'paddockiq_jock_stats';

function loadJockStats() {
  try { return JSON.parse(localStorage.getItem(JOCK_STATS_KEY) || '{}'); }
  catch(e) { return {}; }
}

function saveJockStats(stats) {
  try { localStorage.setItem(JOCK_STATS_KEY, JSON.stringify(stats)); }
  catch(e) { console.warn('Failed to save jock stats', e); }
}

// Ingest jockey/trainer data from a newly loaded card into the persistent store
function ingestCardJockStats(races, trackCode) {
  if (!races || !trackCode) return;
  var stats = loadJockStats();
  if (!stats[trackCode]) stats[trackCode] = { jockeys: {}, trainers: {} };
  var ts = stats[trackCode];
  var today = new Date().toISOString().slice(0, 10);

  races.forEach(function(race) {
    (race.horses || []).forEach(function(h) {
      // Jockey
      var jName = h.jockeyName || h.jName;
      var jPct  = h.jockMeetWinPct != null ? h.jockMeetWinPct : (h.j != null ? h.j / 100 : null);
      if (jName && jPct != null) {
        var existing = ts.jockeys[jName];
        // Always update — latest card has freshest meet stats
        ts.jockeys[jName] = {
          pct:     Math.round(jPct * 100 * 10) / 10,  // e.g. 18.5
          updated: today
        };
      }
      // Trainer
      var tName = h.trainerName || h.tName;
      var tPct  = h.trnrMeetWinPct != null ? h.trnrMeetWinPct : (h.tr != null ? h.tr / 100 : null);
      if (tName && tPct != null) {
        ts.trainers[tName] = {
          pct:     Math.round(tPct * 100 * 10) / 10,
          updated: today
        };
      }
    });
  });

  saveJockStats(stats);
}

// Get jockey win% for a name at a given track — returns pct (0-100) or null
function getJockPct(jockeyName, trackCode) {
  if (!jockeyName || !trackCode) return null;
  var stats = loadJockStats();
  var ts = stats[trackCode];
  if (!ts) return null;
  var entry = ts.jockeys[jockeyName];
  return entry ? entry.pct : null;
}

function getTrainerPct(trainerName, trackCode) {
  if (!trainerName || !trackCode) return null;
  var stats = loadJockStats();
  var ts = stats[trackCode];
  if (!ts) return null;
  var entry = ts.trainers[trainerName];
  return entry ? entry.pct : null;
}

// Returns sorted leaderboard { jockeys: [...], trainers: [...] } for a track
function getTrackLeaderboard(trackCode) {
  var stats = loadJockStats();
  var ts = stats[trackCode];
  if (!ts) return { jockeys: [], trainers: [] };
  var jockeys = Object.entries(ts.jockeys)
    .map(function(e) { return { name: e[0], pct: e[1].pct, updated: e[1].updated }; })
    .sort(function(a,b) { return b.pct - a.pct; });
  var trainers = Object.entries(ts.trainers)
    .map(function(e) { return { name: e[0], pct: e[1].pct, updated: e[1].updated }; })
    .sort(function(a,b) { return b.pct - a.pct; });
  return { jockeys: jockeys, trainers: trainers };
}

async function parseResultsFromClipboard(){
  var key=document.getElementById('pp-api-key').value.trim();
  if(!key){document.getElementById('results-status').textContent='Enter API key in the PP Parser tab first.';return;}

  var userContent=[];
  var prompt='Extract horse racing results from this document. Return a JSON array:\n'+
    '[{race:number, winner:string, second:string, third:string, winPay:number, placePay:number, showPay:number}]\n'+
    'Payouts are $2 mutuels as numbers (e.g. 7.40). Use 0 if unavailable.\n'+
    'Return ONLY valid JSON array, no markdown, no preamble.';

  if(resMode==='pdf'&&(resPdfText||resPdfBase64)){
    if(resPdfText){
      userContent=[{type:'text',text:prompt+'\n\nRESULTS TEXT (extracted from PDF):\n'+resPdfText}];
    } else {
      userContent=[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:resPdfBase64}},
        {type:'text',text:prompt}
      ];
    }
  } else {
    // Text mode
    var text=document.getElementById('results-raw').value.trim();
    if(!text||text.length<20){
      try{
        text=await navigator.clipboard.readText();
        var ta=document.getElementById('results-raw');
        if(ta){ta.value=text;ta.style.display='';}
      }catch(e){
        document.getElementById('results-status').textContent='Paste results text in the box, or switch to PDF Upload mode.';
        return;
      }
    }
    userContent=[{type:'text',text:prompt+'\n\nRESULTS:\n'+text}];
  }

  document.getElementById('results-status').textContent='Parsing results...';
  try{
    var resp=await fetch(PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-beta':'pdfs-2024-09-25'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:5120,messages:[{role:'user',content:userContent}]})
    });
    var data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    var raw=data.content[0].text.trim().replace(/```json|```/g,'').trim();
    var match=raw.match(/\[[\s\S]*\]/); if(match)raw=match[0];
    var results=JSON.parse(raw);

    loadRaceResultsLog();
    var today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    var trackSel=document.getElementById('res-track');
    var track=trackSel?trackSel.value:'OP';
    var settled=0;

    results.forEach(function(r){
      // 1. Auto-settle bets
      bets.forEach(function(b){
        if(b.race===r.race&&!b.settled){
          b.settled=true;
          var won=b.horse.toLowerCase()===r.winner.toLowerCase();
          var placed=b.horse.toLowerCase()===r.winner.toLowerCase();
          if(b.type==='WIN'){
            b.payout=won&&r.winPay?(b.amount/2)*r.winPay:0;
          } else if(b.type==='WIN/PLACE'||b.type==='WIN / PLACE'){
            b.payout=(won&&r.winPay?(b.amount/4)*r.winPay:0)+(placed&&r.placePay?(b.amount/4)*r.placePay:0);
          } else {
            b.payout=placed&&r.placePay?(b.amount/4)*r.placePay:0;
          }
          if(b.payout>0){returned+=b.payout;settled++;}
        }
      });

      // 2. Store full algo context for calibration
      var ri=R.findIndex(function(race){return race.n===r.race;});
      if(ri<0)return;
      var sc=scoreRace(ri);
      if(!sc.length)return;
      var cf=conf(sc);
      var gap=sc.length>1?sc[0].score-sc[1].score:0;
      var top=sc[0];
      var topBet=bets.find(function(b){return b.race===r.race&&b.horse===top.name;});
      var pickFinish=top.name.toLowerCase()===r.winner.toLowerCase()?1:
                     top.name.toLowerCase()===(r.second||'').toLowerCase()?2:
                     top.name.toLowerCase()===(r.third||'').toLowerCase()?3:0;
      var entry={
        date:today, track:track, race:r.race,
        algoPickName:top.horse?(top.horse.disp||top.name):top.name,
        algoScore:top.score, algoGap:gap, algoConf:cf,
        betType:topBet?topBet.type:(cf==='high'?'WIN':cf==='medium'?'WIN/PLACE':'PLACE/SHOW'),
        betAmt:topBet?topBet.amount:0,
        actualWinner:r.winner, winPay:r.winPay||0,
        placePay:r.placePay||0, showPay:r.showPay||0,
        second:r.second||'', third:r.third||'',
        pickFinish:pickFinish, won:pickFinish===1,
        pnl:topBet?parseFloat((topBet.payout-topBet.amount).toFixed(2)):0,
        surface:tc.surface, bias:tc.bias, fieldSize:sc.length
      };
      var ex=raceResultsLog.findIndex(function(e){return e.date===today&&e.track===track&&e.race===r.race;});
      if(ex>-1)raceResultsLog[ex]=entry; else raceResultsLog.push(entry);
    });

    saveRaceResultsLog();
    saveState();
    render();

    document.getElementById('results-status').innerHTML=
      '<span style="color:var(--green)">✓ '+results.length+' races parsed · '+settled+' bets settled · saved to history log</span><br>'+
      '<span style="font-size:11px;color:var(--muted)">'+
      results.map(function(r){
        var ri=R.findIndex(function(race){return race.n===r.race;});
        var top=ri>=0?scoreRace(ri)[0]:null;
        var hit=top&&top.name.toLowerCase()===r.winner.toLowerCase();
        return '<span style="color:'+(hit?'var(--green)':'var(--red)')+'">R'+r.race+': '+r.winner+' $'+r.winPay+'</span>';
      }).join(' · ')+
      '</span>';
  }catch(e){
    var emsg2=e.message||'';
    if(emsg2.toLowerCase().indexOf('fetch')>-1||emsg2.toLowerCase().indexOf('network')>-1){
      document.getElementById('results-status').innerHTML='<span style="color:var(--red)">\u26a0 Connection blocked — host the app at https:// (e.g. Netlify) to enable API calls from a tablet or phone.</span>';
    } else {
      document.getElementById('results-status').textContent='Parse error: '+emsg2;
    }
  }
}

var LS_KEY='paddockiq_state';

function saveState(){
  persistState().catch(function(e){});
  try{
    var racesData=R.map(function(r){return {n:r.n,t:r.t,d:r.d,ty:r.ty,grade:r.grade||0,gradeName:r.gradeName||'',horses:r.horses.map(function(h){
      return {name:h.name,disp:h.disp,pp:h.pp,ml:h.ml,b:h.b,sty:h.sty,
        j:h.j,tr:h.tr,layoff:h.layoff,cc:h.cc,wins:h.wins,notes:h.notes,
        eq:h.eq||{lf:false,bf:false,bl:false},wk:h.wk||[]};
    })};});
    var state={
      bankroll:bankroll,
      wagered:wagered,
      returned:returned,
      scratches:scratches,
      bets:bets,
      tc:tc,
      apiKey:ppApiKey,
      proxyUrl:PROXY_URL,
      races:racesData,
      savedAt:new Date().toISOString(),
      appVersion:APP_VERSION
    };
    localStorage.setItem(LS_KEY,JSON.stringify(state));
  }catch(e){console.warn('Save failed:',e);}
}

function applyLoadedState(state){
  if(!state) return;
  if(state.races && state.races.length){
    R = state.races.map(function(sr){
      var ri = R.findIndex(function(r){return r.n===sr.n;});
      return {
        n:sr.n, t:sr.t||'', d:sr.d||'', ty:sr.ty||'',
        grade:sr.grade||0, gradeName:sr.gradeName||'',
        purse:sr.purse||'',
        horses:(sr.horses||[]).map(function(h){
          // Sanitize legacy eq data: lf was wrongly set for "on lasix" — move to lo
          var rawEq = h.eq||{lf:false,bf:false,bl:false};
          var eq = {
            lf: rawEq.lf && rawEq.lo ? rawEq.lf : false,  // keep lf only if lo also set (genuine first-time)
            lo: rawEq.lo || (rawEq.lf && !rawEq.lo),       // migrate old lf→lo
            bf: rawEq.bf||false,
            bl: rawEq.bl||false
          };
          // Sanitize legacy distFit
          var distFit = h.distFit==='csv' ? 'tested' : (h.distFit||'tested');
          return {name:h.name||'',disp:h.disp||h.name||'',pp:parseInt(h.pp)||0,
            ml:h.ml||'5-1',b:parseInt(h.b)||0,sty:h.sty||'Midpack',
            j:parseInt(h.j)||10,tr:parseInt(h.tr)||10,wins:parseInt(h.wins)||0,
            notes:h.notes||'',layoff:h.layoff!=null?parseInt(h.layoff):null,cc:parseInt(h.cc)||0,
            eq:eq,wk:h.wk||[],distFit:distFit,
            // Validate cc — should be in $K (e.g. -10 = drop $10K), cap at ±150
            cc: (function(v){ v=parseInt(v)||0; if(Math.abs(v)>150) v=Math.round(v/1000); return Math.max(-150,Math.min(150,v)); })(h.cc)};
        })
      };
    });
  }
  if(state.cardInfo){
    cardInfo.track    = state.cardInfo.track   || cardInfo.track;
    cardInfo.code     = state.cardInfo.code    || cardInfo.code;
    cardInfo.date     = state.cardInfo.date    || cardInfo.date;
    cardInfo.numRaces = state.cardInfo.numRaces|| cardInfo.numRaces;
    cardInfo.tz       = state.cardInfo.tz      || cardInfo.tz;
  }
  if(state.bankroll)  bankroll  = state.bankroll;
  if(state.bets)      bets      = state.bets;
  if(state.tc)        Object.assign(tc, state.tc);
  if(state.scratches) scratches = state.scratches;
  if(state.ppApiKey)  ppApiKey  = state.ppApiKey;
}

function loadState(){
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(!raw)return;
    var state=JSON.parse(raw);
    // Wipe state if app version changed (clears stale bankroll etc)
    if(state.appVersion!==APP_VERSION){
      localStorage.removeItem(LS_KEY);
      return;
    }
    // Only restore if same day
    var savedDay=state.savedAt?state.savedAt.slice(0,10):'';
    var today=new Date().toISOString().slice(0,10);
    if(savedDay!==today){
      localStorage.removeItem(LS_KEY);
      return;
    }
    // Only restore bankroll/wagered/returned if the save looks like a real session
    if(state.bankroll&&state.bankroll!==DEFAULT_BANKROLL)bankroll=state.bankroll;
    if(state.wagered!==undefined)wagered=state.wagered;
    if(state.returned!==undefined)returned=state.returned;
    if(state.scratches)scratches=state.scratches;
    if(state.bets)bets=state.bets;
    if(state.tc)tc=state.tc;
    if(state.apiKey)ppApiKey=state.apiKey;
    if(state.proxyUrl)PROXY_URL=state.proxyUrl;
    if(state.cardInfo){
      Object.assign(cardInfo,state.cardInfo);
      // Ensure tz is set from TRACK_LIST if not saved
      if(!cardInfo.tz && cardInfo.code){
        var tObj=TRACK_LIST.find(function(t){return t.code===cardInfo.code;});
        if(tObj) cardInfo.tz=tObj.tz;
      }
    }
    // Restore parsed horse data
    if(state.races&&state.races.length){
      state.races.forEach(function(saved){
        var ri=R.findIndex(function(r){return r.n===saved.n;});
        if(ri>=0){
          if(saved.horses&&saved.horses.length) R[ri].horses=saved.horses.map(function(h){
            var eq=h.eq||{lf:false,lo:false,bf:false,bl:false};
            if(eq.lf&&!eq.lo){ eq=Object.assign({},eq,{lo:true,lf:false}); }
            var distFit=h.distFit==='csv'?'tested':(h.distFit||'tested');
            return Object.assign({},h,{eq:eq,distFit:distFit});
          });
          if(saved.t) R[ri].t=saved.t;
          if(saved.d) R[ri].d=saved.d;
          if(saved.ty) R[ri].ty=saved.ty;
          if(saved.grade) R[ri].grade=saved.grade;
          if(saved.gradeName) R[ri].gradeName=saved.gradeName;
        }
      });
    }
    console.log('PaddockIQ state restored from',savedDay);
  }catch(e){
    // If anything goes wrong, clear corrupted state and start fresh
    console.warn('Load failed, clearing state:',e);
    localStorage.removeItem(LS_KEY);
  }
}

// Core multi-file processor — handles both browse and drag-drop
async function processCSVFiles(files) {
  var queue = document.getElementById('csv-queue');
  if (!queue) return;

  // Get track override if set
  var overrideSel = document.getElementById('csv-track-override');
  var trackOverride = overrideSel ? overrideSel.value : '';

  // Build queue UI rows
  queue.innerHTML = '<div style="font-size:11px;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:8px">Processing '+files.length+' file'+(files.length>1?'s':'')+'…</div>'+
    files.map(function(f, i) {
      return '<div id="qrow_'+i+'" style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px">'+
        '<span style="font-size:11px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+f.name+'</span>'+
        '<span id="qstatus_'+i+'" style="font-size:11px;color:var(--dim)">⏳ Queued</span>'+
      '</div>';
    }).join('');

  var loadedAny = false;
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    var statusEl = document.getElementById('qstatus_'+i);
    if (statusEl) { statusEl.style.color='#6aabbb'; statusEl.textContent='⏳ Parsing…'; }

    try {
      var text = await new Promise(function(res, rej) {
        var r = new FileReader();
        r.onload = function(e) { res(e.target.result); };
        r.onerror = rej;
        r.readAsText(file);
      });

      var cardState = parseSFCSV(text);
      if (!cardState || !cardState.races.length) throw new Error('No races found — make sure this is a DRF _sf.csv Selections File');

      // Apply track override if set
      if (trackOverride) {
        var tObj = TRACK_LIST.find(function(t){ return t.code === trackOverride; });
        cardState.track     = trackOverride;
        cardState.trackName = tObj ? tObj.name : trackOverride;
        if (cardState.cardInfo) {
          cardState.cardInfo.code  = trackOverride;
          cardState.cardInfo.track = tObj ? tObj.name : trackOverride;
        }
      }

      var totalHorses = cardState.races.reduce(function(a,r){ return a+r.horses.length; }, 0);
      var d = new Date(cardState.date+'T12:00:00');
      var label = cardState.trackName + ' - ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();

      if (statusEl) { statusEl.style.color='var(--blue)'; statusEl.textContent='💾 Saving to Neon…'; }

      // Save to Neon
      var resp = await fetch('/api/cards', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          track: cardState.track, raceDate: cardState.date,
          numRaces: cardState.races.length, label: label, data: cardState
        })
      });
      var result = await resp.json();

      // Ingest jockey/trainer stats for this track
      ingestCardJockStats(cardState.races, cardState.track);

      var savedId = result.ok ? result.id : null;

      // Load the last file (most recently dropped) into the active view
      // For multiple files, load the last one — user can switch via dropdown
      if (i === files.length - 1) {
        loadCSVCard(cardState);
        if (savedId) window._loadedCardId = savedId;
        loadedAny = true;
      }

      if (statusEl) {
        statusEl.style.color = 'var(--green)';
        statusEl.innerHTML = savedId
          ? '✅ '+cardState.races.length+' races · '+totalHorses+' horses · saved id:'+savedId
          : '⚠️ Loaded but not saved';
      }

      // Update row to show track badge
      var row = document.getElementById('qrow_'+i);
      if (row) {
        var prof = TRACK_PROFILES[cardState.track];
        var biasColor = prof ? (prof.bias==='speed'?'#d4904a':prof.bias==='closer'?'#6aabbb':'#888') : '#888';
        row.querySelector('span').insertAdjacentHTML('afterend',
          '<span style="font-size:10px;padding:1px 7px;border-radius:20px;border:1px solid '+biasColor+';color:'+biasColor+';white-space:nowrap">'+cardState.track+'</span>'
        );
      }

    } catch (err) {
      console.error('[CSV Import]', err);
      if (statusEl) { statusEl.style.color='#e05555'; statusEl.textContent='❌ '+err.message; }
    }
  }

  // Refresh saved cards dropdown after all files processed
  await loadSavedCardList();

  // If multiple files, add a "load a different one" hint
  if (files.length > 1 && loadedAny) {
    var hint = document.createElement('div');
    hint.style.cssText = 'font-size:11px;color:var(--dim);margin-top:8px;padding:6px 10px;background:var(--bg2);border-radius:6px;border:1px solid var(--border)';
    hint.innerHTML = '💡 Last file loaded into view. Use the <strong style="color:var(--gold)">Saved Cards</strong> dropdown below to switch between cards.';
    queue.appendChild(hint);
  }
}


async function saveCardToServer(){
  var btn=document.getElementById("save-card-btn"),st=document.getElementById("save-card-status");
  if(!R.some(function(r){return r.horses.length>0;})){if(st)st.textContent="No parsed card.";return;}
  if(btn){btn.disabled=true;btn.textContent="Saving...";}
  try{
    var raceDate=(cardInfo&&cardInfo.date)?cardInfo.date:new Date().toLocaleDateString("en-CA",{timeZone:"America/Chicago"});
    var track=(cardInfo&&cardInfo.code)?cardInfo.code:"OP";
    var trackName=(cardInfo&&cardInfo.track)?cardInfo.track:"Oaklawn Park";
    var p=raceDate.split("-"),months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var label=trackName+" - "+months[parseInt(p[1])-1]+" "+parseInt(p[2]);
    var resp=await fetch("/api/cards",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({track:track,raceDate:raceDate,numRaces:R.filter(function(r){return r.horses.length>0;}).length,label:label,data:JSON.stringify({cardInfo:cardInfo,races:R,scratches:scratches})})});
    var data=await resp.json();
    if(data.ok){if(st)st.innerHTML='<span style="color:var(--green)">Saved: '+label+'</span>';await loadSavedCardList();}
  }catch(e){if(st)st.innerHTML='<span style="color:var(--red)">Error: '+e.message+'</span>';}
  if(btn){btn.disabled=false;btn.textContent="Save Card";}
}
async function loadSavedCardList(){
  try{
    var resp=await fetch("/api/cards"),cards=await resp.json();
    var sel=document.getElementById("saved-cards-sel");
    if(!sel||!Array.isArray(cards))return;
    // Use the manual track filter dropdown — NOT cardInfo.code
    // This way loading a new card doesn't hijack the filter
    var filterSel=document.getElementById('cards-track-filter');
    var filterCode=filterSel?filterSel.value:'';
    var filtered=filterCode ? cards.filter(function(c){ return c.track===filterCode; }) : cards;
    if(filtered.length===0) filtered=cards;
    var today=new Date().toLocaleDateString("en-CA",{timeZone:"America/Chicago"});
    sel.innerHTML='<option value="">Select saved card ('+(filtered.length)+')</option>'+filtered.map(function(c){
      // Show track code prefix when showing all tracks
      var prefix=!filterCode&&c.track ? '['+c.track+'] ' : '';
      var flag=c.raceDate===today?" ● TODAY":c.raceDate>today?" UPCOMING":" past";
      return '<option value="'+c.id+'">'+ prefix +c.label+flag+'</option>';
    }).join("");
    // Only auto-load if no card is currently loaded
    if(!R.some(function(r){return r.horses.length>0;})){
      var auto=filtered.find(function(c){return c.raceDate===today;})||filtered.find(function(c){return c.raceDate>=today;});
      if(auto)await loadCardById(auto.id);
    }
  }catch(e){console.warn(e);}
}
async function loadCardById(id){
  try{
    var resp=await fetch("/api/cards?id="+id),card=await resp.json();
    if(!card||!card.data)return;
    var saved=JSON.parse(card.data);
    if(saved.cardInfo){if(!cardInfo)cardInfo={};Object.assign(cardInfo,saved.cardInfo);}
    if(saved.races&&saved.races.length){
      // Sanitize legacy Neon data on load
      R=saved.races.map(function(race){
        return Object.assign({},race,{
          horses:(race.horses||[]).map(function(h){
            var eq=h.eq||{lf:false,lo:false,bf:false,bl:false};
            // Legacy: lf was set for "on lasix" not "first time" — move to lo
            if(eq.lf&&!eq.lo){ eq=Object.assign({},eq,{lo:true,lf:false}); }
            // Legacy: distFit:'csv' → 'tested' as safe default
            var distFit=h.distFit==='csv'?'tested':(h.distFit||'tested');
            return Object.assign({},h,{eq:eq,distFit:distFit});
          })
        });
      });
    }
    if(saved.scratches)scratches=saved.scratches;
    window._loadedCardId=id;
    // Persist jockey/trainer stats for this track
    var _tCode=(saved.cardInfo&&saved.cardInfo.code)?saved.cardInfo.code:null;
    if(_tCode) ingestCardJockStats(saved.races, _tCode);
    updateCardHeader();renderRaceTabs();goRace(0);render();
    var st=document.getElementById("save-card-status");
    if(st)st.innerHTML='<span style="color:var(--green)">Loaded: '+card.label+'</span>';
    document.querySelectorAll(".ntab").forEach(function(b){if(b.textContent.indexOf("Rankings")>-1)b.click();});
  }catch(e){console.warn(e);}
}
async function loadSelectedCard(){
  var sel=document.getElementById("saved-cards-sel");
  if(!sel||!sel.value)return;
  await loadCardById(parseInt(sel.value));
}
