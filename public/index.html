<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Paddock IQ — Oaklawn Park — Mar 20, 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080810;--bg2:#0d0d18;--bg3:#111120;--border:#1e1e30;--gold:#d4af37;--gold2:#f0c850;--green:#4ec97e;--blue:#7b8df8;--red:#e05555;--purple:#b48cf8;--text:#e8e4d8;--muted:#888;--dim:#444}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);font-size:14px;min-height:100vh}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
input{font-family:'DM Sans',sans-serif}
.mono{font-family:monospace}
.bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:2px}

/* Layout */
#hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;min-height:52px;flex-wrap:wrap;gap:8px}
#main{max-width:1060px;margin:0 auto;padding:16px}

/* Race tabs */
#race-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.rtab{padding:4px 11px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:transparent;color:var(--dim);transition:all .15s}
.rtab:hover{border-color:var(--gold);color:var(--gold)}
.rtab.on{border-color:var(--gold);background:#2a2010;color:var(--gold)}
.rtab.past{border-color:#552020;color:#884444;text-decoration:line-through;opacity:.6}
.rtab.nxt{border-color:var(--green);background:#0d2010;color:var(--green);font-weight:600}

/* Nav tabs */
#nav-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;overflow-x:auto;gap:0}
.ntab{padding:9px 14px;font-size:13px;font-weight:500;color:var(--dim);border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;transition:all .15s}
.ntab:hover{color:var(--muted)}
.ntab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* Cards */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.card-gold{background:linear-gradient(135deg,#14120a,#111120);border:1px solid var(--gold);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.ctitle{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold);margin-bottom:10px}
.slabel{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}

/* Stat boxes */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px}
.stat-l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.stat-v{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}

/* Badges / pills */
.pill{display:inline-block;padding:2px 9px;border-radius:20px;border:1px solid var(--border);font-size:11px;background:transparent;color:var(--dim);white-space:nowrap;transition:all .15s}
.pill:hover{border-color:var(--gold);color:var(--gold)}
.pill.on{border-color:var(--gold);background:#2a2010;color:var(--gold)}
.pill.on-g{border-color:var(--green);background:#0d2010;color:var(--green)}
.pill.on-b{border-color:var(--blue);background:#1a1a2e;color:var(--blue)}
.pill.on-r{border-color:var(--red);background:#2e1010;color:var(--red)}
.pill.on-p{border-color:var(--purple);background:#1a1030;color:var(--purple)}
.badge-h{padding:2px 8px;border-radius:20px;font-size:10px;background:#0d2010;color:var(--green);border:1px solid #1a4020}
.badge-m{padding:2px 8px;border-radius:20px;font-size:10px;background:#2a2010;color:#d4b55a;border:1px solid #4a3820}
.badge-l{padding:2px 8px;border-radius:20px;font-size:10px;background:#2a1010;color:#d47a5a;border:1px solid #4a2820}

/* Btn */
.btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;transition:all .15s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.on{border-color:var(--gold);background:#2a2010;color:var(--gold)}
.btn-green{background:#0d2010;border:1px solid #1a4020;color:var(--green);padding:5px 14px;border-radius:7px;font-size:12px}

/* Input */
.inp{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 9px;font-size:13px}
.inp:focus{outline:none;border-color:var(--gold)}

/* Horse rank cards */
.hcard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden}
.hcard-row{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;transition:background .1s}
.hcard-row:hover{background:#111120}
.hcard-detail{padding:0 12px 12px;border-top:1px solid var(--border)}
.hcard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:5px;margin:8px 0}
.hcard-stat{background:var(--bg);border:1px solid #1a1a2e;border-radius:5px;padding:5px 8px}
.hcard-stat-l{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.hcard-stat-v{font-size:12px;font-weight:600;color:var(--text);margin-top:1px}

/* Progress bar */
.pbar{height:4px;background:#1a1a2e;border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--gold2))}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;padding:5px 8px;text-align:left;border-bottom:1px solid var(--border)}
.tbl td{padding:6px 8px;border-bottom:1px solid #0d0d18;vertical-align:middle}
.tbl tr.scr td{opacity:.4;text-decoration:line-through}

/* Track bar */
#tc-bar{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:8px 14px;margin:0 -14px 10px;}
#tc-content{display:none;margin-top:10px;display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
#tc-content.open{display:grid}

/* Alloc row */
.alloc-row{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:5px}

/* Note / warn boxes */
.note-box{background:#0d1a0d;border:1px solid #1a3a1a;border-radius:7px;padding:8px 11px;font-size:11px;color:var(--green);line-height:1.6;margin-top:8px}
.warn-box{background:#1a0d0d;border:1px solid #3a1a1a;border-radius:7px;padding:8px 11px;font-size:11px;color:#d47a5a;line-height:1.6;margin-top:8px}

/* Kaci */
.kaci-panel{background:#0d1020;border-radius:8px;padding:10px 12px;margin-top:8px}
.kaci-cat{background:var(--bg);border-radius:6px;padding:8px 10px}
.kaci-cat-l{font-size:10px;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.kaci-cat-d{font-size:10px;color:var(--dim);margin-bottom:6px}
.kaci-opts{display:flex;gap:3px}
.kopt{flex:1;padding:5px 2px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);transition:all .1s;min-height:32px}
.kopt:hover{border-color:var(--purple);color:var(--purple)}
.kopt.on{border-color:var(--purple);background:#2a1a4e;color:#c49bf4}
/* Kaci inline strip on main card row */
.kaci-strip{display:flex;gap:4px;padding:6px 12px 8px 12px;background:#09090f;border-top:1px solid #1a1a2e;align-items:center;flex-wrap:wrap}
.kaci-strip-label{font-size:10px;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;min-width:60px}
.kstrip-btn{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);transition:all .1s;min-height:30px}
.kstrip-btn:hover{border-color:var(--purple);color:var(--purple)}
.kstrip-btn.on{border-color:var(--purple);background:#2a1a4e;color:#c49bf4}
/* Tablet touch targets */
@media(max-width:768px){
  .ntab{padding:10px 12px;font-size:12px}
  .rtab{padding:6px 12px;font-size:12px;min-height:34px}
  .hcard-row{padding:12px 14px}
  .kopt{min-height:38px;font-size:12px}
  .kstrip-btn{min-height:36px;font-size:12px;padding:6px 12px}
  .btn{min-height:36px;padding:8px 16px}
  .inp{min-height:36px;font-size:14px}
}

/* Pace */
.pace-bar{display:flex;height:24px;border-radius:6px;overflow:hidden;margin:6px 0}
.pace-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;opacity:.8}
.proj-bar{height:5px;background:#1a1a2e;border-radius:3px;overflow:hidden;flex:1;min-width:50px}
.proj-fill{height:100%;border-radius:3px}

/* Multi-race */
.leg-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.leg-horse{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:6px;cursor:pointer;margin-bottom:3px;border:1px solid var(--border);transition:all .1s}
.leg-horse:hover{border-color:var(--gold)}
.leg-horse.sel{background:#1a2a10;border-color:#2a4e1a}
.leg-chk{width:14px;height:14px;border-radius:3px;border:1px solid var(--dim);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.leg-chk.on{background:var(--green);border-color:var(--green);color:#000}

/* Responsive */
@media(max-width:600px){
  .hcard-grid{grid-template-columns:repeat(3,1fr)}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<div id="hdr">
  <div>
    <div class="bebas" style="font-size:24px;color:var(--gold);letter-spacing:1px">PaddockIQ</div>
    <div id="hdr-sub" style="font-size:11px;color:#ffffff;letter-spacing:1.5px;font-family:'DM Sans',sans-serif;margin-top:1px">OAKLAWN PARK · 10 RACES</div>
  </div>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
    <span class="pill on-g" id="br-badge">$100.00 Bankroll</span>
    <span class="pill on" id="race-badge">Race 1</span>
  </div>
</div>

<div id="main">
  <div id="tc-bar"></div>
  <div id="race-tabs"></div>
  <div id="nav-tabs">
    <button class="ntab on" onclick="goTab('rankings')">🏇 Rankings</button>
    <button class="ntab" onclick="goTab('pace')">⚡ Pace</button>
    <button class="ntab" onclick="goTab('multirace')">🎯 Pick 3/4/5</button>
    <button class="ntab" onclick="goTab('odds')">📡 Odds</button>
    <button class="ntab" onclick="goTab('bankroll')">💰 Bankroll</button>
    <button class="ntab" onclick="goTab('pnl')">📊 P&L</button>
    <button class="ntab" onclick="goTab('ppparser')" style="color:#b48cf8;border-bottom-color:transparent">⚡ PP Parser</button>
    <button class="ntab" onclick="goTab('settings')" style="color:var(--dim);border-bottom-color:transparent">⚙️ Settings</button>
  </div>
  <div id="tab-rankings"></div>
  <div id="tab-pace" style="display:none"></div>
  <div id="tab-multirace" style="display:none"></div>
  <div id="tab-odds" style="display:none"></div>
  <div id="tab-bankroll" style="display:none"></div>
  <div id="tab-pnl" style="display:none"></div>
  <div id="tab-ppparser" style="display:none"></div>
  <div id="tab-settings" style="display:none"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// RACE DATA
// ═══════════════════════════════════════════════════════════
var R=[
 {n:1,t:"",d:"6F Dirt",ty:"4+ OC35k/SAL25k",horses:[]},
 {n:2,t:"",d:"6F Dirt",ty:"3YO Mdn Clm $40K",horses:[]},
 {n:3,t:"",d:"6F Dirt",ty:"4+ Rhp $47K",horses:[]},
 {n:4,t:"",d:"1-1/16M Dirt",ty:"3YO Mdn $15K",horses:[]},
 {n:5,t:"",d:"5.5F Dirt",ty:"3+ Mdn $10K",horses:[]},
 {n:6,t:"",d:"5.5F Dirt",ty:"3+ Mdn Clm $40K F&M",horses:[]},
 {n:7,t:"",d:"1-1/16M Dirt",ty:"3YO Mdn $24K F&M",horses:[]},
 {n:8,t:"",d:"1M Dirt",ty:"4+ Alw $62K",horses:[]},
 {n:9,t:"",d:"6F Dirt",ty:"3+ Alw N2L $125K",horses:[]},
 {n:10,t:"",d:"6F Dirt",ty:"4+ Clm $10K N1Y",horses:[]},
];


// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
var PP_COLORS={1:{bg:"#CC0000",t:"#fff"},2:{bg:"#ffffff",t:"#111"},3:{bg:"#1a4fd6",t:"#fff"},4:{bg:"#f5c518",t:"#000"},5:{bg:"#2d8a2d",t:"#fff"},6:{bg:"#1a1a1a",t:"#fff"},7:{bg:"#e85c0d",t:"#fff"},8:{bg:"#e84d8a",t:"#fff"},9:{bg:"#1abfbf",t:"#000"},10:{bg:"#7b3fa0",t:"#fff"},11:{bg:"#888888",t:"#fff"},12:{bg:"#a8e63d",t:"#000"}};
var CUR=0, TAB='rankings';
var bankroll=213.78, wagered=0, returned=0;
var scratches={
  0:{"Itzel":true},
  2:{"Tartaria":true},
  3:{"Awol":true,"El Gato Americano":true},
  4:{"Uncle Tater":true,"Jonesboogie":true},
  7:{"Fireball Birdie":true},
  8:{"Divine Justice":true},
  9:{"Texas Holdem":true,"Big Commerce":true,"Cravensworth":true,"Taillights":true}
}, liveOdds={}, expanded={}, kaci={}, eqChange={}, jockeyOvr={}, checklist={};
var bets=[], mrLegs=[], mrSels={}, mrUnit=0.5;
var tc={surface:'fast',bias:'none',wind:'calm',temp:'55',weather:'clear'};
var tcOpen=false;

function rem(){return bankroll-wagered+returned;}
async function ppCacheExport(){
  // Sync with Equibase first to ensure correct race count
  var st=document.getElementById('cache-status');
  var hasHorses = R.some(function(r){return r.horses.length>0;});
  if(!hasHorses){
    if(st) st.innerHTML='<span style="color:var(--red)">No parsed data to export — parse a PP card first.</span>';
    return;
  }
  if(st) st.innerHTML='<span style="color:var(--dim)">Syncing race card from Equibase...</span>';
  try{
    var eqData = await fetchEquibaseData();
    if(eqData && eqData.races && eqData.races.length > 0) rebuildRacesFromEquibase(eqData);
  }catch(e){ console.warn('Export Equibase sync:', e.message); }
  var cache = {
    version:1,
    exportedAt: new Date().toISOString(),
    cardInfo: cardInfo,
    races: R.map(function(r){
      return {
        n:r.n, t:r.t, d:r.d, ty:r.ty,
        horses: r.horses.map(function(h){
          return {name:h.name,disp:h.disp,pp:h.pp,ml:h.ml,b:h.b,sty:h.sty,
            j:h.j,tr:h.tr,layoff:h.layoff,cc:h.cc,wins:h.wins,notes:h.notes,
            eq:h.eq||{lf:false,bf:false,bl:false},wk:h.wk||[],distFit:h.distFit||'tested',
            // Validate cc — should be in $K (e.g. -10 = drop $10K), cap at ±150
            cc: (function(v){ v=parseInt(v)||0; if(Math.abs(v)>150) v=Math.round(v/1000); return Math.max(-150,Math.min(150,v)); })(h.cc)};
        })
      };
    })
  };
  var json = JSON.stringify(cache, null, 2);
  var blob = new Blob([json], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var d = cardInfo.date ? cardInfo.date : new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = (cardInfo.code||'OP')+'-'+d+'-card.json';
  a.click();
  URL.revokeObjectURL(url);
  var totalHorses = R.reduce(function(s,r){return s+r.horses.length;},0);
  var st=document.getElementById('cache-status');
  if(st) st.innerHTML='<span style="color:var(--green)">✓ Exported '+R.length+' races, '+totalHorses+' horses to '+a.download+'</span>';
}

function ppCacheImport(input){
  var file = input.files[0];
  if(!file) return;
  var st=document.getElementById('cache-status');
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var cache = JSON.parse(e.target.result);
      if(!cache.races || !Array.isArray(cache.races)){
        throw new Error('Invalid cache file — no races array');
      }
      // Restore cardInfo
      if(cache.cardInfo) Object.assign(cardInfo, cache.cardInfo);
      // Restore races
      var loaded = 0;
      cache.races.forEach(function(saved){
        var ri = R.findIndex(function(r){return r.n===saved.n;});
        if(ri>=0){
          if(saved.t) R[ri].t = saved.t;
          if(saved.d) R[ri].d = saved.d;
          if(saved.ty) R[ri].ty = saved.ty;
          if(saved.horses&&saved.horses.length){
            R[ri].horses = saved.horses;
            loaded++;
          }
        }
      });
      // Save to localStorage
      var state=JSON.parse(localStorage.getItem('paddockiq_state')||'{}');
      state.races=R.map(function(r){return {n:r.n,t:r.t,d:r.d,ty:r.ty,grade:r.grade||0,gradeName:r.gradeName||'',horses:r.horses.map(function(h){
        return {name:h.name,disp:h.disp,pp:h.pp,ml:h.ml,b:h.b,sty:h.sty,j:h.j,tr:h.tr,
          layoff:h.layoff,cc:h.cc,wins:h.wins,notes:h.notes,eq:h.eq||{lf:false,bf:false,bl:false},
          wk:h.wk||[],distFit:h.distFit||'tested'};
      })};});
      state.savedAt=new Date().toISOString();
      state.cardInfo=cardInfo;
      localStorage.setItem('paddockiq_state',JSON.stringify(state));
      // Update UI
      updateCardHeader();
      renderRaceTabs();
      goRace(0);
      render();
      var totalH = R.reduce(function(s,r){return s+r.horses.length;},0);
      var exportedAt = cache.exportedAt ? new Date(cache.exportedAt).toLocaleString() : 'unknown';
      if(st) st.innerHTML='<span style="color:var(--green)">✓ Loaded '+loaded+' races, '+totalH+' horses from cache (exported '+exportedAt+')</span>';
      // Switch to Rankings
      document.querySelectorAll('.ntab').forEach(function(b){
        if(b.textContent.indexOf('Rankings')>-1) b.click();
      });
    }catch(err){
      if(st) st.innerHTML='<span style="color:var(--red)">✗ Import failed: '+err.message+'</span>';
      console.error('Cache import error:',err);
    }
  };
  reader.readAsText(file);
  input.value=''; // reset so same file can be reimported
}

function updateCardHeader(){
  var el = document.getElementById('hdr-sub');
  if(!el) return;
  if(typeof cardInfo === 'undefined') return;
  // Use today's date if cardInfo.date not set
  var dateStr = (cardInfo && cardInfo.date) ? cardInfo.date : new Date().toLocaleDateString('en-CA',{timeZone:'America/Chicago'});
  // Parse date parts manually to avoid timezone shift from new Date(string)
  var parts = dateStr.split('-');
  var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  var mo  = months[parseInt(parts[1])-1] || '';
  var dy  = parseInt(parts[2]);
  var yr  = parts[0];
  // Race count: always use R.length (reflects Equibase rebuild)
  var total  = R.length;
  var loaded = R.filter(function(r){return r.horses.length>0;}).length;
  var raceStr = (loaded > 0 && loaded < total) ? loaded+'/'+total+' RACES' : total+' RACES';
  var track = (cardInfo && cardInfo.track) ? cardInfo.track : 'OAKLAWN PARK';
  el.textContent = track+' · '+mo+' '+dy+', '+yr+' · '+raceStr;
  document.title = 'PaddockIQ — '+track+' — '+mo+' '+dy+', '+yr;
}

function raceTypeBadge(ty){
  // Returns short badge text from race type string
  if(!ty) return '';
  var t = ty.toUpperCase();
  if(t.indexOf('MDN CLM')>-1||t.indexOf('MAIDEN CLM')>-1) return 'MDN CLM';
  if(t.indexOf('MDN')>-1||t.indexOf('MAIDEN')>-1)         return 'MDN';
  if(t.indexOf('STK')>-1||t.indexOf('STAKES')>-1)         return 'STK';
  if(t.indexOf('G1')>-1||t.indexOf('GRADE 1')>-1)         return 'G1';
  if(t.indexOf('G2')>-1||t.indexOf('GRADE 2')>-1)         return 'G2';
  if(t.indexOf('G3')>-1||t.indexOf('GRADE 3')>-1)         return 'G3';
  if(t.indexOf('ALW')>-1||t.indexOf('ALLOWANCE')>-1||t.indexOf('ALLW')>-1) return 'ALW';
  if(t.indexOf('OC')>-1||t.indexOf('OPT CLM')>-1)         return 'OC';
  if(t.indexOf('CLM')>-1||t.indexOf('CLAIMING')>-1)       return 'CLM';
  if(t.indexOf('RHP')>-1||t.indexOf('R/HP')>-1)           return 'RHP';
  if(t.indexOf('MSW')>-1)                                  return 'MSW';
  if(t.indexOf('MCL')>-1)                                  return 'MCL';
  return '';
}

function mlDec(ml){var p=(ml||'4-1').split('-');return p[1]>0?p[0]/p[1]:4;}

function scoreRace(ri){
  var race=R[ri], scr=scratches[ri]||{};
  var _autoScr=((typeof scratchedHorses!=='undefined'&&scratchedHorses[race.n])||[]).map(function(n){return n.toLowerCase().replace(/[^a-z0-9 ]/g,'');});
  function _isScrH(h){
    if(scr[h.name]) return true;
    var hn=h.name.toLowerCase().replace(/[^a-z0-9 ]/g,'');
    return _autoScr.some(function(s){if(s===hn)return true;if(s.length>=5&&hn.length>=5&&(hn.includes(s)||s.includes(hn)))return true;return false;});
  }
  var results=[];
  race.horses.forEach(function(h){
    if(_isScrH(h))return;
    // Speed: Beyer weight 18% — best figure
    var spd=Math.min(100,Math.max(0,(h.b-60)/70*100))*0.18;

    // Beyer TREND: 9% — are figures improving, declining, or flat?
    var beyerTrend = 0;
    var wkBeyersRaw = (h.wk||[]).slice(0,4).map(function(w){ return parseFloat(w.beyer||w.figure||0); }).filter(function(b){ return b>0; });
    // Also use notes to infer trend if no workouts
    var trendScore = 0;
    if(wkBeyersRaw.length >= 2){
      // Simple linear trend — last vs average of earlier
      var recent = wkBeyersRaw[0];
      var earlier = wkBeyersRaw.slice(1).reduce(function(s,v){return s+v;},0)/wkBeyersRaw.slice(1).length;
      var diff = recent - earlier;
      if(diff >= 10)       trendScore = 100;  // massive improvement
      else if(diff >= 6)   trendScore = 80;
      else if(diff >= 3)   trendScore = 60;
      else if(diff >= 0)   trendScore = 40;   // flat/slight improvement
      else if(diff >= -3)  trendScore = 25;   // slight decline
      else if(diff >= -6)  trendScore = 10;
      else                 trendScore = 0;    // sharp decline
    } else {
      trendScore = 40; // unknown — neutral
    }
    beyerTrend = trendScore * 0.09;

    // E1/E2 Pace figures: 6% — early pace dominance
    var paceScore = 50; // default neutral
    var nn_lower = (h.notes||'').toLowerCase();
    // Extract E1/E2 from notes if Claude included them
    var e1m = nn_lower.match(/e1[:\s]+(\d+)/);
    var e2m = nn_lower.match(/e2[:\s]+(\d+)/);
    if(e1m && e2m){
      var e1 = parseInt(e1m[1]), e2 = parseInt(e2m[1]);
      // Higher E2 = sustained pace — most predictive
      paceScore = Math.min(100, Math.max(0, (e2 - 80) / 40 * 100));
    } else if(h.sty==='Leader'||h.sty==='Speed'){
      paceScore = 65; // front runner bonus — likely good early figures
    } else if(h.sty==='Closer'){
      paceScore = 45;
    }
    var e1e2Score = paceScore * 0.06;
    var nn=h.notes.toLowerCase();
    // FORM: 5-tier keyword system
    var frm_raw=50;
    var months=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    var wonRecent=months.some(function(m){return nn.indexOf('won '+m)>-1;})||nn.indexOf('won last')>-1||nn.indexOf('won here')>-1;
    var multiWin=/\d+\s*wins?\s*(op|here|2026|2025|career|this|lifetime)/.test(nn)||['won op','op wins','career wins','won maiden','won allowance','won kee','won cd'].some(function(x){return nn.indexOf(x)>-1;});
    var closeUp=['2nd last','3rd last','placed last','showed life','improving','close 3rd','close 2nd','2nd in stakes','placed in stakes','vied for lead','runner-up'].some(function(x){return nn.indexOf(x)>-1;});
    var weakForm=['weak form','flat lately','poor form','0-3 all','beaten far','no wins ever'].some(function(x){return nn.indexOf(x)>-1;});
    var unproven=['only 1 career','unproven','0-12','0-4 all','0-3 all'].some(function(x){return nn.indexOf(x)>-1;});
    if(wonRecent)frm_raw=90;
    else if(multiWin)frm_raw=78;
    else if(closeUp)frm_raw=68;
    else if(weakForm)frm_raw=30;
    else if(unproven)frm_raw=35;
    // Career wins: floor weak-form horses with proven class
    var cwm=nn.match(/(\d+)\s*career wins/);
    var careerWins=cwm?parseInt(cwm[1]):0;
    var careerWins=cwm?parseInt(cwm[1]):(h.wins||0);
    if(careerWins>=10&&frm_raw<=40)frm_raw=Math.max(frm_raw,52);
    var frm=frm_raw*0.22;  // 25%->22%
    // Class: use h.cl if set, otherwise default 65; add career wins bonus
    var careerBonus=Math.min(15,careerWins*0.8);
    var cls=((h.cl!=null?h.cl:65)+careerBonus)*0.23;  // 27%->23%
    var sm={Leader:70,Speed:68,Tracker:65,Midpack:62,Closer:58,Plodder:50};
    var pce=(sm[h.sty]||62)*0.13;  // 15%->13%
    // Jockey/Trainer: curved formula rewards elite riders more
    var jEff=(jockeyOvr[race.n]&&jockeyOvr[race.n][h.name]!=null)?jockeyOvr[race.n][h.name]:h.j;
    // Jockey/Trainer: track-specific meet win% rewarded non-linearly
    // 25%+ = dominant meet leader gets extra boost
    var jBase = Math.min(100, jEff*3.5 + Math.pow(jEff,1.3)*0.4);
    var jMeetBonus = jEff >= 25 ? 8 : jEff >= 20 ? 4 : 0;
    var jck = (jBase + jMeetBonus) * 0.05;  // reduced 6%->5%

    var trBase = Math.min(100, h.tr*3.5 + Math.pow(h.tr,1.3)*0.4);
    var trMeetBonus = h.tr >= 25 ? 6 : h.tr >= 20 ? 3 : 0;
    var trn = (trBase + trMeetBonus) * 0.04;  // reduced 5%->4%
    // Layoff adjustment
    var lo=h.layoff||21;
    var layoffAdj= lo<=14?3 : lo<=28?0 : lo<=45?-2 : lo<=90?-5 : -8;
    // Class change: negative cc = dropped in class = bonus
    var cc=h.cc||0;
    var ccAdj= cc<=-15?8 : cc<=-5?5 : cc<=-1?2 : cc>=10?-5 : cc>=5?-3 : cc>=1?-1 : 0;
    // ── WORKOUT SCORING (replaces flat bulletBonus) ───────────────────────────
    // Uses h.wk array from PP parser, falls back to notes keywords
    var wkScore = 0;
    var wkLabel = ''; // for display in detail card
    var wkArr   = h.wk || [];
    var isDebut = !h.b || h.b === 0;

    if(wkArr.length > 0){
      // ── Score from structured workout data ──
      var w0 = wkArr[0]; // most recent work
      // 1. Recency bonus
      var recBonus = w0.daysAgo <= 7  ? 4 :
                     w0.daysAgo <= 14 ? 2 :
                     w0.daysAgo <= 21 ? 1 : 0;
      // 2. Quality bonus — bullet or elite rank/field ratio
      var rf = (w0.field > 0) ? w0.rank / w0.field : 0.5;
      var qualBonus = w0.bullet         ? 8 :
                      rf > 0 && rf < 0.1 ? 6 :  // top 10% but not bullet
                      rf > 0 && rf < 0.2 ? 4 :  // top 20%
                      rf > 0 && rf < 0.4 ? 2 : 0;
      // 3. Volume — more works = horse is pointed
      var volBonus = wkArr.length >= 4 ? 3 :
                     wkArr.length >= 3 ? 2 :
                     wkArr.length >= 2 ? 1 : 0;
      // 4. Layoff multiplier — bullet/elite work off 45+ days = trainer is pointing this horse HERE
      var layoffMult = (lo >= 45 && (w0.bullet || rf < 0.15)) ? 1.5 : 1.0;
      // 5. Debut multiplier — workouts are the PRIMARY signal when b=0
      var debutMult  = isDebut ? 1.8 : 1.0;
      // 6. Distance match bonus — worked at race distance or further
      var raceDistF  = (race.d||'').match(/(\d+)\s*f/i);
      var raceFurlong = raceDistF ? parseInt(raceDistF[1]) : 6;
      var workFurlong = parseInt((w0.dist||'').replace(/\D/g,'')) || 0;
      var distBonus   = (workFurlong >= raceFurlong) ? 2 : (workFurlong >= raceFurlong - 1) ? 1 : 0;

      wkScore = Math.min(18, Math.round((recBonus + qualBonus + volBonus + distBonus) * layoffMult * debutMult));

      // Build label for display
      var qStr = w0.bullet ? '🔵 BULLET' : (rf < 0.2 ? '🟢 ELITE' : '');
      wkLabel  = (w0.dist||'?f') + ' ' + (w0.time||'') + (w0.bullet?' B':'') +
                 (w0.rank&&w0.field?' '+w0.rank+'/'+w0.field:'') +
                 ' ('+w0.daysAgo+'d ago)' + (qStr?' '+qStr:'');
    } else {
      // ── Fallback to notes keywords when no wk array ──
      var hasBullet  = nn.indexOf('bullet') > -1;
      var recentWork = nn.indexOf('sharp work') > -1 || nn.indexOf('works well') > -1;
      var multiWork  = (nn.match(/\bwork\b/g)||[]).length >= 2;
      if(hasBullet){
        wkScore = lo >= 45 ? 9 : 6;
        wkLabel = 'Bullet (notes)';
      } else if(recentWork) {
        wkScore = 2;
        wkLabel = 'Sharp work (notes)';
      }
      if(multiWork && !hasBullet) wkScore = Math.max(wkScore, 3);
      if(isDebut && wkScore > 0) wkScore = Math.round(wkScore * 1.5); // debut multiplier even on fallback
    }
    var bulletBonus = wkScore; // keep variable name for base calculation below
    // Equipment signals from PDF extraction
    var heq=h.eq||{lf:false,bf:false,bl:false};
    var lasixFirst=heq.lf?12:0;    // Lasix first time — horse was bleeding, expect big improvement
    var blinkFirst=heq.bf?10:0;    // Blinkers first time — focus/equipment change
    var blinkCont=heq.bl?3:0;      // Blinkers continuing — minor signal
    var eqB=(eqChange[race.n]&&eqChange[race.n][h.name])||0;
    // FIX 1: First-with-trainer bonus — notes keyword 'new trainer' or h.newTrainer flag
    // Rewards hot barn switches that static trainer% misses (e.g. Saffie Joseph 50% 1stW/Trn)
    var newTrnBonus=0;
    if(h.newTrainer){newTrnBonus=(h.newTrainer>=30)?12:(h.newTrainer>=20)?9:(h.newTrainer>=15)?6:3;}
    else if(nn.indexOf('new trainer')>-1||nn.indexOf('1stw/trn')>-1||nn.indexOf('first with trainer')>-1){newTrnBonus=7;}
    // FIX 2: Extreme class-drop floor — when horse drops 2+ full class levels (cc<=-20)
    // layoff penalty was swamping the class-drop signal; cap layoff at -5 and add drop bonus
    var extremeDropBonus=0;
    if(cc<=-20){extremeDropBonus=6; if(layoffAdj<-5)layoffAdj=-5;}

    // ── DISTANCE FIT ─────────────────────────────────────────────────────────
    // Uses distFit field extracted by PP Parser from horse's past performance lines
    var distFitAdj=0;
    var df=h.distFit||'tested';
    if(df==='proven')       distFitAdj=5;   // 2+ wins at today's exact distance
    else if(df==='tested')  distFitAdj=2;   // has run it, competitive
    else if(df==='shortening') distFitAdj=3; // sprint->route to sprint often helps
    else if(df==='stretching') distFitAdj=-3; // route novice, often struggles
    else if(df==='debut_dist') distFitAdj=-2; // first time at distance, unknown
    // Notes-based fallback when distFit not available
    if(df==='tested'||!h.distFit){
      if(nn.indexOf('best at route')>-1||nn.indexOf('router')>-1) distFitAdj=Math.max(distFitAdj,3);
      if(nn.indexOf('sprint to route')>-1||nn.indexOf('first route')>-1) distFitAdj=Math.min(distFitAdj,-2);
      if(nn.indexOf('best sprinting')>-1||nn.indexOf('route to sprint')>-1) distFitAdj=Math.max(distFitAdj,2);
    }

    // ── STAKES EXPERIENCE ────────────────────────────────────────────────────
    // Horses that have run in stakes have proven class above what claiming $ shows
    var stakesBonus=0;
    if(nn.indexOf('stakes')>-1||nn.indexOf('grade')>-1){
      stakesBonus=3; // has run in stakes company — proven class
      if(nn.indexOf('won stakes')>-1||nn.indexOf('stakes winner')>-1) stakesBonus=5;
      if(nn.indexOf('graded')>-1) stakesBonus=4;
    }

    var base=spd+beyerTrend+e1e2Score+frm+cls+pce+jck+trn+layoffAdj+ccAdj+bulletBonus+lasixFirst+blinkFirst+blinkCont+eqB+newTrnBonus+extremeDropBonus+distFitAdj+stakesBonus;
    // Track bonus
    var tb=0;
    if(tc.surface==='sloppy'||tc.surface==='muddy'){
      tb+=(h.sty==='Closer'?2:(h.sty==='Leader'||h.sty==='Speed')?-2:0);
      tb+=(nn.indexOf('sloppy')>-1||nn.indexOf('muddy')>-1)?3:-2;
    } else if(tc.surface==='soft'){
      tb+=(h.sty==='Closer'||h.sty==='Tracker')?2:(h.sty==='Leader')?-2:0;
    }
    if(tc.bias==='speed')tb+=(h.sty==='Leader'||h.sty==='Speed')?5:(h.sty==='Closer')?-3:0;
    if(tc.bias==='closer')tb+=(h.sty==='Closer')?5:(h.sty==='Leader')?-3:0;
    if(tc.bias==='inside')tb+=(h.sty==='Leader'||h.sty==='Speed')?3:0;
    if(tc.wind==='strong')tb+=(h.sty==='Leader'||h.sty==='Speed')?-2:0;
    // Kaci
    var k=kaci[race.n]&&kaci[race.n][h.name]||{enabled:false,carry:0,conformation:0,temperament:0};
    var km=1.0;
    if(k.enabled){var kt=k.carry+k.conformation+k.temperament;if(kt>0)km=1+(kt/9)*0.15;}
    var final=Math.min(120,Math.round((base+tb)*km));
    var trendDir=wkBeyersRaw&&wkBeyersRaw.length>=2?(wkBeyersRaw[0]-wkBeyersRaw[1]):0;
    results.push({name:h.name,horse:h,score:final,base:Math.round(base),tb:Math.round(tb*10)/10,km:km,kaciOn:km>1,newTrnBonus:newTrnBonus,extremeDropBonus:extremeDropBonus,wkScore:wkScore,wkLabel:wkLabel,distFitAdj:distFitAdj,stakesBonus:stakesBonus});
  });
  results.sort(function(a,b){return b.score-a.score;});
  var debutCount=race.horses.filter(function(h){return !(scratches[ri]||{})[h.name]&&(h.b===0||h.b==null||isNaN(h.b));}).length;
  results._debutWarning=debutCount>=3;
  return results;
}

function softmax(sc){
  var T=8, mx=Math.max.apply(null,sc.map(function(s){return s.score;}));
  var ex=sc.map(function(s){return Math.exp((s.score-mx)/T);});
  var sum=ex.reduce(function(a,b){return a+b;},0);
  return ex.map(function(e){return e/sum;});
}

function kellyBet(prob,ml,bank){
  var b=mlDec(ml),q=1-prob,f=(b*prob-q)/b*0.5;
  if(f<=0)return 0;
  var raw = Math.round(f*bank*100)/100;
  return Math.max(2, Math.round(Math.min(bank*0.20, raw))); // whole dollars for Caesars sportsbook
}

function conf(sc){
  if(sc.length<2)return'low';
  var g=sc[0].score-sc[1].score;
  return g>=8?'high':g>=4?'medium':'low';
}

function getOdds(ri,name){
  return(liveOdds[ri]&&liveOdds[ri][name])||R[ri].horses.find(function(h){return h.name===name;}).ml||'5-1';
}

var TRACK_LAT = 34.4850, TRACK_LON = -93.0571;
var TRACK_CITY = 'Hot+Springs,AR';
var weatherStatus = '';

function fetchLiveWeather() {
  weatherStatus = 'Fetching...';
  renderTC();

  // Use wttr.in JSON API — works from file:// via standard fetch (CORS open)
  // Fallback: JSONP injection if fetch blocked
  var url = 'https://wttr.in/' + TRACK_CITY + '?format=j1';

  fetch(url)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(d) {
      var cur = d.current_condition[0];
      var tempF   = parseInt(cur.temp_F);
      var windMph = parseInt(cur.windspeedMiles);
      var precip  = parseFloat(cur.precipMM) * 0.0394; // mm → inches
      var desc    = (cur.weatherDesc[0].value||'').toLowerCase();
      var humidity = parseInt(cur.humidity);

      // Surface from description + precip
      var surface = 'fast';
      if (precip > 0.1 || desc.indexOf('rain') > -1 || desc.indexOf('shower') > -1) {
        surface = precip > 0.3 ? 'sloppy' : 'good';
      } else if (desc.indexOf('snow') > -1 || desc.indexOf('sleet') > -1) {
        surface = 'muddy';
      } else if (desc.indexOf('drizzle') > -1 || desc.indexOf('mist') > -1) {
        surface = 'good';
      } else if (humidity > 90) {
        surface = 'good';
      }

      var windSet = windMph > 18 ? 'strong' : windMph > 8 ? 'light' : 'calm';

      tc.surface = surface;
      tc.wind    = windSet;
      tc.temp    = String(tempF);

      weatherStatus = 'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) +
        ' \u2014 ' + tempF + '\u00b0F, ' + windMph + 'mph, ' + desc +
        ' \u2192 ' + surface;
      render();
    })
    .catch(function() {
      // Fetch blocked (file:// origin) — try JSONP fallback via script injection
      fetchWeatherJSONP();
    });
}

function fetchWeatherJSONP() {
  // wttr.in doesn't support JSONP natively, so fall back to
  // Open-Meteo via script tag (they support JSONP via callback param)
  // Actually use a simple iframe-free workaround: just show manual prompt
  weatherStatus = 'Auto-fetch unavailable from local file \u2014 tap to set manually \u2193';
  renderTC();
  // As a bonus, try Open-Meteo once more with no-cors mode just to get temp
  var url = 'https://api.open-meteo.com/v1/forecast' +
    '?latitude=' + TRACK_LAT + '&longitude=' + TRACK_LON +
    '&current=temperature_2m,wind_speed_10m,precipitation,weather_code' +
    '&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch' +
    '&timezone=America/Chicago';
  fetch(url, {mode: 'cors'})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var cur = d.current;
      var tempF  = Math.round(cur.temperature_2m);
      var wind   = cur.wind_speed_10m;
      var precip = cur.precipitation;
      var code   = cur.weather_code;
      var surface = 'fast';
      if (precip > 0.1) surface = 'sloppy';
      else if (precip > 0) surface = 'good';
      else if (code >= 61 && code <= 77) surface = 'muddy';
      else if (code >= 51 && code <= 57) surface = 'sloppy';
      else if (code === 45 || code === 48) surface = 'good';
      var windSet = wind > 18 ? 'strong' : wind > 8 ? 'light' : 'calm';
      tc.surface = surface;
      tc.wind    = windSet;
      tc.temp    = String(tempF);
      weatherStatus = 'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) +
        ' \u2014 ' + tempF + '\u00b0F, ' + Math.round(wind) + 'mph \u2192 ' + surface;
      render();
    })
    .catch(function(e) {
      weatherStatus = '\u26a0 Weather unavailable \u2014 set surface manually below';
      renderTC();
    });
}

  var biasC=tc.bias!=='none'?'var(--gold)':'var(--dim)';

      return '<button class="pill'+(cur===v?' on':'')+'\" onclick="setTC(\''+field+'\',\''+v+'\');event.stopPropagation()">'+v+'</button>';
    }).join('');
  };
  el.innerHTML=
    // Row 1: emoji + surface · dirt · temp + weather button
    '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer" onclick="toggleTC()">'+

        '<span style="font-size:14px;font-weight:700;color:'+srfC+'">'+srfEmoji+' '+tc.surface.toUpperCase()+'</span>'+
        '<span style="color:var(--muted);font-size:12px">·</span>'+
        '<span style="font-size:14px;font-weight:600;color:#ffffff">'+trkEmoji+' '+(tc.surface==='turf'||tc.surface==='soft'?'Turf':'Dirt')+'</span>'+
        '<span style="color:var(--muted);font-size:12px">·</span>'+
        '<span style="font-size:14px;font-weight:600;color:#ffffff">'+tc.temp+'\u00b0F'+(windEmoji?' '+windEmoji:'')+'</span>'+
      '</div>'+
      '<div style="display:flex;gap:6px;align-items:center">'+
        '<button onclick="fetchLiveWeather();event.stopPropagation()" style="font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid #6aabbb;background:#0d1a20;color:#6aabbb;cursor:pointer;white-space:nowrap">\u26c5 Weather</button>'+
        '<span style="color:var(--dim);font-size:11px">'+(tcOpen?'\u25b2':'\u25bc')+'</span>'+
      '</div>'+
    '</div>'+
    // Row 2: weather status line
    (weatherStatus?'<div style="font-size:12px;color:#6aabbb;padding:3px 0 2px 2px;line-height:1.4">'+weatherStatus+'</div>':'')+
    // Row 3: bias pills — same line, compact
    '<div style="display:flex;gap:4px;align-items:center;padding:4px 0 1px 0;flex-wrap:wrap">'+
      '<span style="font-size:11px;color:var(--muted);margin-right:2px">Bias:</span>'+
      ['none','speed','closer','inside','outside'].map(function(v){
        var active=tc.bias===v;
        var lbl=v==='none'?'None':v.charAt(0).toUpperCase()+v.slice(1);
        return '<button onclick="setTC(\'bias\',\''+v+'\');event.stopPropagation()" '+
          'style="font-size:11px;padding:2px 10px;border-radius:20px;border:1px solid '+(active?'var(--gold)':'var(--border)')+';'+
          'background:'+(active?'#1a1400':'transparent')+';color:'+(active?'var(--gold)':'var(--muted)')+';cursor:pointer">'+lbl+'</button>';
      }).join('')+
    '</div>'+
    // Expandable surface + wind controls
    '<div id="tc-content" class="'+(tcOpen?'open':'')+'" style="display:'+(tcOpen?'grid':'none')+'">'+
      '<div><div class="slabel">Surface</div><div style="display:flex;gap:4px;flex-wrap:wrap">'+opts(['fast','good','sloppy','muddy','soft','turf'],'surface',tc.surface)+'</div></div>'+
      '<div><div class="slabel">Wind</div><div style="display:flex;gap:4px;flex-wrap:wrap">'+opts(['calm','light','strong'],'wind',tc.wind)+'</div>'+
        '<div style="display:flex;align-items:center;gap:6px;margin-top:6px"><span style="font-size:10px;color:var(--dim)">Temp \u00b0F</span>'+
        '<input class="inp" type="number" value="'+tc.temp+'" onchange="setTC(\'temp\',this.value)" style="width:60px"/></div></div>'+
    '</div>';
}
function toggleTC(){tcOpen=!tcOpen;renderTC();}
function setTC(f,v){tc[f]=v;render();}

// ═══════════════════════════════════════════════════════════
// RANKINGS
// ═══════════════════════════════════════════════════════════
function renderRankings(){
  var race=R[CUR], sc=scoreRace(CUR), pr=softmax(sc), cf=conf(sc);
  var scr=scratches[CUR]||{};
  var el=document.getElementById('tab-rankings');
  if(!sc.length){el.innerHTML='<div style="color:var(--dim);padding:20px">All horses scratched.</div>';return;}
  var top=sc[0], top2=sc[1]||{name:'—',score:0}, top3=sc[2]||{name:'—',score:0};
  var gap=top.score-(top2.score||0);
  var btype=cf==='high'?'WIN':cf==='medium'?'WIN / PLACE':'PLACE / SHOW';
  var cfBadge=cf==='high'?'badge-h':cf==='medium'?'badge-m':'badge-l';
  var odds=getOdds(CUR,top.name);
  var ka=kellyBet(pr[0]||.01,odds,rem());
  var debutWarn=sc._debutWarning?'<div class="warn-box" style="margin-bottom:10px">⚠️ Debut warning — 3+ first-out horses in this field. Algorithm confidence is reduced; use caution sizing bets.</div>':'';

  var html='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;font-size:12px">'+
    '<span class="bebas" style="font-size:14px;color:var(--gold);background:#1a1a10;border:1px solid var(--gold);padding:2px 10px;border-radius:4px">Race '+race.n+'</span>'+
    '<span style="color:var(--muted)">'+race.t+' · '+race.d+' · '+race.ty+'</span></div>';

  // Top pick
  var html=renderChecklist(CUR);
  html+=debutWarn;
  html+='<div class="card-gold">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">'+
    '<div><div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px">Top Pick — Race '+race.n+(race.gradeName?' &nbsp;<span style="color:#f0c850;text-transform:none">'+race.gradeName+'</span>':'')+'</div>'+
    '<div class="bebas" style="font-size:26px;color:var(--gold)">'+(top.horse.disp||top.name)+'</div>'+
    '<div style="font-size:11px;color:var(--muted);margin-top:4px;max-width:360px">'+top.horse.notes+'</div>'+
    '<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center">'+
    '<span class="pill on-b">ML: '+top.horse.ml+'</span>'+
    '<span class="pill on-g">Score: '+top.score+'</span>'+
    '<span class="'+cfBadge+'">'+cf.toUpperCase()+' CONF</span>'+
    '<span class="pill on">'+btype+'</span>'+
    (top.wkScore>0?'<span style="font-size:10px;background:#1a1030;color:#b48cf8;border:1px solid #3a2060;padding:2px 8px;border-radius:20px">WRK +'+top.wkScore+' pts</span>':'')+
    (top.kaciOn?'<span class="pill on-p">✨ Kaci ×'+top.km.toFixed(2)+'</span>':'')+
    '</div></div>'+
    '<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">'+
    (ka<=0
      // ── NO BET state ──
      ? '<div style="background:#1a1010;border:2px solid #553030;border-radius:8px;padding:10px 16px;text-align:center;min-width:160px">'+
          '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:18px;color:#884444;letter-spacing:1px">NO BET</div>'+
          '<div style="font-size:10px;color:#664444;margin-top:2px">No edge at current odds</div>'+
          '<div style="font-size:10px;color:#553333;margin-top:4px">Skip this race or use in exotics only</div>'+
        '</div>'
      // ── Has edge — show Recommended + Secondary ──
      : '<div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">'+
          // Primary recommended bet
          '<div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;text-align:right">Recommended Bet</div>'+
          '<button onclick="logBet(\''+top.name.replace(/'/g,'\\\'')+'\',' +ka.toFixed(2)+')" style="'+
            'background:'+(cf==='high'?'#0d2010':cf==='medium'?'#0d1a0d':'#1a0d0d')+';'+
            'border:2px solid '+(cf==='high'?'var(--green)':cf==='medium'?'#4ea84e':'#c07070')+';'+
            'color:'+(cf==='high'?'var(--green)':cf==='medium'?'#7ec87e':'#d4a0a0')+';'+
            'border-radius:8px;padding:8px 16px;cursor:pointer;font-family:\'Bebas Neue\',sans-serif;font-size:18px;letter-spacing:1px;min-width:170px;text-align:center">'+
            (cf==='high'?'WIN — $'+ka.toFixed(2):cf==='medium'?'WIN / PLACE — $'+ka.toFixed(2):'PLACE / SHOW — $'+ka.toFixed(2))+
          '</button>'+
          // Secondary exotic option
          (sc.length>=2
            ? '<div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;text-align:right;margin-top:2px">Secondary Option</div>'+
              '<button onclick="logBet(\''+top.name.replace(/'/g,'\\\'')+'\',' +(ka*0.5).toFixed(2)+')" style="'+
                'background:#0d1020;border:1px solid #7b8df8;color:#7b8df8;'+
                'border-radius:8px;padding:6px 14px;cursor:pointer;font-family:\'Bebas Neue\',sans-serif;font-size:14px;letter-spacing:1px;min-width:170px;text-align:center">'+
                'EXACTA BOX — $'+(ka*0.5).toFixed(2)+
              '</button>'
            : '')+
          '<div style="font-size:10px;color:var(--dim);text-align:right;margin-top:3px">Kelly: $'+ka.toFixed(2)+' @ '+odds+' · '+
            (cf==='high'?'High confidence':cf==='medium'?'Medium confidence':'Lower confidence')+
          '</div>'+
        '</div>'
    )+
    '</div></div>'+
    '<div style="margin-top:10px;padding-top:8px;border-top:1px solid #2a2a1a;display:flex;gap:14px;flex-wrap:wrap;font-size:12px">'+
    '<span style="color:var(--dim)">2nd: <b style="color:var(--text)">'+top2.name+'</b> ('+top2.score+')</span>'+
    '<span style="color:var(--dim)">3rd: <b style="color:var(--text)">'+top3.name+'</b> ('+top3.score+')</span>'+
    '<span style="color:var(--dim)">Gap: <b style="color:var(--gold)">'+gap+' pts</b></span>'+
    '<span style="margin-left:auto;color:var(--dim)">Exacta: '+(top.horse.disp||top.name)+' / '+(top2.horse?top2.horse.disp||top2.name:top2.name)+'</span>'+
    '</div></div>';

  // Full field — ranked actives interspersed with scratched horses at their PP position
  html+='<div class="slabel" style="margin-top:4px">Full Field Rankings</div>';

  var shownScr={};
  // Merge manual scratches + auto-detected scratches from DRF check
  var autoScr=((typeof scratchedHorses!=='undefined'&&scratchedHorses[race.n])||[]).map(function(n){return n.toLowerCase().replace(/[^a-z0-9 ]/g,'');});
  function isScratchedHorse(h){
    if(scr[h.name]) return true;
    var hn=h.name.toLowerCase().replace(/[^a-z0-9 ]/g,'');
    var hd=(h.disp||'').toLowerCase().replace(/[^a-z0-9 ]/g,'');
    return autoScr.some(function(s){if(s===hn||s===hd)return true;if(s.length>=5&&hn.length>=5&&(hn.includes(s)||s.includes(hn)))return true;if(s.length>=5&&hd.length>=5&&(hd.includes(s)||s.includes(hd)))return true;return false;});
  }
  var scrByPP=race.horses.filter(function(h){return isScratchedHorse(h);})
    .sort(function(a,b){return (a.pp||0)-(b.pp||0);});

  function flushScr(maxPP){
    scrByPP.forEach(function(h){
      if(shownScr[h.name])return;
      if((h.pp||99)<=maxPP){
        shownScr[h.name]=true;
        html+='<div class="hcard" style="opacity:0.38;border-color:rgba(180,60,60,0.15)">'+
          '<div class="hcard-row" style="cursor:default;position:relative">'+
          '<div style="position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(160,50,50,0.55);pointer-events:none;z-index:2"></div>'+
          '<div class="bebas" style="font-size:22px;color:#664444;min-width:22px;line-height:1">'+h.pp+'</div>'+
          '<div style="flex:1;min-width:0">'+
            '<div style="display:flex;align-items:center;gap:5px">'+
            '<span style="font-size:13px;color:#664444;text-decoration:line-through;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(h.disp||h.name)+'</span>'+
            '<span style="font-size:10px;background:#2a0a0a;color:#994444;border:1px solid #441a1a;padding:1px 6px;border-radius:20px;flex-shrink:0">SCR</span>'+
            '</div>'+
          '</div>'+
          '<div style="font-size:11px;color:#553333;text-decoration:line-through;min-width:44px;text-align:right">'+h.ml+'</div>'+
          '</div>'+
        '</div>';
      }
    });
  }

  sc.forEach(function(s,i){
    flushScr((s.horse.pp||0)-1);
    var nc=['var(--gold)','#9eaac8','#c09060'][i]||'var(--dim)';
    var isExp=expanded[CUR+'_'+s.name];
    var pr2=pr[i]?(pr[i]*100).toFixed(1):'0.0';
    var k=kaci[race.n]&&kaci[race.n][s.name]||{enabled:false,carry:0,conformation:0,temperament:0};

    html+='<div class="hcard">'+
      '<div class="hcard-row" onclick="toggleExp('+CUR+',\''+s.name+'\')" >'+
      '<div class="bebas" style="font-size:22px;color:'+nc+';min-width:22px;line-height:1">'+(i+1)+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="display:flex;align-items:center;gap:5px;min-width:0">'+
        '<span style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(s.horse.disp||s.name)+'</span>'+
        (function(){var pc=PP_COLORS[s.horse.pp]||{bg:'#555',t:'#fff'};return '<span style="background:'+pc.bg+';color:'+pc.t+';font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,0.15)">'+s.horse.pp+'</span>';})()+
        '</div>'+
        flagPills(s.horse,race.n)+
        whyBadge(s)+
        // Beyer trend pill — only show if we have 2+ actual Beyer figures to compare
        (function(){
          var wks = s.horse && s.horse.wk ? s.horse.wk.filter(function(w){return (w.beyer||w.figure||0)>0;}) : [];
          if(wks.length < 2) return ''; // not enough data — don't show
          var ts = s.trendScore || 0;
          if(ts >= 70) return '<span style="font-size:9px;font-weight:700;background:#052010;color:#4ec97e;border:1px solid #4ec97e;border-radius:3px;padding:2px 6px">↑ IMPROVING</span>';
          if(ts <= 15) return '<span style="font-size:9px;font-weight:700;background:#200505;color:#e05555;border:1px solid #e05555;border-radius:3px;padding:2px 6px">↓ DECLINING</span>';
          return '';
        })()+
        // E1/E2 pace edge pill
        (function(){
          var nn=(s.horse.notes||'').toLowerCase();
          var e2m=nn.match(/e2[:\s]+(\d+)/);
          if(e2m && parseInt(e2m[1])>=95) return '<span style="font-size:9px;font-weight:700;background:#0d1a20;color:#6aabbb;border:1px solid #6aabbb;border-radius:3px;padding:2px 6px">⚡ PACE EDGE</span>';
          return '';
        })()+
        (s.wkScore>0?(function(){
          var isBullet=(s.horse.notes||'').toLowerCase().indexOf('bullet')>-1||(s.horse.wk&&s.horse.wk.length&&s.horse.wk[0].bullet);
          var wkArr=s.horse.wk||[];
          var isElite=wkArr.length&&wkArr[0].field>0&&(wkArr[0].rank/wkArr[0].field)<0.15;
          var label=isBullet?'\u25cf BULLET +'+s.wkScore:isElite?'\u2605 WRK +'+s.wkScore:'WRK +'+s.wkScore;
          var bg=isBullet?'#1a1030':isElite?'#0d2010':'#101028';
          var cl=isBullet?'#b48cf8':isElite?'#4ec97e':'#8888cc';
          var bd=isBullet?'#3a2060':isElite?'#1a4020':'#202040';
          return '<span style="font-size:10px;background:'+bg+';color:'+cl+';border:1px solid '+bd+';padding:1px 7px;border-radius:20px;flex-shrink:0">'+label+'</span>';
        })():'')+
        (s.newTrnBonus>0?'<span style="font-size:10px;background:#1a1030;color:#b48cf8;border:1px solid #3a2060;padding:1px 7px;border-radius:20px;flex-shrink:0">NEW TRN +'+s.newTrnBonus+'</span>':'')+
        (s.extremeDropBonus>0?'<span style="font-size:10px;background:#0d2010;color:#4ec97e;border:1px solid #1a4020;padding:1px 7px;border-radius:20px;flex-shrink:0">BIG DROP +'+s.extremeDropBonus+'</span>':'')+
        ((s.distFitAdj&&s.distFitAdj!==0&&s.distFitAdj!==2)?(function(){
          var df=s.horse.distFit||'';
          var labels={'proven':'✓ DIST +5','stretching':'↑ DIST -3','shortening':'↓ DIST +3','debut_dist':'NEW DIST -2'};
          var colors={'proven':'#4ec97e','stretching':'#d4904a','shortening':'#6aabbb','debut_dist':'#aaaa44'};
          var bgs={'proven':'#0d2010','stretching':'#1a0d00','shortening':'#001a10','debut_dist':'#1a1a00'};
          var bds={'proven':'#1a4020','stretching':'#3a2000','shortening':'#003020','debut_dist':'#3a3a00'};
          if(!labels[df]) return '';
          return '<span style="font-size:10px;background:'+bgs[df]+';color:'+colors[df]+';border:1px solid '+bds[df]+';padding:1px 7px;border-radius:20px;flex-shrink:0">'+labels[df]+'</span>';
        })():'')+
      '</div>'+
      '<div class="pbar" style="flex:1;min-width:60px;max-width:120px"><div class="pbar-fill" style="width:'+Math.min(100,s.score)+'%"></div></div>'+
      '<div style="font-size:11px;color:var(--dim);min-width:44px;text-align:right">'+pr2+'%</div>'+
      '<div class="bebas" style="font-size:18px;color:'+nc+';min-width:36px;text-align:right">'+s.score+'</div>'+
      '<div style="font-size:10px;color:var(--blue);background:#1a1a2e;padding:2px 8px;border-radius:20px;min-width:44px;text-align:center">'+getOdds(CUR,s.name)+'</div>'+
      '</div>'+
      (isExp?'<div class="hcard-detail">'+
        '<div style="font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:8px">'+s.horse.notes+'</div>'+
        '<div class="hcard-grid">'+
        [['Beyer',s.horse.b],['Style',s.horse.sty],['Jockey%',s.horse.j+'%'],['Trainer%',s.horse.tr+'%'],['Layoff',(s.horse.layoff||'?')+'d'],['Equipment',(s.horse.eq?(s.horse.eq.lf?'LASIX 1ST':s.horse.eq.bf?'BLINK 1ST':s.horse.eq.bl?'Blinkers':'None'):'—')],['Class Chg',s.horse.cc!=null?(s.horse.cc===0?'Even':(s.horse.cc<0?'DROP $'+Math.abs(s.horse.cc)+'K':'UP $'+s.horse.cc+'K')):'--'],['Workout Pts',(s.wkScore||0)>0?'+'+s.wkScore+' pts':'—'],['Dist Fit',(s.distFitAdj||0)!==0?((s.distFitAdj>0?'+':'')+s.distFitAdj+' pts ('+( s.horse.distFit||'tested')+')'):s.horse.distFit||'—'],['Stakes',(s.stakesBonus||0)>0?'+'+s.stakesBonus+' pts':'—'],['New Trn Bonus',(s.newTrnBonus||0)>0?'+'+s.newTrnBonus+'pts':'—'],['Drop Bonus',(s.extremeDropBonus||0)>0?'+'+s.extremeDropBonus+'pts':'—'],['Base',s.base],['Track Adj',(s.tb>=0?'+':'')+s.tb],['Win Prob',pr2+'%'],['Final Score',s.score]].map(function(x){
          var vc=x[0]==='Track Adj'?(parseFloat(x[1])>=0?'var(--green)':'var(--red)'):x[0]==='Final Score'?'var(--gold)':x[0]==='Workout Pts'?'var(--purple)':x[0]==='Dist Fit'?(s.distFitAdj>0?'var(--green)':s.distFitAdj<0?'var(--red)':'var(--muted)'):x[0]==='Stakes'?'#c490f8':'var(--text)';
          return '<div class="hcard-stat"><div class="hcard-stat-l">'+x[0]+'</div><div class="hcard-stat-v" style="color:'+vc+'">'+x[1]+'</div></div>';
        }).join('')+
        '</div>'+kaciPanel(race.n,s.name,k,s.km)+liveUpdatesPanel(race.n,s.name,s.horse)+
        // ── Workout log ──
        (s.horse.wk&&s.horse.wk.length>0?
          '<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">'+
          '<div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Workouts</div>'+
          '<table style="width:100%;border-collapse:collapse;font-size:11px">'+
          '<tr style="color:var(--dim)"><td style="padding:2px 4px">Days</td><td style="padding:2px 4px">Dist</td><td style="padding:2px 4px">Time</td><td style="padding:2px 4px">Rank</td><td style="padding:2px 4px">Track</td><td style="padding:2px 4px">Flag</td></tr>'+
          s.horse.wk.slice(0,5).map(function(w){
            var isBullet=w.bullet;
            var rf=w.field>0?w.rank/w.field:1;
            var qual=isBullet?'<span style="color:#b48cf8;font-weight:600">🔵 B</span>':
                     rf<0.1?'<span style="color:var(--green)">★ Elite</span>':
                     rf<0.2?'<span style="color:var(--gold)">✓ Top 20%</span>':'';
            return '<tr style="border-top:1px solid #0d0d18;color:'+(isBullet?'#b48cf8':'var(--text)')+'">'+'<td style="padding:3px 4px">'+w.daysAgo+'d</td>'+'<td style="padding:3px 4px">'+w.dist+'</td>'+'<td style="padding:3px 4px;font-family:monospace">'+w.time+'</td>'+'<td style="padding:3px 4px;color:var(--muted)">'+w.rank+'/'+w.field+'</td>'+'<td style="padding:3px 4px;color:var(--dim)">'+w.track+'</td>'+'<td style="padding:3px 4px">'+qual+'</td></tr>';
          }).join('')+
          '</table>'+
          (s.wkLabel?'<div style="font-size:10px;color:var(--muted);margin-top:3px">Score: +'+s.wkScore+' — '+s.wkLabel+'</div>':'')+
          '</div>':'')
        +'</div>':'')+
      '</div>';
  });

  flushScr(999);
  el.innerHTML=html;
}


// Flag pills on horse card
function whyBadge(s){
  // Returns a single badge explaining the PRIMARY reason this horse scores well
  // s = scoreRace result object with component breakdown
  if(!s) return '';

  var reasons = [];

  // Build reason list ranked by contribution
  if(s.lasixFirst > 0)   reasons.push({label:'1ST LASIX', score:s.lasixFirst, color:'#4ec97e', bg:'#0d2010'});
  if(s.blinkFirst > 0)   reasons.push({label:'BLINKERS ON', score:s.blinkFirst, color:'#b48cf8', bg:'#1a1030'});
  if(s.extremeDropBonus > 0) reasons.push({label:'BIG DROP', score:s.extremeDropBonus, color:'#4ec97e', bg:'#0a2010'});
  if(s.newTrnBonus > 0)  reasons.push({label:'NEW TRAINER', score:s.newTrnBonus, color:'#c8a84b', bg:'#1a1500'});
  if(s.stakesBonus > 0)  reasons.push({label:'STAKES BRED', score:s.stakesBonus, color:'#f0c850', bg:'#1a1200'});

  // Component scores — find dominant factor
  var components = [
    {label:'SPEED', score: s.spdRaw||0, color:'#e07733', bg:'#1a0d00'},
    {label:'FORM',  score: s.frmRaw||0, color:'#4ec97e', bg:'#0d2010'},
    {label:'CLASS', score: s.clsRaw||0, color:'#b48cf8', bg:'#1a1030'},
    {label:'PACE',  score: s.pceRaw||0, color:'#6aabbb', bg:'#0d1a20'},
  ];
  var topComp = components.reduce(function(a,b){return a.score>b.score?a:b;}, {score:0});

  // Jockey dominance
  var jEff = Math.max(s.horse ? (s.horse.j||10) : 10, 10);
  if(jEff >= 25) reasons.push({label:'HOT JOCK '+jEff+'%', score:jEff, color:'#c8a84b', bg:'#1a1200'});
  else if(jEff >= 20) reasons.push({label:'JOC '+jEff+'%', score:jEff*0.5, color:'#aaaa66', bg:'#151500'});

  // Distance proven
  if(s.distFitAdj >= 5) reasons.push({label:'PROVEN DIST', score:5, color:'#6aabbb', bg:'#0d1a20'});

  // Bullet workout
  if(s.trendScore >= 70) reasons.push({label:'IMPROVING', score:s.trendScore*0.5, color:'#4ec97e', bg:'#052010'});
  if(s.trendScore <= 15) reasons.push({label:'DECLINING', score:20, color:'#e05555', bg:'#200505'});
  if(s.bulletBonus > 0)  reasons.push({label:'BULLET WRK', score:s.bulletBonus, color:'#b48cf8', bg:'#1a1030'});

  // Pick the top reason by score
  var allReasons = reasons.concat([topComp]);
  allReasons.sort(function(a,b){return b.score-a.score;});
  var top = allReasons[0];
  if(!top || top.score <= 0) return '';

  return '<span style="font-size:9px;font-weight:700;background:'+top.bg+
    ';color:'+top.color+';border:1px solid '+top.color+'44;'+
    'border-radius:3px;padding:2px 6px;letter-spacing:.3px">'+top.label+'</span>';
}

  var heqf=h.eq||{lf:false,bf:false,bl:false};

function setKaciEnabled(rn,name,on){
  if(!kaci[rn])kaci[rn]={};
  if(!kaci[rn][name])kaci[rn][name]={enabled:false,carry:0,conformation:0,temperament:0};
  kaci[rn][name].enabled=on;
  renderRankings();
}
function setKaciVal(rn,name,field,val){
  if(!kaci[rn])kaci[rn]={};
  if(!kaci[rn][name])kaci[rn][name]={enabled:false,carry:0,conformation:0,temperament:0};
  // If tapping N/A on all 3, disable. Otherwise auto-enable.
  kaci[rn][name][field]=val;
  // Auto-enable when any non-N/A value is set
  var k=kaci[rn][name];
  k.enabled=(k.carry>0||k.conformation>0||k.temperament>0);
  renderRankings();
}

function renderPace(){
  var race=R[CUR], scr=scratches[CUR]||{};
  var active=race.horses.filter(function(h){return!scr[h.name];});
  var early=active.filter(function(h){return h.sty==='Leader'||h.sty==='Speed';});
  var press=active.filter(function(h){return h.sty==='Tracker';});
  var mid=active.filter(function(h){return h.sty==='Midpack';});
  var closrs=active.filter(function(h){return h.sty==='Closer'||h.sty==='Plodder';});
  var sc=scoreRace(CUR);

  var scenario,sCol,sIcon,sDesc,setup;
  if(early.length===0){scenario='NO SPEED';sCol='var(--blue)';sIcon='😴';sDesc='No front-runners — slow tactical race. Closers and stalkers get a clean trip.';setup='Favors Closers/Trackers';}
  else if(early.length===1){scenario='LONE SPEED';sCol='var(--gold)';sIcon='⚡';sDesc=early[0].name+' has an uncontested lead — lone speed on a fast track wins at a very high rate. Strong lean.';setup='Strong lean: '+early[0].name;}
  else if(early.length===2){scenario='DUAL SPEED';sCol='#d4b55a';sIcon='⚔️';sDesc=early.map(function(h){return h.name;}).join(' and ')+' will fight for the lead. Contested pace sets up closers.';setup='Slight edge to Closers';}
  else{scenario='HOT PACE';sCol='var(--red)';sIcon='🔥';sDesc=early.length+' horses want the lead. Hot pace almost always collapses — closers and stalkers are perfectly set.';setup='Strong favor: Closers/Trackers';}

  var segs=[{lbl:'Early',arr:early,col:'var(--gold)'},{lbl:'Trackers',arr:press,col:'var(--blue)'},{lbl:'Mid-Pack',arr:mid,col:'#9eaac8'},{lbl:'Closers',arr:closrs,col:'var(--green)'}].filter(function(s){return s.arr.length>0;});
  var total=active.length||1;
  var sClr={Leader:'var(--gold)',Speed:'#d4b55a',Tracker:'var(--blue)',Midpack:'#9eaac8',Closer:'var(--green)',Plodder:'var(--muted)'};

  var html='<div class="card-gold" style="border-color:'+sCol+'">'+
    '<div style="display:flex;gap:14px;flex-wrap:wrap">'+
    '<div style="font-size:44px;line-height:1">'+sIcon+'</div>'+
    '<div style="flex:1">'+
    '<div class="slabel">Pace Scenario — Race '+race.n+'</div>'+
    '<div class="bebas" style="font-size:26px;color:'+sCol+'">'+scenario+'</div>'+
    '<div style="font-size:12px;color:#aaa;line-height:1.7;margin-top:6px">'+sDesc+'</div>'+
    '<div style="margin-top:8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 11px;font-size:12px">'+
    '<span class="slabel" style="display:inline">Betting Setup: </span>'+
    '<span style="color:'+sCol+';font-weight:600">'+setup+'</span></div>'+
    '</div></div>'+
    '<div style="margin-top:12px">'+
    '<div class="slabel">Field Composition</div>'+
    '<div class="pace-bar">'+
    segs.map(function(s){return'<div class="pace-seg" style="flex:'+s.arr.length+';background:'+s.col+'">'+s.arr.length+'</div>';}).join('')+
    '</div>'+
    '<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:11px">'+
    segs.map(function(s){
      return'<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+s.col+';margin-right:4px;opacity:.8"></span>'+
      '<span style="color:var(--muted)">'+s.lbl+': </span><b>'+s.arr.length+'</b>'+
      '<span style="color:var(--dim)"> ('+s.arr.map(function(h){return h.name;}).join(', ')+')</span></span>';
    }).join('')+
    '</div></div></div>';

  // Projections
  var proj=active.map(function(h){
    var e={Leader:[.95,.85,.70],Speed:[.90,.88,.75],Tracker:[.78,.92,.85],Midpack:[.70,.85,.90],Closer:[.60,.78,.95],Plodder:[.55,.72,.88]}[h.sty]||[.72,.82,.85];
    return{name:h.name,sty:h.sty,b:h.b,e1:Math.round(h.b*e[0]),e2:Math.round(h.b*e[1]),late:Math.round(h.b*e[2])};
  }).sort(function(a,b){return b.e1-a.e1;});

  html+='<div class="card"><div class="ctitle">Pace Projections</div>';
  proj.forEach(function(h){
    var mx=Math.max(h.e1,h.e2,h.late);
    html+='<div style="padding:7px 0;border-bottom:1px solid #0d0d18">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'+
      '<div style="flex:1;font-size:13px;font-weight:500">'+h.name+'</div>'+
      '<span style="font-size:11px;color:'+(sClr[h.sty]||'#888')+';background:var(--bg2);padding:1px 7px;border-radius:20px;border:1px solid '+(sClr[h.sty]||'#888')+'44">'+h.sty+'</span>'+
      '<span style="font-size:11px;color:var(--gold)">'+h.b+'</span></div>'+
      [['E1',h.e1,'var(--gold)'],['E2',h.e2,'var(--blue)'],['Late',h.late,'var(--green)']].map(function(x){
        return'<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'+
          '<span style="font-size:10px;color:var(--dim);min-width:28px">'+x[0]+'</span>'+
          '<div class="proj-bar"><div class="proj-fill" style="width:'+Math.round(x[1]/mx*100)+'%;background:'+x[2]+'"></div></div>'+
          '<span style="font-size:11px;color:var(--muted);min-width:24px">'+x[1]+'</span></div>';
      }).join('')+
      '</div>';
  });
  html+='</div>';

  // Pace-adjusted picks
  html+='<div class="card"><div class="ctitle">Pace-Adjusted Picks</div>';
  sc.forEach(function(s){
    var st=s.horse.sty;
    var benefit=(scenario==='LONE SPEED'&&(st==='Leader'||st==='Speed'))||
                (scenario==='HOT PACE'&&(st==='Closer'||st==='Tracker'))||
                (scenario==='DUAL SPEED'&&(st==='Closer'||st==='Tracker'));
    var hurt=(scenario==='HOT PACE'&&(st==='Leader'||st==='Speed'))||
             (scenario==='LONE SPEED'&&(st==='Closer'||st==='Plodder'));
    if(benefit){
      html+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #0d0d18;font-size:13px">'+
        '<span style="color:var(--green)">✅</span>'+
        '<span style="flex:1;font-weight:500">'+s.name+'</span>'+
        '<span style="font-size:11px;color:'+(sClr[st]||'#888')+';background:var(--bg2);padding:1px 7px;border-radius:20px;border:1px solid '+(sClr[st]||'#888')+'44">'+st+'</span>'+
        '<span class="bebas" style="font-size:16px;color:var(--gold)">'+s.score+'</span></div>';
    }
  });
  var hasBenefit=sc.some(function(s){var st=s.horse.sty;return(scenario==='LONE SPEED'&&(st==='Leader'||st==='Speed'))||(scenario==='HOT PACE'&&(st==='Closer'||st==='Tracker'))||(scenario==='DUAL SPEED'&&(st==='Closer'||st==='Tracker'));});
  if(!hasBenefit)html+='<div style="color:var(--dim);font-size:12px">Even setup — no clear pace beneficiary in this race.</div>';
  html+='</div>';

  document.getElementById('tab-pace').innerHTML=html;
}

// ═══════════════════════════════════════════════════════════
function initMR(n){mrLegs=[];mrSels={};for(var i=0;i<n;i++)mrLegs.push(i);renderMR();}
function setMRStart(s){var n=mrLegs.length;mrLegs=[];mrSels={};for(var i=0;i<n&&(s+i)<10;i++)mrLegs.push(s+i);renderMR();}
function setMRUnit(v){mrUnit=v;renderMR();}
function toggleMRSel(ri,name){
  if(!mrSels[ri])mrSels[ri]=[];
  var idx=mrSels[ri].indexOf(name);
  if(idx>-1)mrSels[ri].splice(idx,1);
  else{if(mrSels[ri].length>=3)mrSels[ri].shift();mrSels[ri].push(name);}
  renderMR();
}

function renderMR(){
  var el=document.getElementById('tab-multirace');
  var combos=mrLegs.reduce(function(acc,ri){return acc*Math.max(1,(mrSels[ri]||[]).length);},1);
  var cost=combos*mrUnit;
  var allSet=mrLegs.length>0&&mrLegs.every(function(ri){return(mrSels[ri]||[]).length>0;});

  var html='<div class="card-gold">'+
    '<div class="ctitle">Pick 3 / 4 / 5 Builder</div>'+
    '<div style="font-size:11px;color:var(--muted);margin-bottom:12px">Pick consecutive races. Select up to 3 horses per leg. Ticket cost calculated automatically.</div>'+

  } else {

      });

    });
    html+='</div>';

    // Ticket summary
    html+='<div class="card-gold">'+
      '<div class="ctitle">Ticket Summary</div>'+
      '<div class="stat-grid">';

      var longshot = sc.slice(1).find(function(s){

      });
      return {ri:ri, top:top, longshot:longshot, sc:sc};
    });

    var singlesProb = smartLegs.reduce(function(p,leg){
      if(!leg.top) return p;
      var probs = softmax(leg.sc);
      return p * (probs[0]||0.1);
    }, 1);
    var singleCost = mrUnit;
    var topPickOdds = smartLegs.map(function(leg){
      return leg.top ? mlDec(getOdds(leg.ri, leg.top.name)) : 3;
    });
    var singlePayout = mrUnit * topPickOdds.reduce(function(p,o){return p*(o+1);}, 1) * 0.75; // ~75% track take factor
    var singleEV = ((singlesProb * singlePayout) - singleCost).toFixed(2);

    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';

    html += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px">';

    html += '</div>';

    // With-a-key (top pick + 1 longshot per leg)
    var keyPicks = smartLegs.map(function(leg){
      var picks = [leg.top ? leg.top.name : null];
      if(leg.longshot) picks.push(leg.longshot.name);
      return picks.filter(Boolean);
    });
    var keyCombos = keyPicks.reduce(function(a,p){return a*p.length;},1);
    var keyCost = (keyCombos * mrUnit).toFixed(2);
    html += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px">';
    html += '<div style="font-size:11px;color:var(--dim);margin-bottom:4px">WITH-A-KEY (top + longshot threat)</div>';
    html += '<div style="font-size:12px;color:var(--text);line-height:1.8">';

      html += 'R'+R[leg.ri].n+': <b style="color:var(--gold)">'+disp+'</b>';

    '</div>';

    var w=cfWts[c];
    totalW+=w;
    return{race:race,idx:i,top:s[0],cf:c,w:w};
  }).filter(function(a){return a.top;});

  html+='<div class="card"><div class="ctitle">Half Kelly — All 10 Races</div>';
  allocs.forEach(function(a){
    var pct=(a.w/totalW*100).toFixed(0);
    var amt=(a.w/totalW)*rem();
    var cc=a.cf==='high'?'badge-h':a.cf==='medium'?'badge-m':'badge-l';
    html+='<div class="alloc-row">'+
      '<div style="font-size:13px;flex:1;min-width:130px"><b>R'+a.race.n+'</b> '+a.top.name+'</div>'+
      '<span class="'+cc+'">'+a.cf.toUpperCase()+'</span>'+
      '<div class="pbar" style="flex:1;min-width:50px"><div class="pbar-fill" style="width:'+pct+'%"></div></div>'+
      '<div style="font-size:11px;color:var(--dim);min-width:26px">'+pct+'%</div>'+
      '<div class="bebas" style="font-size:18px;color:var(--gold);min-width:44px;text-align:right">$'+amt.toFixed(2)+'</div>'+
      '</div>';
  });
  html+='</div>';

  // Bet recs for current race
  if(sc.length>0){
    var top=sc[0], odds=getOdds(CUR,top.name), ka=kellyBet(pr[0]||.01,odds,rem());
    html+='<div class="card"><div class="ctitle">Bet Recs — Race '+R[CUR].n+'</div>'+
      '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 13px;margin-bottom:8px">'+
      '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
      '<div class="bebas" style="font-size:14px;color:'+(ka>0?'var(--gold)':'#884444')+'">'+
        (ka>0?(cf==='high'?'Recommended: WIN':cf==='medium'?'Recommended: WIN / PLACE':'Recommended: PLACE / SHOW'):'NO BET — Skip This Race')+
      '</div>'+
      '<div style="font-size:12px;color:var(--muted);flex:1">#'+top.horse.pp+' '+top.name+' @ '+odds+'</div>'+
      '<div class="bebas" style="font-size:22px;color:'+(ka>0?'var(--green)':'#664444')+'">'+
        (ka>0?'$'+ka.toFixed(2):'SKIP')+
      '</div></div>'+
      (ka>0?
        ((sc.length>=2?'<div class="note-box" style="margin-top:8px"><b>Secondary option:</b> Exacta '+sc[0].name+' &gt; '+sc[1].name+(sc[2]?'<br>Trifecta: '+sc[0].name+' / '+sc[1].name+' / '+sc[2].name:'')+'</div>':''))+
        '<button class="btn on" style="margin-top:8px" onclick="logBet(\''+top.name.replace(/'/g,'\\\'')+'\',' +ka.toFixed(2)+')">Log Recommended Bet — $'+ka.toFixed(2)+'</button>'
        :'<div style="font-size:11px;color:#664444;margin-top:6px;padding:8px;background:#1a0d0d;border-radius:6px">No positive edge at current odds. Consider using this horse in multi-race exotics only.</div>'
      )+
      '</div></div>';
  }
  document.getElementById('tab-bankroll').innerHTML=html;
}

function updateBR(){
  var v=parseFloat(document.getElementById('br-inp').value)||100;
  bankroll=v;render();saveState();
}

function logBet(name,amt){
  wagered+=amt;
  bets.push({race:R[CUR].n,horse:name,amount:amt,type:conf(scoreRace(CUR))==='high'?'WIN':'WIN/PLACE',settled:false,payout:0});
  render();saveState();
  alert('Bet logged: $'+amt.toFixed(2)+' on '+name);
}
