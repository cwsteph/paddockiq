// Core multi-file processor — handles both browse and drag-drop
async function processCSVFiles(files) {
  var queue = document.getElementById('csv-queue');
  if (!queue) return;

  // Get track override if set
  var overrideSel = document.getElementById('csv-track-override');
  var trackOverride = overrideSel ? overrideSel.value : '';

  // Build queue UI rows
  queue.innerHTML = '<div style="font-size:11px;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:8px">Processing '+files.length+' file'+(files.length>1?'s':'')+'…</div>'+
    files.map(function(f, i) {
      return '<div id="qrow_'+i+'" style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px">'+
        '<span style="font-size:11px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+f.name+'</span>'+
        '<span id="qstatus_'+i+'" style="font-size:11px;color:var(--dim)">⏳ Queued</span>'+
      '</div>';
    }).join('');

  var loadedAny = false;
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    var statusEl = document.getElementById('qstatus_'+i);
    if (statusEl) { statusEl.style.color='#6aabbb'; statusEl.textContent='⏳ Parsing…'; }

    try {
      var text = await new Promise(function(res, rej) {
        var r = new FileReader();
        r.onload = function(e) { res(e.target.result); };
        r.onerror = rej;
        r.readAsText(file);
      });

      var cardState = parseSFCSV(text);
      if (!cardState || !cardState.races.length) throw new Error('No races found — make sure this is a DRF _sf.csv Selections File');

      // Auto-detect track from filename if parseSFCSV couldn't find it
      if (!trackOverride && (!cardState.track || cardState.track === 'OP')) {
        var fnUpper = file.name.toUpperCase().replace(/[^A-Z0-9]/g,' ');
        var fnMatch = TRACK_LIST.find(function(t){
          // Match track code at start of filename or surrounded by non-alpha chars
          var re = new RegExp('\\b'+t.code+'\\b','i');
          return re.test(fnUpper) || fnUpper.indexOf(t.code) === 0;
        });
        if (fnMatch && fnMatch.code !== 'OP') {
          cardState.track = fnMatch.code;
          cardState.trackName = fnMatch.name;
          if (cardState.cardInfo) {
            cardState.cardInfo.code = fnMatch.code;
            cardState.cardInfo.track = fnMatch.name;
            cardState.cardInfo.tz = fnMatch.tz || 'America/Chicago';
          }
        }
      }

      // Apply track override if set
      if (trackOverride) {
        var tObj = TRACK_LIST.find(function(t){ return t.code === trackOverride; });
        cardState.track     = trackOverride;
        cardState.trackName = tObj ? tObj.name : trackOverride;
        if (cardState.cardInfo) {
          cardState.cardInfo.code  = trackOverride;
          cardState.cardInfo.track = tObj ? tObj.name : trackOverride;
        }
      }

      var totalHorses = cardState.races.reduce(function(a,r){ return a+r.horses.length; }, 0);
      var d = new Date(cardState.date+'T12:00:00');
      var label = cardState.trackName + ' - ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();

      if (statusEl) { statusEl.style.color='var(--blue)'; statusEl.textContent='💾 Saving to Neon…'; }

      // Save to Neon
      var resp = await fetch('/api/cards', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          track: cardState.track, raceDate: cardState.date,
          numRaces: cardState.races.length, label: label, data: cardState
        })
      });
      var result = await resp.json();

      // Ingest jockey/trainer stats for this track
      ingestCardJockStats(cardState.races, cardState.track);

      var savedId = result.ok ? result.id : null;

      // Load the last file (most recently dropped) into the active view
      // For multiple files, load the last one — user can switch via dropdown
      if (i === files.length - 1) {
        loadCSVCard(cardState);
        if (savedId) {
          window._loadedCardId = savedId;
          // Auto-snapshot pre-race picks to DB
          setTimeout(function(){ snapshotPicks(savedId); }, 1500);
          // Start auto-results loop
          initRaceStatus();
        }
        loadedAny = true;
      }

      if (statusEl) {
        statusEl.style.color = 'var(--green)';
        statusEl.innerHTML = savedId
          ? '✅ '+cardState.races.length+' races · '+totalHorses+' horses · saved id:'+savedId+' · picks snapshotted'
          : '⚠️ Loaded but not saved';
      }

      // Update row to show track badge
      var row = document.getElementById('qrow_'+i);
      if (row) {
        var prof = TRACK_PROFILES[cardState.track];
        var biasColor = prof ? (prof.bias==='speed'?'#d4904a':prof.bias==='closer'?'#6aabbb':'#888') : '#888';
        row.querySelector('span').insertAdjacentHTML('afterend',
          '<span style="font-size:10px;padding:1px 7px;border-radius:20px;border:1px solid '+biasColor+';color:'+biasColor+';white-space:nowrap">'+cardState.track+'</span>'
        );
      }

    } catch (err) {
      console.error('[CSV Import]', err);
      if (statusEl) { statusEl.style.color='#e05555'; statusEl.textContent='❌ '+err.message; }
    }
  }

  // Refresh saved cards dropdown after all files processed
  await loadSavedCardList();
  // Force re-render to make sure everything shows
  try{ renderRaceTabs(); render(); updateCardHeader(); }catch(e){}

  // If multiple files, add a "load a different one" hint
  if (files.length > 1 && loadedAny) {
    var hint = document.createElement('div');
    hint.style.cssText = 'font-size:11px;color:var(--dim);margin-top:8px;padding:6px 10px;background:var(--bg2);border-radius:6px;border:1px solid var(--border)';
    hint.innerHTML = '💡 Last file loaded into view. Use the <strong style="color:var(--gold)">Saved Cards</strong> dropdown below to switch between cards.';
    queue.appendChild(hint);
  }
}


async function saveCardToServer(){
  var btn=document.getElementById("save-card-btn"),st=document.getElementById("save-card-status");
  if(!R.some(function(r){return r.horses.length>0;})){if(st)st.textContent="No parsed card.";return;}
  if(btn){btn.disabled=true;btn.textContent="Saving...";}
  try{
    var raceDate=(cardInfo&&cardInfo.date)?cardInfo.date:new Date().toLocaleDateString("en-CA",{timeZone:"America/Chicago"});
    var track=(cardInfo&&cardInfo.code)?cardInfo.code:"OP";
    var trackName=(cardInfo&&cardInfo.track)?cardInfo.track:"Oaklawn Park";
    var p=raceDate.split("-"),months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var label=trackName+" - "+months[parseInt(p[1])-1]+" "+parseInt(p[2]);
    var resp=await fetch("/api/cards",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({track:track,raceDate:raceDate,numRaces:R.filter(function(r){return r.horses.length>0;}).length,label:label,data:JSON.stringify({cardInfo:cardInfo,races:R,scratches:scratches})})});
    var data=await resp.json();
    if(data.ok){if(st)st.innerHTML='<span style="color:var(--green)">Saved: '+label+'</span>';await loadSavedCardList();}
  }catch(e){if(st)st.innerHTML='<span style="color:var(--red)">Error: '+e.message+'</span>';}
  if(btn){btn.disabled=false;btn.textContent="Save Card";}
}
async function loadSavedCardList(){
  try{
    var resp=await fetch("/api/cards"),cards=await resp.json();
    if(!Array.isArray(cards))return;
    var today=new Date().toLocaleDateString("en-CA",{timeZone:"America/Chicago"});

    // Populate Card Import dropdown
    var sel=document.getElementById("saved-cards-sel");
    if(sel){
      var filterSel=document.getElementById('cards-track-filter');
      var filterCode=filterSel?filterSel.value:'';
      var filtered=filterCode ? cards.filter(function(c){ return c.track===filterCode; }) : cards;
      if(filtered.length===0) filtered=cards;
      sel.innerHTML='<option value="">Select saved card ('+(filtered.length)+')</option>'+filtered.map(function(c){
        var prefix=!filterCode&&c.track ? '['+c.track+'] ' : '';
        var flag=c.raceDate===today?" ● TODAY":c.raceDate>today?" UPCOMING":" past";
        return '<option value="'+c.id+'">'+ prefix +c.label+flag+'</option>';
      }).join("");
    }

    // Populate header card switcher — scoped to the selected track, most recent first
    var hdrSel=document.getElementById("hdr-card-sel");
    if(hdrSel){
      var loadedId=window._loadedCardId||0;
      var trackCode=(cardInfo&&cardInfo.code)||'OP';
      var scoped=cards.filter(function(c){return c.track===trackCode;});
      var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      // Sort: upcoming first, then most-recent past
      scoped.sort(function(a,b){
        var aFut=a.raceDate>=today, bFut=b.raceDate>=today;
        if(aFut!==bFut) return aFut?-1:1;
        return aFut ? a.raceDate.localeCompare(b.raceDate) : b.raceDate.localeCompare(a.raceDate);
      });
      var opts=scoped.map(function(c){
        var parts=c.raceDate.split('-');
        var dLabel=months[parseInt(parts[1])-1]+' '+parseInt(parts[2]);
        var flag=c.raceDate===today?' · TODAY':c.raceDate>today?' · upcoming':'';
        return '<option value="'+c.id+'"'+(c.id===loadedId?' selected':'')+'>'+dLabel+flag+'</option>';
      }).join('');
      hdrSel.innerHTML = opts || '<option value="">No cards saved for this track</option>';
    }

    // Only auto-load if no card is currently loaded
    if(!R.some(function(r){return r.horses.length>0;})){
      var auto=cards.find(function(c){return c.raceDate===today;})||cards.find(function(c){return c.raceDate>=today;});
      if(auto)await loadCardById(auto.id);
    }
  }catch(e){console.warn(e);}
}
async function loadCardById(id){
  try{
    var resp=await fetch("/api/cards?id="+id),card=await resp.json();
    if(!card||!card.data)return;
    var saved=JSON.parse(card.data);
    if(saved.cardInfo){if(!cardInfo)cardInfo={};Object.assign(cardInfo,saved.cardInfo);}
    if(saved.races&&saved.races.length){
      // Sanitize legacy Neon data on load
      R=saved.races.map(function(race){
        return Object.assign({},race,{
          horses:(race.horses||[]).map(function(h){
            var eq=h.eq||{lf:false,lo:false,bf:false,bl:false};
            // Legacy: lf was set for "on lasix" not "first time" — move to lo
            if(eq.lf&&!eq.lo){ eq=Object.assign({},eq,{lo:true,lf:false}); }
            // Legacy: distFit:'csv' → 'tested' as safe default
            var distFit=h.distFit==='csv'?'tested':(h.distFit||'tested');
            return Object.assign({},h,{eq:eq,distFit:distFit});
          })
        });
      });
    }
    if(saved.scratches)scratches=saved.scratches;
    window._loadedCardId=id;
    // Sync header dropdowns
    var hdrSel=document.getElementById("hdr-card-sel");
    if(hdrSel) hdrSel.value=String(id);
    var hdrTrackSel=document.getElementById("hdr-track-sel");
    if(hdrTrackSel && cardInfo && cardInfo.code) hdrTrackSel.value=cardInfo.code;
    // Initialize auto-pipeline for this card
    initRaceStatus();
    // Persist jockey/trainer stats for this track
    var _tCode=(saved.cardInfo&&saved.cardInfo.code)?saved.cardInfo.code:null;
    if(_tCode) ingestCardJockStats(saved.races, _tCode);
    // Reset track condition & bias to match the new track's profile
    if(_tCode){
      var _tp = TRACK_PROFILES[_tCode] || {};
      var biasMap = {speed:'speed',closer:'closer',neutral:'none'};
      tc.bias = biasMap[_tp.bias] || 'none';
      // Clear TVG commentary cache so it re-fetches for the new track
      tvgCommentary = {};
    }
    // Update weather to match the loaded track
    if(_tCode && typeof updateWeatherForTrack === 'function') updateWeatherForTrack(_tCode);
    updateCardHeader();renderRaceTabs();goRace(0);render();
    // Fetch TVG odds immediately to populate morning lines (fixes 5-1 default issue)
    setTimeout(function(){ fetchLiveOdds(true); }, 1000);
    var st=document.getElementById("save-card-status");
    if(st)st.innerHTML='<span style="color:var(--green)">Loaded: '+card.label+'</span>';
    document.querySelectorAll(".ntab").forEach(function(b){if(b.textContent.indexOf("Rankings")>-1)b.click();});
  }catch(e){console.warn(e);}
}
async function loadSelectedCard(){
  var sel=document.getElementById("saved-cards-sel");
  if(!sel||!sel.value)return;
  await loadCardById(parseInt(sel.value));
}



</script>

<script>
// ── Public aliases for CSV import tab ────────────────────────────────────
// parseSFCSV and loadCSVCard are called from handleCSVUpload (defined above)
// They are exposed by initCSVImport() as window._csv* globals

// ============================================================
// PaddockIQ CSV Import Patch
// Append this <script> block to public/index.html before </body>
//
// WHAT THIS DOES:
// 1. Renames "⚡ PP Parser" tab to "📥 Card Import"
// 2. Adds a "📂 Load DRF CSV" button to the top of that tab
//    - Accepts the _sf.csv (Selections File) format from DRF
//    - Parses all horses with Beyers, pace calls, works, ML odds
//    - Scores using updated weights (Beyer + pace now available)
//    - Saves to Neon via /api/cards and populates dropdown
//    - Loads the card immediately into window.R
// 3. Keeps PDF/Paste parse options below (still useful for scratches etc)
// 4. Updated scoring weights that use the richer SF data
// ============================================================

(function initCSVImport() {
  'use strict';

  // ── SCORING ENGINE (updated weights with real Beyer + pace) ──
  // Old weights (no Beyer/pace): speed:27, pace:13, class:23, form:22, jock:5, trainer:4, works:3, ml:3
  // New weights (Beyer+pace available): beyer:18, pace:13, class:20, form:20, speed:10, jock:6, trainer:5, works:4, ml:4
  // Rationale:
  //   - Beyer gets its own full 18% (was merged into speed proxy)
  //   - Pace stays at 13% (now real call positions, not estimated)
  //   - Class drops 3% (23→20) — earnings/claim still useful but less predictive than speed figs
  //   - Form drops 2% (22→20) — still important but Beyer already captures recent form
  //   - Speed proxy drops from 27% to 10% — only used as tiebreaker / dist+trk win%
  //   - Jockey up 1% (5→6), Trainer up 1% (4→5) — richer situational data in SF
  //   - Works up 1% (3→4) — bullet work data now reliable
  //   - ML up 1% (3→4) — market is useful signal especially for first-timers

  const W = {
    beyer:   0.18,
    pace:    0.13,
    class_:  0.20,
    form:    0.20,
    speed:   0.10,
    jock:    0.06,
    trainer: 0.05,
    works:   0.04,
    ml:      0.04
  };

  function nv(v) { const f = parseFloat(v); return isNaN(f) ? 0 : f; }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/\r/,'').replace(/"/g,''));
    return lines.slice(1).map(line => {
      const cols = []; let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') inQ = !inQ;
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      cols.push(cur.trim().replace(/\r/,''));
      const obj = {}; headers.forEach((h,i) => obj[h] = cols[i] || '');
      return obj;
    });
  }

  function getBeyerFigs(h) {
    const figs = [];
    for (let i = 1; i <= 12; i++) {
      const b = nv(h['HR_Beyer_'+i]), date = h['HR_Date_'+i];
      if (!date) break;
      if (b > 0 && b < 900) figs.push(b);
    }
    return figs;
  }

  function getPaceData(h, fieldSize) {
    const data = [];
    for (let i = 1; i <= 6; i++) {
      const date = h['HR_Date_'+i]; if (!date) break;
      const fc = nv(h['HR_FirstCall_'+i]), fin = nv(h['HR_FinalCall_'+i]);
      if (fc > 0) data.push({ first: fc, final: fin });
    }
    return data;
  }

  function getWorks(h) {
    const wk = []; let bullets = 0, score = 0, count = 0;
    for (let i = 1; i <= 6; i++) {
      const d = h['W_Date_'+i]; if (!d) break;
      const isBullet = h['W_Bullet_'+i] === '*';
      const rank = nv(h['W_Rank_'+i]), rankIn = nv(h['W_RankIn_'+i]);
      if (isBullet) bullets++;
      if (rankIn > 0) score += (rankIn - rank) / rankIn;
      count++;
      wk.push({ date: d, dist: String(nv(h['W_Distance_'+i])), time: h['W_WorkTime_'+i],
                bullet: isBullet, rank, rankIn,
                field: rankIn,
                daysAgo: Math.round((new Date() - new Date(d)) / 86400000),
                track: '' });
    }
    return { wk, bullets, score: count > 0 ? score / count : 0.5 };
  }

  function mlToDecimal(mlStr) {
    if (!mlStr || !mlStr.includes('-')) return 99;
    const [a, b] = mlStr.split('-').map(Number);
    return b > 0 ? a/b : 99;
  }

  function inferStyle(h, fieldSize) {
    const calls = [];
    for (let i = 1; i <= 6; i++) {
      const date = h['HR_Date_'+i]; if (!date) break;
      const fc = nv(h['HR_FirstCall_'+i]);
      if (fc > 0) calls.push(fc);
    }
    if (calls.length === 0) return 'Unknown';
    const avg = calls.reduce((a,b)=>a+b,0)/calls.length;
    const fs = fieldSize || 8;
    if (avg <= 1.5) return 'Front';
    if (avg <= 3)   return 'Presser';
    if (avg <= fs*0.5) return 'Tracker';
    return 'Closer';
  }

  function getDays(h) {
    if (!h.H_LastRaced || !h.H_LastRaced.match(/\d+\/\d+\/\d+/)) return 0;
    const p = h.H_LastRaced.split('/'), r = h.R_RCDate.split('/');
    return Math.round((new Date(r[2],r[0]-1,r[1]) - new Date(p[2],p[0]-1,p[1])) / 86400000);
  }

  function scoreRaceCSV(horses) {
    const raw = horses.map(h => {
      // Beyer
      const beyerFigs = getBeyerFigs(h);
      const bestBeyer = beyerFigs.length > 0 ? Math.max(...beyerFigs) : 0;
      const avg3Beyer = beyerFigs.length > 0 ? beyerFigs.slice(0,3).reduce((a,b)=>a+b,0)/Math.min(3,beyerFigs.length) : 0;
      const beyerRaw = bestBeyer > 0 ? bestBeyer*0.55 + avg3Beyer*0.45 : 0;

      // Pace
      const fs = nv(h.R_Starters) || 8;
      const pd = getPaceData(h, fs);
      let earlyPos = 0, posGain = 0;
      if (pd.length > 0) {
        earlyPos = pd.reduce((a,c)=>a+c.first,0)/pd.length;
        posGain  = pd.reduce((a,c)=>a+(c.first-c.final),0)/pd.length;
      }
      const earlyNorm  = earlyPos > 0 ? Math.max(0, 1-(earlyPos-1)/(fs-1)) : 0.5;
      const gainNorm   = posGain > 0 ? Math.min(1, posGain/4) : 0;
      const paceRaw    = earlyNorm*0.6 + gainNorm*0.4;

      // Speed proxy (dist/trk win% as tiebreaker)
      const trkS = nv(h.H_TrkStarts), trkW = nv(h.H_TrkWins);
      const distS = nv(h.H_DistStarts), distW = nv(h.H_DistWins);
      const speedRaw = (trkS>0 ? trkW/trkS : 0)*0.55 + (distS>0 ? distW/distS : 0)*0.45;

      // Class
      const starts = nv(h.H_Starts);
      const eps    = starts > 0 ? nv(h.H_Earnings)/starts : 0;
      const trkEps = trkS > 0 ? nv(h.H_TrkEarnings)/trkS : 0;
      const classRaw = eps*0.55 + trkEps*0.35 + nv(h.H_ClaimPrice)*0.1;

      // Form
      const wins = nv(h.H_Wins), places = nv(h.H_Places), shows = nv(h.H_Shows);
      const cyS = nv(h.H_CYStarts), cyW = nv(h.H_CYWins);
      const winPct  = starts > 0 ? wins/starts : 0;
      const itmPct  = starts > 0 ? (wins+places+shows)/starts : 0;
      const cyWinPct = cyS > 0 ? cyW/cyS : 0;
      const days = getDays(h);
      const layoff = days<=60&&days>=7?1:days<7?0.7:days<=90?0.65:days<=120?0.45:0.2;
      const formRaw = winPct*0.35 + cyWinPct*0.25 + itmPct*0.2 + layoff*0.2;

      // Jockey — use YTD if meet starts < 5 (not enough sample)
      const jMeetStarts = nv(h.H_JockMeetStarts);
      const jMeetPct = nv(h.H_JockMeetWinPct);
      const jYTDPct = nv(h.H_JockYTDWinPct);
      const jEffPct = jMeetStarts >= 5 ? jMeetPct*0.65 + jYTDPct*0.35 : jYTDPct;
      const jockRaw = jEffPct;
      // Display pct — best available
      const jDispPct = jMeetStarts >= 5 ? jMeetPct : jYTDPct;

      // Trainer — use YTD if meet starts < 5 (not enough sample)
      const tMeetStarts = nv(h.H_TrainerMeetStarts);
      const tMeetPct = nv(h.H_TrainerMeetWinPct);
      const tYTDPct = nv(h.H_TrainerYTDWinPct);
      const tEffPct = tMeetStarts >= 5 ? tMeetPct*0.5 + tYTDPct*0.3 : tYTDPct;
      // Display pct — best available
      const tDispPct = tMeetStarts >= 5 ? tMeetPct : tYTDPct;
      const trnrBase = tEffPct;
      let trnrSit = 0;
      let claimAngleBonus = 0;
      for (let i = 1; i <= 6; i++) {
        const cat = h['T_Category_'+i], wp = nv(h['T_WinPct_'+i]), roi = nv(h['T_ROI_'+i]);
        if (cat && wp > 0 && ((days>45&&cat.includes('Off'))||(h.H_Blinker&&cat.includes('Blink'))||cat.includes('Clm')||cat==='Dirt'))
          trnrSit += wp * Math.min(roi/2, 1.5);
        // Claim angle bonus — trainer specializes in claims with strong ROI
        if (cat && (cat.includes('Clm')||cat.toLowerCase().includes('claim')) && wp >= 0.18 && roi >= 1.8)
          claimAngleBonus = Math.min(0.15, wp * Math.min(roi/2, 2.0));
      }
      const trainerRaw = trnrBase*0.7 + Math.min(trnrSit*0.3, 0.25) + claimAngleBonus;

      // Class drop origin — ALW/Stakes → claim = penalty, within-claim drop = bonus
      const lastClassStr = (h.HR_LongClass_1||'').toUpperCase();
      const claimNow = nv(h.H_ClaimPrice);
      const claimLast = nv(h.HR_ClaimPrice_1);
      const isAlwDrop = claimNow>0 && (lastClassStr.includes('ALW')||lastClassStr.includes('OC ')||lastClassStr.includes('ALLOW')||lastClassStr.includes('STK')||lastClassStr.includes('STAKE')||lastClassStr.includes('MSW')||lastClassStr.includes('MDN SP'));
      const isClaimDrop = claimNow>0 && claimLast>0 && claimLast>claimNow;
      const classDropAdj = isAlwDrop ? -0.12 : isClaimDrop ? 0.10 : 0;

      // Works
      const workData = getWorks(h);

      // J/T combo
      const jtBonus = nv(h.H_JTAllWinPct) * Math.min(nv(h.H_JTAllRoi), 5);

      // ML
      const mlDec = mlToDecimal(h.B_MLOdds);
      const mlRaw = mlDec<=1?1:mlDec<=2?0.85:mlDec<=4?0.70:mlDec<=9?0.55:mlDec<=19?0.35:0.15;

      // Past race history (up to 12)
      const pastRaces = [];
      for (let i = 1; i <= 12; i++) {
        const prDate = h['HR_Date_'+i]; if (!prDate) break;
        pastRaces.push({
          date: prDate,
          beyer: nv(h['HR_Beyer_'+i]),
          cls: h['HR_LongClass_'+i] || '',
          claim: nv(h['HR_ClaimPrice_'+i]),
          fc: nv(h['HR_FirstCall_'+i]),
          fin: nv(h['HR_FinalCall_'+i]),
          trk: h['HR_Track_'+i] || '',
          dist: h['HR_Distance_'+i] || '',
          surf: h['HR_Surface_'+i] || '',
          pos: nv(h['HR_FinishPos_'+i]),
          starters: nv(h['HR_Starters_'+i]),
        });
      }

      return {
        horseName: h.H_Horse, pp: parseInt(h.H_PostPosition)||0,
        jockey: h.H_Jockey, trainer: h.H_Trainer, ml: h.B_MLOdds,
        scratch: h.H_Scratch === 'Y', days,
        beyerFigs: beyerFigs.slice(0,3), bestBeyer,
        pastRaces,
        sty: inferStyle(h, fs),
        eq: { lf: false, lo: h.H_Lasix==='L'||h.H_Lasix==='l', bf: false, bl: !!h.H_Blinker },
        wk: workData.wk, bullets: workData.bullets,
        notes: (h.CL_Comment||'').substring(0,120).trim(),
        sire: h.H_Sire, dam: h.H_Dam,
        claimPrice: nv(h.H_ClaimPrice), earnings: nv(h.H_Earnings),
        lastClaimPrice: nv(h.HR_ClaimPrice_1),
        lastClass: h.HR_LongClass_1 || '',
        starts, wins: nv(h.H_Wins), places: nv(h.H_Places), shows: nv(h.H_Shows),
        jockMeetWinPct: jDispPct, trnrMeetWinPct: tDispPct,
        _jDispPct: jDispPct, _tDispPct: tDispPct,
        jtAllWinPct: nv(h.H_JTAllWinPct), jtAllRoi: nv(h.H_JTAllRoi),
        // Trainer situational categories (up to 6) for claim angle pill
        trnrCat1: h.T_Category_1||'', trnrWp1: nv(h.T_WinPct_1), trnrRoi1: nv(h.T_ROI_1),
        trnrCat2: h.T_Category_2||'', trnrWp2: nv(h.T_WinPct_2), trnrRoi2: nv(h.T_ROI_2),
        trnrCat3: h.T_Category_3||'', trnrWp3: nv(h.T_WinPct_3), trnrRoi3: nv(h.T_ROI_3),
        trnrCat4: h.T_Category_4||'', trnrWp4: nv(h.T_WinPct_4), trnrRoi4: nv(h.T_ROI_4),
        // raw scores
        beyerRaw, paceRaw, speedRaw, classRaw, formRaw, jockRaw, trainerRaw,
        classDropAdj,
        worksScore: workData.score, mlRaw, jtBonus,
        // pass through for distFit computation
        H_DistStarts: nv(h.H_DistStarts), H_DistWins: nv(h.H_DistWins),
        H_TrkStarts: nv(h.H_TrkStarts), H_TrkWins: nv(h.H_TrkWins),
        raceFurlongs: nv(h.R_Distance)
      };
    }).filter(h => !h.scratch);

    // Min-max normalize per race
    const factors = ['beyerRaw','paceRaw','speedRaw','classRaw','formRaw','jockRaw','trainerRaw'];
    const mm = {};
    factors.forEach(f => {
      const vals = raw.map(r => r[f]);
      mm[f] = { min: Math.min(...vals), max: Math.max(...vals) };
    });
    const norm = (v,f) => mm[f].max===mm[f].min ? 0.5 : (v-mm[f].min)/(mm[f].max-mm[f].min);
    const jtMax = Math.max(...raw.map(r => r.jtBonus), 0.001);

    return raw.map(h => {
      const bN = norm(h.beyerRaw,'beyerRaw'), pN = norm(h.paceRaw,'paceRaw'),
            sN = norm(h.speedRaw,'speedRaw'), cN = norm(h.classRaw,'classRaw'),
            fN = norm(h.formRaw,'formRaw'),   jN = norm(h.jockRaw,'jockRaw'),
            tN = norm(h.trainerRaw,'trainerRaw'), jtN = h.jtBonus/jtMax;

      const score = Math.round((
        bN*W.beyer + pN*W.pace + sN*W.speed + (cN + h.classDropAdj)*W.class_ + fN*W.form +
        jN*W.jock + tN*W.trainer + h.worksScore*W.works + h.mlRaw*W.ml + jtN*0.02
      ) * 100);

      // Compute distFit from distance history
      const _distS = h.H_DistStarts || 0, _distW = h.H_DistWins || 0;
      const _distLabel = _distS === 0 ? 'first-time'
                       : _distW >= 2 ? 'winner'
                       : _distW === 1 && _distS <= 3 ? 'winner'
                       : _distW === 0 && _distS >= 4 ? 'no wins'
                       : 'tested';
      return {
        name: h.horseName, disp: h.horseName, pp: h.pp, ml: h.ml,
        b: h.bestBeyer, beyerFigs: h.beyerFigs, sty: h.sty,
        j: Math.round(h._jDispPct*100), tr: Math.round(h._tDispPct*100),
        layoff: h.days, cc: 0, wins: h.wins, notes: h.notes, eq: h.eq, wk: h.wk,
        distFit: _distLabel, jockeyName: h.jockey, trainerName: h.trainer,
        sire: h.sire, dam: h.dam, claimPrice: h.claimPrice, earnings: h.earnings,
        lastClaimPrice: h.lastClaimPrice, lastClass: h.lastClass,
        starts: h.starts, places: h.places, shows: h.shows,
        jockMeetWinPct: h._jDispPct, trnrMeetWinPct: h._tDispPct,
        jtAllWinPct: h.jtAllWinPct, jtAllRoi: h.jtAllRoi,
        trnrCat1: h.trnrCat1, trnrWp1: h.trnrWp1, trnrRoi1: h.trnrRoi1,
        trnrCat2: h.trnrCat2, trnrWp2: h.trnrWp2, trnrRoi2: h.trnrRoi2,
        trnrCat3: h.trnrCat3, trnrWp3: h.trnrWp3, trnrRoi3: h.trnrRoi3,
        trnrCat4: h.trnrCat4, trnrWp4: h.trnrWp4, trnrRoi4: h.trnrRoi4,
        _csvScore: score
      };
    });
  }

  // ── PARSE FULL SF CSV INTO CARD ──────────────────────────────
  function parseSFCSV(text) {
    const rawRows = parseCSV(text);
    // Carry R_RCRace forward (only first horse per race has it populated)
    let currentRace = null, raceFields = {};
    const rows = rawRows.map(r => {
      if (r.R_RCRace) {
        currentRace = r.R_RCRace;
        raceFields = Object.fromEntries(Object.entries(r).filter(([k]) => k.startsWith('R_') && r[k] !== ''));
      }
      if (!r.H_Horse?.trim()) return null;
      // Merge: raceFields first, then only non-empty row values on top
      var merged = { ...raceFields };
      Object.entries(r).forEach(([k, v]) => { if (v !== '') merged[k] = v; });
      merged._race = currentRace;
      return merged;
    }).filter(Boolean);

    if (rows.length === 0) return null;

    const raceNums = [...new Set(rows.map(r => r._race))].sort((a,b) => +a - +b);
    const dateStr  = rows[0].R_RCDate || '';          // "4/2/2026"
    // Detect track from multiple possible CSV fields
    const _rawTrack = rows[0].R_RCTrack || rows[0].R_Track || rows[0].R_TrackCode || rows[0].TrackCode || '';
    // Try to match raw track name to a TRACK_LIST entry
    var _detectedCode = _rawTrack;
    var _detectedName = rows[0].R_TrackName || rows[0].R_RCTrackName || '';
    if (!_detectedCode && _detectedName) {
      // Try matching track name to TRACK_LIST
      var _tLow = _detectedName.toLowerCase();
      var _found = TRACK_LIST.find(function(t){ return t.name.toLowerCase() === _tLow || t.name.toLowerCase().indexOf(_tLow) >= 0 || _tLow.indexOf(t.name.toLowerCase()) >= 0; });
      if (_found) _detectedCode = _found.code;
    }
    // If still no code, try to detect from race data — check if any horse past-race tracks give a hint
    if (!_detectedCode) {
      var _trackHints = {};
      rows.slice(0, 20).forEach(function(r) {
        for (var ti = 1; ti <= 3; ti++) {
          var trk = r['HR_Track_' + ti];
          if (trk) _trackHints[trk] = (_trackHints[trk] || 0) + 1;
        }
      });
      // Most common track in past races is likely the current track
      var _topTrack = Object.entries(_trackHints).sort(function(a,b){ return b[1]-a[1]; })[0];
      if (_topTrack) {
        var _tMatch = TRACK_LIST.find(function(t){ return t.code === _topTrack[0] || t.name.toLowerCase().indexOf(_topTrack[0].toLowerCase()) >= 0; });
        if (_tMatch) { _detectedCode = _tMatch.code; _detectedName = _tMatch.name; }
      }
    }
    const trackCode = _detectedCode || 'OP';
    const trackName = _detectedName || (TRACK_LIST.find(function(t){return t.code===trackCode;})||{}).name || 'Oaklawn Park';

    // Convert "4/2/2026" → "2026-04-02"
    let isoDate = dateStr;
    if (dateStr.match(/\d+\/\d+\/\d+/)) {
      const [m,d,y] = dateStr.split('/');
      isoDate = y + '-' + m.padStart(2,'0') + '-' + d.padStart(2,'0');
    }

    // Display date: "Apr 2, 2026"
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const dispDate = dateStr.match(/\d+\/\d+\/\d+/) ?
      months[parseInt(dateStr.split('/')[0])-1] + ' ' + parseInt(dateStr.split('/')[1]) + ', ' + dateStr.split('/')[2]
      : dateStr;

    const races = raceNums.map(rn => {
      const horses = rows.filter(r => r._race === rn);
      const ri = horses[0];
      const dist = nv(ri.R_Distance);
      const scored = scoreRaceCSV(horses);

      return {
        n: parseInt(rn),
        t: (ri.R_PostTime || '') + ' ' + (function(){ var tz=(cardInfo&&cardInfo.tz)||''; if(tz.indexOf('New_York')>=0||tz.indexOf('Indiana')>=0) return 'ET'; if(tz.indexOf('Los_Angeles')>=0||tz.indexOf('Phoenix')>=0) return 'PT'; if(tz.indexOf('Denver')>=0) return 'MT'; return 'CT'; })(),
        d: dist + 'F ' + (ri.R_Surface === 'T' ? 'Turf' : 'Dirt'),
        ty: ri.R_LongClass || ri.R_Class || '',
        grade: (function(){
          var tc = (ri.R_LongClass||ri.R_Class||'').toUpperCase();
          if(/-G1\b|\bG1\b/.test(tc)) return 1;
          if(/-G2\b|\bG2\b/.test(tc)) return 2;
          if(/-G3\b|\bG3\b/.test(tc)) return 3;
          return 0;
        })(),
        gradeName: (function(){
          var tc = (ri.R_LongClass||ri.R_Class||'').toUpperCase();
          if(/-G1\b|\bG1\b/.test(tc)) return 'Grade 1';
          if(/-G2\b|\bG2\b/.test(tc)) return 'Grade 2';
          if(/-G3\b|\bG3\b/.test(tc)) return 'Grade 3';
          return '';
        })(),
        purse: String(Math.round(nv(ri.R_Purse) * 1000)),
        horses: scored
      };
    });

    return {
      track: trackCode, trackName, date: isoDate, tz: (TRACK_LIST.find(function(t){return t.code===trackCode;})||{}).tz || 'America/Chicago',
      cardInfo: { track: trackName, code: trackCode, numRaces: races.length, date: isoDate, tz: (TRACK_LIST.find(function(t){return t.code===trackCode;})||{}).tz || 'America/Chicago' },
      races, dispDate
    };
  }

  // ── LOAD CARD INTO APP ───────────────────────────────────────
  function loadCardIntoApp(cardState) {
    // Fix workout dist to string (app calls .replace() on it)
    cardState.races.forEach(race => {
      race.horses.forEach(horse => {
        if (horse.wk) horse.wk.forEach(w => { w.dist = String(w.dist); });
      });
    });

    // Write to localStorage
    localStorage.setItem('paddockiq_state', JSON.stringify(cardState));

    // Swap window.R and re-render
    if (window.R) {
      window.R.splice(0, window.R.length, ...cardState.races);
    }
    if (window.cardInfo) {
      Object.assign(window.cardInfo, cardState.cardInfo);
    }
    // Update weather coordinates and re-fetch for the newly loaded track
    var trackCode = (cardState.cardInfo && cardState.cardInfo.code) || cardState.track;
    if (trackCode && typeof updateWeatherForTrack === 'function') {
      updateWeatherForTrack(trackCode);
    }
    // Reset bias to track default
    if (trackCode && typeof TRACK_PROFILES !== 'undefined') {
      var _tp = TRACK_PROFILES[trackCode] || {};
      var biasMap = {speed:'speed',closer:'closer',neutral:'none'};
      if (typeof tc !== 'undefined') tc.bias = biasMap[_tp.bias] || 'none';
    }
    // Refresh header, race tabs, dropdown, and navigate to race 1
    if (typeof window.updateCardHeader === 'function') window.updateCardHeader();
    if (typeof window.renderRaceTabs === 'function') window.renderRaceTabs();
    if (typeof window.goRace === 'function') window.goRace(0);
    if (typeof window.loadSavedCardList === 'function') window.loadSavedCardList();
    if (typeof window.render === 'function') window.render('rankings');
    // Fetch live odds to replace 5-1 defaults
    setTimeout(function(){ if(typeof fetchLiveOdds==='function') fetchLiveOdds(true); }, 1000);
  }

  // ── SAVE TO NEON ─────────────────────────────────────────────
  async function saveToNeon(cardState, label) {
    const resp = await fetch('/api/cards', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        track: cardState.track,
        raceDate: cardState.date,
        numRaces: cardState.races.length,
        label,
        data: cardState
      })
    });
    const result = await resp.json();
    if (result.ok) {
      // Refresh the dropdown
      if (typeof window.loadSavedCardList === 'function') window.loadSavedCardList();
    }
    return result;
  }

  // Expose for console debugging and external callers
  window._csvParseSF  = parseSFCSV;
  window._csvLoadCard = loadCardIntoApp;
  window._csvSaveNeon = saveToNeon;
  window._csvWeights  = W;
})();

// Public aliases
window.parseSFCSV  = window._csvParseSF;
window.loadCSVCard = window._csvLoadCard;

</script>
