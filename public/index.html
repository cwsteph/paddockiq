function handleMultiDrop(files){
  if(!files || !files.length) return;
  // Check if these are single-race PDFs (multiple files) or one full card PDF
  if(files.length > 1){
    // Multiple files — treat as individual race PDFs
    if(typeof fetchEquibaseData === 'function' && cardInfo.date){
      // Sync Equibase first to get rosters
      fetchEquibaseData().then(function(eqData){
        if(eqData){
          rebuildRacesFromEquibase(eqData);
          // Build equibase rosters
          var url = equibaseURL();
          if(url) fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({action:'fetchDRF',url:url})})
            .then(function(r){return r.json();})
            .then(function(d){
              if(d.ok&&d.text) equibaseRosters=parseEquibaseRosters(d.text);
              parseMultiplePDFs(files);
            }).catch(function(){parseMultiplePDFs(files);});
          else parseMultiplePDFs(files);
        } else parseMultiplePDFs(files);
      }).catch(function(){ parseMultiplePDFs(files); });
    } else {
      parseMultiplePDFs(files);
    }
  } else {
    // Single file — use existing full-card parser
    var input = document.createElement('input');
    ppHandleFile(files[0]);
  }
}

async function parseMultiplePDFs(files){
  var key = ppApiKey || '';
  if(!key){ alert('Add your API key in Settings first.'); return; }
  if(!files || !files.length) return;

  var fileArr = Array.from(files).sort(function(a,b){
    return a.name.localeCompare(b.name, undefined, {numeric:true});
  });

  var applied = 0, errors = [], total = fileArr.length;

  function setMP(msg, pct){
    var el = document.getElementById('parse-progress');
    if(!el) return;
    el.innerHTML = '<div style="font-size:13px;color:#b48cf8;margin-bottom:6px">'+msg+'</div>'+
      '<div style="background:var(--border);border-radius:4px;height:8px;width:100%">'+
        '<div style="background:#b48cf8;border-radius:4px;height:8px;width:'+pct+'%;transition:width .4s"></div>'+
      '</div>'+
      '<div style="font-size:11px;color:var(--dim);margin-top:4px">'+applied+'/'+total+' files applied</div>';
  }

  ppParseState.loading = false;
  ppParseState.progress = {current:0, total:total, applied:0};
  renderPPParser();

  for(var fi=0; fi<fileArr.length; fi++){
    var file = fileArr[fi];
    setMP('Reading '+file.name+'...', Math.round(fi/total*20));

    try{
      var b64 = await new Promise(function(resolve, reject){
        var reader = new FileReader();
        reader.onload  = function(e){ resolve(e.target.result.split(',')[1]); };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      // Detect race number from filename — explicitly avoid date digits
      // Match: Race1.pdf, R1.pdf, Race_1.pdf — NOT dates like 03-22-2026
      var rnm = file.name.match(/(?:race|r)[\s_\-]?(\d{1,2})(?![\d\-])/i);
      if(!rnm){
        // Try bare number only if filename is simple like "1.pdf" or "11.pdf"
        var simpleNum = file.name.match(/^(\d{1,2})\.pdf$/i);
        rnm = simpleNum;
      }
      var hintRaceN = rnm ? parseInt(rnm[1]) : null;

      setMP('Parsing '+file.name+(hintRaceN?' (Race '+hintRaceN+')':'')+' ...', Math.round((fi/total)*90+5));

      var roster    = (hintRaceN && typeof equibaseRosters!=='undefined' && equibaseRosters[hintRaceN]) || [];
      var rosterStr = roster.length ? ' Equibase roster: '+roster.map(function(h){return h.name;}).join(', ')+'. Only return these horses.' : '';
      var raceHint  = hintRaceN ? 'This is Race '+hintRaceN+' past performance page.'+rosterStr : 'Detect the race number from this past performance page.';

      var prompt = raceHint+'\n\nExtract ALL horses from this single-race DRF past performance PDF.\n\nRULES:\n1. Horse names are proper nouns e.g. Boltoro, Mo Sense\n2. NEVER use a number as a name - numbers are post positions\n3. J/T line e.g. J/T 2025-26 OP (47 14 .30) = 30% win rate\n4. Use CURRENT MEET win% not career stats\n\nReturn ONLY valid JSON: {"raceN":1,"postTime":"1:30 PM","grade":null,"gradeName":null,"trackBias":"none","horses":[{"name":"","disp":"","pp":1,"ml":"5-2","b":78,"sty":"Tracker","j":18,"tr":22,"layoff":21,"cc":0,"wins":0,"notes":"","eq":{"lf":false,"bf":false,"bl":false},"wk":[],"distFit":"tested"}]}';

            var resp = await fetch(PROXY_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:5120,
          messages:[{role:'user',content:[
            {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
            {type:'text',text:prompt}
          ]}]
        })
      });

      var data = await resp.json();
      if(data.error) throw new Error(data.error.message);

      var raw = data.content[0].text.trim().replace(/```json|```/g,'').trim();
      var depth=0,jS=-1,jE=-1;
      for(var ci=0;ci<raw.length;ci++){
        if(raw[ci]==='{'){if(depth===0)jS=ci;depth++;}
        else if(raw[ci]==='}'){depth--;if(depth===0){jE=ci+1;break;}}
      }
      if(jS>-1&&jE>-1) raw=raw.slice(jS,jE);
      var parsed = JSON.parse(raw);

      var raceN = hintRaceN || parseInt(parsed.raceN) || (fi+1);
      var ri    = R.findIndex(function(r){return r.n===raceN;});
      if(ri<0){
        R.push({n:raceN,t:'',d:'',ty:'',grade:0,gradeName:'',horses:[]});
        R.sort(function(a,b){return a.n-b.n;});
        ri = R.findIndex(function(r){return r.n===raceN;});
      }

      var horses = (parsed.horses||[]).filter(function(h){
        var n=(h.name||'').trim();
        return n.length>1 && isNaN(n) && !/^\d+$/.test(n);
      });
      if(!horses.length) throw new Error('No valid horses extracted');

      R[ri].horses = horses.map(function(h){
        return {name:h.name||'',disp:h.disp||h.name||'',pp:parseInt(h.pp)||0,
          ml:h.ml||'5-1',b:parseInt(h.b)||0,sty:h.sty||'Midpack',
          j:parseInt(h.j)||10,tr:parseInt(h.tr)||10,wins:parseInt(h.wins)||0,
          notes:h.notes||'',layoff:parseInt(h.layoff)||21,cc:parseInt(h.cc)||0,
          eq:h.eq||{lf:false,bf:false,bl:false},wk:h.wk||[],distFit:h.distFit||'tested'};
      });
      if(parsed.postTime&&/\d+:\d+/.test(parsed.postTime)) R[ri].t=parsed.postTime;
      if(parsed.grade&&parseInt(parsed.grade)>0){ R[ri].grade=parseInt(parsed.grade); R[ri].gradeName=parsed.gradeName||''; }
      if(parsed.trackBias&&parsed.trackBias!=='none'&&tc.bias==='none'){ tc.bias=parsed.trackBias; renderTC(); }

      applied++;
      console.log('Race '+raceN+' from '+file.name+': '+horses.length+' horses');

    }catch(e){
      errors.push(file.name+': '+e.message);
      console.error('Multi-PDF', file.name, e.message);
    }

    if(fi < fileArr.length-1) await new Promise(function(r){setTimeout(r,3000);});
  }

  ppParseState.progress = null;
  ppParseState.fullCardApplied = applied;
  if(errors.length) ppParseState.error = errors.join(' | ');

  persistState().catch(function(e){});
  var st=JSON.parse(localStorage.getItem('paddockiq_state')||'{}');
  st.races=R.map(function(r){return {n:r.n,t:r.t,d:r.d,ty:r.ty,grade:r.grade||0,gradeName:r.gradeName||'',horses:r.horses.map(function(h){return {name:h.name,disp:h.disp,pp:h.pp,ml:h.ml,b:h.b,sty:h.sty,j:h.j,tr:h.tr,layoff:h.layoff,cc:h.cc,wins:h.wins,notes:h.notes,eq:h.eq||{lf:false,bf:false,bl:false},wk:h.wk||[],distFit:h.distFit||'tested'};})};});
  st.savedAt=new Date().toISOString(); st.cardInfo=cardInfo;
  localStorage.setItem('paddockiq_state',JSON.stringify(st));
  scheduleAutoExport(); writeParseTrigger(); saveCardToDrive();
  renderRaceTabs(); goRace(0); render(); renderPPParser();
  document.querySelectorAll('.ntab').forEach(function(b){if(b.textContent.indexOf('Rankings')>-1)b.click();});
  var msg='\u2713 Done! '+applied+'/'+total+' race PDFs loaded!'+(errors.length?'\n\nFailed: '+errors.join(', '):'');
  alert(msg);
}


async function parsePPs(){
  // Use variable directly — DOM element may not exist if tab not rendered
  var key = ppApiKey || (document.getElementById('pp-api-key') ? document.getElementById('pp-api-key').value.trim() : '');

  // ── Step 1: Fetch Equibase to get official race structure + horse rosters ──
  if(typeof fetchEquibaseData === 'function' && cardInfo.date){
    try{
      var eqCheck = await fetchEquibaseData();
      if(eqCheck && eqCheck.races && eqCheck.races.length > 0){
        rebuildRacesFromEquibase(eqCheck);
        console.log('Pre-parse Equibase sync: R.length =', R.length);
        // Also extract horse rosters for validation
        try{
          var dp2=cardInfo.date.split('-');
          var yr2=dp2[0].slice(2);
          var eqUrl='https://www.equibase.com/static/entry/'+cardInfo.code+dp2[1]+dp2[2]+yr2+'USA-EQB.html';
          var eqResp = await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'fetchDRF',url:eqUrl})});
          var eqData = await eqResp.json();
          if(eqData.ok && eqData.text){
            equibaseRosters = parseEquibaseRosters(eqData.text);
            var totalHorses = Object.values(equibaseRosters).reduce(function(s,v){return s+v.length;},0);
            console.log('Equibase rosters: '+totalHorses+' horses across '+Object.keys(equibaseRosters).length+' races');
          }
        }catch(re){ console.warn('Roster fetch failed:', re.message); }
      }
    }catch(e){ console.warn('Pre-parse Equibase sync failed:', e.message); }
  }
  var ri=-1; // Always parse all races
  var mode=ppParseState.mode||'pdf';

  if(!key){ppParseState.error='Enter your Anthropic API key above (sk-ant-...).';renderPPParser();return;}

  // Build content array — PDF or text
  var userContent=[];
  // Full card: parse each race sequentially
  if(ri === -1){
    var src = ppParseState.pdfText || null;
    if(!src && mode==='text'){
      var ta=document.getElementById('pp-raw-text');
      src = ta ? ta.value.trim() : '';
    }
    if(!src){
      ppParseState.error='No PDF text found. Please re-upload the PDF file.';
      renderPPParser();return;
    }
    parseAllRaces(key, src);
    return;
  }

  if(mode==='pdf'){
    if(!ppParseState.pdfText&&!ppParseState.pdfBase64){
      ppParseState.error='Please select a PDF file first.';renderPPParser();return;
    }
    if(ppParseState.pdfText){
      userContent=[{type:'text',text:buildParsePrompt(ri)+'\n\nPP TEXT (extracted from PDF):\n'+ppParseState.pdfText}];
    } else {
      userContent=[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:ppParseState.pdfBase64}},
        {type:'text',text:buildParsePrompt(ri)}
      ];
    }
  } else {
    var text=document.getElementById('pp-raw-text').value.trim();
    if(!text||text.length<50){ppParseState.error='Please paste DRF PP text first.';renderPPParser();return;}
    userContent=[{type:'text',text:buildParsePrompt(ri)+'\n\nPP TEXT:\n'+text}];
  }

  ppParseState.loading=true;ppParseState.error=null;ppParseState.result=null;
  renderPPParser();

  try{
    var resp=await fetch(PROXY_URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-beta':'pdfs-2024-09-25'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:8192,
        messages:[{role:'user',content:userContent}]
      })
    });
    var data=await resp.json();
    if(data.error){throw new Error(data.error.message||'API error');}
    var raw=data.content[0].text.trim();
    raw=raw.replace(/```json|```/g,'').trim();
    // Extract JSON object or array
    var objMatch=raw.match(/\{[\s\S]*\}/);
    if(objMatch)raw=objMatch[0];
    var parsed=JSON.parse(raw);
    var bias=parsed.trackBias||'none';

    // Full card response: {races:[{n,horses},...],...}
    if(parsed.races&&Array.isArray(parsed.races)&&parsed.races.length>0){
      // Apply all races at once
      var applied=0;
      parsed.races.forEach(function(raceData){
        var ri=R.findIndex(function(r){return r.n===raceData.n;});
        if(ri<0||!raceData.horses||!raceData.horses.length)return;
        R[ri].horses=raceData.horses.map(function(h){
          return {name:h.name,disp:h.disp||h.name,pp:h.pp||0,ml:h.ml||'5-1',
            b:h.b||0,sty:h.sty||'Midpack',j:h.j||10,tr:h.tr||10,
            wins:h.wins||0,notes:h.notes||'',layoff:h.layoff||21,cc:h.cc||0,
            eq:h.eq||{lf:false,bf:false,bl:false},wk:h.wk||[],distFit:h.distFit||'tested',
            // Validate cc — should be in $K (e.g. -10 = drop $10K), cap at ±150
            cc: (function(v){ v=parseInt(v)||0; if(Math.abs(v)>150) v=Math.round(v/1000); return Math.max(-150,Math.min(150,v)); })(h.cc)};
        });
        applied++;
      });
      if(bias!=='none'&&tc.bias==='none'){tc.bias=bias;renderTC();ppParseState.biasApplied=bias;}
      ppParseState.loading=false;
      ppParseState.result=null; // no single-race preview for full card
      ppParseState.fullCardApplied=applied;
      renderPPParser();
      goRace(CUR);
      document.querySelectorAll('.ntab').forEach(function(b){if(b.textContent.indexOf('Rankings')>-1){b.click();}});
      alert('✓ Full card parsed — '+applied+' races loaded with PP data!');
      return;
    }

    // Single race response: {horses:[...],...}
    var horses=Array.isArray(parsed)?parsed:(parsed.horses||[]);
    if(!horses.length){throw new Error('Parser returned empty — try selecting a specific race number instead of All Races');}
    if(bias!=='none'&&tc.bias==='none'){tc.bias=bias;renderTC();ppParseState.biasApplied=bias;}
    ppParseState.result=horses;
    ppParseState.loading=false;
    renderPPParser();
  }catch(e){
    ppParseState.loading=false;
    var emsg=e.message||'';
    if(emsg.toLowerCase().indexOf('fetch')>-1||emsg.toLowerCase().indexOf('network')>-1||emsg.toLowerCase().indexOf('cors')>-1){
      ppParseState.error='\u26a0 Connection blocked — connection failed — make sure the app is deployed on Netlify (not opened as a local file). If the problem persists, check your API key. (Error: '+emsg+')';
    } else if(emsg.indexOf('401')>-1||emsg.indexOf('auth')>-1){
      ppParseState.error='\u26a0 API key rejected — check your key in the field above (sk-ant-...).';
    } else {
      ppParseState.error='Parse error: '+emsg+'. Try: (1) parse one race at a time using the race selector, or (2) switch to Paste Text mode and paste just that race result.';
    }
    renderPPParser();
  }
}

async function parseAllRaces(key, srcText){
  var total   = R.length;
  var applied = 0;
  var errors  = [];
  var allRaceNums = R.map(function(r){return r.n;}).sort(function(a,b){return a-b;});

  ppParseState.loading  = false;
  ppParseState.progress = {current:0,total:total,applied:0};
  ppParseState.error    = null;
  ppParseState.result   = null;
  renderPPParser();

  function setProgress(msg, pct){
    var el = document.getElementById('parse-progress');
    if(!el) return;
    el.innerHTML =
      '<div style="font-size:13px;color:#b48cf8;margin-bottom:6px">'+msg+'</div>'+
      '<div style="background:var(--border);border-radius:4px;height:8px;width:100%">'+
        '<div style="background:#b48cf8;border-radius:4px;height:8px;width:'+pct+'%;transition:width .4s"></div>'+
      '</div>'+
      '<div style="font-size:11px;color:var(--dim);margin-top:4px">'+applied+'/'+total+' races applied</div>';
  }

  // ── One API call per race — most reliable approach ───────────────────────
  // Each race gets a centered chunk. Equibase roster filters bad results.
  var chunkSize = Math.ceil(srcText.length / total);
  var overlap   = Math.floor(chunkSize * 0.25); // 25% each side

  for(var i=0; i<allRaceNums.length; i++){
    var raceN = allRaceNums[i];
    var ri    = R.findIndex(function(r){return r.n===raceN;});
    if(ri < 0) continue;

    setProgress('Parsing Race '+raceN+' of '+allRaceNums[allRaceNums.length-1]+'...', Math.round(i/total*90));

    // Center chunk on this race's position in the text
    var cStart = Math.max(0, i*chunkSize - overlap);
    var cEnd   = Math.min(srcText.length, (i+1)*chunkSize + overlap);
    var chunk  = srcText.slice(cStart, cEnd);

    // Equibase roster for this race — used as anchor and filter
    var roster = (typeof equibaseRosters!=='undefined' && equibaseRosters[raceN]) || [];
    var rosterStr = roster.length
      ? '\nEquibase confirms these horses are in Race '+raceN+': '+roster.map(function(h){return h.name;}).join(', ')+'.\nOnly return horses from this list.'
      : '';

    var prevN = i>0 ? allRaceNums[i-1] : null;
    var nextN = i<allRaceNums.length-1 ? allRaceNums[i+1] : null;

    var prompt =
      'Extract past performance data for Race '+raceN+' ONLY from this DRF text.'+rosterStr+'\n\n'+
      'CRITICAL RULES:\n'+
      '1. Horse NAMES are proper nouns — e.g. "Boltoro", "Australian Navy", "Mo Sense"\n'+
      '2. NEVER use a number as a horse name. Numbers = post positions (pp field)\n'+
      '3. Only include horses entered in Race '+raceN+
        (prevN ? ' — Race '+prevN+' horses have already been extracted, do not include them.' : '')+
        (nextN ? ' — Race '+nextN+' horses will be extracted next, do not include them.' : '')+'\n'+
      '4. J/T stats line format: "J/T 2025-26 OP (47 14 .30 $2.14)" — use .30 = 30% for j or tr\n'+
      '5. Use CURRENT MEET (OP/KEE/CD etc) win% for jockey and trainer, not career\n\n'+
      'Return ONLY valid JSON:\n'+
      '{"postTime":null,"grade":null,"gradeName":null,"trackBias":"none","horses":[\n'+
      '  {"name":"HorseName","disp":"Horse Name","pp":1,"ml":"5-2","b":78,\n'+
      '   "sty":"Tracker","j":18,"tr":22,"layoff":21,"cc":-10,"wins":3,\n'+
      '   "notes":"brief key angles","eq":{"lf":false,"bf":false,"bl":false},\n'+
      '   "wk":[{"daysAgo":5,"dist":"5f","time":"1:00.2","bullet":true,"rank":1,"field":8,"track":"OP"}],\n'+
      '   "distFit":"proven"}\n'+
      ']}\n\n'+
      'PP TEXT:\n'+chunk;

    var attempts = 0;
    var success  = false;

    while(attempts < 2 && !success){
      attempts++;
      try{
        var resp = await fetch(PROXY_URL,{
          method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
          body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:5120,
            messages:[{role:'user',content:[{type:'text',text:prompt}]}]})
        });
        var txt  = await resp.text();
        var data; try{data=JSON.parse(txt);}catch(e){throw new Error('Proxy: '+txt.slice(0,60));}

        if(data.error){
          var em = data.error.message||'';
          if(em.indexOf('rate limit')>-1){
            setProgress('Rate limit — waiting 65s...', Math.round(i/total*90));
            await new Promise(function(r){setTimeout(r,65000);});
            attempts--; continue;
          }
          if(em.indexOf('credit')>-1||em.indexOf('billing')>-1){
            ppParseState.error='\u26a0\ufe0f API credits exhausted.';
            renderPPParser(); return;
          }
          throw new Error(em);
        }

        // Extract JSON
        var raw   = data.content[0].text.trim().replace(/```json|```/g,'').trim();
        var depth=0,jS=-1,jE=-1;
        for(var ci=0;ci<raw.length;ci++){
          if(raw[ci]==='{'){if(depth===0)jS=ci;depth++;}
          else if(raw[ci]==='}'){depth--;if(depth===0){jE=ci+1;break;}}
        }
        if(jS>-1&&jE>-1) raw=raw.slice(jS,jE);
        var parsed = JSON.parse(raw);

        // Apply track bias
        if(parsed.trackBias&&parsed.trackBias!=='none'&&tc.bias==='none'){tc.bias=parsed.trackBias;renderTC();}

        // Apply post time + grade
        if(parsed.postTime&&/\d+:\d+/.test(parsed.postTime)) R[ri].t=parsed.postTime;
        if(parsed.grade&&parseInt(parsed.grade)>0){
          R[ri].grade=parseInt(parsed.grade);
          R[ri].gradeName=parsed.gradeName||'';
        }

        var horses = parsed.horses||[];

        // Filter: no numeric names, must be 2+ chars
        horses = horses.filter(function(h){
          var n=(h.name||'').trim();
          return n.length>1 && isNaN(n) && !/^\d+$/.test(n);
        });

        // Filter to roster if available (prevents cross-race contamination)
        if(roster.length){
          var rLow = roster.map(function(r){return r.name.toLowerCase().replace(/[^a-z]/g,'');});
          var filtered = horses.filter(function(h){
            var hn=(h.name||'').toLowerCase().replace(/[^a-z]/g,'');
            var hd=(h.disp||'').toLowerCase().replace(/[^a-z]/g,'');
            return rLow.some(function(r){
              if(r===hn||r===hd) return true;
              if(r.length>=5&&hn.length>=5&&(hn.indexOf(r)>-1||r.indexOf(hn)>-1)) return true;
              return false;
            });
          });
          // Use filtered if it has a reasonable number of horses
          if(filtered.length >= Math.min(3, horses.length * 0.5)) horses = filtered;
        }

        if(!horses.length){
          if(attempts < 2){
            console.warn('R'+raceN+' attempt '+attempts+': no valid horses, retrying with wider chunk');
            var wider = Math.floor(chunkSize * 0.40);
            var wStart = Math.max(0, i*chunkSize - wider);
            var wEnd   = Math.min(srcText.length, (i+1)*chunkSize + wider);
            chunk = srcText.slice(wStart, wEnd);
            continue;
          }
          errors.push('R'+raceN+': no horses extracted');
          break;
        }

        R[ri].horses = horses.map(function(h){
          return {name:h.name||'',disp:h.disp||h.name||'',pp:parseInt(h.pp)||0,
            ml:h.ml||'5-1',b:parseInt(h.b)||0,sty:h.sty||'Midpack',
            j:parseInt(h.j)||10,tr:parseInt(h.tr)||10,wins:parseInt(h.wins)||0,
            notes:h.notes||'',layoff:parseInt(h.layoff)||21,cc:parseInt(h.cc)||0,
            eq:h.eq||{lf:false,bf:false,bl:false},wk:h.wk||[],distFit:h.distFit||'tested',
            // Validate cc — should be in $K (e.g. -10 = drop $10K), cap at ±150
            cc: (function(v){ v=parseInt(v)||0; if(Math.abs(v)>150) v=Math.round(v/1000); return Math.max(-150,Math.min(150,v)); })(h.cc)};
        });

        applied++;
        success = true;
        console.log('R'+raceN+' OK: '+horses.length+' horses'+(roster.length?' ('+roster.length+' in roster)':''));

      }catch(e){
        if(attempts >= 2){
          errors.push('R'+raceN+': '+e.message);
          console.error('R'+raceN+' failed:', e.message);
        }
      }
    }

    // 3 second gap between races to stay under rate limit
    if(i < allRaceNums.length-1) await new Promise(function(r){setTimeout(r,3000);});
  }

  // ── Validation + backstop ─────────────────────────────────────────────────
  var missingRaces=[], partialRaces=[];
  R.forEach(function(r){
    var roster=(typeof equibaseRosters!=='undefined'&&equibaseRosters[r.n])||[];
    var active=roster.filter(function(h){return !h.scratched;});
    if(!active.length) return;
    var parsed=r.horses.map(function(h){return (h.name||'').toLowerCase().replace(/[^a-z]/g,'');});
    var missing=active.filter(function(eq){
      var en=eq.name.toLowerCase().replace(/[^a-z]/g,'');
      return !parsed.some(function(p){
        if(p===en)return true;
        if(en.length>=5&&p.length>=5&&(p.indexOf(en)>-1||en.indexOf(p)>-1))return true;
        return false;
      });
    });
    if(r.horses.length===0){
      missingRaces.push({n:r.n,count:active.length});
      active.forEach(function(eq){
        r.horses.push({name:eq.name.replace(/\s+/g,'_'),disp:eq.name,pp:eq.pp,
          ml:eq.ml||'5-1',b:0,sty:'Midpack',j:10,tr:10,wins:0,layoff:21,cc:0,
          notes:'[Equibase backstop]',eq:{lf:false,bf:false,bl:false},wk:[],distFit:'tested'});
      });
    } else if(missing.length){
      partialRaces.push({n:r.n,parsed:r.horses.length,total:active.length,missing:missing});
      missing.forEach(function(eq){
        r.horses.push({name:eq.name.replace(/\s+/g,'_'),disp:eq.name,pp:eq.pp,
          ml:eq.ml||'5-1',b:0,sty:'Midpack',j:10,tr:10,wins:0,layoff:21,cc:0,
          notes:'[Equibase backstop]',eq:{lf:false,bf:false,bl:false},wk:[],distFit:'tested'});
      });
    }
  });

  ppParseState.progress=null; ppParseState.fullCardApplied=applied;
  if(errors.length) ppParseState.error=errors.join(' | ');

  // Save
  var st=JSON.parse(localStorage.getItem('paddockiq_state')||'{}');
  st.races=R.map(function(r){return {n:r.n,t:r.t,d:r.d,ty:r.ty,grade:r.grade||0,gradeName:r.gradeName||'',horses:r.horses.map(function(h){
    return {name:h.name,disp:h.disp,pp:h.pp,ml:h.ml,b:h.b,sty:h.sty,j:h.j,tr:h.tr,
      layoff:h.layoff,cc:h.cc,wins:h.wins,notes:h.notes,eq:h.eq||{lf:false,bf:false,bl:false},wk:h.wk||[],distFit:h.distFit||'tested'};
  })};});
  st.savedAt=new Date().toISOString(); st.cardInfo=cardInfo;
  localStorage.setItem('paddockiq_state',JSON.stringify(st));
  persistState().catch(function(e){});

  // Schedule auto-export at 11 PM now that we have parsed data
  scheduleAutoExport();
  writeParseTrigger();
  saveCardToDrive();

  var msg='\u2713 Done! '+applied+'/'+total+' races loaded!';
  if(errors.length) msg+='\n\nErrors: '+errors.join(', ');
  if(missingRaces.length) msg+='\n\n\u26a0\ufe0f '+missingRaces.length+' race(s) empty — filled from Equibase:\n'+missingRaces.map(function(r){return 'Race '+r.n+' ('+r.count+' horses added)';}).join('\n');
  if(partialRaces.length) msg+='\n\n\u26a0\ufe0f '+partialRaces.length+' race(s) partial — missing horses added:\n'+partialRaces.map(function(r){return 'Race '+r.n+': got '+r.parsed+'/'+r.total;}).join('\n');

  renderRaceTabs(); goRace(0); render(); renderPPParser();
  document.querySelectorAll('.ntab').forEach(function(b){if(b.textContent.indexOf('Rankings')>-1)b.click();});
  alert(msg);
}


function splitTextByRace(text, numRaces){
  // Try to find DRF race boundary markers
  var ordinals = ['1st','2nd','3rd','4th','5th','6th','7th','8th','9th','10th'];
  var patterns = [];
  // Pattern: "1st Race", "RACE 1", "Race 1", numbered headers
  for(var i=0;i<numRaces;i++){
    patterns.push(new RegExp('('+ordinals[i]+'\\s+Race|RACE\\s+'+(i+1)+'\\b|Race\\s+'+(i+1)+'\\b)', 'i'));
  }
  
  // Find positions of each race boundary
  var positions = [];
  for(var i=0;i<patterns.length;i++){
    var m = patterns[i].exec(text);
    if(m) positions.push({idx:i, pos:m.index});
  }
  positions.sort(function(a,b){return a.pos-b.pos;});
  
  // If we found boundaries, split on them
  if(positions.length >= Math.floor(numRaces * 0.5)){
    var chunks = [];
    for(var i=0;i<positions.length;i++){
      var start = positions[i].pos;
      var end = i+1 < positions.length ? positions[i+1].pos : text.length;
      chunks[positions[i].idx] = text.slice(start, end);
    }
    // Fill any missing with empty string
    for(var i=0;i<numRaces;i++){ if(!chunks[i]) chunks[i]=''; }
    return chunks;
  }
  
  // Fallback: equal chunks by line count
  var lines = text.split('\n');
  var chunkLines = Math.ceil(lines.length / numRaces);
  var chunks = [];
  for(var i=0;i<numRaces;i++){
    chunks.push(lines.slice(i*chunkLines, (i+1)*chunkLines+20).join('\n'));
  }
  return chunks;
}

function buildParsePrompt(ri){
  var isAll = ri === -1;
  var raceRef = isAll ? 'ALL races in this card' : 'Race '+R[ri].n;
  return 'You are a horse racing handicapping data extractor. Extract horse data from the following DRF past performance document for '+raceRef+'.\n\n'+
    'For each horse return a JSON object with these exact fields:\n'+
    '- name: string (internal key, no apostrophes, e.g. "Im Fired Up")\n'+
    '- disp: string (display name with proper punctuation, e.g. "I\'m Fired Up")\n'+
    '- pp: number (post position number)\n'+
    '- ml: string (morning line odds e.g. "5-2", "9-1")\n'+
    '- b: number (best recent Beyer Speed Figure, 0 if debut or unknown)\n'+
    '- sty: string (exactly one of: Leader, Speed, Tracker, Midpack, Closer, Plodder)\n'+
    '- j: number (jockey win% at meet or overall, integer 0-99)\n'+
    '- tr: number (trainer win% at meet or overall, integer 0-99)\n'+
    '- layoff: number (days since last race; use 14 if under 2 weeks, 21 if unknown)\n'+
    '- cc: number (class change in $K: negative=dropped, positive=rose, 0=same)\n'+
    '- wins: number (career wins total)\n'+
    '- notes: string (brief: X wins, last finish, key angle. No apostrophes)\n'+
    '- eq: object — {lf: bool (lasix first time), bf: bool (blinkers first time), bl: bool (blinkers continuing)}\n'+
    '- wk: array of workout objects, most recent first, max 5. Each workout:\n'+
    '  {daysAgo: number (days before race date, e.g. 5), dist: string (e.g. "4f","5f","6f"), '+
    'time: string (e.g. "0:47.2","1:00.1"), bullet: bool (fastest of the day = B), '+
    'rank: number (e.g. 3 if 3/18), field: number (e.g. 18 if 3/18), track: string (e.g. "OP")}\n'+
    '  If no workouts available, use empty array [].\n\n'+
    'Style guide: Leader/Speed=on or near front; Tracker=just off pace; Midpack=middle; Closer=from behind; Plodder=always far back.\n\n'+
    'Also detect track bias. Add top-level "trackBias": one of "none","speed","closer","inside","outside".\n\n'+
    +(isAll
      ? 'Return a JSON object: {"races": [{"n": 1, "horses": [...]}, {"n": 2, "horses": [...]}], "trackBias": "none"}. One entry per race. No markdown, no backticks, no preamble.'
      : 'Return a JSON object: {"horses": [...], "trackBias": "none"}. No markdown, no backticks, no preamble.');
}

function applyParsedHorses(ri){
  var horses=ppParseState.result;
  if(!horses||!horses.length)return;
  // Merge into race — preserve existing scratches, kaci, liveOdds
  R[ri].horses=horses.map(function(h){
    return {
      name:h.name, disp:h.disp||h.name, pp:h.pp||0, ml:h.ml||'5-1',
      b:h.b||0, sty:h.sty||'Midpack', j:h.j||10, tr:h.tr||10,
      wins:h.wins||0, notes:h.notes||'', layoff:h.layoff||21, cc:h.cc||0,
      eq:h.eq||{lf:false,bf:false,bl:false},
      wk:h.wk||[]
    };
  });
  ppParseState.result=null;
  ppParseState.error=null;
  CUR=ri;
  goRace(ri);
  // Switch to rankings to show result
  document.querySelectorAll('.ntab').forEach(function(b){
    if(b.textContent.indexOf('Rankings')>-1){b.click();}
  });
  alert('Race '+R[ri].n+' updated with '+horses.length+' horses from PP data!');
}


async function saveCardToServer(){
  var btn=document.getElementById("save-card-btn"),st=document.getElementById("save-card-status");
  if(!R.some(function(r){return r.horses.length>0;})){if(st)st.textContent="No parsed card.";return;}
  if(btn){btn.disabled=true;btn.textContent="Saving...";}
  try{
    var raceDate=(cardInfo&&cardInfo.date)?cardInfo.date:new Date().toLocaleDateString("en-CA",{timeZone:"America/Chicago"});
    var track=(cardInfo&&cardInfo.code)?cardInfo.code:"OP";
    var trackName=(cardInfo&&cardInfo.track)?cardInfo.track:"Oaklawn Park";
    var p=raceDate.split("-"),months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var label=trackName+" - "+months[parseInt(p[1])-1]+" "+parseInt(p[2]);
    var resp=await fetch("/api/cards",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({track:track,raceDate:raceDate,numRaces:R.filter(function(r){return r.horses.length>0;}).length,label:label,data:JSON.stringify({cardInfo:cardInfo,races:R,scratches:scratches})})});
    var data=await resp.json();
    if(data.ok){if(st)st.innerHTML='<span style="color:var(--green)">Saved: '+label+'</span>';await loadSavedCardList();}
  }catch(e){if(st)st.innerHTML='<span style="color:var(--red)">Error: '+e.message+'</span>';}
  if(btn){btn.disabled=false;btn.textContent="Save Card";}
}
async function loadSavedCardList(){
  try{
    var resp=await fetch("/api/cards"),cards=await resp.json();
    var sel=document.getElementById("saved-cards-sel");
    if(!sel||!Array.isArray(cards))return;
    var today=new Date().toLocaleDateString("en-CA",{timeZone:"America/Chicago"});
    sel.innerHTML='<option value="">Select a saved card</option>'+cards.map(function(c){
      var flag=c.raceDate===today?" TODAY":c.raceDate>today?" UPCOMING":" past";
      return '<option value="'+c.id+'">'+c.label+flag+'</option>';
    }).join("");
    var auto=cards.find(function(c){return c.raceDate===today;})||cards.find(function(c){return c.raceDate>=today;});
    if(auto&&!R.some(function(r){return r.horses.length>0;}))await loadCardById(auto.id);
  }catch(e){console.warn(e);}
}
async function loadCardById(id){
  try{
    var resp=await fetch("/api/cards?id="+id),card=await resp.json();
    if(!card||!card.data)return;
    var saved=JSON.parse(card.data);
    if(saved.cardInfo){if(!cardInfo)cardInfo={};Object.assign(cardInfo,saved.cardInfo);}
    if(saved.races&&saved.races.length)R=saved.races;
    if(saved.scratches)scratches=saved.scratches;
    updateCardHeader();renderRaceTabs();goRace(0);render();
    var st=document.getElementById("save-card-status");
    if(st)st.innerHTML='<span style="color:var(--green)">Loaded: '+card.label+'</span>';
    document.querySelectorAll(".ntab").forEach(function(b){if(b.textContent.indexOf("Rankings")>-1)b.click();});
  }catch(e){console.warn(e);}
}
async function loadSelectedCard(){
  var sel=document.getElementById("saved-cards-sel");
  if(!sel||!sel.value)return;
  await loadCardById(parseInt(sel.value));
}

  try{
    var raceDate=(cardInfo&&cardInfo.date)?cardInfo.date:new Date().toLocaleDateString("en-CA",{timeZone:"America/Chicago"});
    var track=(cardInfo&&cardInfo.code)?cardInfo.code:"OP";
    var trackName=(cardInfo&&cardInfo.track)?cardInfo.track:"Oaklawn Park";
    var p=raceDate.split("-"),months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var label=trackName+" - "+months[parseInt(p[1])-1]+" "+parseInt(p[2]);
    var resp=await fetch("/api/cards",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({track:track,raceDate:raceDate,numRaces:R.filter(function(r){return r.horses.length>0;}).length,label:label,data:JSON.stringify({cardInfo:cardInfo,races:R,scratches:scratches})})});
    var data=await resp.json();
    if(data.ok){if(st)st.innerHTML='<span style="color:var(--green)">Saved: '+label+'</span>';await loadSavedCardList();}
  }catch(e){if(st)st.innerHTML='<span style="color:var(--red)">Error: '+e.message+'</span>';}
  if(btn){btn.disabled=false;btn.textContent="Save Card";}
}
async function loadSavedCardList(){
  try{
    var resp=await fetch("/api/cards"),cards=await resp.json();
    var sel=document.getElementById("saved-cards-sel");
    if(!sel||!Array.isArray(cards))return;
    var today=new Date().toLocaleDateString("en-CA",{timeZone:"America/Chicago"});
    sel.innerHTML='<option value="">Select a saved card</option>'+cards.map(function(c){
      var flag=c.raceDate===today?" TODAY":c.raceDate>today?" UPCOMING":" past";
      return '<option value="'+c.id+'">'+c.label+flag+'</option>';
    }).join("");
    var auto=cards.find(function(c){return c.raceDate===today;})||cards.find(function(c){return c.raceDate>=today;});
    if(auto&&!R.some(function(r){return r.horses.length>0;}))await loadCardById(auto.id);
  }catch(e){console.warn(e);}
}
async function loadCardById(id){
  try{
    var resp=await fetch("/api/cards?id="+id),card=await resp.json();
    if(!card||!card.data)return;
    var saved=JSON.parse(card.data);
    if(saved.cardInfo){if(!cardInfo)cardInfo={};Object.assign(cardInfo,saved.cardInfo);}
    if(saved.races&&saved.races.length)R=saved.races;
    if(saved.scratches)scratches=saved.scratches;
    updateCardHeader();renderRaceTabs();goRace(0);render();
    var st=document.getElementById("save-card-status");
    if(st)st.innerHTML='<span style="color:var(--green)">Loaded: '+card.label+'</span>';
    document.querySelectorAll(".ntab").forEach(function(b){if(b.textContent.indexOf("Rankings")>-1)b.click();});
  }catch(e){console.warn(e);}
}
async function loadSelectedCard(){
  var sel=document.getElementById("saved-cards-sel");
  if(!sel||!sel.value)return;
  await loadCardById(parseInt(sel.value));
}
</script>
